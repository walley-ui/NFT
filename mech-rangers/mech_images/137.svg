 x1="902.7670741986111" y1="771.7651180826127" x2="911.5302547428385" y2="131.27972513521087" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="868.2,152.6 936.3,150.2 914.9,-6.8" fill="url(#blader1x137)" stroke="#00ff60" stroke-width="1.8" filter="url(#wmr1x137)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="877.4297206322291" y="420.2607271192595" width="40.0" height="20.0" fill="url(#bevelr1x137)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x137)"/><rect x="880.108589437753" y="513.1896938582883" width="40.0" height="20.0" fill="url(#bevelr1x137)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x137)"/><rect x="877.4396592501179" y="602.062058420293" width="40.0" height="20.0" fill="url(#bevelr1x137)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x137)"/><rect x="878.3632729748823" y="691.3923674163408" width="40.0" height="20.0" fill="url(#bevelr1x137)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x137)"/><ellipse cx="896.1270177721605" cy="792.1231757570989" rx="22.0" ry="15.0" fill="url(#bevelr1x137)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x137)"/></g><rect x="449.8252047694288" y="558.5234804895706" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x137)"/><rect x="425.5906128930859" y="576.0370390951633" width="152.0" height="26.0" fill="url(#bevelr1x137)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x137)"/><polygon points="307.7,379.8 350.7,295.1 498.6,277.9 651.1,293.8 692.8,380.1 669.9,504.8 499.6,565.4 332.8,505.2" fill="url(#suitr1x137)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x137) url(#metalr1x137)"/><polygon points="309.4,379.3 348.9,295.5 501.2,279.1 648.4,294.8 692.2,381.7 669.9,504.9 499.5,563.9 329.4,504.7" fill="url(#carbonr1x137)"/><polygon points="381.2,304.5 498.6,284.6 618.4,301.7 608.3,379.9 393.6,380.9" fill="url(#sui