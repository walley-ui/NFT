.0" y="522.9" width="9.3" height="17.4" rx="1" fill="#ccccff" stroke="#0d1520" stroke-width=".6"/></g><g><polygon points="829.2,291.9 966.7,293.7 966.1,590.3 899.4,726.3 827.2,591.5" fill="url(#titaniumr1x5284)" stroke="#ccccff" stroke-width="2.6" filter="url(#wmr1x5284)"/><polygon points="828.7,293.5 966.1,291.7 968.6,591.1 897.2,726.4 826.7,590.5" fill="url(#carbonr1x5284)"/><polygon points="860.6,359.6 936.5,361.1 935.0,539.7 896.1,632.0 861.6,540.2" fill="#ccccff" fill-opacity=".28" stroke="#ccccff" stroke-width="1.5"/><line x1="847.4051508547366" y1="430.92233713455494" x2="948.7839266118222" y2="431.03054328672584" stroke="#ccccff" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.5949130967819" y1="331.94323971839617" x2="899.1449964588136" y2="590.1048295406624" stroke="#ccccff" stroke-opacity=".4" stroke-width="1"/><line x1="828.1963844791613" y1="295.13015070101244" x2="966.144244359117" y2="294.92614923762153" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.4709775169939" cy="431.4765647208318" r="18.0" fill="url(#bevelr1x5284)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x5284)"/></g><rect x="449.3914170683362" y="557.6703513989224" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x5284)"/><rect x="425.1657763378695" y="575.2633322820999" width="152.0" height="26.0" fill="url(#bevelr1x5284)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x5284)"/><polygon points="308.1,379.1 348.6,296.1 498.5,276.4 651.0,293.7 691.0,381.8 670.5,503.9 501.7,564.2 329.8,505.2" fill="url(#suitr1x5284)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x5284) url(#metalr1x5284)"/><polygon points="309.6,382.1 350.8,293.5 500.5,277.4 648.3,292.8 690.8,380.3 670.5,502.3 499.2,563.6 329.8,502.3" fill="url(#carbonr1x5284)"/><polygon points="381.9,303.6 498.2,287.1 617.9,303.0 605.8,380.3 392.3,379.5" fill="url(#suitHir1x5284)"/><polygon points="380.3,379.3 364.6,425.2 432.9,5