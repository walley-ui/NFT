0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.4,466.2 235.0,466.3 259.0,735.0 127.9,734.5" fill="url(#suitr1x958)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x958) url(#metalr1x958)"/><polygon points="174.4,431.9 251.3,433.1 244.4,509.6 160.0,512.0" fill="url(#bevelr1x958)" fill-opacity=".72" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x958)"/><polygon points="161.1,621.1 241.9,622.4 238.8,660.3 163.8,659.6" fill="#2060ff" fill-opacity=".42" stroke="#2060ff" stroke-width="1" filter="url(#skr1x958)"/><polygon points="765.5,467.4 848.1,466.3 869.8,735.1 743.0,735.2" fill="url(#suitr1x958)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x958) url(#metalr1x958)"/><polygon points="746.5,431.8 825.3,433.0 841.6,511.1 757.7,509.6" fill="url(#bevelr1x958)" fill-opacity=".72" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x958)"/><polygon points="756.2,622.9 838.7,620.8 834.8,659.4 760.0,659.6" fill="#2060ff" fill-opacity=".42" stroke="#2060ff" stroke-width="1" filter="url(#skr1x958)"/><rect x="121.2"  y="698.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x958)" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x958)"/><rect x="750.2"   y="699.3" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x958)" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x958)"/><line x1="149.9" y1="703.6" x2="148.9" y2="784.1" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="778.9" y1="701.6" x2="777.4" y2="785.3" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="183.0" y1="702.1" x2="183.6" y2="785.4" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="809.2" y1="701.3" x2="812.2" y2="782.5" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="213.6" y1="702.1" x2="215.1" y2="783.5" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="843.2" y1="700.6" x2="845.1" y2="783.6" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><polygon points