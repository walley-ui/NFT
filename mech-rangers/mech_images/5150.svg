2" y="640.8" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.7,466.2 236.0,467.6 257.2,733.6 127.3,733.6" fill="url(#suitr1x5150)" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5150) url(#metalr1x5150)"/><polygon points="173.3,432.3 254.4,431.9 241.9,511.8 160.8,512.1" fill="url(#bevelr1x5150)" fill-opacity=".72" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5150)"/><polygon points="159.7,622.3 243.3,621.3 240.4,661.8 165.1,660.2" fill="#ffcc00" fill-opacity=".42" stroke="#ffcc00" stroke-width="1" filter="url(#skr1x5150)"/><polygon points="764.2,467.1 846.2,467.7 870.7,733.7 741.3,736.4" fill="url(#suitr1x5150)" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5150) url(#metalr1x5150)"/><polygon points="748.6,433.8 825.1,430.8 841.0,509.1 756.3,510.2" fill="url(#bevelr1x5150)" fill-opacity=".72" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5150)"/><polygon points="756.1,622.1 840.5,620.4 833.8,661.5 759.8,661.3" fill="#ffcc00" fill-opacity=".42" stroke="#ffcc00" stroke-width="1" filter="url(#skr1x5150)"/><rect x="121.1"  y="698.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x5150)" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x5150)"/><rect x="748.1"   y="699.1" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x5150)" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x5150)"/><line x1="149.9" y1="700.7" x2="148.7" y2="782.2" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="776.8" y1="702.9" x2="776.5" y2="784.9" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="184.1" y1="700.2" x2="182.5" y2="784.4" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="809.4" y1="700.7" x2="812.4" y2="782.5" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="215.8" y1="701.6" x2="216.7" y2="782.1" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="842.9" y1="703.6" x2="843.3" y2="782.4" stroke="#ffcc00" stroke-opacity=