0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.7,466.0 235.9,466.5 256.7,735.2 128.6,734.7" fill="url(#suitr1x512)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x512) url(#metalr1x512)"/><polygon points="174.9,433.9 253.2,430.9 242.4,510.6 158.0,511.5" fill="url(#bevelr1x512)" fill-opacity=".72" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x512)"/><polygon points="162.6,621.5 242.0,621.3 237.5,660.5 164.2,660.6" fill="#c0c0d0" fill-opacity=".42" stroke="#c0c0d0" stroke-width="1" filter="url(#skr1x512)"/><polygon points="766.5,467.0 845.4,465.0 870.3,734.4 741.6,736.8" fill="url(#suitr1x512)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x512) url(#metalr1x512)"/><polygon points="747.3,430.5 827.4,430.6 841.4,511.8 756.7,509.8" fill="url(#bevelr1x512)" fill-opacity=".72" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x512)"/><polygon points="755.0,621.6 840.5,620.3 836.0,661.4 761.7,661.1" fill="#c0c0d0" fill-opacity=".42" stroke="#c0c0d0" stroke-width="1" filter="url(#skr1x512)"/><rect x="120.8"  y="698.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x512)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x512)"/><rect x="749.9"   y="699.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x512)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x512)"/><line x1="148.9" y1="701.6" x2="149.8" y2="785.3" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="777.0" y1="700.6" x2="777.7" y2="782.5" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="184.3" y1="703.0" x2="184.2" y2="784.0" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="811.3" y1="700.6" x2="810.4" y2="783.7" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="215.5" y1="703.2" x2="213.7" y2="782.8" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="843.4" y1="701.5" x2="844.0" y2="784.6" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><polygon points