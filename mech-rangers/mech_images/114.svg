7.9" y1="548.0" x2="600.0" y2="548.9" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x114)"/><line x1="268.1" y1="491.3" x2="318.6" y2="490.9" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.2" y1="492.2" x2="731.6" y2="489.3" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.7" y1="523.7" x2="320.9" y2="524.3" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.6" y1="521.6" x2="733.1" y2="522.5" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.6" y1="553.2" x2="318.5" y2="556.3" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.7" y1="553.8" x2="733.3" y2="553.8" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.9" y1="585.2" x2="318.2" y2="586.4" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.5" y1="587.1" x2="733.7" y2="585.4" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x114)"><polygon points="500.6,451.4 543.0,511.7 501.0,568.8 457.5,510.5" fill="#ff44aa" stroke="#050508" stroke-width="1.4" filter="url(#skr1x114)"/><polygon points="499.3,452.1 540.6,510.2 500.9,568.2 459.1,510.0" fill="url(#suitHir1x114)" opacity=".45"/></g><rect x="449.6962018892169" y="557.10835726941" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x114)"/><rect x="423.67793493019417" y="576.1732864735649" width="152.0" height="26.0" fill="url(#bevelr1x114)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x114)"/><polygon points="307.6,379.6 351.9,295.5 499.9,278.4 649.9,293.1 693.0,381.9 670.7,504.3 501.7,565.0 329.4,502.3" fill="url(#suitr1x114)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x114) url(#metalr1x114)"/><polygon points="306.8,378.9 349.0,295.5 499.5,276.4 648.4,294.2 693.2,382.3 667.5,504.3 500.0,565.7 331.2,503.6" fill="url(#carbonr1x114)"/><polygon points="382.5,303.2 501.7,287.