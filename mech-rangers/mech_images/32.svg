 fill="rgba(255,255,255,.48)"/><polygon points="153.4,466.7 236.2,465.5 257.4,733.7 127.6,733.5" fill="url(#suitr1x32)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x32) url(#metalr1x32)"/><polygon points="174.3,432.5 252.1,431.5 243.9,510.7 160.8,510.6" fill="url(#bevelr1x32)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x32)"/><polygon points="161.0,622.6 244.9,620.4 239.8,661.5 165.4,660.6" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x32)"/><polygon points="766.7,466.3 847.0,465.8 873.0,735.3 742.8,735.9" fill="url(#suitr1x32)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x32) url(#metalr1x32)"/><polygon points="746.3,433.3 827.0,431.1 841.0,511.0 756.0,508.9" fill="url(#bevelr1x32)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x32)"/><polygon points="755.7,621.9 839.2,620.7 835.9,661.4 761.2,662.5" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x32)"/><rect x="121.3"  y="700.7" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x32)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x32)"/><rect x="746.9"   y="698.9" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x32)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x32)"/><line x1="151.4" y1="700.6" x2="150.9" y2="785.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="778.8" y1="700.9" x2="778.3" y2="783.2" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="181.8" y1="701.2" x2="181.6" y2="782.1" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="809.9" y1="700.6" x2="812.1" y2="783.4" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="213.7" y1="701.6" x2="215.6" y2="784.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="844.8" y1="702.9" x2="842.8" y2="782.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><polygon points="236.6,419.1 764.7,416.3 722.2,664.1 277.6,664.2" fill="url(#suitr1x32)" stroke="#ff00ff" stroke-width="2.6" filter="url(#skr1x32) url(#metalr1x32)"/><polygon points="233.4,418.1 763.3,416.4 724.2,662.4 276.8,661.7" fill="url(#carbonr1x32)"/><polygon points="366.8,416.8 631.3,417.7 611.1,516.2 389.3,514.2" fill="url(#suitHir1x32)"/><line x1="361.3" y1="472.1" x2="639.4" y2="469.8" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x32)"/><line x1="398.8" y1="548.1" x2="599.9" y2="549.5" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x32)"/><line x1="267.1" y1="490.9" x2="321.1" y2="490.2" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.1" y1="489.7" x2="732.4" y2="492.6" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.4" y1="523.7" x2="319.3" y2="521.1" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="682.0" y1="521.8" x2="733.8" y2="522.3" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.3" y1="555.3" x2="319.6" y2="555.8" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.9" y1="555.4" x2="734.5" y2="553.3" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.6" y1="588.1" x2="319.5" y2="586.1" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.7" y1="587.2" x2="731.7" y2="585.5" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x32)"><circle cx="501.6" cy="500.9" r="31.3" fill="#ff00ff" stroke="#0a0520" stroke-width="1.4" filter="url(#skr1x32)"/><circle cx="487.2" cy="497.0" r="7.0" fill="#0a0520"/><circle cx="511.5" cy="497.1" r="7.0" fill="#0a0520"/><rect x="485.0" y="523.7" width="9.3" height="17.4" rx="1" fill="#ff00ff" stroke="#0a0520" stroke-width=".6"/><rect x="494.6" y="521.3" width="9.3" height="17.4" rx="1" fill="#ff00ff" stroke="#0a0520" stroke-width=".6"/><rect x="507.9" y="520.9" width="9.3" height="17.4" rx="1" fill="#ff00ff" stroke="#0a0520" stroke-width=".6"