.2" fill="url(#suitr1x4323)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x4323) url(#metalr1x4323)"/><polygon points="309.8,379.1 350.5,295.0 501.1,279.4 651.4,292.8 690.7,381.4 668.7,503.1 499.0,563.5 329.7,503.2" fill="url(#carbonr1x4323)"/><polygon points="382.0,301.2 501.6,285.7 618.1,303.4 608.0,381.7 391.0,382.2" fill="url(#suitHir1x4323)"/><polygon points="381.3,380.1 367.1,425.5 433.3,504.1 501.0,528.3 566.3,504.8 634.4,426.3 617.3,382.1" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x4323)"/><polygon points="379.4,409.9 475.5,410.2 484.9,441.0 387.6,440.6" fill="#4444ff" filter="url(#glowr1x4323)"/><polygon points="523.7,409.7 618.1,411.8 611.6,440.5 513.7,440.1" fill="#4444ff" filter="url(#glowr1x4323)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="482.9168744061701" y1="413.73413739753886" x2="513.8157901099324" y2="412.8081743736751" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.7196783657744" y1="436.53472937196494" x2="514.9139417282678" y2="438.3324778771028" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.8653062089346" y1="455.03606618046757" x2="500.00302537837996" y2="481.8852585753426" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x4323)"/><line x1="455.39802824927494" y1="490.0077332615852" x2="454.89643440486867" y2="519.3014449879527" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4323)"/><line x1="475.67688394118096" y1="492.55518825482574" x2="477.7173828797787" y2="520.1282364138402" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4323)"/><line x1="500.027313442342" y1="491.29387466190377" x2="499.84968558531256" y2="519.5360718862154" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4323)"/><line x1="522.029259405