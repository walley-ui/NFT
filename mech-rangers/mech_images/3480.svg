 896.9,724.6 829.3,590.1" fill="url(#titaniumr1x3480)" stroke="#ffcc00" stroke-width="2.6" filter="url(#wmr1x3480)"/><polygon points="826.7,293.1 967.8,292.2 967.9,592.2 897.9,724.8 828.7,591.9" fill="url(#carbonr1x3480)"/><polygon points="858.9,360.7 935.4,361.3 935.6,541.2 898.5,632.8 860.5,542.2" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="847.5841173117608" y1="429.9107133845798" x2="950.4581051516906" y2="430.81022313795984" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="898.6770892854407" y1="332.85930527113374" x2="899.5330628553965" y2="590.7174113526008" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="829.6690959246457" y1="295.34259213656185" x2="965.9880668324978" y2="297.5329512745142" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.6579187985137" cy="430.3792773521505" r="18.0" fill="url(#bevelr1x3480)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x3480)"/></g><rect x="450.63883027732373" y="556.9387717805803" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x3480)"/><rect x="424.5438613840379" y="574.0284393372946" width="152.0" height="26.0" fill="url(#bevelr1x3480)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x3480)"/><polygon points="307.0,379.4 351.0,293.8 501.7,279.0 650.2,295.7 691.9,382.2 668.9,502.1 499.7,564.9 331.4,504.5" fill="url(#suitr1x3480)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x3480) url(#metalr1x3480)"/><polygon points="308.4,379.1 351.8,294.3 500.0,276.5 648.6,294.9 691.4,380.8 668.0,501.8 501.5,565.8 330.9,502.2" fill="url(#carbonr1x3480)"/><polygon points="381.6,302.2 500.3,286.9 618.5,303.7 605.9,381.7 394.2,380.9" fill="url(#suitHir1x3480)"/><polygon points="380.5,380.4 367.0,425.9 431.7,503.0 498.6,527.8 568.6,502.1 636.1,423.9 618.8,381.0" fill="#050508" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x3480)"/><polygo