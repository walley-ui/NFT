ne x1="521.6039503309503" y1="489.8421211485751" x2="521.5582483827695" y2="521.1296275691129" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4058)"/><line x1="546.6031444056147" y1="490.4628958433866" x2="545.118372306712" y2="521.40017655259" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4058)"/><polygon points="431.0,503.6 568.0,503.5 553.5,557.3 445.3,558.2" fill="#cc0020" fill-opacity=".72" stroke="#ff2040" stroke-width="1.3" filter="url(#skr1x4058)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".48">CRIMSON RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".32">MECH RANGERS</text></svg>