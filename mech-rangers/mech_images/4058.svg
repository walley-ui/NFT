l="#050508" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#050508" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#ff2040"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#ff2040"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#ff2040" stroke="#050508" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#ff2040" stroke="#050508" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><g><polygon points="829.1,291.7 968.9,294.0 966.8,592.2 897.7,728.0 826.3,591.9" fill="url(#titaniumr1x4058)" stroke="#ff2040" stroke-width="2.6" filter="url(#wmr1x4058)"/><polygon points="827.4,294.5 967.1,294.0 967.2,592.7 898.5,725.7 826.8,591.5" fill="url(#carbonr1x4058)"/><polygon points="858.7,361.5 935.4,361.4 936.8,540.6 898.1,631.2 858.8,542.5" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="846.8267664860562" y1="430.82268348159266" x2="951.0836408873648" y2="429.6944331245497" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.3068195729144" y1="330.77008968200533" x2="899.5776964000985" y2="591.4082555476576" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="829.8118346235343" y1="295.1237757607363" x2="965.1157373078727" y2="297.8786913919262" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.2752452849038" cy="430.9265585451387" r="18.0" fill="url(#bevelr1x4058)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x4058)"/></g><rect x="448.9768101121299" y="558.3930284512229" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x4058)"/><rect x="425.1934221310541" y="575.8750785331242" width="152.0" height="26.0" fill="url(#bevelr1x4058)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x4058)"/><polygon points="309.3,382.3 349.7,292.8 498.4,276.4 650.5,295.7 690.4,381.4 670.0,504.7 5