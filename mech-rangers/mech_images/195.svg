7.6" y1="550.3" x2="601.0" y2="550.8" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x195)"/><line x1="268.0" y1="491.1" x2="321.5" y2="491.1" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.6" y1="491.8" x2="732.4" y2="489.8" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.2" y1="523.1" x2="319.3" y2="523.7" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.8" y1="521.4" x2="732.8" y2="522.8" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.6" y1="555.3" x2="321.2" y2="555.1" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.7" y1="555.2" x2="731.5" y2="556.4" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.1" y1="587.7" x2="321.4" y2="584.9" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.4" y1="586.7" x2="732.6" y2="586.5" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x195)"><polygon points="498.3,451.2 540.6,509.4 498.2,569.6 457.4,511.1" fill="#2060ff" stroke="#050508" stroke-width="1.4" filter="url(#skr1x195)"/><polygon points="501.5,451.7 542.2,509.5 498.4,569.0 458.8,511.2" fill="url(#suitHir1x195)" opacity=".45"/></g><g><polygon points="866.3,692.8 898.3,690.2 834.1,271.8" fill="url(#blader1x195)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x195)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="910.2,690.2 942.8,693.1 984.4,272.6" fill="url(#blader1x195)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x195)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.7181850460917" y="682.83409455996" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x195)" stroke="#2060ff" stroke-width="1.4" filter="url(#wmr1x195)"/></g><rect x="450.2564101184718" y="557.2932745533063" width="100.0"  height="56.0