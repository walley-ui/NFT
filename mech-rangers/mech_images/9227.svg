.7" y="523.7" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#0a0520" stroke-width=".6"/></g><g><rect x="828.6846560453624" y="419.8221024707891" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x9227)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x9227)"/><rect x="830.2416738656908" y="423.0732847364619" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x9227)"/><rect x="837.5880451514014" y="402.2769150863401" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x9227)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9227)"/><circle cx="876.436258949209" cy="414.8249962757341" r="15.0" fill="#4444ff" opacity=".8" filter="url(#glowr1x9227)"/><circle cx="876.2043249016256" cy="413.81296854568643" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="944.483181731645" y="453.8487224162556" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x9227)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x9227)"/><circle cx="1020.6133787403443" cy="469.77251565046606" r="18.0" fill="#4444ff" filter="url(#glowr1x9227)" opacity=".88"/><circle cx="1018.5131664312072" cy="470.7239460268058" r="7.0" fill="#ffffff"/><rect x="873.515917151291" y="503.1951147384941" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x9227)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9227)"/><rect x="833.4766522791796" y="422.0992878462188" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="857.669813947808" y1="487.66747355917465" x2="856.7350645252131" y2="520.2078009342774" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="875.214281338323" y1="486.55361760957163" x2="873.1658762458339" y2="518.9772426906973" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="889.4253360527196" y1="485.6908044225536" x2="888.5482925482653" y2="520.2792253876105" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.5045268859714" y="556.3764091071672" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x9227)"/><rect x="425.09918989222496" y="576.6905548364856" width="152.0" height="26.0" fill="url(#bevelr1x9227)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x9227)"/><polygon points="308.2,379.8 350.0,294.9 499.1,279.7 648.7,293.6 693.4,379.3 668.3,504.7 500.4,564.3 332.7,503.1" fill="url(#suitr1x9227)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x9227) url(#metalr1x9227)"/><polygon points="306.6,380.5 350.0,295.2 498.9,277.8 650.1,295.5 692.4,381.6 670.6,502.4 498.2,566.5 329.7,505.2" fill="url(#carbonr1x9227)"/><polygon points="380.3,302.0 500.3,287.2 618.7,302.5 608.7,381.7 393.2,380.3" fill="url(#suitHir1x9227)"/><polygon points="381.3,379.1 367.1,424.6 432.6,504.3 501.6,526.6 567.6,502.0 635.3,426.7 620.6,379.3" fill="#0a0520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x9227)"/><polygon points="379.4,411.3 476.4,411.1 483.6,441.3 390.4,439.0" fill="#4444ff" filter="url(#glowr1x9227)"/><polygon points="522.5,412.9 620.1,412.5 613.0,440.1 516.9,439.0" fill="#4444ff" filter="url(#glowr1x9227)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.76472497308623" y1="413.1837077161297" x2="515.8143413220905" y2="413.07254489958285" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.8703389453329" y1="436.21284743081776" x2="515.8736024436913" y2="439.52362970262766" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="498.7854004432447" y1="454.61019527995956" x2="501.50611758008597" y2="484.61761881774294" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x9227)"/><line x1="453.3955223495886" y1="490.3202628704719" x2="453.09297279620546" y2="519.4516374467872" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9227)"/><line x1="475.7168434248678" y1="