20)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="114.8,691.4 147.4,690.1 191.7,270.9" fill="url(#blader1x2820)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x2820)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="67.09045938536522" y="679.8714717044495" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x2820)" stroke="#2060ff" stroke-width="1.4" filter="url(#wmr1x2820)"/></g><rect x="448.90409964434804" y="557.7905320217833" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x2820)"/><rect x="424.69943000143394" y="576.7222295456567" width="152.0" height="26.0" fill="url(#bevelr1x2820)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x2820)"/><polygon points="309.6,380.5 351.3,293.1 501.2,278.9 648.8,293.9 691.6,381.0 670.7,504.5 500.6,565.9 331.7,502.3" fill="url(#suitr1x2820)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x2820) url(#metalr1x2820)"/><polygon points="306.7,382.3 349.2,293.6 499.4,279.0 648.9,293.2 692.3,380.4 670.6,505.1 501.3,564.7 329.3,502.8" fill="url(#carbonr1x2820)"/><polygon points="381.6,302.0 500.0,287.9 619.2,302.9 607.9,381.1 392.8,380.3" fill="url(#suitHir1x2820)"/><polygon points="380.3,379.2 365.7,425.6 432.7,505.3 499.1,526.9 566.9,503.0 634.9,425.9 620.7,382.4" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x2820)"/><polygon points="381.9,413.0 476.7,410.4 483.1,441.2 390.2,438.9" fill="#2060ff" filter="url(#glowr1x2820)"/><polygon points="524.8,412.5 617.8,412.3 609.9,440.9 515.9,438.3" fill="#2060ff" filter="url(#glowr1x2820)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.2127444979362" y1="413.9602545786649" x2="516.2680228677019" y2="413.9399