url(#wmr1x1523)"/><polygon points="827.6,292.7 969.6,292.0 966.7,593.0 896.8,724.7 826.3,591.0" fill="url(#carbonr1x1523)"/><polygon points="858.8,360.2 935.9,362.8 936.3,540.8 896.3,631.2 858.6,540.5" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="846.2765158353933" y1="430.30723664788525" x2="949.0321855021268" y2="432.93186051193624" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.1804608043842" y1="331.81030957708134" x2="896.9788820495456" y2="590.2348815375939" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="830.1416806257889" y1="297.98581600617615" x2="967.3640834913217" y2="295.01874450165775" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.1398000260443" cy="432.5399492642842" r="18.0" fill="url(#bevelr1x1523)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x1523)"/></g><rect x="449.6340397490188" y="556.6756141948514" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1523)"/><rect x="424.64384428737685" y="574.4746866779402" width="152.0" height="26.0" fill="url(#bevelr1x1523)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1523)"/><polygon points="309.7,380.5 350.5,292.8 499.6,277.9 649.3,295.9 693.6,380.3 668.7,503.7 498.6,564.1 332.3,501.9" fill="url(#suitr1x1523)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x1523) url(#metalr1x1523)"/><polygon points="308.7,380.4 351.0,295.7 501.7,277.9 650.3,295.4 692.5,381.8 669.5,504.5 500.8,565.8 330.8,504.6" fill="url(#carbonr1x1523)"/><polygon points="379.3,302.8 498.5,286.8 619.5,304.5 608.9,381.2 390.7,379.8" fill="url(#suitHir1x1523)"/><polygon points="379.5,379.8 366.4,425.6 433.7,505.3 499.9,529.6 565.7,505.1 634.4,427.5 619.4,381.6" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x1523)"/><polygon points="381.7,412.5 478.1,412.2 483.1,440.3 389.7,441.0" fill="#2060ff" filter="url(#glowr1x1523)"/><polygon points="522.8,411.7 618.3,409.9 612.6,438.5 514.8,441.6" fill="#2060ff" filter="url(#glowr1x1523)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.32177266661074" y1="415.1704007179476" x2="514.4746399242804" y2="412.4435304511338" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.64123767843466" y1="438.35592559743674" x2="516.8663303773292" y2="438.2932271545753" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.6758653687313" y1="453.1057544426061" x2="499.66759482417257" y2="481.44502166109163" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1523)"/><line x1="453.5662486523204" y1="490.03183154501016" x2="453.5140739830956" y2="518.4675674994476" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1523)"/><line x1="475.23300881743427" y1="492.5187010440975" x2="475.62848593875765" y2="518.2204519736581" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1523)"/><line x1="501.37408123463393" y1="491.55219035744665" x2="500.0385459343903" y2="520.7860813494772" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1523)"/><line x1="522.0946885630116" y1="492.2785349617712" x2="523.0262187145278" y2="519.1886142615228" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1523)"/><line x1="546.4731966099888" y1="492.8325232354924" x2="547.1406414784677" y2="520.515142142307" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1523)"/><polygon points="433.0,503.6 566.7,502.6 555.3,555.9 447.7,558.5" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x1523)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text