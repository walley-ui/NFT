 filter="url(#wmr1x8892)"/><rect x="42.368752575051005" y="397.143785484042" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x8892)"/><rect x="16.714370790347424" y="448.7342255381867" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x8892)" stroke="#4444ff" stroke-width="1.4" filter="url(#wmr1x8892)"/><circle cx="117.47027982570228" cy="469.7761867580935" r="48.0" fill="rgba(0,0,0,.55)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x8892)"/><circle cx="119.83933657700193" cy="473.09734861468894" r="34.0" fill="#4444ff" fill-opacity=".4" filter="url(#bloomr1x8892)"/><circle cx="118.61852866945785" cy="472.5576852255501" r="18.0" fill="#4444ff" filter="url(#glowr1x8892)"/><rect x="48.628945505004346" y="379.89448748100546" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x8892)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x8892)"/><rect x="44.0617487324774" y="399.225472293701" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="52.30694566996765" y1="520.8595777156762" x2="51.985877344235746" y2="547.6017033183947" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/><line x1="77.67303507508707" y1="520.267307283543" x2="77.744749613516" y2="548.4004191824234" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/><line x1="101.95247614219781" y1="520.5495496346615" x2="100.56857938462865" y2="548.8064776040613" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/><line x1="124.16206771409136" y1="519.8628307608888" x2="125.07498408019539" y2="550.7547470321879" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/></g><rect x="450.1806814053096" y="558.2633432748727" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x8892)"/><rect x="422.2423275783658" y="573.5717576738447" width="152.0" height="26.0" fill="url(#bevelr1x8892)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x8892)"/><polygon points="309.5,380.3 349.3,294.9 499.7,279.0 649.1,2