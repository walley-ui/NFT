2" stroke-width="1.3" filter="url(#skr1x6894)"/><line x1="398.5" y1="548.0" x2="601.9" y2="548.4" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x6894)"/><line x1="266.8" y1="490.4" x2="319.1" y2="491.0" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.9" y1="490.7" x2="733.5" y2="491.1" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.0" y1="521.2" x2="319.8" y2="522.7" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.8" y1="524.0" x2="731.7" y2="522.6" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.5" y1="553.8" x2="321.1" y2="556.3" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.4" y1="553.8" x2="732.1" y2="554.9" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.6" y1="586.3" x2="318.5" y2="585.1" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.0" y1="585.4" x2="734.0" y2="585.7" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x6894)"><polygon points="481.5,454.1 513.6,507.0 501.5,507.2 517.8,570.3 486.3,515.1 501.4,516.0" fill="#2060ff" stroke="#0a0520" stroke-width="1.4" filter="url(#skr1x6894)"/><polygon points="483.5,452.4 513.7,505.9 500.0,504.5 518.8,569.2 488.2,515.6 500.6,514.0" fill="url(#suitHir1x6894)" opacity=".4"/></g><rect x="450.0788762435317" y="558.2162284420803" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x6894)"/><rect x="424.40185911916194" y="573.577628957294" width="152.0" height="26.0" fill="url(#bevelr1x6894)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x6894)"/><polygon points="306.2,380.6 349.4,294.3 501.5,279.4 649.3,294.2 693.7,379.1 669.4,505.0 500.3,565.6 331.6,502.2" fill="url(#suitr1x6894)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x6894) url(#metalr1x6894)"/><polygon points="308.1,380.6 351.1,296.0 498.9,279.1 650.7,296