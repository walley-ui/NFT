ill="#2060ff" stroke="#0a0520" stroke-width=".6"/></g><g><rect x="116.3" y="701.8" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x866)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x866)"/><rect x="115.4" y="703.6" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x866)"/><rect x="748.3"  y="702.8" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x866)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x866)"/><rect x="747.2"  y="701.9" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x866)"/><rect x="120.5" y="699.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><rect x="753.5" y="698.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><rect x="150.3" y="699.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><rect x="783.6" y="698.8" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><rect x="180.9" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><rect x="815.3" y="701.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><rect x="209.7" y="699.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><rect x="844.7" y="701.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x866)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x866)"/><ellipse cx="184.70086432727052" cy="709.5428870526887" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x866)"/><ellipse cx="816.1594516155496" cy="712.5669272785819" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x866)"/></g><rect x="448.609714425