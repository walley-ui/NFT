="494.3" y="522.9" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#1e0600" stroke-width=".6"/><rect x="508.6" y="522.8" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#1e0600" stroke-width=".6"/></g><g><line x1="102.77585370879618" y1="791.8966709054075" x2="86.18974436106157" y2="111.48416911950332" stroke="url(#chromer1x1650)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x1650)"/><line x1="97.84161418074738" y1="769.8706644810736" x2="88.86375326136124" y2="130.06744816023854" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="73.2,150.4 140.6,150.8 83.6,-9.7" fill="url(#blader1x1650)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x1650)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="82.9950774267688" y="423.1609266058542" width="40.0" height="20.0" fill="url(#bevelr1x1650)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1650)"/><rect x="83.37197057375681" y="509.78823184212666" width="40.0" height="20.0" fill="url(#bevelr1x1650)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1650)"/><rect x="82.85156143376601" y="600.4131641939282" width="40.0" height="20.0" fill="url(#bevelr1x1650)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1650)"/><rect x="83.75823915101584" y="692.6705622301437" width="40.0" height="20.0" fill="url(#bevelr1x1650)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1650)"/><ellipse cx="100.94916608532887" cy="791.2953110838308" rx="22.0" ry="15.0" fill="url(#bevelr1x1650)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1650)"/></g><rect x="449.63684864798563" y="555.5875029674731" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x1650)"/><rect x="424.91456869738175" y="573.9294668824413" width="152.0" height="26.0" fill="url(#bevelr1x1650)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x1650)"/><polygon p