" rx="5" fill="url(#bevelr1x2371)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x2371)"/><rect x="116.4" y="703.1" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x2371)"/><rect x="750.0"  y="700.2" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x2371)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x2371)"/><rect x="747.7"  y="703.0" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x2371)"/><rect x="123.6" y="698.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><rect x="756.3" y="700.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><rect x="150.4" y="699.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><rect x="783.2" y="698.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><rect x="179.4" y="699.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><rect x="813.5" y="700.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><rect x="211.9" y="699.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><rect x="843.4" y="700.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2371)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2371)"/><ellipse cx="184.39108207490295" cy="711.3924555225111" rx="45.1" ry="30.0" fill="#4444ff" fill-opacity=".25" filter="url(#glowr1x2371)"/><ellipse cx="818.9700438742713" cy="712.0177417264133" rx="45.1" ry="30.0" fill="#4444ff" fill-opacity=".25" filter="url(#glowr1x2371)"/></g><rect x="448.47589765358714" y="558.5215343222953" width="100.0"  height="56.0" fill="#141428" stroke="#444