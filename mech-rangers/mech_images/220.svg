0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.4,467.0 234.6,465.6 259.1,733.8 128.2,735.1" fill="url(#suitr1x220)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x220) url(#metalr1x220)"/><polygon points="174.4,433.0 251.4,432.5 242.4,511.6 160.8,508.9" fill="url(#bevelr1x220)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x220)"/><polygon points="161.4,621.3 241.6,622.3 240.6,660.5 164.7,659.5" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x220)"/><polygon points="766.3,468.1 846.2,466.1 871.8,735.4 741.5,735.9" fill="url(#suitr1x220)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x220) url(#metalr1x220)"/><polygon points="746.3,432.0 827.4,430.6 841.8,511.7 758.6,511.9" fill="url(#bevelr1x220)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x220)"/><polygon points="757.6,622.9 839.7,623.6 834.4,661.7 762.4,659.6" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x220)"/><rect x="118.4"  y="701.0" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x220)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x220)"/><rect x="746.9"   y="700.8" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x220)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x220)"/><line x1="149.4" y1="701.4" x2="150.3" y2="785.1" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="779.8" y1="701.5" x2="779.8" y2="784.5" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="182.7" y1="702.0" x2="182.8" y2="784.5" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="811.8" y1="702.7" x2="809.4" y2="783.8" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="214.1" y1="702.8" x2="214.4" y2="782.1" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="844.9" y1="702.2" x2="842.8" y2="782.7" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><polygon points