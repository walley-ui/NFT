2,-28.6 897.8,-138.6" fill="url(#blader1x6425)" filter="url(#wmr1x6425)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x6425)" opacity=".9"/><line x1="908.8809737957083" y1="672.8363575422205" x2="900.6386167251691" y2="-130.2946070911363" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="887.597918008659" y1="669.8759475988336" x2="896.5084666470067" y2="-128.0063618390821" stroke="#00ff60" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.3727304421924" y="668.6922384572215" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x6425)" stroke="#00ff60" stroke-width="1.6" filter="url(#wmr1x6425)"/><rect x="867.3488505448773" y="674.7479264412075" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="885.5950270386971" y="678.0462968490086" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="885.3068076362462" y="686.1556229391135" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="886.6845207847283" y="694.7035908304155" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="886.6275434719026" y="701.557289042417" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="885.6855744235777" y="708.9441565520129" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="885.4028947977909" y="718.5536581502296" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><ellipse cx="897.7143013917469" cy="726.5355640202761" rx="22.0" ry="16.0" fill="url(#bevelr1x6425)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x6425)"/></g><rect x="450.88048670394346" y="558.2555195922032" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x6425)"/><rect