28.6 102.2,-138.6" fill="url(#blader1x8702)" filter="url(#wmr1x8702)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x8702)" opacity=".9"/><line x1="113.26528165785592" y1="671.5554030915722" x2="102.55200980287043" y2="-127.44697027960794" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="91.58476315876466" y1="671.7004403471947" x2="102.7480400311574" y2="-128.70341504709796" stroke="#ffd700" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="45.42314553599802" y="670.7878139620647" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x8702)" stroke="#ffd700" stroke-width="1.6" filter="url(#wmr1x8702)"/><rect x="69.25821578366678" y="672.1553814600221" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="90.62892394935709" y="677.3200944554061" width="24.0" height="6.0" rx="1" fill="#ffd700" fill-opacity=".35"/><rect x="89.92677722390738" y="687.0819566400721" width="24.0" height="6.0" rx="1" fill="#ffd700" fill-opacity=".35"/><rect x="89.238304467909" y="693.3475734512322" width="24.0" height="6.0" rx="1" fill="#ffd700" fill-opacity=".35"/><rect x="89.00576222524043" y="700.0391755800694" width="24.0" height="6.0" rx="1" fill="#ffd700" fill-opacity=".35"/><rect x="89.8788094587065" y="709.7779492743313" width="24.0" height="6.0" rx="1" fill="#ffd700" fill-opacity=".35"/><rect x="90.61905729345975" y="717.8541172428056" width="24.0" height="6.0" rx="1" fill="#ffd700" fill-opacity=".35"/><ellipse cx="101.17009592115876" cy="724.6475323974155" rx="22.0" ry="16.0" fill="url(#bevelr1x8702)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x8702)"/></g><rect x="449.81667692055925" y="555.6718006569891" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x8702)"/><rect x="423.42816097987816" y="577.0132902414538" width="152.0" height="26.0" fill="url(#bevelr1x8702)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x8702)"/><polygon points="309.1,379.4 349.8,293.6 499.5,279.3 650.5,295.6 690.3,382.1 667.9,504.2 501.8,566.9 332.4,502.2" fill="url(#suitr1x8702)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x8702) url(#metalr1x8702)"/><polygon points="308.7,381.5 350.7,293.4 499.3,278.1 648.4,295.8 692.7,381.3 668.7,504.6 498.5,566.8 330.5,503.8" fill="url(#carbonr1x8702)"/><polygon points="380.6,301.7 498.2,287.4 619.8,301.8 606.0,380.9 393.3,380.9" fill="url(#suitHir1x8702)"/><polygon points="380.1,379.1 363.9,424.1 433.5,504.0 498.4,529.3 566.8,503.6 636.0,425.4 617.9,379.7" fill="#050508" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x8702)"/><polygon points="382.2,412.8 475.2,412.9 483.5,439.3 387.7,441.1" fill="#ffd700" filter="url(#glowr1x8702)"/><polygon points="523.0,412.3 617.3,411.7 611.3,441.6 516.4,438.9" fill="#ffd700" filter="url(#glowr1x8702)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.0579016939364" y1="412.1303843750618" x2="513.8031257323362" y2="414.8528960932977" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="484.6691193862446" y1="439.5136435618624" x2="516.591672380399" y2="437.06178078465166" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="499.63161445707084" y1="454.6306392581202" x2="501.5016607939266" y2="482.04664736418056" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8702)"/><line x1="454.5406948236562" y1="492.57404925525185" x2="455.00713865000756" y2="520.8150739401578" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8702)"/><line x1="478.3974221805483" y1="490.1233887874521" x2="478.335593127124" y2="519.163561298605" str