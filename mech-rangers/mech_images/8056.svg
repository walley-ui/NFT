 points="380.0,302.4 498.9,287.4 619.3,302.1 608.3,380.0 391.9,380.0" fill="url(#suitHir1x8056)"/><polygon points="382.0,379.0 366.2,425.6 433.1,502.2 500.1,528.2 566.2,505.2 635.0,426.1 619.5,380.1" fill="#050508" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x8056)"/><polygon points="379.6,410.8 477.8,412.3 483.9,439.1 389.4,438.7" fill="#ff44aa" filter="url(#glowr1x8056)"/><polygon points="521.3,410.0 618.3,409.9 611.2,440.3 514.1,441.0" fill="#ff44aa" filter="url(#glowr1x8056)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.6290699420124" y1="412.5551705567166" x2="516.4982859049366" y2="413.4902402887121" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="482.99640516988933" y1="438.2792485465296" x2="516.6052894367277" y2="437.1737875632942" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="498.22005633190275" y1="456.11926624123004" x2="501.32949923025444" y2="483.03406688934194" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8056)"/><line x1="452.1225518788025" y1="489.8520113408565" x2="454.1795303229988" y2="518.7111302901991" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8056)"/><line x1="478.4583418737538" y1="492.5457845456898" x2="476.33366266017777" y2="518.2066496680491" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8056)"/><line x1="498.5393041241914" y1="490.7595004648901" x2="499.9694125778973" y2="518.468845055718" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8056)"/><line x1="521.3290766492113" y1="489.9932410918176" x2="523.4452657827735" y2="520.8902536696754" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8056)"/><line x1="547.2049890062958" y1="493.02340664407234" x2="546.899289702177" y2="519.9972159047611" stroke="