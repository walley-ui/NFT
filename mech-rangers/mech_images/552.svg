alr1x552)" stroke="#ff00ff" stroke-width="2" filter="url(#wmr1x552)"/><rect x="830.5453400679492" y="422.1684231203049" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x552)"/><rect x="836.6294049519673" y="401.67365259788926" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x552)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x552)"/><circle cx="876.221766248215" cy="415.7431456500664" r="15.0" fill="#ff00ff" opacity=".8" filter="url(#glowr1x552)"/><circle cx="878.4203599824198" cy="414.90473290821535" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="947.0219266073406" y="455.7834630955942" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x552)" stroke="#ff00ff" stroke-width="1.2" filter="url(#wmr1x552)"/><circle cx="1019.9889023967646" cy="472.0813981774263" r="18.0" fill="#ff00ff" filter="url(#glowr1x552)" opacity=".88"/><circle cx="1021.0688086595945" cy="470.0232631077058" r="7.0" fill="#ffffff"/><rect x="875.2132473366894" y="502.7787797314115" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x552)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x552)"/><rect x="832.6578523559124" y="425.08844262631607" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="857.7976288642362" y1="487.6185222304426" x2="858.8305075876043" y2="519.1801168023609" stroke="#ff00ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="873.0406153271534" y1="487.3403629910201" x2="873.4543727892079" y2="521.0727705343626" stroke="#ff00ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="888.8998629591056" y1="486.3529354343191" x2="890.9971335831657" y2="518.9653608056716" stroke="#ff00ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.0661649324" y="557.7384469425306" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x552)"/><rect x="425.59007608499377" y="574.7271264162846" width="152.0" height="26.0" fill="url(#bevelr1x552)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x552)"/><polygon points="306.2,379.5 351.9,292.9 500.0,276.9 649.1,293.1 690.5,379.5 668.9,505.3 501.7,563.4 330.0,501.8" fill="url(#suitr1x552)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x552) url(#metalr1x552)"/><polygon points="309.5,381.6 349.2,292.8 499.3,276.4 650.9,293.6 692.1,379.7 670.1,503.8 501.7,565.4 331.6,504.5" fill="url(#carbonr1x552)"/><polygon points="381.3,301.0 501.7,286.8 617.7,304.2 607.7,380.0 390.9,381.7" fill="url(#suitHir1x552)"/><polygon points="382.7,380.7 365.4,425.4 433.5,504.3 499.9,529.8 568.5,503.4 633.4,425.5 620.8,381.0" fill="#0d1520" fill-opacity=".88" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x552)"/><polygon points="381.5,413.0 477.0,410.1 486.0,440.9 387.4,439.6" fill="#ff00ff" filter="url(#glowr1x552)"/><polygon points="523.2,410.4 620.4,412.4 610.4,440.5 515.2,439.9" fill="#ff00ff" filter="url(#glowr1x552)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.1077796896547" y1="412.74169412925835" x2="514.1365052574687" y2="412.4637272997759" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.0542349858768" y1="437.8701021085493" x2="516.6199235464819" y2="437.00162439616395" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.8577199520543" y1="455.0177241137251" x2="498.8785112798214" y2="482.7305094028823" stroke="#ff00ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x552)"/><line x1="453.50717846041545" y1="492.8261802813969" x2="454.2909321838804" y2="520.6860304244794" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x552)"/><line x1="477.0496550063975" y1="490.2279516909271" x2="478.39707336345685" y2="519.9839824956841" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x552)"/><line x1="500.1743083107285" y1="489.88480672389267" x2="498.47537629334255" y2="520.130