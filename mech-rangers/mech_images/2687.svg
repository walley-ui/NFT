455.4546611289494,463.8604123380967 474.73967239232735,514.6275899336673 500,522.4700732760132" fill="rgba(255,255,255,.14)"/><path d="M500,493.20000000000005 C544.1923303069547,465.0436864204705 520.5095453884453,514.64121520482 500,522.2531941447407" fill="rgba(255,255,255,.14)"/></g><rect x="449.0888408831321" y="555.662608426623" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x2687)"/><rect x="425.60567451510576" y="576.6540746975691" width="152.0" height="26.0" fill="url(#bevelr1x2687)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x2687)"/><polygon points="309.4,379.1 350.1,293.7 501.3,279.3 650.4,295.3 691.0,380.7 668.3,503.3 501.2,566.7 330.1,503.8" fill="url(#suitr1x2687)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x2687) url(#metalr1x2687)"/><polygon points="307.1,379.3 351.0,294.2 501.6,278.6 648.8,294.3 690.6,379.5 667.3,502.0 498.7,566.7 331.4,501.9" fill="url(#carbonr1x2687)"/><polygon points="379.4,303.8 499.0,285.9 618.6,303.1 608.4,379.7 391.5,380.8" fill="url(#suitHir1x2687)"/><polygon points="381.8,381.1 364.5,424.5 433.8,503.3 498.4,529.4 568.8,504.9 634.5,424.1 618.5,379.6" fill="#0a0520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x2687)"/><polygon points="381.8,413.1 478.2,410.4 485.8,440.9 388.1,439.6" fill="#ccccff" filter="url(#glowr1x2687)"/><polygon points="524.0,411.7 618.2,411.6 611.0,441.6 514.0,438.3" fill="#ccccff" filter="url(#glowr1x2687)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.3070635236427" y1="413.476112597622" x2="514.5054136006535" y2="413.7636271415278" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="484.0177003302239" y1="437.2846555505879" x2="516.8825121183321" y2="436.5604699476622" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="501.68452