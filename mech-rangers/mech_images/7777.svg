00" fill-opacity=".88" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x7777)"/><path d="M500,493.20000000000005 C455.0929538452998,461.55092097008605 475.08308925544844,514.881030432973 500,524.0193933852017" fill="rgba(255,255,255,.14)"/><path d="M500,493.20000000000005 C547.3288245332427,464.26382675236096 522.1376853662543,515.3411604907363 500,523.2753480931744" fill="rgba(255,255,255,.14)"/></g><rect x="448.39171140734106" y="556.8125759217888" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x7777)"/><rect x="424.7607169125229" y="576.4711107064039" width="152.0" height="26.0" fill="url(#bevelr1x7777)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x7777)"/><polygon points="309.2,382.4 351.4,296.3 500.6,276.8 650.2,293.8 693.6,380.4 669.8,503.0 500.4,566.2 332.0,501.8" fill="url(#suitr1x7777)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x7777) url(#metalr1x7777)"/><polygon points="308.3,379.1 349.2,292.9 499.1,278.5 649.4,294.8 690.3,380.8 669.0,503.6 498.7,563.4 332.1,503.2" fill="url(#carbonr1x7777)"/><polygon points="380.6,303.7 500.0,286.8 618.0,301.2 607.1,379.1 392.9,379.2" fill="url(#suitHir1x7777)"/><polygon points="382.4,382.3 364.5,426.0 431.4,503.0 501.6,527.1 567.4,504.7 633.3,426.2 618.6,381.5" fill="#1e0600" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x7777)"/><polygon points="382.4,409.6 476.7,409.8 486.4,440.3 386.9,440.7" fill="#ffd700" filter="url(#glowr1x7777)"/><polygon points="523.2,412.2 618.3,410.1 611.1,440.2 515.7,441.3" fill="#ffd700" filter="url(#glowr1x7777)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.24245401803404" y1="413.6188204578124" x2="515.5096070834808" y2="413.85784205663947" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="484.2399550021253" y1="436.6849064785