stroke-width="2.6" filter="url(#wmr1x645)"/><rect x="836.9168748999574" y="396.42094325711946" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x645)"/><rect x="981.210476983022" y="447.8600410045124" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x645)" stroke="#ff00ff" stroke-width="1.4" filter="url(#wmr1x645)"/><circle cx="881.0350879883953" cy="472.84761736597864" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ff00ff" stroke-width="2" filter="url(#wmr1x645)"/><circle cx="881.3541990542412" cy="471.25314224530007" r="34.0" fill="#ff00ff" fill-opacity=".4" filter="url(#bloomr1x645)"/><circle cx="880.7217276650109" cy="471.6927147260867" r="18.0" fill="#ff00ff" filter="url(#glowr1x645)"/><rect x="843.9308385813237" y="380.6880144675262" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x645)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x645)"/><rect x="841.5753563856334" y="399.2216233455576" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="848.1882983605936" y1="518.5403724223376" x2="846.3090742169508" y2="548.929744017031" stroke="#ff00ff" stroke-opacity=".6" stroke-width="2"/><line x1="871.480917769447" y1="518.1336870460771" x2="870.3102732205391" y2="550.3516832340508" stroke="#ff00ff" stroke-opacity=".6" stroke-width="2"/><line x1="895.2885060079955" y1="518.112230554968" x2="895.1613791586459" y2="548.2248316516168" stroke="#ff00ff" stroke-opacity=".6" stroke-width="2"/><line x1="920.4779523785785" y1="521.0112605732866" x2="919.0712210737728" y2="550.3001713168807" stroke="#ff00ff" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.2690101103857" y="556.2456850081682" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x645)"/><rect x="423.3676961926743" y="573.7861715078354" width="152.0" height="26.0" fill="url(#bevelr1x645)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x645)"/><polygon points="306.6,382.2 349.2,294.4 499.7,277.8 650.4,296.2 690.9,381.5 670.1,502.5 499.3,565.0 331.7,504.4" fill="url(#suitr1x645)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x645) url(#metalr1x645)"/><polygon points="306.5,380.2 348.4,292.7 499.4,276.4 648.2,293.9 691.2,380.9 667.5,505.2 500.5,566.0 330.2,502.8" fill="url(#carbonr1x645)"/><polygon points="381.0,302.7 498.5,284.8 619.1,301.9 606.0,382.1 391.5,382.2" fill="url(#suitHir1x645)"/><polygon points="380.2,382.2 365.7,425.0 431.8,502.3 499.8,527.2 568.9,505.2 633.9,424.9 617.7,382.4" fill="#1e0600" fill-opacity=".88" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x645)"/><polygon points="382.4,412.7 478.7,409.8 484.8,440.2 387.6,440.7" fill="#ff00ff" filter="url(#glowr1x645)"/><polygon points="523.4,413.0 617.5,410.9 612.5,441.2 516.0,438.4" fill="#ff00ff" filter="url(#glowr1x645)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.953691714406" y1="411.7746768294833" x2="515.0460418843105" y2="413.5486828168854" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.9418368293531" y1="438.0051520641893" x2="513.9518025477789" y2="438.91497109327463" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="501.2814686133526" y1="452.6123935339972" x2="499.4256734682247" y2="482.95639612441886" stroke="#ff00ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x645)"/><line x1="455.29661276804285" y1="492.02543025687334" x2="452.9172682322376" y2="519.4647443360649" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x645)"/><line x1="476.1418096850067" y1="492.72683024108403" x2="475.230173579175" y2="521.2103434132412" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x645)"/><line x1="500.51372568532827" y1="491.0121732092462" x2="498.2777340290137" y2="519.0637174057774" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1