0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.5,466.6 236.1,465.1 259.4,736.7 129.7,736.6" fill="url(#suitr1x390)" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x390) url(#metalr1x390)"/><polygon points="173.9,433.8 251.9,432.8 243.2,510.1 159.9,511.8" fill="url(#bevelr1x390)" fill-opacity=".72" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x390)"/><polygon points="161.2,623.5 243.6,621.7 238.1,662.0 164.4,660.7" fill="#ff44aa" fill-opacity=".42" stroke="#ff44aa" stroke-width="1" filter="url(#skr1x390)"/><polygon points="766.7,467.8 846.8,467.4 870.0,735.9 740.3,734.1" fill="url(#suitr1x390)" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x390) url(#metalr1x390)"/><polygon points="746.5,433.0 825.9,432.9 841.4,510.9 758.5,509.5" fill="url(#bevelr1x390)" fill-opacity=".72" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x390)"/><polygon points="757.3,621.4 838.0,620.4 833.0,659.4 762.2,659.4" fill="#ff44aa" fill-opacity=".42" stroke="#ff44aa" stroke-width="1" filter="url(#skr1x390)"/><rect x="118.4"  y="698.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x390)" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x390)"/><rect x="748.8"   y="700.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x390)" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x390)"/><line x1="149.0" y1="702.1" x2="150.3" y2="783.8" stroke="#ff44aa" stroke-opacity=".38" stroke-width="1"/><line x1="777.4" y1="702.5" x2="776.5" y2="783.9" stroke="#ff44aa" stroke-opacity=".38" stroke-width="1"/><line x1="183.5" y1="701.2" x2="181.3" y2="785.5" stroke="#ff44aa" stroke-opacity=".38" stroke-width="1"/><line x1="811.5" y1="701.8" x2="811.6" y2="784.2" stroke="#ff44aa" stroke-opacity=".38" stroke-width="1"/><line x1="216.3" y1="702.1" x2="213.6" y2="785.2" stroke="#ff44aa" stroke-opacity=".38" stroke-width="1"/><line x1="843.6" y1="701.5" x2="843.7" y2="785.3" stroke="#ff44aa" stroke-opacity=".38" stroke-width="1"/><polygon points