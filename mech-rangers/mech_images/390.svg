lter="url(#glowr1x390)"/><ellipse cx="815.7314688509516" cy="711.5035987430065" rx="45.1" ry="30.0" fill="#ff44aa" fill-opacity=".25" filter="url(#glowr1x390)"/></g><rect x="448.5110305817798" y="557.3483997169882" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x390)"/><rect x="423.1130863561295" y="575.1412719269283" width="152.0" height="26.0" fill="url(#bevelr1x390)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x390)"/><polygon points="308.7,382.1 351.8,295.2 500.0,277.1 649.9,295.7 690.7,380.5 667.6,505.1 500.8,564.9 332.5,502.7" fill="url(#suitr1x390)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x390) url(#metalr1x390)"/><polygon points="306.8,379.3 350.4,295.6 500.6,278.7 650.1,295.2 690.9,380.0 667.9,503.6 501.8,565.9 330.6,505.1" fill="url(#carbonr1x390)"/><polygon points="381.6,301.1 498.8,287.1 618.6,301.7 608.7,379.7 393.6,379.6" fill="url(#suitHir1x390)"/><polygon points="381.7,381.3 367.4,427.2 431.8,502.0 499.2,528.5 565.7,501.9 636.1,424.4 618.5,379.6" fill="#0a0520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x390)"/><polygon points="382.0,410.8 475.6,410.0 484.7,441.0 389.3,439.2" fill="#ff44aa" filter="url(#glowr1x390)"/><polygon points="521.3,410.4 619.7,412.7 610.2,441.6 513.9,440.8" fill="#ff44aa" filter="url(#glowr1x390)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.52926621694115" y1="413.96926056398075" x2="515.574804459177" y2="412.47869009077544" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="483.5351110053807" y1="438.6679569767788" x2="515.7704431963526" y2="437.2558057716116" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="501.0821561533958" y1="455.8488684211857" x2="500.3945571546443" y2="481.4913622851484" stroke="#ff44aa" stroke-opacity=".58" stroke-width=