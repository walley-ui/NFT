.0" y="523.9" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#0d1520" stroke-width=".6"/></g><g><rect x="34.66867695827034" y="420.0173532004468" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x4671)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x4671)"/><rect x="34.69861884055656" y="422.3175211062655" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x4671)"/><rect x="43.52675717877221" y="404.73091187514365" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x4671)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x4671)"/><circle cx="82.41293758735057" cy="414.0465404129587" r="15.0" fill="#4444ff" opacity=".8" filter="url(#glowr1x4671)"/><circle cx="83.17344393556934" cy="413.7799331619404" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="53.06769051034" y="455.0752413427457" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x4671)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x4671)"/><circle cx="-20.71748898919675" cy="471.29555733576416" r="18.0" fill="#4444ff" filter="url(#glowr1x4671)" opacity=".88"/><circle cx="-19.71558914208788" cy="472.6820656487718" r="7.0" fill="#ffffff"/><rect x="79.91702537894245" y="503.0980296049267" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x4671)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x4671)"/><rect x="37.675591224562346" y="422.57461937833574" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.03877084957433" y1="487.794372491166" x2="61.76928096575659" y2="520.1059398685582" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.87028626849872" y1="484.7512846811674" x2="76.89337457375598" y2="517.7100486495532" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.64746454473581" y1="487.3450543304905" x2="95.54002308700231" y2="520.3162929043174" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.4319333131425" y="557.9087639058008" width="100.0"  height="56.0" fill="#141428" stro