idth="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x7896)" stroke="#ccccff" stroke-width="2" filter="url(#wmr1x7896)"/><rect x="829.138174179066" y="422.78167584156614" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x7896)"/><rect x="836.6962856359407" y="404.5695458859205" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x7896)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x7896)"/><circle cx="877.167422781568" cy="415.2595143096521" r="15.0" fill="#ccccff" opacity=".8" filter="url(#glowr1x7896)"/><circle cx="876.6824696569331" cy="413.8315377603285" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="944.4414485341497" y="455.8307984403334" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x7896)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x7896)"/><circle cx="1020.913430331517" cy="470.26425954410803" r="18.0" fill="#ccccff" filter="url(#glowr1x7896)" opacity=".88"/><circle cx="1020.3028373960034" cy="470.5264772980474" r="7.0" fill="#ffffff"/><rect x="872.8430373428017" y="500.1132477735169" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x7896)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x7896)"/><rect x="833.8540295808203" y="424.5405790117569" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="859.3705954254233" y1="484.78169675301757" x2="856.5940345795453" y2="520.8408634765074" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="874.1001753221825" y1="486.99201581589875" x2="873.9200437638536" y2="519.577951033879" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="888.152892729044" y1="486.247665285971" x2="891.1050896025822" y2="518.2238339997828" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.23933992274107" y="556.8325573085807" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x7896)"/><rect x="423.59785384843127" y="575.223622836452" width="152.0" height="26.0" fill="url(#bevelr1x78