.1" y="522.3" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#0d1520" stroke-width=".6"/></g><g><polygon points="30.8,292.9 173.6,293.1 172.5,591.4 101.2,727.1 32.5,592.8" fill="url(#titaniumr1x7799)" stroke="#ff2040" stroke-width="2.6" filter="url(#wmr1x7799)"/><polygon points="30.4,292.6 172.0,292.4 171.8,590.6 101.5,727.6 31.9,593.0" fill="url(#carbonr1x7799)"/><polygon points="64.2,361.0 140.8,363.0 140.0,540.7 100.9,632.1 62.9,539.8" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="49.64575247246769" y1="430.85110221281644" x2="155.2636944334395" y2="429.91045055072755" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.83797665679825" y1="332.3179700560868" x2="102.26987366391343" y2="592.2201021810062" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="35.12984020909291" y1="295.2343399669044" x2="171.25308989848938" y2="296.3051811964251" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.67999915502962" cy="430.67738555967804" r="18.0" fill="url(#bevelr1x7799)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x7799)"/></g><rect x="450.6072669569403" y="557.8670002409257" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x7799)"/><rect x="425.43157887421546" y="575.7328716131859" width="152.0" height="26.0" fill="url(#bevelr1x7799)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x7799)"/><polygon points="306.6,381.9 351.0,294.7 500.6,278.2 648.3,295.9 692.8,381.7 668.8,502.4 501.5,565.0 330.8,504.3" fill="url(#suitr1x7799)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x7799) url(#metalr1x7799)"/><polygon points="307.3,378.9 349.1,294.3 499.2,279.4 649.0,293.0 692.4,382.4 668.1,504.2 499.5,566.3 332.5,502.4" fill="url(#carbonr1x7799)"/><polygon points="379.5,304.2 500.7,287.4 620.5,304.4 606.7,381.2 392.3,380.3" fill="url(#suitHir1x7799)"/><polygon points="380.1,381.5 367.4,424.7 431.9,502