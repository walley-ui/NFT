0" rx="5" fill="url(#carbonr1x5264)"/><rect x="747.6"  y="701.1" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x5264)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x5264)"/><rect x="746.9"  y="703.0" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x5264)"/><rect x="121.4" y="699.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><rect x="755.1" y="700.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><rect x="152.9" y="701.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><rect x="785.7" y="700.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><rect x="180.8" y="701.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><rect x="814.2" y="700.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><rect x="209.7" y="699.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><rect x="843.6" y="701.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5264)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x5264)"/><ellipse cx="182.62267975438385" cy="709.8155544473602" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x5264)"/><ellipse cx="819.2662708952278" cy="711.1997105971723" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x5264)"/></g><rect x="449.450639684312" y="556.6485606309026" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x5264)"/><rect x="424.9885908240452" y="574.9643335862086" width="152.0" height="26.0" fill="url(#bevelr1x5