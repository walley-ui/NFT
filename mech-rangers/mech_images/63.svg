 fill="rgba(255,255,255,.48)"/><polygon points="154.1,466.8 234.4,466.1 258.7,735.7 128.0,736.1" fill="url(#suitr1x63)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x63) url(#metalr1x63)"/><polygon points="172.7,432.8 252.3,431.3 243.4,511.7 159.9,509.3" fill="url(#bevelr1x63)" fill-opacity=".72" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x63)"/><polygon points="162.3,620.3 244.3,622.1 240.3,661.7 164.2,660.0" fill="#c0c0d0" fill-opacity=".42" stroke="#c0c0d0" stroke-width="1" filter="url(#skr1x63)"/><polygon points="763.3,464.9 846.6,466.5 872.1,735.8 743.3,734.0" fill="url(#suitr1x63)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x63) url(#metalr1x63)"/><polygon points="748.5,432.2 826.7,431.0 841.6,512.2 755.0,512.0" fill="url(#bevelr1x63)" fill-opacity=".72" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x63)"/><polygon points="756.7,620.9 840.0,623.2 833.3,661.8 762.3,659.1" fill="#c0c0d0" fill-opacity=".42" stroke="#c0c0d0" stroke-width="1" filter="url(#skr1x63)"/><rect x="122.0"  y="699.7" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x63)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x63)"/><rect x="750.2"   y="700.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x63)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x63)"/><line x1="149.6" y1="701.6" x2="149.3" y2="782.5" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="777.7" y1="701.8" x2="778.7" y2="782.4" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="183.0" y1="700.3" x2="184.2" y2="784.5" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="811.5" y1="702.5" x2="809.6" y2="783.7" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="216.4" y1="700.8" x2="215.4" y2="782.2" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="843.1" y1="700.4" x2="842.1" y2="783.2" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><polygon points="234.9,416.3 763.5,416.9 722.2,663.2 277.1,663.5" fill="url(#suitr1x63)" stroke="#c0c0d0" stroke-width="2.6" filter="url(#skr1x63) url(#metalr1x63)"/><polygon points="235.1,417.7 766.6,419.0 721.0,661.6 279.2,661.9" fill="url(#carbonr1x63)"/><polygon points="367.4,419.1 633.6,417.1 610.3,517.0 387.5,514.4" fill="url(#suitHir1x63)"/><line x1="363.7" y1="472.3" x2="639.6" y2="470.4" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x63)"/><line x1="401.0" y1="549.9" x2="602.4" y2="550.1" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x63)"/><line x1="268.4" y1="490.3" x2="321.5" y2="489.7" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.9" y1="491.3" x2="734.9" y2="492.1" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.2" y1="521.9" x2="321.6" y2="521.2" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.6" y1="522.9" x2="733.3" y2="523.4" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.1" y1="556.1" x2="321.2" y2="555.3" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.3" y1="556.2" x2="734.2" y2="554.4" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.2" y1="587.2" x2="318.3" y2="585.2" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.3" y1="585.9" x2="732.7" y2="585.7" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x63)"><path d="M500.0,449.7 C462.3,446.8 442.0,481.6 447.8,513.5 L459.4,542.5 C476.8,536.7 491.3,551.2 500.0,551.2 C508.7,551.2 523.2,536.7 540.6,542.5 L552.2,513.5 C558.0,481.6 537.7,446.8 500.0,449.7 Z" fill="#c0c0d0" fill-opacity=".92" stroke="#050508" stroke-width="1.3" filter="url(#skr1x63)"/><path d="M483.8,519.3 Q500.0,533.8 516.2,519.3" stroke="#050508" stroke-width="1" fill="none" opacity=".58"/><ellipse cx="481.4" cy="497.8" rx="8.7" ry="6.4" fill="#050508" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#050508" opaci