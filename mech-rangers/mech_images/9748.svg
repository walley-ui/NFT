l(#wmr1x9748)"/><polygon points="30.5,292.0 171.7,294.2 171.5,589.9 102.3,724.7 31.1,592.7" fill="url(#carbonr1x9748)"/><polygon points="65.8,361.3 141.8,360.8 140.7,540.9 103.3,632.7 64.2,539.7" fill="#ff44aa" fill-opacity=".28" stroke="#ff44aa" stroke-width="1.5"/><line x1="49.28730323821303" y1="431.2855489988811" x2="155.7008790499903" y2="431.0582325492985" stroke="#ff44aa" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.54019433608275" y1="330.3518219555728" x2="101.40959548376497" y2="590.5364342102781" stroke="#ff44aa" stroke-opacity=".4" stroke-width="1"/><line x1="35.831957680024175" y1="297.1537110328674" x2="170.30068702273067" y2="296.0933556195348" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.23937251077962" cy="433.10283694658426" r="18.0" fill="url(#bevelr1x9748)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x9748)"/></g><rect x="451.58839653767643" y="555.3683079081587" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x9748)"/><rect x="423.6746738811955" y="576.1546829132363" width="152.0" height="26.0" fill="url(#bevelr1x9748)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x9748)"/><polygon points="308.9,379.4 348.8,295.9 500.8,279.0 648.0,293.7 690.5,380.1 668.5,504.8 501.8,563.5 330.1,503.0" fill="url(#suitr1x9748)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x9748) url(#metalr1x9748)"/><polygon points="307.5,379.1 349.3,295.2 498.2,278.7 650.5,293.6 693.7,379.8 667.4,502.3 501.7,566.3 331.6,503.7" fill="url(#carbonr1x9748)"/><polygon points="380.9,302.7 501.0,287.5 619.4,304.5 606.8,380.7 394.1,381.6" fill="url(#suitHir1x9748)"/><polygon points="379.2,379.2 364.2,427.5 434.4,502.9 500.6,527.3 566.7,503.4 635.8,426.8 619.8,380.4" fill="#0d1520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x9748)"/><polygon points="381.7,411.2 475.8,411.8 484.7,441.5 388.0,440.5" fill="#ff44aa" filter="url(#glowr1x9748)"/>