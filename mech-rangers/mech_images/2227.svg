oke-width="2" filter="url(#wmr1x2227)"/><rect x="828.3341502586007" y="421.58319082222874" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x2227)"/><rect x="837.8090319506451" y="404.21905451100315" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x2227)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x2227)"/><circle cx="877.9890428942256" cy="412.69231821782887" r="15.0" fill="#ccccff" opacity=".8" filter="url(#glowr1x2227)"/><circle cx="878.5088509528525" cy="413.96469171941277" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="947.6317069877498" y="454.2433339300565" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x2227)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x2227)"/><circle cx="1019.1481847773865" cy="471.94256591815497" r="18.0" fill="#ccccff" filter="url(#glowr1x2227)" opacity=".88"/><circle cx="1020.380555050131" cy="471.3470452463254" r="7.0" fill="#ffffff"/><rect x="873.7135803309828" y="501.89171980237586" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x2227)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x2227)"/><rect x="834.2310834499635" y="422.8417406462133" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="856.8952014659159" y1="486.27211112082" x2="856.8810899669863" y2="521.160539967101" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="875.4778078375944" y1="484.82991600381206" x2="874.9126500811055" y2="519.0294575804844" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="891.451977398675" y1="485.03320060828696" x2="890.5998666187376" y2="519.9203266696073" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.2760325864889" y="555.6972797793336" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x2227)"/><rect x="425.2371632763185" y="575.0142069452443" width="152.0" height="26.0" fill="url(#bevelr1x2227)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x2