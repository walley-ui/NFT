.9" y="523.0" width="9.3" height="17.4" rx="1" fill="#ff44aa" stroke="#0d1520" stroke-width=".6"/></g><rect x="449.93822109047323" y="555.1907588862814" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x7200)"/><rect x="424.2576972225681" y="574.6732062878087" width="152.0" height="26.0" fill="url(#bevelr1x7200)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x7200)"/><polygon points="307.1,379.5 351.5,294.8 499.0,277.5 650.9,293.5 691.5,380.2 668.4,505.0 498.8,564.5 332.2,503.5" fill="url(#suitr1x7200)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x7200) url(#metalr1x7200)"/><polygon points="306.3,381.8 349.8,294.6 499.6,279.0 651.1,294.1 692.4,380.3 667.2,501.8 498.6,565.1 331.8,502.4" fill="url(#carbonr1x7200)"/><polygon points="382.3,301.4 499.8,287.8 620.3,302.9 609.0,380.1 393.7,379.4" fill="url(#suitHir1x7200)"/><polygon points="382.6,381.7 367.4,427.2 433.5,503.9 501.7,528.9 568.7,503.1 634.3,427.5 619.7,380.6" fill="#0d1520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x7200)"/><polygon points="380.8,412.6 476.7,410.4 485.1,438.8 390.2,440.9" fill="#ff44aa" filter="url(#glowr1x7200)"/><polygon points="524.5,409.6 620.1,411.8 611.2,438.9 516.8,439.5" fill="#ff44aa" filter="url(#glowr1x7200)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.22459623055533" y1="415.0591206997633" x2="514.8367588655465" y2="414.86435607438904" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="486.2516903134622" y1="437.6808097980917" x2="516.0033447862976" y2="436.61845949850976" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="501.20731076272205" y1="454.5720431684516" x2="500.7902276305482" y2="481.58562227897346" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x7200)"/><line x1="452.33