" fill="url(#blader1x5553)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x5553)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="911.9,690.6 942.9,691.8 986.3,270.5" fill="url(#blader1x5553)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x5553)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="864.9783940708824" y="682.8557218583301" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x5553)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x5553)"/></g><rect x="451.49297950426114" y="557.0094594612717" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x5553)"/><rect x="425.6079927173443" y="576.6749761784449" width="152.0" height="26.0" fill="url(#bevelr1x5553)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x5553)"/><polygon points="309.0,381.5 351.4,296.1 501.4,279.4 648.4,296.0 693.4,382.0 668.8,502.2 500.0,566.0 332.4,505.3" fill="url(#suitr1x5553)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x5553) url(#metalr1x5553)"/><polygon points="309.6,380.8 350.9,295.4 501.7,278.0 650.9,294.5 691.2,380.7 670.0,503.6 501.8,564.3 329.3,502.8" fill="url(#carbonr1x5553)"/><polygon points="380.4,303.4 498.4,286.7 620.2,304.4 607.7,381.7 392.7,382.1" fill="url(#suitHir1x5553)"/><polygon points="381.1,381.0 366.8,423.9 431.9,505.4 501.5,526.6 568.9,503.0 632.9,426.8 620.7,382.2" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x5553)"/><polygon points="380.3,411.0 477.9,410.4 485.2,439.6 388.5,438.7" fill="#ff2040" filter="url(#glowr1x5553)"/><polygon points="523.3,411.7 620.2,409.9 611.5,438.4 515.0,439.2" fill="#ff2040" filter="url(#glowr1x5553)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><l