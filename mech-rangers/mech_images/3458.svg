 x2="87.13363862274211" y2="112.30522355511782" stroke="url(#chromer1x3458)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x3458)"/><line x1="97.03952745473009" y1="770.3582489508204" x2="89.853905421067" y2="129.71562139475716" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="73.7,151.3 140.8,152.1 82.8,-7.9" fill="url(#blader1x3458)" stroke="#00ff60" stroke-width="1.8" filter="url(#wmr1x3458)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="81.36527938278388" y="420.9747188074514" width="40.0" height="20.0" fill="url(#bevelr1x3458)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3458)"/><rect x="83.40940571570766" y="509.66925263935696" width="40.0" height="20.0" fill="url(#bevelr1x3458)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3458)"/><rect x="84.4703900056332" y="599.898987604957" width="40.0" height="20.0" fill="url(#bevelr1x3458)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3458)"/><rect x="83.11879414239895" y="691.8475504030473" width="40.0" height="20.0" fill="url(#bevelr1x3458)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3458)"/><ellipse cx="102.73014191187914" cy="792.0437695643865" rx="22.0" ry="15.0" fill="url(#bevelr1x3458)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3458)"/></g><rect x="448.72923688413573" y="555.1796785308048" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x3458)"/><rect x="425.4007660141215" y="576.2271443907172" width="152.0" height="26.0" fill="url(#bevelr1x3458)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x3458)"/><polygon points="307.1,381.2 348.6,294.0 501.2,278.3 649.1,294.9 693.5,381.8 669.1,502.9 499.6,565.0 329.9,502.5" fill="url(#suitr1x3458)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x3458) url(#metalr1x3458)"/><polygon points="308.0,381.1 351.0,294.1 501.5,277.2 650.8,293.0 6