 points="379.8,409.8 478.3,411.0 484.2,439.8 389.3,438.8" fill="#c0c0d0" filter="url(#glowr1x5332)"/><polygon points="523.7,412.9 618.3,411.7 611.7,440.4 513.9,438.9" fill="#c0c0d0" filter="url(#glowr1x5332)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.37221002044157" y1="414.99504362242294" x2="516.3797458225303" y2="412.44248086335136" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="485.7622839205526" y1="439.33979760278015" x2="516.8600656171702" y2="438.75258585037665" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="498.7777891035192" y1="454.6371640173718" x2="501.41708865072576" y2="484.5981236718595" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5332)"/><line x1="454.40799040028827" y1="492.7575168588198" x2="454.2795121626742" y2="519.507329665497" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5332)"/><line x1="478.59122053761035" y1="492.08828211035575" x2="477.15394448464735" y2="521.7363828351721" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5332)"/><line x1="498.67894282061604" y1="490.21635330617426" x2="498.97894608508795" y2="519.2746470385231" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5332)"/><line x1="523.9751762651465" y1="492.82206729156894" x2="522.7172356992587" y2="520.9838963639922" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5332)"/><line x1="546.8624527330697" y1="492.0983497450128" x2="544.7011134261452" y2="519.7305151024833" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5332)"/><polygon points="432.9,505.3 568.5,505.2 554.0,556.2 446.6,558.4" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x5332)"/><text x="30.0"  y="975.0" font-family="monospace" font-weig