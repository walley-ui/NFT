60ff" stroke-width="2" filter="url(#wmr1x6491)"/><rect x="831.170634352006" y="420.3582553897984" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x6491)"/><rect x="837.8918400820904" y="404.7567362271249" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x6491)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x6491)"/><circle cx="876.9317116958648" cy="414.50095936236903" r="15.0" fill="#2060ff" opacity=".8" filter="url(#glowr1x6491)"/><circle cx="877.8035325571523" cy="413.75133398510513" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="944.3150573418103" y="455.7739975095726" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x6491)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x6491)"/><circle cx="1019.5886694229767" cy="469.8967243670486" r="18.0" fill="#2060ff" filter="url(#glowr1x6491)" opacity=".88"/><circle cx="1019.1549502112531" cy="472.15413690898566" r="7.0" fill="#ffffff"/><rect x="873.9497911843099" y="501.0639085134491" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x6491)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x6491)"/><rect x="833.9537955345214" y="424.14515800811347" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="857.1269096765295" y1="487.9498907651752" x2="857.5846019887924" y2="519.2998740988784" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="872.9584254314751" y1="485.3840051487088" x2="872.9482317237743" y2="519.4427043600008" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="889.5841579365172" y1="485.09820467298846" x2="891.0726523304917" y2="520.6901268259622" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.1845846364275" y="557.7937001246959" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x6491)"/><rect x="424.533965605218" y="574.3829394437373" width="152.0" height="26.0" fill="url(#bevelr1x6491)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="ur