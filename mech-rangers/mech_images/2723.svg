th="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x2723)" stroke="#ccccff" stroke-width="2" filter="url(#wmr1x2723)"/><rect x="35.62654769312587" y="421.10411954475563" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x2723)"/><rect x="40.893221364300665" y="402.41452425159514" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x2723)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x2723)"/><circle cx="82.64899541897697" cy="415.4308534007519" r="15.0" fill="#ccccff" opacity=".8" filter="url(#glowr1x2723)"/><circle cx="81.5850080096535" cy="414.31577121056614" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="55.213472260665114" y="454.1841993240639" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x2723)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x2723)"/><circle cx="-20.281941429581526" cy="472.89186516795303" r="18.0" fill="#ccccff" filter="url(#glowr1x2723)" opacity=".88"/><circle cx="-20.89665245279673" cy="472.33749404661353" r="7.0" fill="#ffffff"/><rect x="79.92573246559125" y="503.1577586714178" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x2723)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x2723)"/><rect x="37.48579487422478" y="423.50666627418246" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.95716607937586" y1="485.1728965774178" x2="62.513374619688804" y2="518.8202558821067" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="76.79290450833734" y1="488.115958810132" x2="77.12105681378391" y2="518.7425126791001" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="94.42720950668675" y1="486.0330234943889" x2="94.66099816434082" y2="518.6342713749036" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.5258042818867" y="557.1260643860325" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x2723)"/><rect x="423.99887803951276" y="576.2194589801132" width="152.0" height="26.0" fill="url(#be