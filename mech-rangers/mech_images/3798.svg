ints="382.7,412.9 475.3,411.9 485.0,441.1 388.8,440.1" fill="#c0c0d0" filter="url(#glowr1x3798)"/><polygon points="522.1,411.2 618.8,412.7 611.2,441.0 514.2,440.4" fill="#c0c0d0" filter="url(#glowr1x3798)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.65317493859675" y1="412.40595666160806" x2="513.8750530252606" y2="412.60087134903296" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="483.08320808285845" y1="438.13515440085905" x2="515.6351057741232" y2="437.80996533036233" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="500.733314303495" y1="455.57357130246237" x2="501.37231337474657" y2="484.37076224414636" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3798)"/><line x1="452.85733841413634" y1="490.3324979512952" x2="454.3556736008078" y2="521.5649752127938" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3798)"/><line x1="475.86602852981537" y1="491.3351132290437" x2="478.611024831552" y2="519.3759954452514" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3798)"/><line x1="499.2783626750112" y1="493.0998788999393" x2="500.3338033040985" y2="518.7373902270571" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3798)"/><line x1="523.7640825189277" y1="491.1887554490007" x2="524.0923953034542" y2="519.3100688976235" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3798)"/><line x1="545.5020221226104" y1="491.7803328762762" x2="544.7973422083259" y2="518.9538736040704" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3798)"/><polygon points="433.2,503.5 568.8,503.4 553.9,557.7 447.5,557.2" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x3798)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bol