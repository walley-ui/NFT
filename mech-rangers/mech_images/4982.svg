 points="887.4,-28.6 908.2,-28.6 897.8,-138.6" fill="url(#blader1x4982)" filter="url(#wmr1x4982)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x4982)" opacity=".9"/><line x1="907.2905207983218" y1="670.3070645741187" x2="898.2432892905734" y2="-130.39100286932666" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="887.7384351629019" y1="670.52000666745" x2="895.8580085954629" y2="-128.03471948551015" stroke="#2060ff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.9125906275214" y="670.9253464915789" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x4982)" stroke="#2060ff" stroke-width="1.6" filter="url(#wmr1x4982)"/><rect x="864.8030869383924" y="674.4110609244555" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="886.6172954352201" y="677.2567058256827" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="885.8936061356776" y="685.3319854817353" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="885.6396450735257" y="694.3616229432635" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="885.1546452650429" y="700.345342518948" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="886.4582768248022" y="710.1051233110949" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="887.5491580465437" y="717.7267446167767" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><ellipse cx="896.5894637819007" cy="725.2162303244695" rx="22.0" ry="16.0" fill="url(#bevelr1x4982)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x4982)"/></g><rect x="450.2306046433747" y="556.0344334776513" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter