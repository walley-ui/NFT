oke-linecap="round" filter="url(#wmr1x4900)"/><line x1="902.3080509590544" y1="813.0510912757367" x2="902.5446655602753" y2="130.93326430153098" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="880.8612672999129" y="621.3477964651771" width="32.0" height="18.0" fill="url(#bevelr1x4900)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x4900)"/><rect x="881.499892194625" y="441.73645516894754" width="32.0" height="18.0" fill="url(#bevelr1x4900)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x4900)"/><rect x="880.4876179310121" y="263.11714418223124" width="32.0" height="18.0" fill="url(#bevelr1x4900)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x4900)"/><circle cx="897.1935957980901" cy="110.62724658483637" r="58.0" fill="rgba(0,0,0,.52)" stroke="#4444ff" stroke-width="2.2" filter="url(#wmr1x4900)"/><circle cx="896.8032916873321" cy="110.09692500866947" r="46.0" fill="url(#orbr1x4900)" filter="url(#bloomr1x4900)"/><circle cx="897.7246866921522" cy="110.3216819426976" r="20.0" fill="#4444ff" filter="url(#glowr1x4900)"/><circle cx="896.5623211375997" cy="110.72631260771303" r="66.0" fill="none" stroke="#4444ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="896.8626627225057" cy="109.85208548977968" rx="66.0" ry="30.0" fill="none" stroke="#4444ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="450.9014562299475" y="557.2518300260417" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x4900)"/><rect x="423.45569826262073" y="574.2437151737512" width="152.0" height="26.0" fill="url(#bevelr1x4900)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x4900)"/><polygon points="307.1,380.4 348.9,294.7 500.7,276.9 650.5,294.0 690.7,380.6 669.1,503.6 501.5,565.4 330.7,504.3" fill="url(#suitr1x4900)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x4900) url(#metalr1x