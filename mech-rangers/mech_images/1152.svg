28.6 102.2,-138.6" fill="url(#blader1x1152)" filter="url(#wmr1x1152)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x1152)" opacity=".9"/><line x1="113.26000587929038" y1="671.9999990363605" x2="102.1250895777717" y2="-127.47034599855544" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.3766059794463" y1="672.2269074263983" x2="102.02972951455038" y2="-128.4028289595619" stroke="#2060ff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="45.8826985050365" y="669.8209283746779" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x1152)" stroke="#2060ff" stroke-width="1.6" filter="url(#wmr1x1152)"/><rect x="71.63827867874872" y="674.6745959238149" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="91.41307014286515" y="676.9037253356538" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="88.70752369923514" y="684.1351270285435" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="90.43420838996765" y="692.438017686829" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="88.92599478423593" y="701.9564612084068" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="89.53002989975732" y="710.1977901825682" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="90.31889692865309" y="719.0243807679973" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><ellipse cx="100.60633970689025" cy="725.5942006281576" rx="22.0" ry="16.0" fill="url(#bevelr1x1152)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x1152)"/></g><rect x="450.69978482918816" y="555.6786603277549" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1152)"/><rect 