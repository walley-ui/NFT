 fill-opacity=".88" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x9897)"/><path d="M500,493.20000000000005 C452.66598468543964,465.0102198140696 478.38919343259187,516.9387351852841 500,522.0733022967354" fill="rgba(255,255,255,.14)"/><path d="M500,493.20000000000005 C547.6142855832353,466.44771179631357 524.83658105582,515.3782215896994 500,523.8241474226118" fill="rgba(255,255,255,.14)"/></g><g><line x1="102.0558335840143" y1="790.6340391433797" x2="84.65915877515447" y2="111.15907277213407" stroke="url(#chromer1x9897)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x9897)"/><line x1="96.29302661040795" y1="772.3382940783165" x2="89.21721097420898" y2="132.530898240488" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="75.2,150.7 138.8,152.7 83.0,-8.8" fill="url(#blader1x9897)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x9897)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="83.77239525172857" y="419.8669159724377" width="40.0" height="20.0" fill="url(#bevelr1x9897)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x9897)"/><rect x="81.67043058587235" y="511.1619564410299" width="40.0" height="20.0" fill="url(#bevelr1x9897)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x9897)"/><rect x="84.71585125051436" y="603.0691580958664" width="40.0" height="20.0" fill="url(#bevelr1x9897)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x9897)"/><rect x="81.3848585999943" y="691.5911759596318" width="40.0" height="20.0" fill="url(#bevelr1x9897)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x9897)"/><ellipse cx="101.10126371219751" cy="790.5873415826819" rx="22.0" ry="15.0" fill="url(#bevelr1x9897)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x9897)"/></g><rect x="449.181157053262" y="558.6595971060916" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x9897)"/><rect x="424.5