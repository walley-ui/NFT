 x2="85.55441454922777" y2="111.86436126707119" stroke="url(#chromer1x7199)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x7199)"/><line x1="98.71813177190718" y1="769.9892409107648" x2="88.09204707279798" y2="131.64407197711986" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="72.7,152.2 140.1,150.1 83.2,-7.6" fill="url(#blader1x7199)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x7199)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="84.4426662146486" y="421.81566369375213" width="40.0" height="20.0" fill="url(#bevelr1x7199)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x7199)"/><rect x="82.33281387699765" y="511.24138389611613" width="40.0" height="20.0" fill="url(#bevelr1x7199)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x7199)"/><rect x="81.37893594888968" y="602.7938549966551" width="40.0" height="20.0" fill="url(#bevelr1x7199)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x7199)"/><rect x="81.91989327421409" y="692.8013273845427" width="40.0" height="20.0" fill="url(#bevelr1x7199)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x7199)"/><ellipse cx="103.29877173429352" cy="790.6482288178056" rx="22.0" ry="15.0" fill="url(#bevelr1x7199)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x7199)"/></g><rect x="451.45173776708543" y="558.0708933263086" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x7199)"/><rect x="422.3754166036844" y="576.61939588245" width="152.0" height="26.0" fill="url(#bevelr1x7199)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x7199)"/><polygon points="308.2,379.4 350.9,294.6 499.2,277.5 648.5,294.7 691.3,380.7 668.1,502.4 500.0,566.4 332.5,502.5" fill="url(#suitr1x7199)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x7199) url(#metalr1x7199)"/><polygon points="307.5,379.3 351.3,293.5 498.7,279.8 649.8,293.4