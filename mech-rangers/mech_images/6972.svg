roke-linecap="round" filter="url(#wmr1x6972)"/><line x1="98.82819329522547" y1="769.8711164123379" x2="88.43133104018864" y2="130.25913520054888" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="75.3,150.2 139.9,150.4 84.1,-9.9" fill="url(#blader1x6972)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x6972)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="82.1418086617626" y="420.86372443530706" width="40.0" height="20.0" fill="url(#bevelr1x6972)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6972)"/><rect x="82.54555438136678" y="511.3088677418418" width="40.0" height="20.0" fill="url(#bevelr1x6972)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6972)"/><rect x="81.88131903329861" y="601.4863475870341" width="40.0" height="20.0" fill="url(#bevelr1x6972)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6972)"/><rect x="83.56711106462402" y="691.536806763988" width="40.0" height="20.0" fill="url(#bevelr1x6972)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6972)"/><ellipse cx="100.46794949578118" cy="793.022149179317" rx="22.0" ry="15.0" fill="url(#bevelr1x6972)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6972)"/></g><rect x="450.4235914578661" y="556.0993001227267" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x6972)"/><rect x="424.00056814132256" y="575.6501761806197" width="152.0" height="26.0" fill="url(#bevelr1x6972)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x6972)"/><polygon points="306.3,381.0 348.7,294.8 501.0,279.5 649.2,294.1 692.4,379.6 667.2,504.3 498.6,564.9 329.2,503.7" fill="url(#suitr1x6972)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x6972) url(#metalr1x6972)"/><polygon points="306.9,381.5 349.8,294.4 500.2,278.8 648.8,295.9 693.0,380.6 670.4,504.1 500.8,564.2 332.7,502.1" fill="url(#carbonr1x6972)"/><polygon points="380.7