.6" y="521.3" width="9.3" height="17.4" rx="1" fill="#ffcc00" stroke="#0a0520" stroke-width=".6"/></g><g><polygon points="828.8,295.1 968.1,294.8 967.3,591.3 897.5,726.5 826.3,591.7" fill="url(#titaniumr1x1980)" stroke="#ffcc00" stroke-width="2.6" filter="url(#wmr1x1980)"/><polygon points="827.9,293.0 968.5,292.2 968.9,590.7 899.0,726.1 827.7,590.9" fill="url(#carbonr1x1980)"/><polygon points="861.1,362.0 935.6,361.2 935.3,542.5 897.9,632.9 860.7,543.1" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="847.3178740691952" y1="432.1671650913544" x2="950.2468067152054" y2="431.2540803001262" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.0289074839652" y1="332.6374287731014" x2="896.6951015898586" y2="590.7072682254948" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="831.4237936893106" y1="297.0794219375588" x2="965.0986728686468" y2="294.70293757282195" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.8314684102871" cy="432.2108558219857" r="18.0" fill="url(#bevelr1x1980)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x1980)"/></g><rect x="448.44424110883847" y="558.391658668872" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x1980)"/><rect x="424.76771377744154" y="575.9660053139553" width="152.0" height="26.0" fill="url(#bevelr1x1980)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x1980)"/><polygon points="306.9,380.5 350.8,294.5 500.2,279.7 648.2,295.3 692.6,382.2 669.5,505.3 500.0,564.6 332.7,505.3" fill="url(#suitr1x1980)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x1980) url(#metalr1x1980)"/><polygon points="306.8,382.2 349.0,293.0 498.5,276.6 649.2,293.1 690.4,378.8 668.7,503.8 499.7,566.2 330.6,503.7" fill="url(#carbonr1x1980)"/><polygon points="382.1,302.3 500.1,287.8 620.6,304.1 607.9,381.3 391.3,381.6" fill="url(#suitHir1x1980)"/><polygon points="382.3,379.8 366.3,427.1 432.6,503.7 501.8,529.9 565.6,505.4 635.7,425.6 619.6,381.5" fill="#0a0520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x1980)"/><polygon points="379.3,410.7 476.5,409.7 485.3,439.2 387.9,438.8" fill="#ffcc00" filter="url(#glowr1x1980)"/><polygon points="524.1,411.2 618.0,410.1 612.7,440.2 517.0,439.5" fill="#ffcc00" filter="url(#glowr1x1980)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.8523073209077" y1="414.5061829132028" x2="517.1293713867105" y2="414.2343626682646" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.2614523995295" y1="438.23958936464044" x2="516.705458549913" y2="439.0875220407732" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.65439743390306" y1="453.02183800479395" x2="498.287630223576" y2="483.5623038652353" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1980)"/><line x1="454.65195108082145" y1="491.762674607709" x2="453.9846011583507" y2="518.3630589752458" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1980)"/><line x1="478.3620908233709" y1="490.3923880534246" x2="478.02075404323637" y2="520.5653909259476" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1980)"/><line x1="500.79372328817846" y1="492.0529352189973" x2="499.2910069569945" y2="521.4827024695463" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1980)"/><line x1="521.7607928090356" y1="490.9948357773013" x2="521.8267196709849" y2="520.410913234204" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1980)"/><line x1="547.8465886099451" y1="492.0962640827521" x2="545.9147938150168" y2="521.3743140554055" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1980)"/><polygon points="434.5,504.4 565.8,504.2 553.6,558.3 445.5,555.4" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x1980)"/><polygon points="477.4,302.4 524.3,302.1 509.9,176.5 488.2,174.3" fill="url(#bevelr1x1980)" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x1980)"/><polygon points="366.2,322.1 457.8,323.1 470.7,227.4" fill="url(#bevelr1x1980)" fill-opacity=".78" stroke="#ffcc00" stroke-width="1.5" filter="url(#skr1x1980)"/><polygon points="540.7,322.8 634.0,323.7 530.3,228.3" fill="url(#bevelr1x1980)" fill-opacity=".78" stroke="#ffcc00" stroke-width="1.5" filter="url(#skr1x1980)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>