x8128)"/><polygon points="380.1,302.4 498.8,287.2 618.9,302.4 608.9,378.8 393.4,382.1" fill="url(#suitHir1x8128)"/><polygon points="382.7,379.8 366.2,425.8 433.8,503.0 499.1,529.7 566.7,502.4 634.8,424.3 618.5,382.4" fill="#1e0600" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x8128)"/><polygon points="381.3,411.3 478.7,413.0 486.0,440.5 387.3,440.7" fill="#4444ff" filter="url(#glowr1x8128)"/><polygon points="522.8,412.4 618.6,411.0 611.2,439.1 514.9,441.5" fill="#4444ff" filter="url(#glowr1x8128)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.28016671981663" y1="412.12756845708935" x2="514.6180701737665" y2="414.5197058281861" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.356764734406" y1="439.17208945574237" x2="515.0920816558786" y2="437.7321474965662" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="498.6134125031531" y1="455.416189167276" x2="498.2867755309679" y2="482.988806001097" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8128)"/><line x1="454.30703603269535" y1="490.53357114987443" x2="455.02964756533504" y2="518.4613102796487" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8128)"/><line x1="478.43441053939983" y1="491.82262088702987" x2="476.39248527916146" y2="521.3967645790428" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8128)"/><line x1="500.5850121004507" y1="492.75386834042143" x2="498.74453035630285" y2="520.3355482218788" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8128)"/><line x1="521.2880772823095" y1="492.7698746155016" x2="521.922374159526" y2="518.6473125481047" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8128)"/><line x1="545.3221297586523" y1="492.97851415053003" x2="545.0980237330497" y2="520.473