-opacity=".38" stroke-width="1"/><line x1="845.3" y1="702.5" x2="845.5" y2="783.1" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><polygon points="235.8,417.9 763.2,416.8 724.4,661.4 277.1,660.9" fill="url(#suitr1x8128)" stroke="#4444ff" stroke-width="2.6" filter="url(#skr1x8128) url(#metalr1x8128)"/><polygon points="235.5,417.3 765.1,419.0 723.0,662.0 277.4,661.7" fill="url(#carbonr1x8128)"/><polygon points="368.7,415.9 631.9,417.4 611.5,514.4 389.1,515.3" fill="url(#suitHir1x8128)"/><line x1="363.3" y1="470.5" x2="637.0" y2="472.9" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x8128)"/><line x1="399.5" y1="549.2" x2="602.2" y2="549.2" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x8128)"/><line x1="266.9" y1="490.4" x2="318.7" y2="491.3" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.0" y1="492.4" x2="734.0" y2="490.0" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.7" y1="521.6" x2="319.7" y2="521.8" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.5" y1="524.3" x2="734.6" y2="523.3" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.5" y1="553.9" x2="320.3" y2="555.0" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.5" y1="555.1" x2="731.7" y2="554.4" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.8" y1="587.9" x2="318.1" y2="587.3" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.8" y1="585.9" x2="734.1" y2="588.2" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x8128)"><path d="M500.0,449.7 C462.3,446.8 442.0,481.6 447.8,513.5 L459.4,542.5 C476.8,536.7 491.3,551.2 500.0,551.2 C508.7,551.2 523.2,536.7 540.6,542.5 L552.2,513.5 C558.0,481.6 537.7,446.8 500.0,449.7 Z" fill="#4444ff" fill-opacity=".92" stroke="#1e0600" stroke-width="1.3" filter="url(#skr1x8128)"/><path d="M483.8,519.3 Q500.0,533.8 516.2,519.3