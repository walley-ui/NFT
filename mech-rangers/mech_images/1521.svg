.6,294.8 173.2,593.2 100.7,724.8 31.7,591.3" fill="url(#carbonr1x1521)"/><polygon points="64.2,361.2 140.6,361.8 140.0,540.4 101.3,630.4 63.0,541.3" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="49.7816757830232" y1="431.7567652118392" x2="155.02945890299972" y2="431.72886414863166" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="100.50634126098824" y1="331.291669059731" x2="102.51817120485005" y2="591.4649749275296" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="34.51959502030161" y1="294.6786176509224" x2="170.4177941961586" y2="296.299323474057" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.93603881871324" cy="431.5629776758142" r="18.0" fill="url(#bevelr1x1521)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x1521)"/></g><rect x="450.11571001242845" y="556.8505560182035" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x1521)"/><rect x="422.5188313961029" y="576.699013367854" width="152.0" height="26.0" fill="url(#bevelr1x1521)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x1521)"/><polygon points="309.0,378.9 351.9,292.7 500.3,277.2 648.6,295.2 693.7,381.8 670.5,501.9 499.1,563.5 329.6,502.6" fill="url(#suitr1x1521)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x1521) url(#metalr1x1521)"/><polygon points="306.5,381.8 349.8,293.0 500.8,276.3 650.6,296.2 692.0,379.0 668.8,504.4 498.8,565.8 329.7,503.1" fill="url(#carbonr1x1521)"/><polygon points="381.1,302.4 498.9,286.2 618.0,303.3 606.1,381.9 391.6,381.7" fill="url(#suitHir1x1521)"/><polygon points="379.2,379.5 364.3,427.1 432.6,502.6 499.7,529.2 568.3,504.8 635.1,426.9 620.1,381.4" fill="#050508" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x1521)"/><polygon points="382.7,412.9 477.3,410.1 486.2,440.4 390.4,438.6" fill="#ffcc00" filter="url(#glowr1x1521)"/><polygon points="523.3,409.7 618.7,412.4 612.2,441.0