 filter="url(#wmr1x1802)"/><rect x="41.20062313018364" y="397.971289327275" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x1802)"/><rect x="16.630479219127416" y="447.0015821290202" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x1802)" stroke="#00ffff" stroke-width="1.4" filter="url(#wmr1x1802)"/><circle cx="117.91540781933811" cy="471.40021618772295" r="48.0" fill="rgba(0,0,0,.55)" stroke="#00ffff" stroke-width="2" filter="url(#wmr1x1802)"/><circle cx="117.30957539914172" cy="469.66865749070416" r="34.0" fill="#00ffff" fill-opacity=".4" filter="url(#bloomr1x1802)"/><circle cx="119.5011533437669" cy="470.11435645204034" r="18.0" fill="#00ffff" filter="url(#glowr1x1802)"/><rect x="47.37825988618654" y="382.8288696897216" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x1802)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x1802)"/><rect x="43.0858431209251" y="399.21671265000475" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="52.873215192873" y1="520.0664681521245" x2="51.89195728771385" y2="548.5917359890416" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/><line x1="75.55003836009648" y1="520.4420701725409" x2="77.89604167662557" y2="548.7655718278139" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/><line x1="98.44162007210772" y1="518.9955752205103" x2="98.7858217733353" y2="548.6215544092469" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/><line x1="124.45201263189313" y1="520.3992747993208" x2="123.16583378290754" y2="550.0572993785142" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.19707281701267" y="556.4345267167315" width="100.0"  height="56.0" fill="#08001e" stroke="#00ffff" stroke-width="2.2" filter="url(#skr1x1802)"/><rect x="422.3842542418279" y="573.8557198967785" width="152.0" height="26.0" fill="url(#bevelr1x1802)" fill-opacity=".65" stroke="#00ffff" stroke-width="1.2" filter="url(#skr1x1802)"/><polygon points="309.3,379.4 351.5,295.9 501.1,277.4 650.9,296