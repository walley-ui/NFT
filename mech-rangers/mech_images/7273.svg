.1" y="520.9" width="9.3" height="17.4" rx="1" fill="#ccccff" stroke="#050508" stroke-width=".6"/></g><g><polygon points="871.8,671.4 923.8,671.4 908.2,-28.6 887.4,-28.6" fill="url(#blader1x7273)" filter="url(#wmr1x7273)"/><polygon points="887.4,-28.6 908.2,-28.6 897.8,-138.6" fill="url(#blader1x7273)" filter="url(#wmr1x7273)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x7273)" opacity=".9"/><line x1="906.083182113804" y1="671.2002082234249" x2="899.0921587885543" y2="-129.4315461266786" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="889.1959358211793" y1="669.8542940081097" x2="898.2573868613691" y2="-127.21251005632806" stroke="#ccccff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="840.3729770747573" y="670.9992741860449" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x7273)" stroke="#ccccff" stroke-width="1.6" filter="url(#wmr1x7273)"/><rect x="865.5813505429402" y="671.7632531118579" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="886.7348239283637" y="677.0088076589628" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="884.2396338673867" y="685.0957620304077" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="885.8447683021054" y="693.0158088455908" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="884.8948228989356" y="702.6705379754304" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="885.8393296204135" y="710.6345941844396" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="884.6340207973122" y="717.6524202152156" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><ellipse cx="897.4904197807051" cy="725.8515817398205" rx="22.0" ry="16