.6" y="523.6" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#0a0520" stroke-width=".6"/></g><g><line x1="897.779954947494" y1="793.0702193646691" x2="912.6410250533932" y2="111.74302224004639" stroke="url(#chromer1x9476)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x9476)"/><line x1="901.4056719210558" y1="770.2171557226218" x2="913.1967527713255" y2="129.74312040321527" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.3,149.9 934.9,151.4 915.6,-7.9" fill="url(#blader1x9476)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x9476)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="877.2093246196956" y="419.88549397131425" width="40.0" height="20.0" fill="url(#bevelr1x9476)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9476)"/><rect x="877.8973710788042" y="511.5054926769808" width="40.0" height="20.0" fill="url(#bevelr1x9476)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9476)"/><rect x="879.8025529715792" y="602.8970364686102" width="40.0" height="20.0" fill="url(#bevelr1x9476)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9476)"/><rect x="880.3643638089858" y="691.1482557601295" width="40.0" height="20.0" fill="url(#bevelr1x9476)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9476)"/><ellipse cx="896.0731843025052" cy="791.8872116007842" rx="22.0" ry="15.0" fill="url(#bevelr1x9476)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9476)"/></g><rect x="451.6009771884419" y="556.2240212501957" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x9476)"/><rect x="425.08560681026427" y="574.5780162983574" width="152.0" height="26.0" fill="url(#bevelr1x9476)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x9476)"/><polygon points="309.7,379.2 351.7,296.0 500.5,279.4 649.2,296.2 692.5,380.3 667.5,504.8 501.0,565.3 330.4,505.1" fill="url(#