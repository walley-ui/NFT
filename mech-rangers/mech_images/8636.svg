484.6,490.0 " fill="url(#suitHir1x8636)" opacity=".45"/></g><g><line x1="103.18140495907512" y1="832.9625391660257" x2="100.48026719786223" y2="110.08585922848431" stroke="url(#chromer1x8636)" stroke-width="22.0" stroke-linecap="round" filter="url(#wmr1x8636)"/><line x1="99.43852765331042" y1="810.7391854583285" x2="99.10175418075171" y2="132.92153612030668" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="87.45933889042583" y="620.0420457323081" width="32.0" height="18.0" fill="url(#bevelr1x8636)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x8636)"/><rect x="87.47400292776521" y="441.86023417217655" width="32.0" height="18.0" fill="url(#bevelr1x8636)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x8636)"/><rect x="87.12902732374144" y="260.0531856286339" width="32.0" height="18.0" fill="url(#bevelr1x8636)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x8636)"/><circle cx="103.51926566924897" cy="110.78835755884646" r="58.0" fill="rgba(0,0,0,.52)" stroke="#ffd700" stroke-width="2.2" filter="url(#wmr1x8636)"/><circle cx="101.7995738938823" cy="112.91114250086245" r="46.0" fill="url(#orbr1x8636)" filter="url(#bloomr1x8636)"/><circle cx="101.21077175581824" cy="109.69810973573473" r="20.0" fill="#ffd700" filter="url(#glowr1x8636)"/><circle cx="102.98479978343468" cy="109.94699528561902" r="66.0" fill="none" stroke="#ffd700" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="103.88462731823321" cy="110.80253259427843" rx="66.0" ry="30.0" fill="none" stroke="#ffd700" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,102.2,111.4)"/></g><rect x="449.26503338702025" y="558.4125856659375" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x8636)"/><rect x="423.14262920031325" y="573.699764273502" width="152.0" height="26.0" fill="url(#bevelr1x8636)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1