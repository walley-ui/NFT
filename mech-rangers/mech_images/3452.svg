url(#wmr1x3452)"/><polygon points="829.3,293.6 968.8,292.3 968.3,591.6 896.6,725.1 828.4,590.4" fill="url(#carbonr1x3452)"/><polygon points="860.5,361.2 936.9,361.2 935.9,542.9 897.6,630.5 858.1,542.7" fill="#ccccff" fill-opacity=".28" stroke="#ccccff" stroke-width="1.5"/><line x1="846.1237947499939" y1="431.7107664797455" x2="948.6692612586171" y2="430.3878859388642" stroke="#ccccff" stroke-opacity=".65" stroke-width="1.3"/><line x1="898.773114513103" y1="331.41187522644174" x2="896.550441665724" y2="590.0255046146922" stroke="#ccccff" stroke-opacity=".4" stroke-width="1"/><line x1="831.0853535155394" y1="298.065781843476" x2="964.5549947691709" y2="296.7247714178636" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.3767733350024" cy="431.4719254908152" r="18.0" fill="url(#bevelr1x3452)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x3452)"/></g><rect x="451.7052229726687" y="555.2315353113227" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x3452)"/><rect x="423.67988867470996" y="576.8605367725715" width="152.0" height="26.0" fill="url(#bevelr1x3452)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x3452)"/><polygon points="306.7,382.0 350.1,296.1 500.0,279.0 651.6,294.7 692.0,380.4 667.9,504.5 501.7,565.9 331.1,505.1" fill="url(#suitr1x3452)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x3452) url(#metalr1x3452)"/><polygon points="308.4,378.9 348.9,294.9 499.8,278.8 648.1,293.2 693.7,381.0 668.4,505.2 500.2,565.8 332.5,502.6" fill="url(#carbonr1x3452)"/><polygon points="381.8,303.0 499.3,285.3 618.2,302.7 608.0,381.2 391.9,381.4" fill="url(#suitHir1x3452)"/><polygon points="381.8,381.0 365.9,425.8 431.9,504.2 500.4,527.2 566.1,505.2 633.0,425.9 620.3,382.4" fill="#050508" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x3452)"/><polygon points="381.6,410.2 477.8,411.1 483.2,440.9 387.6,440.8" fill="#ccccff" filter="url(#glowr1x3452)"/><polygon points="524.2,410.0 617.6,410.0 610.7,439.8 514.7,439.3" fill="#ccccff" filter="url(#glowr1x3452)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.126424908787" y1="413.4862178276293" x2="514.5073948210478" y2="414.72878797883163" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="485.6752704809978" y1="436.9033231473528" x2="515.0878207682073" y2="439.3426023392938" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="499.2584016595967" y1="453.11152530079704" x2="500.1658233252354" y2="482.3035559552722" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3452)"/><line x1="454.81484437685464" y1="491.6866658425889" x2="452.79545930650085" y2="519.220006760396" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3452)"/><line x1="478.4884795640036" y1="490.0242771049961" x2="475.9525254974514" y2="520.6566106148996" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3452)"/><line x1="500.7170317281969" y1="492.6524572680704" x2="500.3941284848377" y2="519.3231048315763" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3452)"/><line x1="524.4470984229445" y1="490.5705030716955" x2="523.3420756036974" y2="518.6600741901435" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3452)"/><line x1="545.3835093165934" y1="491.3140770291909" x2="546.6373172588833" y2="521.7711158200167" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3452)"/><polygon points="433.5,501.8 568.6,502.7 553.3,556.7 447.3,555.7" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x3452)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>