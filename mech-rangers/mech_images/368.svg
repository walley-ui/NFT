acity=".5" stroke-width="1.2"/></g><rect x="448.49546535741536" y="557.9852786520496" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x368)"/><rect x="423.5569330786355" y="575.1324092310854" width="152.0" height="26.0" fill="url(#bevelr1x368)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x368)"/><polygon points="307.0,381.2 349.6,294.9 499.3,278.8 650.9,294.4 690.7,380.5 668.0,503.9 501.2,565.9 330.7,502.5" fill="url(#suitr1x368)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x368) url(#metalr1x368)"/><polygon points="306.4,380.8 349.4,293.7 498.6,277.9 650.1,294.0 692.9,379.5 670.5,502.0 501.7,564.2 330.8,503.2" fill="url(#carbonr1x368)"/><polygon points="380.0,304.5 500.6,286.5 617.5,303.4 608.5,379.9 393.2,381.6" fill="url(#suitHir1x368)"/><polygon points="381.5,380.8 366.6,427.0 431.2,502.4 498.3,528.5 568.0,503.9 634.2,425.0 620.8,381.5" fill="#0a0520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x368)"/><polygon points="381.4,410.3 477.4,410.5 483.7,439.1 388.4,438.9" fill="#2060ff" filter="url(#glowr1x368)"/><polygon points="523.2,412.0 618.0,412.4 611.1,440.1 516.3,438.3" fill="#2060ff" filter="url(#glowr1x368)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.18092646325005" y1="413.9526624687016" x2="515.2024240173772" y2="412.1938063111156" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="486.32454348063095" y1="439.76157548082995" x2="516.3552574302443" y2="438.70711340624837" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.07714883638545" y1="454.09121954431754" x2="499.01691400092096" y2="482.3497968061827" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x368)"/><line x1="452.54651296770203" y1="492.6630020501092" x2="454.546418538671" y2="518.7788597592153" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x368)"/><line x1="476.93662939401344" y1="490.64547041719777" x2="476.8368495691009" y2="518.7450048457831" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x368)"/><line x1="500.9574149688706" y1="490.23879188727585" x2="500.48066159272565" y2="520.3343093782663" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x368)"/><line x1="522.9370587290823" y1="491.8426724010147" x2="523.5902453231253" y2="521.7208757057786" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x368)"/><line x1="544.662315982692" y1="492.70091381222005" x2="544.8066972621904" y2="521.3505733339116" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x368)"/><polygon points="431.3,505.3 566.2,503.1 552.2,556.2 445.2,556.5" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x368)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>