040" stroke-width="2" filter="url(#wmr1x9105)"/><rect x="35.3017250039987" y="419.945633544866" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x9105)"/><rect x="43.235257047452" y="402.8402311869897" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x9105)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x9105)"/><circle cx="82.27317730890584" cy="413.767040457949" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x9105)"/><circle cx="83.70604840436947" cy="414.43798086838797" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="52.685124406628276" y="457.03488889345897" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x9105)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x9105)"/><circle cx="-18.909557491783083" cy="469.60155775910243" r="18.0" fill="#ff2040" filter="url(#glowr1x9105)" opacity=".88"/><circle cx="-18.400695425886692" cy="472.9635479331016" r="7.0" fill="#ffffff"/><rect x="79.68483446961265" y="502.1802520023659" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x9105)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x9105)"/><rect x="38.71800010729578" y="423.34804167775434" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="62.88021137382832" y1="484.6740079880692" x2="63.46859862444919" y2="519.5596093040891" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="78.92389545844864" y1="485.02477231631053" x2="78.92723237372931" y2="520.050149765145" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="93.89228968884792" y1="487.5718092453666" x2="94.92099661076438" y2="520.5250767069869" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.6826390277594" y="558.4449381911196" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x9105)"/><rect x="422.96919330824164" y="574.534335961286" width="152.0" height="26.0" fill="url(#bevelr1x9105)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x9105)"/><polygon points="307.0,379.4 349.4,294.8 500.0,279.8 649.6,296.1 693.6,380.5 668.8,502.7 500.8,566.7 332.4,502.6" fill="url(#suitr1x9105)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x9105) url(#metalr1x9105)"/><polygon points="307.3,381.7 350.3,295.8 500.9,278.9 648.7,293.7 692.5,381.0 667.8,505.4 498.5,564.4 330.8,504.8" fill="url(#carbonr1x9105)"/><polygon points="379.5,303.0 499.2,285.6 620.1,301.2 607.3,381.7 393.2,379.8" fill="url(#suitHir1x9105)"/><polygon points="380.3,379.1 366.8,424.8 431.3,502.5 500.3,529.9 567.3,505.1 634.4,427.4 620.4,382.2" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x9105)"/><polygon points="381.6,410.7 476.6,410.5 483.4,440.2 390.3,440.9" fill="#ff2040" filter="url(#glowr1x9105)"/><polygon points="521.5,411.6 620.2,411.1 611.5,438.8 513.6,440.8" fill="#ff2040" filter="url(#glowr1x9105)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.11769503025334" y1="413.8402961164713" x2="517.1489697213657" y2="412.3172662530094" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="485.58031616635617" y1="438.4417327520438" x2="515.8511412473769" y2="438.69621376125144" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="499.9016781015322" y1="454.1880301881581" x2="498.6462424020283" y2="484.8230990114622" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x9105)"/><line x1="454.2544671667554" y1="490.6257687764242" x2="452.4207739402354" y2="519.6086865681224" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9105)"/><line x1="475.2468673874065" y1="489.7962184672243" x2="476.06932420678436" y2="520.3089238784275" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9105)"/><line x1="501.6351982896216" y1="489.524872683268" x2="500.1733947880566" y2="520.649