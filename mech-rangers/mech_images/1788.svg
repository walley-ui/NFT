ke-linecap="round" filter="url(#wmr1x1788)"/><line x1="904.0333425188996" y1="770.6106477502733" x2="911.5515571376868" y2="131.82633718159047" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="870.3,151.3 935.5,153.1 917.5,-8.0" fill="url(#blader1x1788)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x1788)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="880.5133278219588" y="422.89517366355284" width="40.0" height="20.0" fill="url(#bevelr1x1788)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1788)"/><rect x="879.7537345748023" y="511.4042571241967" width="40.0" height="20.0" fill="url(#bevelr1x1788)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1788)"/><rect x="880.0858512446844" y="602.5964932972565" width="40.0" height="20.0" fill="url(#bevelr1x1788)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1788)"/><rect x="877.5431983552501" y="691.8177665648982" width="40.0" height="20.0" fill="url(#bevelr1x1788)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1788)"/><ellipse cx="897.2846378409863" cy="792.1541946988552" rx="22.0" ry="15.0" fill="url(#bevelr1x1788)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1788)"/></g><rect x="451.7983272638172" y="555.1516636732034" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1788)"/><rect x="425.55848279511554" y="573.9756775048562" width="152.0" height="26.0" fill="url(#bevelr1x1788)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1788)"/><polygon points="308.3,380.4 350.9,293.6 499.4,277.8 649.6,293.1 690.8,379.6 670.5,504.5 501.5,565.2 329.8,505.0" fill="url(#suitr1x1788)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x1788) url(#metalr1x1788)"/><polygon points="308.3,381.8 351.0,293.7 499.8,277.2 649.6,292.9 691.8,381.8 668.8,505.1 499.8,566.1 332.3,504.0" fill="url(#carbonr1x1788)"/><polygon points="38