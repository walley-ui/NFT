94)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="115.0,690.9 146.7,691.2 191.3,272.2" fill="url(#blader1x6094)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x6094)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="68.755565680135" y="679.9895192461088" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x6094)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x6094)"/></g><rect x="451.3435036486946" y="558.3920910208486" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6094)"/><rect x="423.0973794080317" y="576.7017230929807" width="152.0" height="26.0" fill="url(#bevelr1x6094)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x6094)"/><polygon points="307.8,381.1 351.5,294.4 501.4,277.3 651.2,295.6 692.4,380.7 670.7,504.5 500.3,566.8 331.7,502.2" fill="url(#suitr1x6094)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x6094) url(#metalr1x6094)"/><polygon points="308.1,382.3 350.5,295.4 498.8,278.0 650.1,292.9 691.1,379.6 667.4,504.0 498.9,566.8 331.7,504.7" fill="url(#carbonr1x6094)"/><polygon points="380.7,303.8 500.1,286.1 620.7,303.3 606.4,379.8 392.5,380.3" fill="url(#suitHir1x6094)"/><polygon points="382.5,380.0 364.0,425.3 434.0,503.0 501.6,529.8 566.3,501.9 635.1,426.8 620.0,380.3" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x6094)"/><polygon points="379.4,411.8 475.8,409.9 483.8,441.8 387.2,439.3" fill="#ff2040" filter="url(#glowr1x6094)"/><polygon points="524.0,409.8 619.6,412.8 611.5,441.3 514.9,439.8" fill="#ff2040" filter="url(#glowr1x6094)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.3428747332282" y1="411.84505948014555" x2="514.3247751157172" y2="413.5487481