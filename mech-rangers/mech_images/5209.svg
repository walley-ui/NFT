.9" y="521.7" width="9.3" height="17.4" rx="1" fill="#ccccff" stroke="#0d1520" stroke-width=".6"/></g><g><polygon points="30.9,295.1 171.2,294.6 173.0,591.2 101.8,725.9 31.2,592.5" fill="url(#titaniumr1x5209)" stroke="#ccccff" stroke-width="2.6" filter="url(#wmr1x5209)"/><polygon points="31.9,294.3 173.0,294.3 173.6,592.1 102.6,725.2 33.7,590.3" fill="url(#carbonr1x5209)"/><polygon points="63.3,362.5 140.6,361.4 139.3,542.6 100.9,631.2 65.5,541.7" fill="#ccccff" fill-opacity=".28" stroke="#ccccff" stroke-width="1.5"/><line x1="50.28042874563482" y1="432.45123528242107" x2="152.92364060267803" y2="432.25228817788883" stroke="#ccccff" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.8616266936436" y1="330.7379171095788" x2="102.85168495945629" y2="591.7004637653939" stroke="#ccccff" stroke-opacity=".4" stroke-width="1"/><line x1="34.56428239693862" y1="294.8075478449464" x2="170.88671486735342" y2="297.0061563530937" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.85844659138468" cy="431.317820134107" r="18.0" fill="url(#bevelr1x5209)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x5209)"/></g><rect x="448.54236660255117" y="556.4539156622253" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x5209)"/><rect x="424.4586212433875" y="576.8492067210376" width="152.0" height="26.0" fill="url(#bevelr1x5209)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x5209)"/><polygon points="309.2,379.1 348.8,293.4 498.7,279.4 650.5,296.1 692.5,379.2 670.5,503.0 500.3,565.5 330.0,502.8" fill="url(#suitr1x5209)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x5209) url(#metalr1x5209)"/><polygon points="308.9,379.3 349.5,295.6 501.4,277.0 651.0,296.1 692.0,381.5 668.9,503.1 499.6,564.6 331.4,504.7" fill="url(#carbonr1x5209)"/><polygon points="380.8,304.4 499.1,286.8 619.1,301.0 607.6,379.8 392.6,381.4" fill="url(#suitHir1x5209)"/><polygon points="381.1,379.7 364.1,427.1 431.7,504.5