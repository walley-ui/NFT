.4" y="524.0" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#050508" stroke-width=".6"/></g><g><rect x="33.61956887463104" y="420.7534967063926" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x6510)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x6510)"/><rect x="35.443958649635285" y="419.8085150277242" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x6510)"/><rect x="41.059551110714644" y="401.9594150692224" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x6510)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x6510)"/><circle cx="81.15667958961797" cy="414.86129278475414" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x6510)"/><circle cx="81.642990174368" cy="415.3157682935707" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="53.105464719552515" y="456.6430013062432" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x6510)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x6510)"/><circle cx="-18.8334754260816" cy="472.11730038160454" r="18.0" fill="#ff2040" filter="url(#glowr1x6510)" opacity=".88"/><circle cx="-19.238541168030384" cy="472.07570969071236" r="7.0" fill="#ffffff"/><rect x="78.17974944528189" y="500.51639823801816" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x6510)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x6510)"/><rect x="35.83118968255815" y="424.6659375351853" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.71665099387985" y1="487.69177747750655" x2="62.148760653231264" y2="519.0432697792537" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.22793533703309" y1="486.80897029396147" x2="79.32863222410899" y2="520.4453124586493" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="94.14315290771421" y1="485.3566043241881" x2="92.40664230886844" y2="518.18740147762" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.7780839869753" y="555.3147138600237" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6510)"/><rect x="424.17241551857444" y="576.1585096149705" width="152.0" height="26.0" fill="url(#bevelr1x6510)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x6510)"/><polygon points="308.1,379.6 351.9,295.7 498.8,276.8 649.2,293.2 693.3,379.1 667.4,502.4 500.9,566.3 332.0,505.0" fill="url(#suitr1x6510)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x6510) url(#metalr1x6510)"/><polygon points="309.5,382.1 351.0,294.6 499.1,279.6 650.1,294.0 693.2,381.4 668.1,503.0 500.5,566.8 331.8,504.8" fill="url(#carbonr1x6510)"/><polygon points="379.4,303.0 501.0,288.1 620.4,302.7 605.8,381.1 393.5,379.2" fill="url(#suitHir1x6510)"/><polygon points="381.6,381.2 365.1,426.9 431.4,505.3 500.0,528.4 566.7,504.9 633.8,425.8 618.5,382.2" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x6510)"/><polygon points="381.5,412.6 475.5,412.4 485.6,439.0 388.0,440.7" fill="#ff2040" filter="url(#glowr1x6510)"/><polygon points="524.1,410.5 620.2,411.7 609.7,438.8 514.2,440.6" fill="#ff2040" filter="url(#glowr1x6510)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.17427710542455" y1="411.89580551013347" x2="514.6465710568615" y2="414.64951048018406" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="482.9033692314848" y1="439.123763426207" x2="516.8504011964798" y2="436.63773705856875" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="501.4816865024157" y1="454.2360391395166" x2="500.5535111607052" y2="483.8408204637468" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6510)"/><line x1="452.1233531015739" y1="491.4768451222218" x2="452.3061754871905" y2="521.5632639911025" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6510)"/><line x1="475.7481550693884" y1