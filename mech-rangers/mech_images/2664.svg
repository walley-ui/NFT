l(#skr1x2664)"/><line x1="547.7053031034023" y1="489.55081566516304" x2="546.4574820854888" y2="519.3734744747169" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2664)"/><polygon points="433.7,503.3 565.6,504.9 555.4,555.8 445.3,555.6" fill="#141428" fill-opacity=".72" stroke="#4444ff" stroke-width="1.3" filter="url(#skr1x2664)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#4444ff" fill-opacity=".48">OBSIDIAN RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#4444ff" fill-opacity=".32">MECH RANGERS</text></svg>