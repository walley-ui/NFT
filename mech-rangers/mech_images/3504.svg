2" stroke-width="1.3" filter="url(#skr1x3504)"/><line x1="400.2" y1="549.6" x2="601.6" y2="550.8" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3504)"/><line x1="267.5" y1="491.3" x2="321.2" y2="492.2" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.9" y1="489.6" x2="731.9" y2="489.7" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.3" y1="522.7" x2="321.2" y2="523.8" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.0" y1="524.3" x2="732.7" y2="521.8" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.9" y1="553.6" x2="319.3" y2="554.7" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.4" y1="553.6" x2="734.1" y2="554.8" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.6" y1="585.3" x2="319.6" y2="587.1" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.3" y1="587.7" x2="733.8" y2="585.1" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x3504)"><polygon points="499.2,452.8 540.4,511.4 500.2,570.2 458.6,509.3" fill="#ccccff" stroke="#050508" stroke-width="1.4" filter="url(#skr1x3504)"/><polygon points="499.5,451.0 541.3,511.4 499.5,568.9 459.9,511.1" fill="url(#suitHir1x3504)" opacity=".45"/></g><g><polygon points="867.8,689.8 900.5,691.8 834.3,272.7" fill="url(#blader1x3504)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x3504)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="913.6,691.4 944.8,691.9 984.8,271.3" fill="url(#blader1x3504)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x3504)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="864.4839936386421" y="680.6448312611319" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x3504)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x3504)"/></g><rect x="451.2926265483722" y="558.3386437138543" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x3504)"/><rect x="423.32252262625843" y="575.1700603285805" width="152.0" height="26.0" fill="url(#bevelr1x3504)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x3504)"/><polygon points="308.6,381.0 350.7,294.1 500.2,277.3 649.5,294.2 691.4,379.3 670.4,502.7 499.9,566.7 331.7,504.7" fill="url(#suitr1x3504)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x3504) url(#metalr1x3504)"/><polygon points="309.6,378.9 351.0,294.3 498.6,278.5 650.2,294.2 693.6,381.1 670.7,504.5 501.7,564.6 330.1,502.5" fill="url(#carbonr1x3504)"/><polygon points="380.8,301.8 499.0,287.7 620.0,304.0 605.9,379.2 392.3,381.4" fill="url(#suitHir1x3504)"/><polygon points="380.0,380.6 367.0,426.8 433.4,502.1 500.8,527.7 567.0,504.0 636.0,425.0 618.5,380.3" fill="#050508" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x3504)"/><polygon points="380.1,409.9 476.3,410.3 483.9,441.3 389.0,438.3" fill="#ccccff" filter="url(#glowr1x3504)"/><polygon points="524.2,411.0 620.3,409.9 611.2,440.2 516.6,440.7" fill="#ccccff" filter="url(#glowr1x3504)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.79603586314244" y1="415.16400954946874" x2="513.6725204426236" y2="413.3854518198408" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="486.0920855213515" y1="439.43648180980233" x2="515.3657995846495" y2="439.57187644857913" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="499.9937229083851" y1="455.5798095582053" x2="498.3618498664349" y2="483.9382498328574" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3504)"/><line x1="455.0237113648839" y1="490.4084893315099" x2="452.7696269129217" y2="521.0132089179009" stroke="#ccccff" stroke-op