 x2="85.07681619007137" y2="112.2458137645386" stroke="url(#chromer1x8564)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x8564)"/><line x1="98.25608832821247" y1="772.9907890622504" x2="88.24859247108918" y2="132.47331492863594" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="73.4,152.5 139.3,152.0 83.7,-9.2" fill="url(#blader1x8564)" stroke="#00ff60" stroke-width="1.8" filter="url(#wmr1x8564)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="81.87960476897653" y="422.07255508434025" width="40.0" height="20.0" fill="url(#bevelr1x8564)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x8564)"/><rect x="84.24967223111537" y="511.3486139966175" width="40.0" height="20.0" fill="url(#bevelr1x8564)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x8564)"/><rect x="84.19078294163566" y="600.1762717778794" width="40.0" height="20.0" fill="url(#bevelr1x8564)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x8564)"/><rect x="83.91254535488781" y="692.7318016049452" width="40.0" height="20.0" fill="url(#bevelr1x8564)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x8564)"/><ellipse cx="101.42655833516267" cy="790.8931295975111" rx="22.0" ry="15.0" fill="url(#bevelr1x8564)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x8564)"/></g><rect x="449.5664766540751" y="558.490192594286" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x8564)"/><rect x="422.3643084194511" y="573.66498375237" width="152.0" height="26.0" fill="url(#bevelr1x8564)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x8564)"/><polygon points="307.9,380.4 350.0,294.3 498.9,279.2 650.1,294.7 690.5,379.7 669.8,505.0 501.3,563.3 332.4,502.0" fill="url(#suitr1x8564)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x8564) url(#metalr1x8564)"/><polygon points="308.6,381.6 351.6,295.5 499.8,278.5 650.3,296.1 69