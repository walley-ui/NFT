line x1="902.5872411088645" y1="810.020002621971" x2="902.5642018998601" y2="132.96482604676856" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="883.5472023113258" y="622.0385632432997" width="32.0" height="18.0" fill="url(#bevelr1x5297)" stroke="#ccccff" stroke-width=".8" filter="url(#wmr1x5297)"/><rect x="883.075293851234" y="441.59097051247954" width="32.0" height="18.0" fill="url(#bevelr1x5297)" stroke="#ccccff" stroke-width=".8" filter="url(#wmr1x5297)"/><rect x="882.3325277139061" y="262.3559204302728" width="32.0" height="18.0" fill="url(#bevelr1x5297)" stroke="#ccccff" stroke-width=".8" filter="url(#wmr1x5297)"/><circle cx="899.5959991959483" cy="110.68632629858328" r="58.0" fill="rgba(0,0,0,.52)" stroke="#ccccff" stroke-width="2.2" filter="url(#wmr1x5297)"/><circle cx="898.8787771097012" cy="110.630482864473" r="46.0" fill="url(#orbr1x5297)" filter="url(#bloomr1x5297)"/><circle cx="899.4507193739154" cy="112.89991493234409" r="20.0" fill="#ccccff" filter="url(#glowr1x5297)"/><circle cx="899.2556182704494" cy="109.79240586226804" r="66.0" fill="none" stroke="#ccccff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="899.6091119726748" cy="110.49147345786912" rx="66.0" ry="30.0" fill="none" stroke="#ccccff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="449.4186244997196" y="555.2224282260053" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x5297)"/><rect x="423.91856332561" y="574.9768282998353" width="152.0" height="26.0" fill="url(#bevelr1x5297)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x5297)"/><polygon points="307.8,381.2 351.6,293.3 500.4,278.7 648.7,292.8 693.6,379.6 669.1,502.9 500.6,566.3 330.3,504.6" fill="url(#suitr1x5297)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x5297) url(#metalr1x5297)"/><polygon points="307.6,380.7 350.8,293.7 499.