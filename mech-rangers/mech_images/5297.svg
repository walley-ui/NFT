ine x1="544.404538132921" y1="492.6509847638197" x2="545.7820959563554" y2="519.5603657253087" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5297)"/><polygon points="431.7,505.3 566.2,503.2 553.1,557.1 447.3,557.7" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x5297)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>