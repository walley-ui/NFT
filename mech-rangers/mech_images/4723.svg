oke-linecap="round" filter="url(#wmr1x4723)"/><line x1="97.00428184945133" y1="772.2662840501405" x2="88.73569839954374" y2="131.99574397578834" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="74.3,151.1 140.3,151.6 82.9,-9.3" fill="url(#blader1x4723)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x4723)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="84.08203528080132" y="420.84671238129954" width="40.0" height="20.0" fill="url(#bevelr1x4723)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x4723)"/><rect x="82.84985462933776" y="511.6206887421198" width="40.0" height="20.0" fill="url(#bevelr1x4723)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x4723)"/><rect x="82.61615144781766" y="600.1951222372242" width="40.0" height="20.0" fill="url(#bevelr1x4723)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x4723)"/><rect x="81.82646458497268" y="691.7527312943712" width="40.0" height="20.0" fill="url(#bevelr1x4723)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x4723)"/><ellipse cx="100.4800732699595" cy="790.8086421970278" rx="22.0" ry="15.0" fill="url(#bevelr1x4723)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x4723)"/></g><rect x="448.61018720967695" y="555.8432042644359" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x4723)"/><rect x="425.4565158936195" y="574.3355178492144" width="152.0" height="26.0" fill="url(#bevelr1x4723)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x4723)"/><polygon points="306.6,382.3 349.1,294.4 501.7,277.6 648.0,295.3 692.1,380.2 667.6,502.7 500.1,565.0 330.9,504.9" fill="url(#suitr1x4723)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x4723) url(#metalr1x4723)"/><polygon points="308.4,382.1 349.8,295.8 499.7,276.8 649.9,293.1 693.5,381.7 669.1,505.0 500.5,564.6 332.6,502.8" fill="url(#carbonr1x4723)"/><polygon points="381.