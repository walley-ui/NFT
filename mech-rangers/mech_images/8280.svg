.1 565.9,504.0 552.6,557.7 447.9,557.9" fill="#880050" fill-opacity=".72" stroke="#ff44aa" stroke-width="1.3" filter="url(#skr1x8280)"/><polygon points="475.2,304.3 523.6,300.9 512.2,174.9 488.3,177.1" fill="url(#bevelr1x8280)" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x8280)"/><polygon points="366.1,324.2 458.5,324.2 469.4,229.6" fill="url(#bevelr1x8280)" fill-opacity=".78" stroke="#ff44aa" stroke-width="1.5" filter="url(#skr1x8280)"/><polygon points="540.6,322.7 635.8,325.0 530.2,229.2" fill="url(#bevelr1x8280)" fill-opacity=".78" stroke="#ff44aa" stroke-width="1.5" filter="url(#skr1x8280)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".48">SAKURA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".32">MECH RANGERS</text></svg>