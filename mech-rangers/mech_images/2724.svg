.3" y="521.1" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#050508" stroke-width=".6"/></g><g><polygon points="829.4,293.7 968.5,292.9 966.6,591.2 896.4,726.3 826.3,593.0" fill="url(#titaniumr1x2724)" stroke="#ff2040" stroke-width="2.6" filter="url(#wmr1x2724)"/><polygon points="826.8,294.2 968.8,295.0 966.4,589.7 899.4,726.1 826.6,591.5" fill="url(#carbonr1x2724)"/><polygon points="860.6,362.5 935.5,360.1 936.3,540.3 896.5,632.0 861.6,540.2" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="847.3085144891031" y1="432.2474411512725" x2="950.211523125656" y2="432.32637231303374" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="898.2979847862013" y1="333.0726120443083" x2="899.0165026912093" y2="592.6816651421599" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="828.9155520252511" y1="296.071673943568" x2="966.2162734536082" y2="296.79747072178867" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.009177341275" cy="432.8933448311873" r="18.0" fill="url(#bevelr1x2724)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x2724)"/></g><rect x="450.24241364523766" y="555.3716455065645" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x2724)"/><rect x="424.9391449127346" y="577.0705381967127" width="152.0" height="26.0" fill="url(#bevelr1x2724)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x2724)"/><polygon points="307.5,381.9 351.9,293.7 500.4,276.5 648.9,295.7 690.4,380.1 670.1,501.8 499.8,566.1 331.3,504.1" fill="url(#suitr1x2724)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x2724) url(#metalr1x2724)"/><polygon points="306.8,381.4 348.9,293.2 501.3,279.4 649.2,295.1 690.4,379.0 667.9,503.2 500.5,564.9 332.8,502.0" fill="url(#carbonr1x2724)"/><polygon points="379.2,302.8 498.4,286.1 620.8,301.6 607.9,379.0 391.0,380.4" fill="url(#suitHir1x2724)"/><polygon points="380.6,379.2 367.4,426.1 433.3,503.0