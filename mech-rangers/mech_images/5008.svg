lr1x5008)"/><polygon points="306.6,380.7 351.2,293.4 499.8,278.6 650.3,296.0 692.6,380.1 669.3,504.2 500.4,564.4 332.3,502.4" fill="url(#carbonr1x5008)"/><polygon points="380.0,304.3 501.0,287.7 618.6,301.4 607.4,382.2 392.2,382.1" fill="url(#suitHir1x5008)"/><polygon points="382.2,382.0 364.6,425.4 432.7,503.3 498.3,528.8 566.4,503.0 634.5,424.3 618.1,381.5" fill="#0d1520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x5008)"/><polygon points="379.4,412.9 477.7,412.9 484.2,439.6 388.4,439.1" fill="#ffcc00" filter="url(#glowr1x5008)"/><polygon points="523.6,410.8 619.2,411.4 610.9,440.8 514.3,438.6" fill="#ffcc00" filter="url(#glowr1x5008)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.6059675754607" y1="413.6825173873454" x2="516.2237730859221" y2="413.53826587228104" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.3523635011725" y1="437.7076675440185" x2="516.3439223705233" y2="438.13004144076257" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.42998427273704" y1="455.258790606074" x2="498.6481478558853" y2="481.4767430725508" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5008)"/><line x1="454.4721446657367" y1="492.4557138798758" x2="455.60495837310333" y2="521.2113570610993" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5008)"/><line x1="477.9205186417699" y1="490.1480852688662" x2="475.34030759505924" y2="519.1476288178004" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5008)"/><line x1="499.87743934746834" y1="492.6880037744529" x2="500.3334865720943" y2="519.9880278594792" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5008)"/><line x1="522.7795421414636" y1="491.6934142913669" x2="522.4405666985176" y2="520.2702785287984" stroke="#ffcc00" stroke-opa