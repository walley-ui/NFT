2,-28.6 897.8,-138.6" fill="url(#blader1x5854)" filter="url(#wmr1x5854)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x5854)" opacity=".9"/><line x1="905.6114097272047" y1="671.8496637465432" x2="900.2171634044685" y2="-127.87594331577422" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="887.8003163106926" y1="670.0045783443376" x2="896.2575510739349" y2="-127.59754570676016" stroke="#ffcc00" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.6702040994168" y="668.6096122616901" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x5854)" stroke="#ffcc00" stroke-width="1.6" filter="url(#wmr1x5854)"/><rect x="865.5557490481623" y="672.5423554339446" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="885.7301793206111" y="677.3555829891935" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="886.4853249061481" y="684.6222325789741" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="886.9560482497886" y="693.8856306263245" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="885.5695398906805" y="702.4685972775333" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="887.4479952687957" y="707.7131141487508" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="887.0245735008829" y="718.3167310490272" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><ellipse cx="898.3597727942839" cy="725.6760464374908" rx="22.0" ry="16.0" fill="url(#bevelr1x5854)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x5854)"/></g><rect x="448.3276364313439" y="556.5828187030739" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5854)"/><r