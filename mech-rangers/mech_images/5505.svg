"/><rect x="422.7039950719103" y="574.5972439886071" width="152.0" height="26.0" fill="url(#bevelr1x5505)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x5505)"/><polygon points="309.6,379.3 349.0,295.1 499.0,279.8 648.9,296.0 690.9,381.3 667.8,505.1 499.8,566.3 331.7,503.3" fill="url(#suitr1x5505)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x5505) url(#metalr1x5505)"/><polygon points="309.3,378.9 348.9,295.6 501.7,278.6 649.7,293.5 691.8,381.8 667.5,502.0 501.1,563.9 329.8,503.2" fill="url(#carbonr1x5505)"/><polygon points="379.8,302.9 501.1,285.4 619.0,302.6 608.8,381.1 394.2,379.2" fill="url(#suitHir1x5505)"/><polygon points="382.6,380.0 365.2,426.2 431.4,504.6 500.6,528.5 565.9,502.9 634.1,424.8 618.5,380.6" fill="#050508" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x5505)"/><polygon points="381.8,410.6 477.9,411.5 483.5,439.4 387.7,441.3" fill="#ffd700" filter="url(#glowr1x5505)"/><polygon points="521.4,412.7 620.2,412.3 610.6,438.3 515.7,440.3" fill="#ffd700" filter="url(#glowr1x5505)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.7440841133334" y1="413.0527706162072" x2="516.5629793681577" y2="412.9281499374658" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="483.6564105318487" y1="438.0173634024337" x2="515.2631283945776" y2="439.0807776270434" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="501.26756135290486" y1="456.06565670501436" x2="498.5391919458285" y2="484.76365096839146" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5505)"/><line x1="455.16856650270523" y1="490.3123217741027" x2="452.3089168104157" y2="520.9574874530547" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5505)"/><line x1="477.15454007586465" y1="490.86990590188645" x2="476.97120070032776" y2="519.907205