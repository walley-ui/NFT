ke-linecap="round" filter="url(#wmr1x8438)"/><line x1="903.1568640049175" y1="812.9408367180265" x2="901.2196793528833" y2="132.7993118125945" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="881.4367859989964" y="621.9313995836302" width="32.0" height="18.0" fill="url(#bevelr1x8438)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x8438)"/><rect x="881.6218450929597" y="441.8170746865682" width="32.0" height="18.0" fill="url(#bevelr1x8438)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x8438)"/><rect x="881.0602603423036" y="262.8463596547022" width="32.0" height="18.0" fill="url(#bevelr1x8438)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x8438)"/><circle cx="898.8825529307686" cy="111.60218407232313" r="58.0" fill="rgba(0,0,0,.52)" stroke="#2060ff" stroke-width="2.2" filter="url(#wmr1x8438)"/><circle cx="898.950512452852" cy="109.89683981435371" r="46.0" fill="url(#orbr1x8438)" filter="url(#bloomr1x8438)"/><circle cx="899.5403076788039" cy="110.96041550794614" r="20.0" fill="#2060ff" filter="url(#glowr1x8438)"/><circle cx="898.4491419610196" cy="112.28163941344243" r="66.0" fill="none" stroke="#2060ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="897.2421594755352" cy="113.12512805731964" rx="66.0" ry="30.0" fill="none" stroke="#2060ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="451.08368267901244" y="557.9589087387546" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x8438)"/><rect x="423.44135734345764" y="575.2032129039056" width="152.0" height="26.0" fill="url(#bevelr1x8438)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x8438)"/><polygon points="307.8,380.4 350.5,295.9 498.5,278.5 651.0,294.8 691.3,381.5 667.8,504.1 498.8,565.5 330.5,505.4" fill="url(#suitr1x8438)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x8438) url(#metalr1x84