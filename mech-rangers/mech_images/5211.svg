.9" y="521.5" width="9.3" height="17.4" rx="1" fill="#ff44aa" stroke="#050508" stroke-width=".6"/></g><g><polygon points="826.2,292.0 968.1,294.3 968.6,589.8 896.6,724.6 827.1,592.6" fill="url(#titaniumr1x5211)" stroke="#ff44aa" stroke-width="2.6" filter="url(#wmr1x5211)"/><polygon points="828.4,294.1 967.2,293.2 966.2,592.6 896.7,726.5 828.9,590.4" fill="url(#carbonr1x5211)"/><polygon points="858.2,361.8 936.6,360.9 936.4,542.5 897.0,633.0 860.9,539.8" fill="#ff44aa" fill-opacity=".28" stroke="#ff44aa" stroke-width="1.5"/><line x1="845.9599810279534" y1="430.94927821336313" x2="949.9913088026084" y2="431.0316371904686" stroke="#ff44aa" stroke-opacity=".65" stroke-width="1.3"/><line x1="898.6641209330969" y1="329.98495948240156" x2="897.5503135976941" y2="591.0175748086534" stroke="#ff44aa" stroke-opacity=".4" stroke-width="1"/><line x1="830.2565557218716" y1="295.9824132520705" x2="966.4490450368822" y2="296.0441570749506" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.7058852542751" cy="431.4910729235038" r="18.0" fill="url(#bevelr1x5211)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x5211)"/></g><rect x="451.1080044801347" y="555.6690667886287" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x5211)"/><rect x="425.71881639286875" y="575.7649693125859" width="152.0" height="26.0" fill="url(#bevelr1x5211)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x5211)"/><polygon points="307.1,382.1 351.0,294.9 500.2,277.0 649.1,294.4 690.5,380.4 669.9,501.9 498.3,565.5 331.9,502.5" fill="url(#suitr1x5211)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x5211) url(#metalr1x5211)"/><polygon points="306.8,381.5 349.0,295.8 500.7,278.7 648.6,294.6 693.0,379.9 668.8,502.4 498.6,565.0 330.5,504.9" fill="url(#carbonr1x5211)"/><polygon points="380.6,301.2 500.8,286.6 620.1,301.9 607.5,380.4 393.5,379.3" fill="url(#suitHir1x5211)"/><polygon points="381.2,382.2 364.1,424.0 433.4,50