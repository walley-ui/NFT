7.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="117.6,692.0 148.3,690.4 189.2,270.9" fill="url(#blader1x1733)" stroke="#ff44aa" stroke-width="1.8" filter="url(#wmr1x1733)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="68.27992077212778" y="680.158252528403" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x1733)" stroke="#ff44aa" stroke-width="1.4" filter="url(#wmr1x1733)"/></g><rect x="448.8916577962227" y="555.2230889697558" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x1733)"/><rect x="422.5502951956354" y="576.0243905794807" width="152.0" height="26.0" fill="url(#bevelr1x1733)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x1733)"/><polygon points="307.4,379.4 349.5,294.5 500.9,279.8 650.6,295.9 693.2,379.6 670.4,502.8 499.2,564.9 332.2,505.2" fill="url(#suitr1x1733)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x1733) url(#metalr1x1733)"/><polygon points="306.5,380.8 349.9,295.7 498.7,277.5 648.4,296.2 691.9,381.4 668.6,505.2 498.3,566.1 330.4,505.1" fill="url(#carbonr1x1733)"/><polygon points="382.3,302.1 498.4,285.0 619.8,304.4 608.4,379.0 390.9,382.0" fill="url(#suitHir1x1733)"/><polygon points="381.6,381.3 367.1,426.2 433.8,502.2 501.5,526.5 566.0,505.0 636.1,425.9 619.6,380.4" fill="#0a0520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x1733)"/><polygon points="380.7,411.4 478.7,410.0 486.4,441.3 387.8,440.0" fill="#ff44aa" filter="url(#glowr1x1733)"/><polygon points="521.4,411.0 618.7,412.2 610.4,441.0 516.5,440.1" fill="#ff44aa" filter="url(#glowr1x1733)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.24520026143637" y1="412.51086632525545" x2="515.8181554358825" y2="414.75893444912504" stroke