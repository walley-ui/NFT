-opacity=".38" stroke-width="1"/><line x1="844.1" y1="700.5" x2="844.0" y2="785.4" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><polygon points="236.8,419.2 763.7,417.0 723.8,661.8 278.2,663.9" fill="url(#suitr1x1283)" stroke="#2060ff" stroke-width="2.6" filter="url(#skr1x1283) url(#metalr1x1283)"/><polygon points="236.3,417.2 765.4,416.4 722.7,662.4 279.1,661.9" fill="url(#carbonr1x1283)"/><polygon points="368.1,416.1 634.2,418.3 610.0,514.1 387.1,515.9" fill="url(#suitHir1x1283)"/><line x1="363.8" y1="472.6" x2="639.2" y2="471.1" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1283)"/><line x1="401.0" y1="548.7" x2="600.8" y2="550.5" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1283)"/><line x1="265.7" y1="492.7" x2="318.5" y2="492.2" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="682.0" y1="490.1" x2="732.1" y2="491.2" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.6" y1="524.6" x2="319.2" y2="523.3" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.4" y1="523.9" x2="731.4" y2="524.0" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.4" y1="556.0" x2="320.6" y2="555.8" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.8" y1="553.1" x2="731.7" y2="554.4" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.1" y1="587.9" x2="319.2" y2="587.8" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.8" y1="585.9" x2="733.6" y2="585.5" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x1283)"><ellipse cx="499.7" cy="509.5" rx="42.9" ry="23.2" fill="#1e0600" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x1283)"/><circle cx="498.2" cy="510.9" r="15.1" fill="#2060ff"/><circle cx="495.5" cy="506.2" r="5.8" fill="#1e0600"/><ellipse cx="494.9" cy="504.1" rx="3.5" ry="2.3" fill="rgba(255,255,255,.7)"/></g><g><rect x="115.0" y="700.2" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x1283)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x1283)"/><rect x="114.5" y="701.4" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x1283)"/><rect x="747.3"  y="701.6" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x1283)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x1283)"/><rect x="749.6"  y="702.3" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x1283)"/><rect x="121.2" y="701.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><rect x="756.6" y="699.8" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><rect x="150.4" y="698.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><rect x="786.4" y="700.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><rect x="181.3" y="699.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><rect x="813.2" y="701.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><rect x="211.3" y="700.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><rect x="842.2" y="699.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1283)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x1283)"/><ellipse cx="183.30120689360425" cy="709.972742659673" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x1283)"/><ellipse cx="818.0057592526265" cy="712.43930421805" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x1283)"/></g><rect x="449.61472516776996" y="557.270953525044" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1283)"/><rect x="425.64147707605736" y="575.5861755630002" width="152.0" height="26.0" fill="url(#bevelr1x1283)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1283)"/><polygon points="306.7,380.3 349.3,295.6 500.0,277.0 651.4,293.5 693.7,381.5 669.0,502.6 499.4,565.6 330.4,502.6" fill="url(#suitr1x1283)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x1283) url(#metalr1x1283)"/><polygon points="306.5,381.1 349.5,294.0 500.2,278.3 651.5,294.5 693.7,380.6 670.6,504.9 500.8,565.4 331.2,504.7" fill="url(#carbonr1x1283)"/><polygon points="382.4,303.8 500.6,285.7 619.2,304.3 606.0,381.0 392.1,381.4" fill="url(#suitHir1x1283)"/><polygon points="379.7,381.1 366.1,427.5 431.2,503.0 499.5,529.3 565.6,505.0 634.4,426.2 617.6,379.2" fill="#1e0600" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x1283)"/><polygon points="380.2,412.4 478.0,410.5 484.4,441.8 389.5,440.4" fill="#2060ff" filter="url(#glowr1x1283)"/><polygon points="524.7,411.0 619.4,411.0 611.7,441.6 516.6,441.1" fill="#2060ff" filter="url(#glowr1x1283)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.5641082337685" y1="411.8328985724598" x2="516.487163472306" y2="414.11128486320376" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.18389301994813" y1="439.7195739551447" x2="516.3026844622009" y2="438.72626273324715" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.77575724786146" y1="456.17234110590067" x2="500.9049358689226" y2="483.4865499451757" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1283)"/><line x1="455.2143631219678" y1="491.71029400853433" x2="452.7907320882939" y2="520.5679504222237" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1283)"/><line x1="475.