91.8,-28.6" fill="url(#blader1x1330)" filter="url(#wmr1x1330)"/><polygon points="91.8,-28.6 112.6,-28.6 102.2,-138.6" fill="url(#blader1x1330)" filter="url(#wmr1x1330)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x1330)" opacity=".9"/><line x1="110.75275528308" y1="671.4169297085143" x2="104.68112948471678" y2="-129.81627551661808" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.93797788675872" y1="670.5010461864061" x2="99.50758458318185" y2="-130.36599429193888" stroke="#ccccff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="44.67761635709551" y="667.9750858091749" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x1330)" stroke="#ccccff" stroke-width="1.6" filter="url(#wmr1x1330)"/><rect x="68.84138520997014" y="673.0744253234006" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="89.04706463398409" y="678.6739344265312" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="89.96463094972071" y="687.0418157191947" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="89.16820604925972" y="694.4826654353179" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="90.88430100413036" y="699.84028416574" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="88.38807384775949" y="709.7706407534889" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="90.2266351168416" y="717.5444942432456" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><ellipse cx="102.8436055516265" cy="726.6961421919056" rx="22.0" ry="16.0" fill="url(#bevelr1x1330)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x1330)"/></g><rect x="450.8602124400437" y="557.5249005642719" width="100.0"  he