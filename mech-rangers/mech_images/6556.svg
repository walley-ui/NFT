roke-linecap="round" filter="url(#wmr1x6556)"/><line x1="98.08340396428477" y1="771.5777665289119" x2="86.54162463093174" y2="130.90970304664222" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="72.8,151.6 141.7,151.8 85.1,-9.9" fill="url(#blader1x6556)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x6556)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="82.78018602294844" y="421.5032309863716" width="40.0" height="20.0" fill="url(#bevelr1x6556)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6556)"/><rect x="83.28312578139824" y="509.6555069476366" width="40.0" height="20.0" fill="url(#bevelr1x6556)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6556)"/><rect x="84.37100710658353" y="601.3404641120694" width="40.0" height="20.0" fill="url(#bevelr1x6556)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6556)"/><rect x="82.20424530928952" y="691.5774111605249" width="40.0" height="20.0" fill="url(#bevelr1x6556)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6556)"/><ellipse cx="100.44320534145456" cy="790.4698334944434" rx="22.0" ry="15.0" fill="url(#bevelr1x6556)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x6556)"/></g><rect x="450.16427577193826" y="555.5174977488815" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x6556)"/><rect x="425.3997784398496" y="573.8542495332658" width="152.0" height="26.0" fill="url(#bevelr1x6556)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x6556)"/><polygon points="306.9,379.2 349.4,292.7 500.1,276.4 650.6,295.6 691.3,379.3 668.4,502.2 499.1,564.6 329.6,502.0" fill="url(#suitr1x6556)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x6556) url(#metalr1x6556)"/><polygon points="307.9,381.7 349.7,293.3 500.6,277.3 650.5,293.3 693.1,382.3 670.7,502.9 498.8,564.9 332.2,504.4" fill="url(#carbonr1x6556)"/><polygon points="379.6,303.0 498.7,286.2 618.3,303.9 608.2,379.1 391.0,379.4" fill="url(#suitHir1x6556)"/><polygon points="381.3,380.4 366.2,425.2 432.6,502.2 500.4,528.7 567.2,503.1 633.6,427.3 618.0,381.5" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x6556)"/><polygon points="382.2,412.7 476.2,411.0 483.5,438.3 388.9,438.4" fill="#4444ff" filter="url(#glowr1x6556)"/><polygon points="523.9,413.1 618.6,410.6 610.9,441.8 516.4,439.3" fill="#4444ff" filter="url(#glowr1x6556)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.3909086633101" y1="412.9762351079844" x2="515.4829753924533" y2="413.43245948664844" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.4013368020393" y1="439.32405436355623" x2="514.868406508714" y2="439.45512090185656" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.3194336283021" y1="455.5485397444106" x2="499.6691720862873" y2="483.34094971818854" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6556)"/><line x1="454.1769187860005" y1="490.3104835171252" x2="455.1983324563876" y2="518.9949518279172" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6556)"/><line x1="476.9224661410227" y1="491.7373814605176" x2="475.38647848725316" y2="521.4490592972376" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6556)"/><line x1="498.8114641144872" y1="490.7796244613826" x2="500.76669601239263" y2="521.2296381771564" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6556)"/><line x1="523.4939330672472" y1="490.37430142769585" x2="524.1820348837971" y2="519.1737570581957" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6556)"/><line x1="547.532783695329" y1="491.6313001953996" x2="544.4128445243649" y2="518.6198274611495" stroke="#4444ff" str