28.6 102.2,-138.6" fill="url(#blader1x6341)" filter="url(#wmr1x6341)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x6341)" opacity=".9"/><line x1="111.68505518667396" y1="671.7379080142825" x2="104.10978526845572" y2="-130.0622262579389" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="92.47696595955637" y1="672.3551483404823" x2="99.42159237962213" y2="-128.72701300550256" stroke="#ffcc00" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="45.71695990491655" y="669.2850950551219" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x6341)" stroke="#ffcc00" stroke-width="1.6" filter="url(#wmr1x6341)"/><rect x="71.66135939912867" y="673.2892733307555" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="89.54719123294574" y="679.1500780711882" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="91.50304498257113" y="685.6083790087141" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="91.21728198736903" y="693.9262759257108" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="90.71352870402855" y="701.0054346604272" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="90.50011695506048" y="710.8373164813966" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="90.61312205273654" y="718.9022900233977" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><ellipse cx="101.49616763707247" cy="724.879910152778" rx="22.0" ry="16.0" fill="url(#bevelr1x6341)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x6341)"/></g><rect x="451.61886845547707" y="555.6166839540005" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x6341)"/><rec