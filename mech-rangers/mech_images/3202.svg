" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x3202)"/><line x1="96.87854721745472" y1="771.9408919414506" x2="87.03989574139935" y2="131.0588860980235" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="74.2,152.7 138.7,152.7 84.8,-7.3" fill="url(#blader1x3202)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x3202)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="84.67259720111262" y="421.6571438007056" width="40.0" height="20.0" fill="url(#bevelr1x3202)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3202)"/><rect x="82.67614005072039" y="511.29518421618263" width="40.0" height="20.0" fill="url(#bevelr1x3202)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3202)"/><rect x="83.52181728076187" y="600.5248071141541" width="40.0" height="20.0" fill="url(#bevelr1x3202)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3202)"/><rect x="82.88768300408495" y="692.5309628297574" width="40.0" height="20.0" fill="url(#bevelr1x3202)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3202)"/><ellipse cx="102.1505815496109" cy="790.2716027811169" rx="22.0" ry="15.0" fill="url(#bevelr1x3202)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3202)"/></g><rect x="448.3719557326287" y="557.5642861415632" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3202)"/><rect x="422.2165303326212" y="573.6988965763711" width="152.0" height="26.0" fill="url(#bevelr1x3202)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x3202)"/><polygon points="309.3,382.3 352.0,294.6 501.3,279.1 650.3,294.3 693.4,381.9 669.3,503.3 499.9,565.5 332.0,502.1" fill="url(#suitr1x3202)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x3202) url(#metalr1x3202)"/><polygon points="307.0,381.7 351.1,295.1 500.4,276.6 648.0,293.3 691.2,380.5 670.4,502.7 499.3,564.0 331.5,502.3" fill="url(#carbonr1x3202)"/><polygon points="380.3,303.8 499.4,286.2 617.8,303.1 606.0,380.1 394.1,380.3" fill="url(#suitHir1x3202)"/><polygon points="382.5,379.5 366.0,424.6 434.2,502.6 498.8,528.3 568.9,502.6 632.9,424.0 618.1,379.5" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x3202)"/><polygon points="381.8,411.0 475.5,410.1 485.3,438.9 389.2,438.7" fill="#2060ff" filter="url(#glowr1x3202)"/><polygon points="524.4,413.0 620.4,411.6 611.8,441.2 514.7,440.4" fill="#2060ff" filter="url(#glowr1x3202)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.41207392370325" y1="412.21949899094176" x2="515.6391683400981" y2="414.31141264010216" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.4361352572776" y1="439.1492493697442" x2="513.5860982365348" y2="436.9247372721322" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.6379231793806" y1="454.4304955690168" x2="499.05993719175456" y2="484.83558780243624" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3202)"/><line x1="453.45154527880254" y1="491.79196845740074" x2="453.72094787525015" y2="518.9609056662769" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3202)"/><line x1="478.6963370909355" y1="491.30944995712485" x2="475.30300019582734" y2="521.2964188658632" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3202)"/><line x1="498.6481872726232" y1="489.56226517055177" x2="499.03179086735474" y2="520.8894104393199" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3202)"/><line x1="522.5297929068654" y1="489.63969844263045" x2="522.4713459186814" y2="520.0995723141357" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3202)"/><line x1="545.4460515819677" y1="490.1355116697959" x2="544.7770600570552" y2="520.24224