 points="887.4,-28.6 908.2,-28.6 897.8,-138.6" fill="url(#blader1x8023)" filter="url(#wmr1x8023)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x8023)" opacity=".9"/><line x1="905.8228721841239" y1="669.6620529969223" x2="897.7914417850039" y2="-130.16767011620107" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="886.9495533466526" y1="670.766235726513" x2="896.5061064380221" y2="-129.04488706924025" stroke="#ff2040" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.9307022883185" y="669.6361336350441" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x8023)" stroke="#ff2040" stroke-width="1.6" filter="url(#wmr1x8023)"/><rect x="865.4785939379223" y="671.6116919510997" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="887.1972248216719" y="677.741347303614" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="885.7172289667279" y="684.1804973525926" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="885.6641328706966" y="693.1516746831127" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="886.8549239759892" y="702.4624510617926" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="884.9955735410191" y="711.0531184985302" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="887.3763759429195" y="716.1328761983663" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><ellipse cx="899.0179670759104" cy="727.7089240225032" rx="22.0" ry="16.0" fill="url(#bevelr1x8023)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x8023)"/></g><rect x="448.3175799907185" y="556.5273248538375" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filte