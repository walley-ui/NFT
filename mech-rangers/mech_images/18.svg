/></g><g><rect x="838.5180578733422" y="397.8830257997848" width="175.0" height="118.0" rx="7" fill="url(#artilleryr1x18)" stroke="#4444ff" stroke-width="2.6" filter="url(#wmr1x18)"/><rect x="839.05312561417" y="396.5499235355295" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x18)"/><rect x="984.3874439233542" y="445.7358295748941" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x18)" stroke="#4444ff" stroke-width="1.4" filter="url(#wmr1x18)"/><circle cx="883.2465435107798" cy="471.6408693994395" r="48.0" fill="rgba(0,0,0,.55)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x18)"/><circle cx="880.8652384654247" cy="471.52033341070637" r="34.0" fill="#4444ff" fill-opacity=".4" filter="url(#bloomr1x18)"/><circle cx="880.5365067324229" cy="469.9786263669841" r="18.0" fill="#4444ff" filter="url(#glowr1x18)"/><rect x="842.5259082759359" y="381.642991382163" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x18)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x18)"/><rect x="839.3706897765026" y="397.88020261405035" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="848.1263779192791" y1="520.5754982215352" x2="847.4348799835518" y2="548.2029937956482" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/><line x1="873.5351934538782" y1="518.7343051991426" x2="873.5884639538452" y2="549.6039208655245" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/><line x1="895.03100898467" y1="519.4495532290078" x2="895.541053996943" y2="550.9297758253291" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/><line x1="919.8763499595784" y1="519.5564170788973" x2="921.5105283802934" y2="549.0190096504986" stroke="#4444ff" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.15041483566165" y="557.2909388873726" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x18)"/><rect x="422.9478465085849" y="576.4974196899683" width="152.0" height="26.0" fill="url(#bevelr1x18)" fill-opacity=".