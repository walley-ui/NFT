r="url(#wmr1x713)"/><line x1="901.8163122186065" y1="812.1778464808128" x2="901.2833720076457" y2="131.84557006945832" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="883.3763103955985" y="619.7533425406552" width="32.0" height="18.0" fill="url(#bevelr1x713)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x713)"/><rect x="882.6091799709574" y="442.62138319946826" width="32.0" height="18.0" fill="url(#bevelr1x713)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x713)"/><rect x="880.8252360387334" y="260.2837523330003" width="32.0" height="18.0" fill="url(#bevelr1x713)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x713)"/><circle cx="898.2160077422485" cy="110.96604376146567" r="58.0" fill="rgba(0,0,0,.52)" stroke="#2060ff" stroke-width="2.2" filter="url(#wmr1x713)"/><circle cx="897.8809161580726" cy="111.97558332858605" r="46.0" fill="url(#orbr1x713)" filter="url(#bloomr1x713)"/><circle cx="898.7728617601656" cy="111.91074498165396" r="20.0" fill="#2060ff" filter="url(#glowr1x713)"/><circle cx="897.0015891583264" cy="110.15065726600585" r="66.0" fill="none" stroke="#2060ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="897.5629396951385" cy="111.30145042808724" rx="66.0" ry="30.0" fill="none" stroke="#2060ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="448.4128267541528" y="555.8554706223309" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x713)"/><rect x="422.8476960375905" y="577.0494897307829" width="152.0" height="26.0" fill="url(#bevelr1x713)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x713)"/><polygon points="308.8,381.3 349.7,295.0 498.2,279.4 651.4,294.0 693.4,381.7 669.2,502.1 500.1,564.3 330.2,504.8" fill="url(#suitr1x713)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x713) url(#metalr1x713)"/><polygon points="306.3,379.1 350.5