3)"/><line x1="545.9683947304451" y1="490.7070517074316" x2="546.2386092215032" y2="520.4084844528697" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x713)"/><polygon points="432.2,502.5 565.9,504.4 552.4,557.6 445.3,556.6" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x713)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>