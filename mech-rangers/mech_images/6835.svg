oke-linecap="round" filter="url(#wmr1x6835)"/><line x1="97.63647356055674" y1="770.0340473665856" x2="86.96273931436238" y2="132.34748516958206" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="73.7,150.9 139.6,150.3 84.2,-8.0" fill="url(#blader1x6835)" stroke="#ffd700" stroke-width="1.8" filter="url(#wmr1x6835)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="82.57335379555818" y="420.1722322914749" width="40.0" height="20.0" fill="url(#bevelr1x6835)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6835)"/><rect x="83.90509473145005" y="511.6088729064911" width="40.0" height="20.0" fill="url(#bevelr1x6835)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6835)"/><rect x="83.86210772277784" y="602.5207892009057" width="40.0" height="20.0" fill="url(#bevelr1x6835)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6835)"/><rect x="82.08871834002431" y="692.562776510883" width="40.0" height="20.0" fill="url(#bevelr1x6835)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6835)"/><ellipse cx="103.00408751409498" cy="791.1170361245983" rx="22.0" ry="15.0" fill="url(#bevelr1x6835)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6835)"/></g><rect x="449.06364429211243" y="556.8590878191404" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x6835)"/><rect x="425.41629054602237" y="575.4940735764802" width="152.0" height="26.0" fill="url(#bevelr1x6835)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x6835)"/><polygon points="306.4,382.1 350.9,292.9 501.8,279.2 650.6,295.3 690.4,379.4 667.9,505.3 501.5,566.3 331.1,504.1" fill="url(#suitr1x6835)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x6835) url(#metalr1x6835)"/><polygon points="308.2,379.4 350.0,292.7 498.8,278.3 650.0,293.7 690.9,381.8 667.7,502.1 500.2,564.1 330.5,504.0" fill="url(#carbonr1x6835)"/><polygon points="382.