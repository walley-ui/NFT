1x6586)" filter="url(#wmr1x6586)"/><polygon points="887.4,-28.6 908.2,-28.6 897.8,-138.6" fill="url(#blader1x6586)" filter="url(#wmr1x6586)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x6586)" opacity=".9"/><line x1="906.2140663390048" y1="673.0016408373601" x2="899.7677462568693" y2="-126.97963471515106" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="889.5067918095924" y1="672.7317881771363" x2="896.3203163339757" y2="-130.09349345574157" stroke="#ff00ff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="843.4945861052349" y="667.8601492393761" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x6586)" stroke="#ff00ff" stroke-width="1.6" filter="url(#wmr1x6586)"/><rect x="867.123194620721" y="672.1443177912384" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="885.2086264129356" y="678.0916483657435" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="884.8644239372202" y="686.5734855589457" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="885.6936276672967" y="692.7444029667414" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="886.6807445772552" y="702.4834978111088" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="884.1049434836582" y="708.7996783751994" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="887.5588543695957" y="718.3496905421838" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><ellipse cx="899.5638916159608" cy="726.6685993083753" rx="22.0" ry="16.0" fill="url(#bevelr1x6586)" stroke="#ff00ff" stroke-width="1.2" filter="url(#wmr1x6586)"/></g><rect x="448.3176858005114" y="556.2421175654046" width="100.0"  height="56.0" fill="#05050