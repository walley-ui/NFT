 fill="rgba(255,255,255,.48)"/><polygon points="152.6,468.0 235.3,465.4 256.7,735.6 128.2,733.7" fill="url(#suitr1x95)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x95) url(#metalr1x95)"/><polygon points="172.7,431.3 252.4,430.8 241.9,509.8 159.9,511.3" fill="url(#bevelr1x95)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x95)"/><polygon points="160.5,622.0 242.7,622.6 240.5,662.7 166.9,659.1" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x95)"/><polygon points="766.5,468.1 846.6,468.0 873.0,733.5 743.1,735.6" fill="url(#suitr1x95)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x95) url(#metalr1x95)"/><polygon points="748.4,431.4 825.9,430.7 840.6,510.8 758.3,508.9" fill="url(#bevelr1x95)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x95)"/><polygon points="757.8,621.7 838.3,621.0 833.5,662.6 759.9,660.5" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x95)"/><rect x="118.5"  y="701.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x95)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x95)"/><rect x="747.1"   y="698.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x95)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x95)"/><line x1="150.7" y1="701.5" x2="150.7" y2="785.4" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="779.3" y1="701.5" x2="778.1" y2="783.7" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="180.9" y1="700.1" x2="182.8" y2="783.3" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="812.3" y1="700.8" x2="812.1" y2="782.4" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="214.7" y1="700.4" x2="215.3" y2="783.9" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="842.5" y1="703.4" x2="842.4" y2="784.9" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><polygon points="235.5,415.7 764.0,416.9 722.5,663.3 2