.8" height="88.0" rx="5" fill="url(#bevelr1x4067)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x4067)"/><rect x="114.6" y="702.6" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x4067)"/><rect x="749.2"  y="700.5" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x4067)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x4067)"/><rect x="749.9"  y="702.6" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x4067)"/><rect x="122.3" y="700.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><rect x="756.0" y="701.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><rect x="152.3" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><rect x="784.8" y="699.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><rect x="182.6" y="700.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><rect x="813.9" y="699.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><rect x="208.7" y="701.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><rect x="842.3" y="698.8" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x4067)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x4067)"/><ellipse cx="182.68639040006323" cy="710.140864275936" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x4067)"/><ellipse cx="819.1587198902108" cy="711.6175462289526" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x4067)"/></g><rect x="451.7085122410208" y="555.4194849909283" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x4067)"/><rect x="425.56286769304427" y="576.7318314356729" width="152.0" height="26.0" fill="url(#bevelr1x4067)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x4067)"/><polygon points="306.7,381.4 349.2,293.9 500.5,279.7 650.1,294.6 692.8,379.3 669.6,502.5 500.1,565.0 329.5,502.8" fill="url(#suitr1x4067)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x4067) url(#metalr1x4067)"/><polygon points="307.5,380.7 350.1,293.5 500.6,278.4 649.1,294.2 692.3,379.2 667.6,503.2 500.3,563.8 332.7,502.0" fill="url(#carbonr1x4067)"/><polygon points="381.3,303.1 501.6,284.9 617.7,303.3 608.7,380.3 392.9,379.8" fill="url(#suitHir1x4067)"/><polygon points="379.5,381.9 366.5,426.3 431.2,505.3 500.4,529.4 567.1,503.3 635.5,427.5 618.8,378.9" fill="#1e0600" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x4067)"/><polygon points="379.6,410.7 478.6,409.8 483.0,439.4 388.0,441.7" fill="#2060ff" filter="url(#glowr1x4067)"/><polygon points="521.9,412.5 620.6,411.1 612.6,441.4 515.7,438.7" fill="#2060ff" filter="url(#glowr1x4067)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.26942005125807" y1="413.5605022693053" x2="516.1215226062014" y2="415.02571285441513" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.4408850571699" y1="436.9925300781615" x2="513.6497877623327" y2="438.87425763979553" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.76264496995134" y1="453.44170486424116" x2="498.36804239973424" y2="482.86430952288214" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x4067)"/><line x1="454.59293613906954" y1="491.9746044278144" x2="453.8561628253013" y2="518.8361532961019" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4067)"/><line x1="476.347511496245