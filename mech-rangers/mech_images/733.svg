1x733)"/><polygon points="524.6,410.7 617.3,412.0 611.1,440.1 514.7,439.4" fill="#ccccff" filter="url(#glowr1x733)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.53915981246155" y1="414.2841221725568" x2="515.2000646826252" y2="412.3293690741062" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="486.3439225840941" y1="437.4586356620304" x2="515.3140203711018" y2="437.67057150201873" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="500.34486043248324" y1="455.5190181584097" x2="498.9419315964915" y2="481.9409831834026" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x733)"/><line x1="455.4998139591701" y1="491.3598800312727" x2="452.4868742111884" y2="519.9091341740452" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x733)"/><line x1="475.7274960459582" y1="491.98069295678283" x2="477.924867850393" y2="519.1442750289104" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x733)"/><line x1="501.4299256821163" y1="492.01624946445224" x2="500.048979228735" y2="518.5299916126766" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x733)"/><line x1="522.394296880588" y1="492.86643267823376" x2="523.5921502464078" y2="519.6551979374141" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x733)"/><line x1="546.7209961736761" y1="491.0030108368955" x2="547.671899925936" y2="519.08414955372" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x733)"/><polygon points="433.8,504.7 565.6,504.8 554.1,557.9 446.9,555.1" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x733)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>