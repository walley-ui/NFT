-opacity=".38" stroke-width="1"/><line x1="843.9" y1="700.8" x2="845.1" y2="784.1" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><polygon points="233.8,416.6 763.5,416.7 723.1,661.8 276.9,661.1" fill="url(#suitr1x7029)" stroke="#c0c0d0" stroke-width="2.6" filter="url(#skr1x7029) url(#metalr1x7029)"/><polygon points="235.0,416.1 764.2,419.3 723.1,661.9 277.2,664.1" fill="url(#carbonr1x7029)"/><polygon points="366.1,416.7 631.9,415.9 610.3,516.5 388.7,516.6" fill="url(#suitHir1x7029)"/><line x1="362.5" y1="472.0" x2="637.8" y2="469.9" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x7029)"/><line x1="399.3" y1="550.7" x2="601.5" y2="550.9" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x7029)"/><line x1="267.8" y1="489.6" x2="320.7" y2="491.8" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.6" y1="492.3" x2="734.9" y2="489.7" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.3" y1="521.7" x2="321.5" y2="523.2" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.3" y1="524.5" x2="732.4" y2="523.6" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.6" y1="555.6" x2="320.4" y2="554.1" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.5" y1="553.8" x2="733.8" y2="556.3" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.9" y1="585.7" x2="321.5" y2="585.3" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.7" y1="587.3" x2="732.6" y2="588.1" stroke="#c0c0d0" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x7029)"><polygon points="483.5,453.2 511.1,506.3 500.3,507.2 517.0,569.0 487.0,516.6 498.7,513.6" fill="#c0c0d0" stroke="#1e0600" stroke-width="1.4" filter="url(#skr1x7029)"/><polygon points="484.3,453.8 513.9,507.0 498.9,504.5 517.0,570.2 488.0,514.8 500.9,515.8" fill="url(#suitHir1x7029)" opacity=".4"/></g><g><line x1="896.9840486907028" y1="831