oke-width="2" filter="url(#wmr1x9309)"/><rect x="831.5696254085377" y="419.6630222215317" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x9309)"/><rect x="838.7585846029781" y="404.9092793932184" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x9309)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x9309)"/><circle cx="878.4697349224799" cy="413.2591591744683" r="15.0" fill="#ccccff" opacity=".8" filter="url(#glowr1x9309)"/><circle cx="877.8501651011035" cy="414.4736409319564" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="947.3888978893497" y="457.16785957049575" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x9309)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x9309)"/><circle cx="1018.2267658196017" cy="471.46284441286696" r="18.0" fill="#ccccff" filter="url(#glowr1x9309)" opacity=".88"/><circle cx="1018.8589327118918" cy="470.15409661233423" r="7.0" fill="#ffffff"/><rect x="872.921115133781" y="500.35925321681424" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x9309)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x9309)"/><rect x="831.3002487945929" y="424.4471831602975" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="859.2466188490018" y1="486.0882965961471" x2="858.1154852597602" y2="518.4129043976776" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="872.6508224135824" y1="484.71715939771383" x2="874.9928884165921" y2="518.9131996589713" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="891.4845822861977" y1="487.973873394262" x2="890.004982901141" y2="518.0697198563255" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.7464274399914" y="555.7957021432928" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x9309)"/><rect x="423.9764271713793" y="575.6522478434257" width="152.0" height="26.0" fill="url(#bevelr1x9309)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x93