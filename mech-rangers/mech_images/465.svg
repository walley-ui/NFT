65)" filter="url(#wmr1x465)"/><polygon points="887.4,-28.6 908.2,-28.6 897.8,-138.6" fill="url(#blader1x465)" filter="url(#wmr1x465)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x465)" opacity=".9"/><line x1="908.1217193098739" y1="669.8496235119179" x2="897.6212789221853" y2="-127.15963441105562" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="889.192020947691" y1="669.8341928271576" x2="896.9372142015957" y2="-129.73969098264354" stroke="#ffcc00" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.358174011726" y="671.1821737916208" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x465)" stroke="#ffcc00" stroke-width="1.6" filter="url(#wmr1x465)"/><rect x="866.4278758640029" y="675.180068503134" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="884.6131815914624" y="678.099400255736" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="886.8195749782585" y="683.9716253354214" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="884.4742153273523" y="692.7016957149841" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="885.6753211909532" y="702.4431991084479" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="884.5558442641609" y="710.3900458034128" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="884.0756920631603" y="717.1728071658872" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><ellipse cx="898.8079234304465" cy="727.3914897815324" rx="22.0" ry="16.0" fill="url(#bevelr1x465)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x465)"/></g><rect x="448.9205155824311" y="557.1513815071434" width="100.0"  height="56.0" fill="#a07000" stroke="#ffc