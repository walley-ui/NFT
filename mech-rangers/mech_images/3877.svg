-opacity=".38" stroke-width="1"/><line x1="842.4" y1="703.1" x2="842.1" y2="785.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><polygon points="234.5,419.0 765.8,417.1 722.7,661.6 275.6,662.3" fill="url(#suitr1x3877)" stroke="#ff2040" stroke-width="2.6" filter="url(#skr1x3877) url(#metalr1x3877)"/><polygon points="234.8,417.8 765.6,416.0 724.1,663.7 279.1,661.6" fill="url(#carbonr1x3877)"/><polygon points="368.4,418.2 632.8,416.0 611.5,517.1 387.1,513.9" fill="url(#suitHir1x3877)"/><line x1="361.8" y1="471.4" x2="637.0" y2="471.6" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3877)"/><line x1="399.7" y1="551.0" x2="601.3" y2="548.2" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3877)"/><line x1="265.0" y1="490.9" x2="318.9" y2="491.8" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.3" y1="492.3" x2="731.4" y2="489.7" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.4" y1="524.0" x2="318.3" y2="521.8" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.4" y1="523.2" x2="731.8" y2="524.4" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.1" y1="553.8" x2="320.4" y2="555.9" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.9" y1="553.3" x2="733.2" y2="554.0" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.7" y1="587.0" x2="320.2" y2="587.1" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.8" y1="587.3" x2="732.9" y2="587.3" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x3877)"><polygon points="481.9,452.2 514.1,506.3 498.3,507.7 518.2,570.4 488.3,515.6 500.8,515.9" fill="#ff2040" stroke="#1e0600" stroke-width="1.4" filter="url(#skr1x3877)"/><polygon points="481.2,453.1 514.0,505.7 498.4,507.4 518.5,567.9 488.6,513.8 500.1,516.5" fill="url(#suitHir1x3877)" opacity=".4"/></g><g><rect x="831.2272241090983" y="421.6422455176711" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x3877)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x3877)"/><rect x="829.1648300711624" y="421.5853009294718" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x3877)"/><rect x="838.5525200707466" y="403.93604304064064" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x3877)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x3877)"/><circle cx="879.09064359447" cy="413.44254377791657" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x3877)"/><circle cx="876.6813782727905" cy="413.93041957747187" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="946.9370518866555" y="455.5126216901466" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x3877)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x3877)"/><circle cx="1018.3052163295075" cy="472.2484033862129" r="18.0" fill="#ff2040" filter="url(#glowr1x3877)" opacity=".88"/><circle cx="1019.7470285645314" cy="470.10545499240976" r="7.0" fill="#ffffff"/><rect x="873.7118724645675" y="502.5741446933709" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x3877)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x3877)"/><rect x="834.4579506798275" y="424.2518831559457" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="858.1068609402142" y1="487.13163278056305" x2="856.7949223972485" y2="519.7815738674253" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="875.3302817811817" y1="487.9642729668878" x2="873.8152214572393" y2="519.5502786390483" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="891.1351207663864" y1="486.64533738298337" x2="888.3226618033461" y2="519.1283377707005" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.2169058184139" y="556.286211556103" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3877)"/><rect x="425.3410490946844" y="575.8322527453304" width="152.0" height="26.0" fill="url(#bevelr1x3877)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x3877)"/><polygon points="306.6,378.9 349.2,293.1 501.4,279.8 650.6,295.8 691.7,381.8 669.0,505.2 501.7,566.4 330.1,502.8" fill="url(#suitr1x3877)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x3877) url(#metalr1x3877)"/><polygon points="308.9,381.2 350.9,296.2 499.8,277.3 648.2,294.2 693.4,379.5 669.1,504.6 500.9,564.5 331.2,503.1" fill="url(#carbonr1x3877)"/><polygon points="380.1,301.5 501.2,285.9 618.9,302.6 607.6,379.5 391.0,382.4" fill="url(#suitHir1x3877)"/><polygon points="380.3,381.2 366.7,427.4 432.3,502.6 500.2,527.1 566.1,502.4 633.9,426.8 620.3,381.0" fill="#1e0600" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x3877)"/><polygon points="380.3,412.3 476.3,411.0 485.8,438.5 389.5,441.2" fill="#ff2040" filter="url(#glowr1x3877)"/><polygon points="523.7,412.7 617.5,413.1 611.9,439.1 515.8,441.4" fill="#ff2040" filter="url(#glowr1x3877)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="482.8948477511853" y1="412.7845430142246" x2="515.010796336867" y2="412.0429756969213" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="484.33115230049935" y1="437.96549165435135" x2="515.7016975012049" y2="438.84203617237506" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="501.5408955271356" y1="455.04383470267055" x2="500.4077059148811" y2="484.8973066966981" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3877)"/><line x1="452.9098306912743" y1="492.3110356798395" x2="455.0261876900494" y2="518.3644388519227" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3877)"/><line x1="476.5021842918731" y1="490.94674458606164" x2="475.7050633648783" y2="521.3699434737675" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x38