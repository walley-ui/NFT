.9" y="520.5" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#08001e" stroke-width=".6"/></g><g><polygon points="33.3,294.8 172.8,295.2 172.8,591.7 100.6,724.8 31.3,590.7" fill="url(#titaniumr1x6592)" stroke="#ff2040" stroke-width="2.6" filter="url(#wmr1x6592)"/><polygon points="30.9,291.7 172.5,294.0 170.4,591.7 101.8,725.7 32.7,590.8" fill="url(#carbonr1x6592)"/><polygon points="65.5,361.9 139.1,360.5 139.2,540.1 100.9,631.3 65.9,540.9" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="51.854324703980204" y1="431.4829438042827" x2="153.4784462544508" y2="431.14542210437355" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="101.55391343798485" y1="329.7031188222579" x2="102.73362999478351" y2="591.6819243509323" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="34.2656790293194" y1="295.53354561617596" x2="171.6799874706566" y2="296.87838401002807" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.72598158776756" cy="432.3911415235139" r="18.0" fill="url(#bevelr1x6592)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x6592)"/></g><rect x="451.2088354602456" y="555.4480786206201" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6592)"/><rect x="423.51330631868916" y="575.3176994300447" width="152.0" height="26.0" fill="url(#bevelr1x6592)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x6592)"/><polygon points="307.2,380.6 349.9,295.9 498.6,278.6 648.6,294.7 691.9,381.8 667.4,504.3 500.7,564.9 330.0,502.7" fill="url(#suitr1x6592)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x6592) url(#metalr1x6592)"/><polygon points="307.9,382.2 350.6,293.5 501.2,279.9 651.5,293.9 692.4,381.3 669.3,502.7 500.9,565.8 332.3,503.1" fill="url(#carbonr1x6592)"/><polygon points="381.2,301.9 501.1,287.4 620.3,301.2 608.4,380.8 394.2,380.4" fill="url(#suitHir1x6592)"/><polygon points="381.0,380.4 366.8,426.6 433.2,504.