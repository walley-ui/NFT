 x2="101.38506852969525" y2="113.13916392130776" stroke="url(#chromer1x3037)" stroke-width="22.0" stroke-linecap="round" filter="url(#wmr1x3037)"/><line x1="96.62872573345896" y1="813.0073512134142" x2="98.50373153094199" y2="131.34829181302337" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="84.72923311846327" y="622.6886421059259" width="32.0" height="18.0" fill="url(#bevelr1x3037)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x3037)"/><rect x="87.093216043096" y="442.01343006137756" width="32.0" height="18.0" fill="url(#bevelr1x3037)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x3037)"/><rect x="86.63451985711228" y="260.1474057103507" width="32.0" height="18.0" fill="url(#bevelr1x3037)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x3037)"/><circle cx="102.21187739329409" cy="110.97516973456365" r="58.0" fill="rgba(0,0,0,.52)" stroke="#4444ff" stroke-width="2.2" filter="url(#wmr1x3037)"/><circle cx="103.33052889289331" cy="111.37485755858941" r="46.0" fill="url(#orbr1x3037)" filter="url(#bloomr1x3037)"/><circle cx="101.70126318274063" cy="110.96372185610232" r="20.0" fill="#4444ff" filter="url(#glowr1x3037)"/><circle cx="102.04368056705218" cy="110.2669824413955" r="66.0" fill="none" stroke="#4444ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="101.00871252104636" cy="109.73359905993564" rx="66.0" ry="30.0" fill="none" stroke="#4444ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,102.2,111.4)"/></g><rect x="449.4432273644954" y="556.2370586945675" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x3037)"/><rect x="422.8367542232387" y="575.2731585707515" width="152.0" height="26.0" fill="url(#bevelr1x3037)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x3037)"/><polygon points="308.4,379.5 349.4,294.6 498.4,277.0 650.2,295.7 691.2,381.8 669.1,502.7 498.7,564.2 330.1,50