oke-linecap="round" filter="url(#wmr1x5034)"/><line x1="903.1053873890638" y1="772.382782841567" x2="910.1666793772579" y2="132.9691088983789" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.9,152.3 937.4,151.7 915.4,-9.1" fill="url(#blader1x5034)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x5034)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="880.5976763192192" y="422.39198588961733" width="40.0" height="20.0" fill="url(#bevelr1x5034)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x5034)"/><rect x="878.6600299718417" y="511.75310366209595" width="40.0" height="20.0" fill="url(#bevelr1x5034)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x5034)"/><rect x="877.0689227132685" y="601.4718138153664" width="40.0" height="20.0" fill="url(#bevelr1x5034)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x5034)"/><rect x="877.4676256326586" y="691.3025203553959" width="40.0" height="20.0" fill="url(#bevelr1x5034)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x5034)"/><ellipse cx="898.8733857379854" cy="792.2198668993078" rx="22.0" ry="15.0" fill="url(#bevelr1x5034)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x5034)"/></g><rect x="450.76300529195" y="556.5238299790769" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x5034)"/><rect x="425.5576371608302" y="576.797212262731" width="152.0" height="26.0" fill="url(#bevelr1x5034)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x5034)"/><polygon points="309.0,380.2 350.0,295.3 500.9,276.9 651.3,295.3 693.5,382.2 670.6,502.4 501.1,563.7 331.5,505.1" fill="url(#suitr1x5034)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x5034) url(#metalr1x5034)"/><polygon points="307.0,380.1 349.1,295.5 501.2,277.0 650.2,294.0 692.0,381.3 668.3,505.0 499.4,566.5 330.6,501.9" fill="url(#carbonr1x5034)"/><polygon points="382.4,