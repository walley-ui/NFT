,503.6 567.5,505.0 555.4,556.1 446.0,556.9" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x5244)"/><polygon points="475.4,302.9 524.0,304.3 512.3,177.3 487.2,177.0" fill="url(#bevelr1x5244)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x5244)"/><polygon points="367.2,324.7 458.4,324.8 470.4,228.4" fill="url(#bevelr1x5244)" fill-opacity=".78" stroke="#2060ff" stroke-width="1.5" filter="url(#skr1x5244)"/><polygon points="541.2,324.1 633.9,324.5 529.9,229.8" fill="url(#bevelr1x5244)" fill-opacity=".78" stroke="#2060ff" stroke-width="1.5" filter="url(#skr1x5244)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>