)"/><polygon points="382.5,381.6 363.9,425.8 434.5,505.4 501.5,527.5 567.6,504.0 633.2,427.0 619.9,379.9" fill="#0a0520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x1822)"/><polygon points="381.2,410.8 478.2,409.6 484.7,439.1 389.4,440.3" fill="#ff44aa" filter="url(#glowr1x1822)"/><polygon points="523.6,412.3 617.3,411.4 609.9,438.4 516.9,439.1" fill="#ff44aa" filter="url(#glowr1x1822)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.6773076899908" y1="415.0162269917316" x2="515.1577652699686" y2="412.39502105740826" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="485.0679485714622" y1="438.9308057840914" x2="515.9357219367661" y2="437.69682919252665" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="501.7555044054985" y1="453.375116363354" x2="499.1918150421232" y2="483.9472408531234" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1822)"/><line x1="455.61294541487473" y1="489.8064165762625" x2="453.84795333201066" y2="520.2799732433632" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1822)"/><line x1="478.55278519824145" y1="492.0557080657221" x2="476.49093414250757" y2="520.8687509926036" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1822)"/><line x1="499.6245392054319" y1="491.6013840220868" x2="501.648009053804" y2="518.799529249128" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1822)"/><line x1="522.5725485439971" y1="492.95985545571887" x2="524.3427835751884" y2="518.3170815960505" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1822)"/><line x1="547.6816294237227" y1="490.59386136298997" x2="545.5909985594639" y2="520.816311351303" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1822)"/><polygon points="433.0,503.5 566.7,504.2 555.4,558.4 447.3,555.5" fill="#880050" fill-opacity=".72" stroke="#ff44aa" stroke-width="1.3" filter="url(#skr1x1822)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".48">SAKURA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".32">MECH RANGERS</text></svg>