.8" y="523.6" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#050508" stroke-width=".6"/></g><g><polygon points="33.7,292.9 173.7,294.4 170.6,591.4 103.4,726.5 33.6,590.0" fill="url(#titaniumr1x3829)" stroke="#ff2040" stroke-width="2.6" filter="url(#wmr1x3829)"/><polygon points="31.5,292.4 173.6,291.6 172.5,590.7 102.9,725.4 32.7,592.7" fill="url(#carbonr1x3829)"/><polygon points="64.7,361.4 141.8,360.0 140.9,539.9 101.8,631.5 63.4,541.2" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="50.24851896347475" y1="432.75311241187154" x2="153.50794012065973" y2="430.1182714571245" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.22612307727334" y1="331.54370179465036" x2="103.15843008788299" y2="591.7303092096932" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="34.97776277758178" y1="296.5224679696373" x2="171.63253213226793" y2="297.05771418968214" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.4554468107782" cy="432.2551728710532" r="18.0" fill="url(#bevelr1x3829)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x3829)"/></g><rect x="448.46343609541657" y="558.3579614860937" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3829)"/><rect x="423.07023429861295" y="574.4854498798028" width="152.0" height="26.0" fill="url(#bevelr1x3829)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x3829)"/><polygon points="309.2,380.2 349.7,293.7 499.1,278.1 650.5,294.9 692.5,381.6 667.8,505.2 498.2,566.8 330.7,505.1" fill="url(#suitr1x3829)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x3829) url(#metalr1x3829)"/><polygon points="309.1,380.6 349.4,295.0 498.9,279.8 651.3,293.5 690.3,382.1 670.0,503.4 499.2,566.1 330.1,504.5" fill="url(#carbonr1x3829)"/><polygon points="379.2,303.9 499.4,287.3 617.6,302.8 608.4,378.9 392.9,381.7" fill="url(#suitHir1x3829)"/><polygon points="379.9,381.9 365.8,426.6 433.8,50