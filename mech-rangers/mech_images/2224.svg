81" y="421.53264671145007" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x2224)"/><rect x="42.00623765675348" y="403.6786989199929" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x2224)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x2224)"/><circle cx="83.57212731171396" cy="415.5241798768751" r="15.0" fill="#ff44aa" opacity=".8" filter="url(#glowr1x2224)"/><circle cx="81.54302960880098" cy="413.6518281553872" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.66698124980551" y="456.1191405002028" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x2224)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x2224)"/><circle cx="-19.608548738304556" cy="473.0420875233598" r="18.0" fill="#ff44aa" filter="url(#glowr1x2224)" opacity=".88"/><circle cx="-18.27657390708107" cy="471.7028558398597" r="7.0" fill="#ffffff"/><rect x="77.33005169456821" y="502.0994123348966" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x2224)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x2224)"/><rect x="37.80587424015623" y="423.5288935340941" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="61.65601172832769" y1="485.6851418585516" x2="61.18889996739101" y2="521.0687563344836" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.62831045951691" y1="486.58039583973584" x2="78.38969499062743" y2="520.5956604286097" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.6611681760661" y1="488.13799149841066" x2="95.08623791508373" y2="520.6506819793955" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.2931926989928" y="556.7484970565885" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x2224)"/><rect x="422.33105963999407" y="574.9058794507757" width="152.0" height="26.0" fill="url(#bevelr1x2224)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x2224)"/><polygon points="306.8,380.6 350.2,293.8 500.0,276.3 650