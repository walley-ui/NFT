"  y="701.7" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x485)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x485)"/><rect x="748.5"  y="700.3" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x485)"/><rect x="122.2" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><rect x="755.5" y="699.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><rect x="151.4" y="701.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><rect x="783.1" y="698.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><rect x="180.6" y="701.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><rect x="814.5" y="700.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><rect x="211.9" y="700.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><rect x="843.6" y="699.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x485)" stroke="#ffcc00" stroke-width=".8" filter="url(#wmr1x485)"/><ellipse cx="183.4389780483581" cy="710.216959931217" rx="45.1" ry="30.0" fill="#ffcc00" fill-opacity=".25" filter="url(#glowr1x485)"/><ellipse cx="818.3699923303164" cy="709.6939277961663" rx="45.1" ry="30.0" fill="#ffcc00" fill-opacity=".25" filter="url(#glowr1x485)"/></g><rect x="450.6987112767063" y="558.4004513666033" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x485)"/><rect x="423.66843605879694" y="575.909314551577" width="152.0" height="26.0" fill="url(#bevelr1x485)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#sk