ter="url(#wmr1x5576)"/><rect x="828.3844984541275" y="421.0599769834429" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x5576)"/><rect x="838.180954137873" y="404.38463852284474" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x5576)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5576)"/><circle cx="878.5075277613104" cy="413.9213697103783" r="15.0" fill="#ffcc00" opacity=".8" filter="url(#glowr1x5576)"/><circle cx="876.2397966556811" cy="415.5666026468389" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="945.1453244671785" y="456.7914965143427" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x5576)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x5576)"/><circle cx="1019.8256037016027" cy="470.24336430439723" r="18.0" fill="#ffcc00" filter="url(#glowr1x5576)" opacity=".88"/><circle cx="1020.9225412129983" cy="469.77848645895716" r="7.0" fill="#ffffff"/><rect x="872.9638665062004" y="502.73850750969723" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x5576)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5576)"/><rect x="833.847235463243" y="423.6727733042091" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="859.4829852721282" y1="485.77396498117594" x2="859.0401397671178" y2="517.6206110211089" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="872.2659999375791" y1="486.4685804140754" x2="874.8736657497101" y2="520.9532560448162" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="888.0752633137256" y1="486.9512390094809" x2="891.2109873710759" y2="518.6730109849013" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.8934358392842" y="557.3489196942188" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5576)"/><rect x="424.86388392904774" y="576.640321533382" width="152.0" height="26.0" fill="url(#bevelr1x5576)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x5576)"/><polygon p