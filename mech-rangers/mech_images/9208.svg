dth="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x9208)" stroke="#00ffff" stroke-width="2" filter="url(#wmr1x9208)"/><rect x="35.79456725468856" y="421.2011087306775" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x9208)"/><rect x="40.55377765543756" y="402.3285407828167" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x9208)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x9208)"/><circle cx="80.913201484587" cy="416.1669105395674" r="15.0" fill="#00ffff" opacity=".8" filter="url(#glowr1x9208)"/><circle cx="82.23276457296681" cy="413.4034542854875" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.41404226854441" y="453.78942777626213" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x9208)" stroke="#00ffff" stroke-width="1.2" filter="url(#wmr1x9208)"/><circle cx="-21.268645421005818" cy="471.087109789066" r="18.0" fill="#00ffff" filter="url(#glowr1x9208)" opacity=".88"/><circle cx="-20.426925898492367" cy="471.9699915707111" r="7.0" fill="#ffffff"/><rect x="77.04432830721137" y="500.89294640095903" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x9208)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x9208)"/><rect x="37.01712851751593" y="422.5974859620444" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.85461400620636" y1="487.72491581197824" x2="62.601304142586855" y2="519.5741057637148" stroke="#00ffff" stroke-opacity=".5" stroke-width="1.2"/><line x1="79.30005175316703" y1="487.2169827174395" x2="77.06789114292708" y2="520.0704507052898" stroke="#00ffff" stroke-opacity=".5" stroke-width="1.2"/><line x1="93.32769396159794" y1="486.493232882116" x2="94.05449254740026" y2="520.0809686182998" stroke="#00ffff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.76107191042973" y="555.9150407880544" width="100.0"  height="56.0" fill="#08001e" stroke="#00ffff" stroke-width="2.2" filter="url(#skr1x9208)"/><rect x="425.25794096402825" y="573.5989796930925" width="152.0" height="26.0" fill="url(#bevelr