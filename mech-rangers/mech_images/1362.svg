 896.1,725.9 828.7,592.2" fill="url(#titaniumr1x1362)" stroke="#ff44aa" stroke-width="2.6" filter="url(#wmr1x1362)"/><polygon points="829.5,294.8 966.6,292.3 968.8,590.4 897.7,725.7 828.2,592.3" fill="url(#carbonr1x1362)"/><polygon points="860.3,361.4 936.6,360.6 936.6,540.6 897.3,631.4 860.4,542.7" fill="#ff44aa" fill-opacity=".28" stroke="#ff44aa" stroke-width="1.5"/><line x1="846.7493410418369" y1="431.93115886542944" x2="949.8112694670074" y2="432.1333375037648" stroke="#ff44aa" stroke-opacity=".65" stroke-width="1.3"/><line x1="899.42963065641" y1="332.3778614599257" x2="899.3571603846364" y2="592.4276028140448" stroke="#ff44aa" stroke-opacity=".4" stroke-width="1"/><line x1="829.6932595877536" y1="295.98453796394165" x2="964.9594073169493" y2="296.263248429168" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.4326813022234" cy="432.8711517811753" r="18.0" fill="url(#bevelr1x1362)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x1362)"/></g><rect x="449.2658392567188" y="556.3537290794775" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x1362)"/><rect x="423.32730865944177" y="573.6769830477424" width="152.0" height="26.0" fill="url(#bevelr1x1362)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x1362)"/><polygon points="307.1,378.8 349.2,295.0 498.8,278.5 650.1,295.4 692.7,379.3 668.2,503.2 501.0,566.5 331.4,503.5" fill="url(#suitr1x1362)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x1362) url(#metalr1x1362)"/><polygon points="308.9,380.2 350.4,294.5 500.9,279.6 648.2,293.5 691.2,381.4 668.6,504.9 500.1,563.3 330.4,505.0" fill="url(#carbonr1x1362)"/><polygon points="381.1,302.7 499.2,287.7 620.1,301.6 606.6,380.4 393.3,382.2" fill="url(#suitHir1x1362)"/><polygon points="380.9,380.3 366.0,425.9 431.6,504.4 499.9,526.9 567.5,504.9 633.8,424.3 617.9,381.8" fill="#050508" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x1362)"/><polygon po