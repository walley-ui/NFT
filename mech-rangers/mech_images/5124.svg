2,-28.6 897.8,-138.6" fill="url(#blader1x5124)" filter="url(#wmr1x5124)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x5124)" opacity=".9"/><line x1="905.7016427840107" y1="670.1866634694859" x2="898.4974934539013" y2="-127.45055887242782" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="889.4431063506938" y1="671.6580767811275" x2="895.2025391775184" y2="-129.23331827828662" stroke="#ffcc00" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="843.6246211673692" y="667.6992830806412" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x5124)" stroke="#ffcc00" stroke-width="1.6" filter="url(#wmr1x5124)"/><rect x="866.187202057112" y="674.8350115217269" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="884.209786280673" y="677.8542435128242" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="884.0568790751137" y="684.8286585095339" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="885.6626616723463" y="695.0594272963702" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="887.2818988938444" y="703.0720129192806" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="886.4567986703106" y="710.1805660144425" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="885.533452582229" y="717.9418262998573" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><ellipse cx="896.3287476668694" cy="726.3520633115432" rx="22.0" ry="16.0" fill="url(#bevelr1x5124)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x5124)"/></g><rect x="449.5498772227205" y="555.4301430912689" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5124)"/><rect x="425.6206691229716" y="577.1330775518902" width="152.0" height="26.0" fill="url(#bevelr1x5124)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x5124)"/><polygon points="309.4,380.0 350.0,292.9 501.5,277.0 649.9,294.3 693.2,379.8 670.1,504.9 499.6,566.0 330.2,504.8" fill="url(#suitr1x5124)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x5124) url(#metalr1x5124)"/><polygon points="309.5,381.0 350.0,294.1 499.7,278.7 650.5,293.9 691.8,381.8 667.3,502.4 498.6,564.5 329.9,504.1" fill="url(#carbonr1x5124)"/><polygon points="382.3,302.5 500.8,286.1 617.8,303.8 608.1,381.0 393.8,380.4" fill="url(#suitHir1x5124)"/><polygon points="381.1,380.3 367.3,424.7 432.2,504.2 501.2,529.6 568.2,504.8 633.1,424.3 620.4,381.3" fill="#0d1520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x5124)"/><polygon points="380.9,412.1 477.0,412.2 484.8,439.9 388.2,440.3" fill="#ffcc00" filter="url(#glowr1x5124)"/><polygon points="523.9,411.6 620.7,409.6 611.0,439.6 514.4,441.7" fill="#ffcc00" filter="url(#glowr1x5124)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.14138693815096" y1="412.41026698406785" x2="513.8369942495972" y2="412.2494450532831" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.1718576405756" y1="439.5667485494167" x2="513.9913731773756" y2="439.64514173213394" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="499.6525888806209" y1="455.17664147745813" x2="499.3880500385538" y2="483.263861271739" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5124)"/><line x1="452.5259213523753" y1="491.29018753562116" x2="453.123679707367" y2="521.6970299129374" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5124)"/><line x1="477.64730967808515" y1="492.9175322225317" x2="476.07439011590554" y2="518.2610044325702" s