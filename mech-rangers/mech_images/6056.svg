" fill="url(#blader1x6056)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x6056)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="911.2,691.8 945.2,691.4 986.8,271.0" fill="url(#blader1x6056)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x6056)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="864.9687689671852" y="680.4139885046519" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x6056)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x6056)"/></g><rect x="450.31703496482226" y="558.2744724775664" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6056)"/><rect x="423.75064240144565" y="574.9145943099633" width="152.0" height="26.0" fill="url(#bevelr1x6056)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x6056)"/><polygon points="309.1,381.9 350.8,293.2 501.0,279.8 650.8,293.4 691.2,380.6 668.6,504.1 498.4,565.8 330.2,504.7" fill="url(#suitr1x6056)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x6056) url(#metalr1x6056)"/><polygon points="308.1,379.5 351.7,294.6 501.6,277.0 648.6,294.5 692.2,379.2 670.0,502.4 499.0,566.2 329.7,503.6" fill="url(#carbonr1x6056)"/><polygon points="379.6,303.4 499.5,287.4 617.3,302.9 607.2,379.6 393.9,381.3" fill="url(#suitHir1x6056)"/><polygon points="380.2,381.9 366.1,424.0 433.1,502.8 500.7,529.2 566.1,502.7 634.1,424.0 617.9,381.0" fill="#0a0520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x6056)"/><polygon points="381.3,409.8 475.8,411.9 486.2,441.1 387.2,439.9" fill="#ff2040" filter="url(#glowr1x6056)"/><polygon points="523.9,412.6 620.3,411.4 612.2,438.9 516.3,438.3" fill="#ff2040" filter="url(#glowr1x6056)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><