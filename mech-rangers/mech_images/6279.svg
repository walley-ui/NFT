 filter="url(#wmr1x6279)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x6279)" opacity=".9"/><line x1="905.4798150351271" y1="672.6874843597412" x2="900.0641944267974" y2="-128.4615520451218" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="889.4065854815952" y1="671.06241778275" x2="896.0606680792757" y2="-127.65685491533952" stroke="#ccccff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="840.8031517455913" y="669.0256304395385" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x6279)" stroke="#ccccff" stroke-width="1.6" filter="url(#wmr1x6279)"/><rect x="867.3731672514789" y="672.8154496837407" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="884.2813344400004" y="677.1684724872931" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="884.3424578067475" y="685.9849306048825" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="886.8609157501347" y="692.2440746547654" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="884.5047756750696" y="701.1952061525545" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="887.5768091664278" y="708.1960073435679" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="886.613798258789" y="718.3133263853379" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><ellipse cx="899.3076575618796" cy="727.5315687650815" rx="22.0" ry="16.0" fill="url(#bevelr1x6279)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x6279)"/></g><rect x="449.9821194785647" y="555.5050538321026" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x6279)"/><rect x="422.69487991565836" y="575.0568513318897" wi