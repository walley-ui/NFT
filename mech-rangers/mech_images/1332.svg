 x2="86.8213718342967" y2="109.85923735536633" stroke="url(#chromer1x1332)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x1332)"/><line x1="97.63302363375199" y1="771.2645128032192" x2="86.62071639414873" y2="132.47401540763673" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="75.4,150.1 141.1,150.3 82.6,-10.0" fill="url(#blader1x1332)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x1332)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="84.80929758952928" y="420.98295238949356" width="40.0" height="20.0" fill="url(#bevelr1x1332)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x1332)"/><rect x="82.50726815102618" y="510.6611710965633" width="40.0" height="20.0" fill="url(#bevelr1x1332)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x1332)"/><rect x="84.8796630983613" y="601.5227435280568" width="40.0" height="20.0" fill="url(#bevelr1x1332)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x1332)"/><rect x="82.16920126028356" y="690.8072745637968" width="40.0" height="20.0" fill="url(#bevelr1x1332)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x1332)"/><ellipse cx="103.44710474167016" cy="790.736821879819" rx="22.0" ry="15.0" fill="url(#bevelr1x1332)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x1332)"/></g><rect x="449.9347254931927" y="557.7713085451163" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x1332)"/><rect x="423.8560342491604" y="573.8258032037877" width="152.0" height="26.0" fill="url(#bevelr1x1332)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x1332)"/><polygon points="308.4,382.0 351.7,293.5 500.2,279.1 651.2,294.8 690.6,382.2 667.2,502.8 499.9,565.5 331.2,504.9" fill="url(#suitr1x1332)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x1332) url(#metalr1x1332)"/><polygon points="306.8,378.9 350.2,294.8 499.7,277.0 649.9,296.2 