="636.4" y2="472.9" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x655)"/><line x1="398.2" y1="550.7" x2="600.8" y2="549.5" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x655)"/><line x1="265.0" y1="492.7" x2="319.7" y2="489.3" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.3" y1="491.4" x2="733.6" y2="491.6" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.2" y1="521.5" x2="318.7" y2="524.0" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.6" y1="523.0" x2="731.9" y2="523.3" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.2" y1="553.9" x2="319.6" y2="553.7" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.2" y1="555.1" x2="732.6" y2="553.0" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.2" y1="585.8" x2="318.9" y2="584.9" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.4" y1="587.5" x2="734.4" y2="587.1" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x655)"><polygon points="500.5,453.4 513.5,489.8 555.7,493.1 523.1,519.5 533.4,556.9 499.8,535.4 465.0,558.2 474.4,517.9 445.0,494.0 484.7,490.2 " fill="#ffcc00" stroke="#1e0600" stroke-width="1.4" filter="url(#skr1x655)"/><polygon points="500.5,453.4 513.5,489.8 555.7,493.1 523.1,519.5 533.4,556.9 499.8,535.4 465.0,558.2 474.4,517.9 445.0,494.0 484.7,490.2 " fill="url(#suitHir1x655)" opacity=".45"/></g><rect x="448.3092796199955" y="555.7091688107699" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x655)"/><rect x="422.6833453850821" y="575.9642192670144" width="152.0" height="26.0" fill="url(#bevelr1x655)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x655)"/><polygon points="307.9,381.9 349.7,294.7 499.5,277.0 649.1,294.7 690.3,380.3 667.3,503.6 501.8,566.8 329.6,503.7" fill="url(#suitr1x655)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x655) url(#metalr1x655)"/><polygon points="306.4,381.2 351.6,292.8 500.0,277.6 650.5,295.2 691.2,381.8 669.7,502.5 500.3,565.7 330.3,503.4" fill="url(#carbonr1x655)"/><polygon points="379.5,301.6 498.9,287.6 620.6,304.4 608.7,379.4 390.7,381.6" fill="url(#suitHir1x655)"/><polygon points="380.7,381.7 366.3,426.7 432.0,504.6 499.9,528.8 566.1,505.0 635.7,425.5 618.2,381.2" fill="#1e0600" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x655)"/><polygon points="382.2,412.5 476.6,410.7 483.0,439.3 386.9,440.9" fill="#ffcc00" filter="url(#glowr1x655)"/><polygon points="522.2,411.8 620.8,411.8 610.4,441.7 515.2,441.8" fill="#ffcc00" filter="url(#glowr1x655)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.7458314482681" y1="412.65522563410923" x2="514.4147247351148" y2="413.3282823753543" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.8216897701472" y1="437.6645093944855" x2="516.0339522486926" y2="437.9344366226345" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.38439919343216" y1="455.19862666213885" x2="501.0176657233387" y2="481.90201643137266" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x655)"/><line x1="455.3749299897626" y1="489.6597589889541" x2="454.39650998244065" y2="520.6114037505351" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x655)"/><line x1="477.01186187671493" y1="491.32086175903675" x2="478.0529463215172" y2="520.3650668624789" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x655)"/><line x1="499.1844662889838" y1="489.82154493918637" x2="499.28222424546254" y2="519.3412913578562" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x655)"/><line x1="521.8405953308195" y1="492.31690970500927" x2="524.