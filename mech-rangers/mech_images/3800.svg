-opacity=".38" stroke-width="1"/><line x1="845.5" y1="703.1" x2="844.5" y2="783.9" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><polygon points="235.6,418.3 766.0,416.1 723.7,663.1 278.3,661.3" fill="url(#suitr1x3800)" stroke="#ffd700" stroke-width="2.6" filter="url(#skr1x3800) url(#metalr1x3800)"/><polygon points="234.8,416.8 765.6,416.1 723.2,662.2 277.5,663.0" fill="url(#carbonr1x3800)"/><polygon points="366.6,418.5 633.8,418.3 611.1,516.6 388.3,514.0" fill="url(#suitHir1x3800)"/><line x1="360.7" y1="470.4" x2="639.2" y2="471.4" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3800)"/><line x1="400.5" y1="550.5" x2="600.5" y2="549.5" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3800)"/><line x1="267.6" y1="490.6" x2="318.1" y2="490.9" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.3" y1="489.5" x2="734.2" y2="490.2" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.4" y1="523.6" x2="321.1" y2="523.1" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.3" y1="524.3" x2="732.1" y2="523.0" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.2" y1="555.7" x2="319.2" y2="553.0" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.9" y1="555.4" x2="733.1" y2="555.0" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.8" y1="587.2" x2="318.6" y2="587.2" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.4" y1="587.8" x2="732.6" y2="586.5" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x3800)"><polygon points="481.1,453.1 514.1,505.4 498.6,506.3 515.9,570.0 488.3,516.3 501.7,516.3" fill="#ffd700" stroke="#1e0600" stroke-width="1.4" filter="url(#skr1x3800)"/><polygon points="481.5,452.0 511.2,504.5 500.5,504.9 517.7,568.0 488.0,516.2 499.4,515.5" fill="url(#suitHir1x3800)" opacity=".4"/></g><g><polygon points="828.5,294.4 968.5,292.4 969.5,590.2 896.3,725.8 829.0,591.5" fill="url(#titaniumr1x3800)" stroke="#ffd700" stroke-width="2.6" filter="url(#wmr1x3800)"/><polygon points="828.5,292.9 968.6,294.2 967.6,591.1 898.0,724.8 826.5,592.1" fill="url(#carbonr1x3800)"/><polygon points="858.3,362.1 936.5,360.6 936.8,542.6 898.1,631.6 861.5,542.3" fill="#ffd700" fill-opacity=".28" stroke="#ffd700" stroke-width="1.5"/><line x1="844.4075547571853" y1="432.2878370588645" x2="949.3300102613495" y2="433.1936909171752" stroke="#ffd700" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.8934957972356" y1="330.2345451047644" x2="897.2443316968717" y2="591.9232140558771" stroke="#ffd700" stroke-opacity=".4" stroke-width="1"/><line x1="830.9793984751776" y1="295.5767273222096" x2="965.6148745698482" y2="298.1362596337683" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="899.4218372215145" cy="432.0469420828856" r="18.0" fill="url(#bevelr1x3800)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x3800)"/></g><rect x="450.61442956058306" y="557.1755838661454" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x3800)"/><rect x="424.3957436499186" y="576.2163182055577" width="152.0" height="26.0" fill="url(#bevelr1x3800)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x3800)"/><polygon points="306.3,379.4 350.4,293.8 500.1,278.9 649.4,295.3 693.6,378.9 669.6,505.0 500.7,563.4 330.1,503.5" fill="url(#suitr1x3800)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x3800) url(#metalr1x3800)"/><polygon points="308.7,380.9 350.0,294.7 499.5,279.5 650.7,294.4 690.6,379.9 669.8,504.1 501.5,564.5 332.6,504.7" fill="url(#carbonr1x3800)"/><polygon points="379.6,302.4 498.9,287.3 619.7,302.1 605.9,378.9 390.7,378.9" fill="url(#suitHir1x3800)"/><polygon points="379.6,380.8 366.5,423.9 431.1,502.2 501.8,529.8 566.0,504.7 635.9,424.9 618.0,381.3" fill="#1e0600" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x3800)"/><polygon points="379.5,411.4 476.3,410.4 484.0,441.4 387.3,439.6" fill="#ffd700" filter="url(#glowr1x3800)"/><polygon points="524.5,409.7 620.2,412.8 611.5,441.2 514.1,440.6" fill="#ffd700" filter="url(#glowr1x3800)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.8113757980615" y1="414.76759215965865" x2="516.3270196307823" y2="414.8340727125294" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="486.12553273482246" y1="438.0709383456968" x2="516.6316943897307" y2="438.64234456876295" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="500.7091491785832" y1="455.7549533225596" x2="498.6253438799642" y2="483.6275257328525" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3800)"/><line x1="453.0130263856426" y1="492.59870456559577" x2="455.1421201875247" y2="518.5508047717624" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3800)"/><line x1="477.2242234788276" y1="491.75662948694077" x2="475.2165301030874" y2="519.1289808291942" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3800)"/><line x1="500.459189613536" y1="491.1846520941704" x2="500.3024305647239" y2="519.1771456948482" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3800)"/><line x1="524.6932436428591" y1="492.3774288455024" x2="521.5989494788088" y2="518.2170226789079" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3800)"/><line x1="544.5944505198114" y1="492.3115563376806" x2="546.6521474791878" y2="521.058324437961" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3800)"/><polygon points="431.7,502.5 568.8,505.4 555.2,558.3 447.7,558.6" fill="#503400" fill-opacity=".72" stroke="#ffd700" stroke-width="1.3" filter="url(#skr1x3800)"/><text x="30.0"  y="975.0" font-family="monospace" font-