lter="url(#wmr1x1157)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x1157)" opacity=".9"/><line x1="110.45627668181432" y1="672.4025300178677" x2="103.14532542983068" y2="-127.44087929138917" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.29319503242147" y1="672.6157441592775" x2="101.79461728900667" y2="-129.27405620189387" stroke="#ffcc00" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="47.26142834903669" y="670.4138262031599" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x1157)" stroke="#ffcc00" stroke-width="1.6" filter="url(#wmr1x1157)"/><rect x="69.6778297007456" y="672.6987868324853" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="91.57894747354086" y="675.6951118818484" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="89.79396481731904" y="686.8945698748342" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="88.71852223476392" y="692.1924414481036" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="88.4887523954175" y="701.8634224561974" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="89.51137148406353" y="708.4929300105199" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="88.64314165305343" y="716.9977857697755" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><ellipse cx="100.66499969599765" cy="727.5095053294673" rx="22.0" ry="16.0" fill="url(#bevelr1x1157)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x1157)"/></g><rect x="448.5588173531927" y="558.2925174536183" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x1157)"/><rect x="423.1735168630257" y="577.1142546304502" w