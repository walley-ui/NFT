0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.4,465.2 236.8,467.5 256.2,735.8 129.8,734.4" fill="url(#suitr1x230)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x230) url(#metalr1x230)"/><polygon points="175.1,431.3 254.6,432.6 242.8,511.0 159.4,511.3" fill="url(#bevelr1x230)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x230)"/><polygon points="161.4,622.4 243.1,622.9 240.4,661.3 166.3,660.4" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x230)"/><polygon points="766.7,468.2 845.9,466.6 871.2,735.7 741.1,735.3" fill="url(#suitr1x230)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x230) url(#metalr1x230)"/><polygon points="747.8,433.5 825.4,432.0 841.0,511.3 755.1,509.9" fill="url(#bevelr1x230)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x230)"/><polygon points="755.2,620.2 837.7,622.4 834.7,659.8 761.2,661.4" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x230)"/><rect x="119.7"  y="700.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x230)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x230)"/><rect x="746.9"   y="701.0" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x230)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x230)"/><line x1="148.9" y1="700.7" x2="148.2" y2="782.9" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="777.3" y1="700.6" x2="777.2" y2="784.0" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="180.8" y1="700.8" x2="182.8" y2="783.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="810.1" y1="702.0" x2="810.8" y2="782.3" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="215.1" y1="703.1" x2="217.0" y2="782.3" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="842.7" y1="702.6" x2="842.0" y2="785.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><polygon points