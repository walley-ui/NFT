lter="url(#wmr1x5359)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x5359)" opacity=".9"/><line x1="111.9914130577631" y1="671.1104431098327" x2="101.43943505985659" y2="-128.7520970510319" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.09175091199573" y1="670.5187147236429" x2="100.19724846629423" y2="-128.59018287947404" stroke="#2060ff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="44.759132027570125" y="668.6034215807914" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x5359)" stroke="#2060ff" stroke-width="1.6" filter="url(#wmr1x5359)"/><rect x="68.66216548116874" y="672.1353269897401" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="90.56473846802484" y="676.0932876901701" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="91.45997127316889" y="685.37969459733" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="88.41114281838756" y="691.7705200852826" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="89.87577909225595" y="701.4830485638231" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="90.7664874315634" y="710.3930504156276" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="88.60721584292125" y="715.992069872655" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><ellipse cx="103.54724925313141" cy="725.0119924344123" rx="22.0" ry="16.0" fill="url(#bevelr1x5359)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x5359)"/></g><rect x="449.6847949907184" y="557.239852666948" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x5359)"/><rect x="424.32435600822794" y="575.352501413878" width