.5815826077014 390.26059453422204 L500.442787416745 424.53302404331043 L538.6418114163913 392.1671285813675 L606.5603045709245 425.58052208656443" stroke="#ff2040" stroke-width="2.2" fill="none" filter="url(#skr1x6186)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".48">CRIMSON RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".32">MECH RANGERS</text></svg>