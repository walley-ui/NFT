lter="url(#wmr1x4988)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x4988)" opacity=".9"/><line x1="111.52296517536041" y1="672.5706078873015" x2="102.93052413649855" y2="-129.03376568183305" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.044194488693" y1="671.9114426082931" x2="102.50323355205353" y2="-127.58187441276388" stroke="#2060ff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="46.79300385046747" y="669.5845439455471" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x4988)" stroke="#2060ff" stroke-width="1.6" filter="url(#wmr1x4988)"/><rect x="71.20365393901241" y="674.8507197950036" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="88.395267310217" y="675.658238921687" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="91.31603585224596" y="687.1599245350808" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="89.66091966791075" y="693.5158240909687" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="88.6173560598306" y="702.7992364651524" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="91.33985150208693" y="708.788010102138" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="91.85287812747058" y="716.8261945778504" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><ellipse cx="101.10182259486984" cy="726.3614694774151" rx="22.0" ry="16.0" fill="url(#bevelr1x4988)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x4988)"/></g><rect x="451.0728245814331" y="557.6190158596262" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x4988)"/><rect x="425.30863617453724" y="574.8073992986232" width