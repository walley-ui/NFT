e-opacity=".52" stroke-width="1.3" filter="url(#skr1x59)"/><line x1="265.7" y1="489.2" x2="319.4" y2="491.7" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.5" y1="491.2" x2="733.5" y2="490.1" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.9" y1="523.0" x2="319.2" y2="524.1" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.0" y1="521.1" x2="733.6" y2="524.0" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.4" y1="555.8" x2="319.2" y2="554.5" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.6" y1="553.6" x2="733.1" y2="555.5" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.5" y1="587.7" x2="318.7" y2="586.8" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.6" y1="584.9" x2="732.7" y2="585.9" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x59)"><polygon points="498.8,453.8 541.9,510.9 499.9,568.8 457.2,512.3" fill="#2060ff" stroke="#0a0520" stroke-width="1.4" filter="url(#skr1x59)"/><polygon points="501.2,451.1 541.7,510.1 498.4,567.9 457.4,511.8" fill="url(#suitHir1x59)" opacity=".45"/></g><rect x="448.9716932871379" y="555.3327442943119" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x59)"/><rect x="423.8088522278704" y="574.4004325158894" width="152.0" height="26.0" fill="url(#bevelr1x59)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x59)"/><polygon points="306.6,381.8 351.9,292.8 499.2,278.3 648.3,293.9 691.7,380.5 667.9,505.3 500.3,565.4 331.2,504.1" fill="url(#suitr1x59)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x59) url(#metalr1x59)"/><polygon points="306.7,379.8 349.6,293.6 500.2,278.7 650.9,294.8 691.4,380.7 667.6,504.0 499.0,563.5 330.7,502.5" fill="url(#carbonr1x59)"/><polygon points="381.9,304.1 500.4,285.6 619.0,303.8 607.4,379.0 391.9,381.4" fill="url(#suitHir1x59)"/><poly