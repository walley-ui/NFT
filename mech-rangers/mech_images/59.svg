,557.8 447.8,556.8" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x59)"/><polygon points="313.9,304.5 360.7,304.9 339.5,197.1" fill="url(#bevelr1x59)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x59) url(#glowr1x59)"/><polygon points="396.6,304.4 443.1,304.5 420.3,207.0" fill="url(#bevelr1x59)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x59) url(#glowr1x59)"/><polygon points="476.2,305.8 521.7,305.4 500.8,223.0" fill="url(#bevelr1x59)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x59) url(#glowr1x59)"/><polygon points="557.7,304.4 602.2,304.6 581.8,210.3" fill="url(#bevelr1x59)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x59) url(#glowr1x59)"/><polygon points="637.0,303.6 684.6,304.3 662.0,194.0" fill="url(#bevelr1x59)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x59) url(#glowr1x59)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>