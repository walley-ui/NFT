.8" y="521.6" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#050508" stroke-width=".6"/></g><g><polygon points="31.7,293.4 172.1,294.2 173.9,593.0 100.5,726.5 31.5,592.1" fill="url(#titaniumr1x8992)" stroke="#4444ff" stroke-width="2.6" filter="url(#wmr1x8992)"/><polygon points="32.7,293.5 171.6,291.7 171.6,591.2 101.4,724.8 33.7,591.5" fill="url(#carbonr1x8992)"/><polygon points="63.3,362.2 140.4,362.9 140.1,540.5 102.9,631.1 64.0,542.9" fill="#4444ff" fill-opacity=".28" stroke="#4444ff" stroke-width="1.5"/><line x1="49.76423570629206" y1="430.0640389099717" x2="154.2310305927321" y2="432.47956576645373" stroke="#4444ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="101.6604205599427" y1="330.54140053736046" x2="102.507651948221" y2="591.9677004596218" stroke="#4444ff" stroke-opacity=".4" stroke-width="1"/><line x1="35.417329375948725" y1="294.6753069559112" x2="169.65471099022773" y2="294.76528462115675" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.14709677830335" cy="429.60249970313157" r="18.0" fill="url(#bevelr1x8992)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x8992)"/></g><rect x="450.6811368062161" y="557.1981655062176" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x8992)"/><rect x="425.5936923137866" y="575.1694461496547" width="152.0" height="26.0" fill="url(#bevelr1x8992)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x8992)"/><polygon points="307.3,381.1 348.6,295.0 499.3,278.1 648.3,293.8 692.7,380.7 668.5,505.3 499.1,565.9 331.2,503.2" fill="url(#suitr1x8992)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x8992) url(#metalr1x8992)"/><polygon points="308.5,378.9 349.8,293.1 499.6,278.7 651.4,295.9 691.0,381.5 669.2,505.3 501.4,565.0 330.2,505.0" fill="url(#carbonr1x8992)"/><polygon points="381.9,302.9 499.0,287.4 620.7,301.8 607.5,379.0 392.9,379.0" fill="url(#suitHir1x8992)"/><polygon points="382.5,380.9 364.1,427.4 433.1,505.1