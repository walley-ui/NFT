ints="867.2,690.7 898.5,692.4 833.6,272.8" fill="url(#blader1x2988)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x2988)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="913.0,691.7 943.5,690.2 985.8,271.5" fill="url(#blader1x2988)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x2988)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="865.0113037420065" y="680.8886208117008" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x2988)" stroke="#4444ff" stroke-width="1.4" filter="url(#wmr1x2988)"/></g><rect x="451.7295959201641" y="555.9334945679642" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x2988)"/><rect x="424.93918180987237" y="575.6179597574286" width="152.0" height="26.0" fill="url(#bevelr1x2988)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x2988)"/><polygon points="306.3,382.3 350.9,294.2 501.6,278.3 651.2,295.5 693.2,379.7 669.9,503.8 498.3,566.2 332.4,502.8" fill="url(#suitr1x2988)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x2988) url(#metalr1x2988)"/><polygon points="309.0,381.1 349.2,293.5 499.3,276.9 649.0,293.5 692.5,381.2 668.5,503.8 499.0,565.8 330.9,503.3" fill="url(#carbonr1x2988)"/><polygon points="381.6,301.8 501.2,287.6 618.3,303.9 608.4,379.8 391.6,380.0" fill="url(#suitHir1x2988)"/><polygon points="381.5,379.9 364.3,426.1 433.5,505.1 500.4,526.7 567.1,503.6 633.1,426.8 618.1,382.3" fill="#1e0600" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x2988)"/><polygon points="381.6,411.0 478.7,413.1 485.4,440.3 389.3,439.1" fill="#4444ff" filter="url(#glowr1x2988)"/><polygon points="522.1,410.4 620.8,411.2 611.0,441.1 516.4,440.6" fill="#4444ff" filter="url(#glowr1x2988)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  