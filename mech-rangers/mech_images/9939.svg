lter="url(#wmr1x9939)"/><rect x="34.86563103733581" y="420.4954540329054" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x9939)"/><rect x="42.45251022189852" y="402.9938225620426" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x9939)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x9939)"/><circle cx="82.93507305741306" cy="416.0513526016846" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x9939)"/><circle cx="81.11776552874592" cy="412.8610661273822" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="52.638631194215236" y="454.25175257362423" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x9939)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x9939)"/><circle cx="-18.704986996911497" cy="469.84479944836346" r="18.0" fill="#ff2040" filter="url(#glowr1x9939)" opacity=".88"/><circle cx="-18.23532086523253" cy="469.87993041435254" r="7.0" fill="#ffffff"/><rect x="78.06797230731692" y="501.3632873655297" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x9939)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x9939)"/><rect x="35.565958196055114" y="421.9708949212916" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="60.61511394767088" y1="484.6657776447944" x2="63.839323953855754" y2="520.6994348389096" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.40366359580305" y1="486.92453495999797" x2="79.72500486880537" y2="519.0926206171513" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.80746316727247" y1="485.2503998853266" x2="93.47812881920484" y2="518.5708455387503" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.23058010805397" y="555.4234543291851" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x9939)"/><rect x="425.005338294059" y="573.9569163119421" width="152.0" height="26.0" fill="url(#bevelr1x9939)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x9939)"/><polygon points="309.0,381.6 351.2,295.9 500.3,278.5 648.9,293.5 692.6,379.8 670.7,504.9 499.6,565.6 332.4,502.2" fill="url(#suitr1x9939)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x9939) url(#metalr1x9939)"/><polygon points="308.4,381.9 351.1,294.0 501.5,276.7 651.4,295.7 690.9,380.8 669.3,503.8 501.8,565.1 331.2,503.2" fill="url(#carbonr1x9939)"/><polygon points="381.3,302.0 499.6,285.1 617.8,303.3 607.9,380.7 392.1,379.9" fill="url(#suitHir1x9939)"/><polygon points="380.5,381.0 364.9,424.3 433.5,502.3 500.4,527.9 568.0,503.8 633.4,426.3 617.8,379.5" fill="#0a0520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x9939)"/><polygon points="382.3,409.9 478.3,410.7 483.4,440.3 387.1,441.3" fill="#ff2040" filter="url(#glowr1x9939)"/><polygon points="521.3,412.1 619.8,409.9 612.5,441.3 516.0,439.2" fill="#ff2040" filter="url(#glowr1x9939)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.06026164615525" y1="414.60197157841174" x2="516.1944712549821" y2="413.01533324634653" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="483.52461244869977" y1="436.4223673322238" x2="516.2043372487091" y2="438.5673949358985" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="501.585774676688" y1="456.1224186817184" x2="499.8309372359887" y2="483.0554773294367" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x9939)"/><line x1="454.7719985822961" y1="490.6220017387531" x2="452.90557439018045" y2="520.3664900224655" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9939)"/><line x1="478.10121821736914" y1="492.8110801772214" x2="477.0985937790386" y2="520.9745278622024" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9939)"/><line x1="498.4172260639258" y1="490.473368690256" x2="500.39545649178325" y2="520.8815612262115" stro