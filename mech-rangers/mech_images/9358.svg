oke="#ff44aa" stroke-width="1.8" filter="url(#wmr1x9358)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="910.3,691.2 944.4,693.1 986.8,272.4" fill="url(#blader1x9358)" stroke="#ff44aa" stroke-width="1.8" filter="url(#wmr1x9358)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="863.7417466437072" y="680.8742327309213" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x9358)" stroke="#ff44aa" stroke-width="1.4" filter="url(#wmr1x9358)"/></g><rect x="449.39400217300283" y="556.3511378367431" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x9358)"/><rect x="423.5058536819182" y="573.7934485303239" width="152.0" height="26.0" fill="url(#bevelr1x9358)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x9358)"/><polygon points="308.5,381.6 351.0,293.8 499.9,278.6 651.0,294.0 693.1,381.0 669.4,504.9 500.0,564.7 330.4,505.2" fill="url(#suitr1x9358)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x9358) url(#metalr1x9358)"/><polygon points="307.8,378.9 350.6,296.1 501.1,279.5 651.4,295.8 693.1,379.0 667.5,503.4 499.6,565.9 331.0,502.2" fill="url(#carbonr1x9358)"/><polygon points="381.8,303.8 499.8,284.9 619.3,304.4 608.9,381.3 392.7,380.8" fill="url(#suitHir1x9358)"/><polygon points="380.8,379.3 365.1,424.5 434.1,502.6 499.5,528.5 565.6,502.8 635.2,427.0 620.4,379.5" fill="#1e0600" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x9358)"/><polygon points="382.2,410.1 477.0,413.1 485.6,438.9 389.4,439.3" fill="#ff44aa" filter="url(#glowr1x9358)"/><polygon points="522.2,412.6 619.3,410.7 613.0,439.7 515.9,440.6" fill="#ff44aa" filter="url(#glowr1x9358)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.71046144725756" y1=