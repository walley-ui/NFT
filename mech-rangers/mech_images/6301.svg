2.6 172.9,589.9 101.7,728.1 30.6,592.8" fill="url(#titaniumr1x6301)" stroke="#ffd700" stroke-width="2.6" filter="url(#wmr1x6301)"/><polygon points="32.5,292.4 173.6,292.3 170.9,590.7 103.4,726.8 33.0,593.0" fill="url(#carbonr1x6301)"/><polygon points="65.3,362.2 138.6,362.9 139.8,543.2 100.8,630.9 64.6,541.6" fill="#ffd700" fill-opacity=".28" stroke="#ffd700" stroke-width="1.5"/><line x1="48.88127508614209" y1="431.85654599564145" x2="155.53744776736943" y2="429.6775400558486" stroke="#ffd700" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.3396161567792" y1="331.6580534073524" x2="100.56074044456702" y2="591.2362377285957" stroke="#ffd700" stroke-opacity=".4" stroke-width="1"/><line x1="34.44924743952227" y1="296.16677951300517" x2="170.80858279600736" y2="297.58850819924845" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.35250999325883" cy="430.6359783729538" r="18.0" fill="url(#bevelr1x6301)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x6301)"/></g><rect x="450.75195048535244" y="556.4154586539604" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x6301)"/><rect x="423.27575436588376" y="574.3518390642479" width="152.0" height="26.0" fill="url(#bevelr1x6301)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x6301)"/><polygon points="308.4,380.1 352.0,293.1 500.5,276.6 649.6,296.2 691.1,381.6 668.8,503.3 499.3,565.0 331.7,501.9" fill="url(#suitr1x6301)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x6301) url(#metalr1x6301)"/><polygon points="306.4,382.1 351.4,295.8 498.7,278.8 649.2,295.0 691.9,381.3 667.6,504.4 500.9,566.6 329.3,504.9" fill="url(#carbonr1x6301)"/><polygon points="382.4,301.6 500.9,287.2 619.7,301.6 609.0,380.5 392.8,381.6" fill="url(#suitHir1x6301)"/><polygon points="380.0,378.9 367.2,425.9 431.2,503.2 498.6,529.3 568.8,503.8 636.0,424.3 619.3,379.7" fill="#1e0600" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x