2" stroke-width="1.3" filter="url(#skr1x3380)"/><line x1="400.0" y1="548.4" x2="601.2" y2="550.7" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3380)"/><line x1="267.1" y1="491.1" x2="319.8" y2="490.0" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.8" y1="492.5" x2="734.1" y2="492.0" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.3" y1="522.8" x2="319.6" y2="521.6" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.6" y1="522.2" x2="734.5" y2="521.3" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.4" y1="554.3" x2="318.0" y2="555.0" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.7" y1="553.5" x2="732.4" y2="554.7" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.7" y1="585.0" x2="318.4" y2="588.1" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.6" y1="587.1" x2="733.7" y2="586.4" stroke="#4444ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x3380)"><polygon points="482.6,454.1 513.3,506.8 498.9,507.2 516.1,567.0 487.8,513.6 498.6,513.5" fill="#4444ff" stroke="#0a0520" stroke-width="1.4" filter="url(#skr1x3380)"/><polygon points="482.5,452.8 511.9,506.9 500.6,507.1 516.5,568.1 486.5,516.6 500.6,514.9" fill="url(#suitHir1x3380)" opacity=".4"/></g><rect x="450.3843212038279" y="555.325550737977" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x3380)"/><rect x="423.25622369414197" y="575.4941251352429" width="152.0" height="26.0" fill="url(#bevelr1x3380)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x3380)"/><polygon points="309.4,378.8 348.8,295.0 499.5,277.4 648.8,293.1 693.0,381.4 667.9,503.1 501.7,566.7 331.2,504.0" fill="url(#suitr1x3380)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x3380) url(#metalr1x3380)"/><polygon points="306.6,378.9 349.0,296.0 500.3,276.6 650.6,293