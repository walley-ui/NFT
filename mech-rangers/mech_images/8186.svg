oke-linecap="round" filter="url(#wmr1x8186)"/><line x1="902.5918021450378" y1="770.8873493432067" x2="912.4958609215543" y2="130.91873494544996" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.5,150.9 936.3,149.8 915.0,-6.8" fill="url(#blader1x8186)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x8186)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.205183851216" y="422.1932967926375" width="40.0" height="20.0" fill="url(#bevelr1x8186)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x8186)"/><rect x="879.2013565652632" y="512.4134465549141" width="40.0" height="20.0" fill="url(#bevelr1x8186)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x8186)"/><rect x="877.0443850831688" y="602.2461092442273" width="40.0" height="20.0" fill="url(#bevelr1x8186)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x8186)"/><rect x="879.4680593532138" y="693.0380044225603" width="40.0" height="20.0" fill="url(#bevelr1x8186)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x8186)"/><ellipse cx="899.4438769631647" cy="792.3588452040218" rx="22.0" ry="15.0" fill="url(#bevelr1x8186)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x8186)"/></g><rect x="449.49408655688165" y="557.2539460148662" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x8186)"/><rect x="423.54693489726634" y="575.1092462423258" width="152.0" height="26.0" fill="url(#bevelr1x8186)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x8186)"/><polygon points="307.3,379.9 348.5,293.7 499.9,276.8 649.8,295.7 692.1,382.0 668.8,501.9 499.0,566.0 331.8,505.3" fill="url(#suitr1x8186)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x8186) url(#metalr1x8186)"/><polygon points="307.1,381.2 350.5,294.7 499.7,278.7 649.9,296.2 693.0,379.0 669.0,504.8 500.0,565.2 329.5,504.9" fill="url(#carbonr1x8186)"/><polygon points="38