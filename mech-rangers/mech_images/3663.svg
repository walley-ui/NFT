="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="910.9,691.7 942.7,691.0 984.7,271.2" fill="url(#blader1x3663)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x3663)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.1334041797184" y="680.1319745344109" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x3663)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x3663)"/></g><rect x="448.6911087951623" y="557.0057650569826" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3663)"/><rect x="423.2146896280348" y="576.3478714709171" width="152.0" height="26.0" fill="url(#bevelr1x3663)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x3663)"/><polygon points="307.6,379.9 349.3,292.9 499.9,276.9 650.2,295.0 692.6,380.9 669.7,503.0 499.9,564.7 329.8,504.2" fill="url(#suitr1x3663)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x3663) url(#metalr1x3663)"/><polygon points="306.6,382.0 350.4,294.5 498.8,277.5 648.6,294.6 693.6,381.3 668.3,504.9 499.3,564.8 331.6,501.8" fill="url(#carbonr1x3663)"/><polygon points="379.5,303.4 500.1,284.9 618.5,303.4 608.1,379.7 393.5,380.7" fill="url(#suitHir1x3663)"/><polygon points="381.9,379.5 364.7,425.1 431.6,501.9 498.3,529.1 566.5,504.2 634.4,424.1 619.1,379.1" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x3663)"/><polygon points="382.2,409.9 475.6,411.8 486.1,441.2 387.2,440.5" fill="#ff2040" filter="url(#glowr1x3663)"/><polygon points="524.8,411.3 620.2,412.8 609.6,439.7 514.3,438.7" fill="#ff2040" filter="url(#glowr1x3663)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.5074429690465" y1="413.4420331723988" x2="516.152798752524" y2="413.13617624910546" stroke="#ff2040" stroke-opacity=".52" stroke-width=