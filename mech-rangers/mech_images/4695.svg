,379.7" fill="url(#suitHir1x4695)"/><polygon points="380.6,379.6 363.9,427.4 434.3,503.6 498.6,528.5 568.4,503.5 635.9,424.4 618.3,380.0" fill="#0d1520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x4695)"/><polygon points="381.7,411.8 476.6,410.3 484.0,441.5 388.4,438.5" fill="#ccccff" filter="url(#glowr1x4695)"/><polygon points="524.0,411.1 617.3,411.9 611.0,440.3 515.0,440.1" fill="#ccccff" filter="url(#glowr1x4695)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.1763313354552" y1="415.075812861789" x2="515.388228713479" y2="413.21802866924554" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="485.4336129211448" y1="437.9661411780864" x2="514.5372309564054" y2="438.4206097777002" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="501.3575572957285" y1="454.5966837727465" x2="500.6989446448162" y2="482.6992367149331" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x4695)"/><line x1="453.34517793346197" y1="493.0582489197142" x2="453.5362664706819" y2="519.4647496828809" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4695)"/><line x1="475.7089225313999" y1="491.48592982618135" x2="477.9019831785373" y2="518.3497084424831" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4695)"/><line x1="500.37720434190703" y1="492.07919260021293" x2="499.328280966077" y2="521.0357746155933" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4695)"/><line x1="524.0160467343032" y1="492.789332519751" x2="522.0499994739517" y2="519.618060644716" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4695)"/><line x1="544.6229791444913" y1="491.65770954722535" x2="547.2785689054243" y2="518.2759076290764" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1