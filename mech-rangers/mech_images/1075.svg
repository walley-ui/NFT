2" stroke-width="1.3" filter="url(#skr1x1075)"/><line x1="397.7" y1="551.6" x2="601.5" y2="548.1" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1075)"/><line x1="266.9" y1="489.8" x2="318.3" y2="489.8" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.4" y1="491.8" x2="733.1" y2="490.2" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.6" y1="524.4" x2="321.1" y2="522.4" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.6" y1="522.4" x2="733.6" y2="522.8" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.0" y1="553.5" x2="318.6" y2="554.0" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.1" y1="553.0" x2="731.7" y2="554.2" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.7" y1="587.7" x2="318.6" y2="585.6" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.1" y1="586.1" x2="733.4" y2="585.9" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x1075)"><circle cx="498.3" cy="500.2" r="31.3" fill="#ff2040" stroke="#050508" stroke-width="1.4" filter="url(#skr1x1075)"/><circle cx="488.2" cy="498.2" r="7.0" fill="#050508"/><circle cx="512.2" cy="498.0" r="7.0" fill="#050508"/><rect x="485.5" y="522.2" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#050508" stroke-width=".6"/><rect x="496.8" y="522.7" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#050508" stroke-width=".6"/><rect x="507.1" y="522.7" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#050508" stroke-width=".6"/></g><rect x="450.48135423967614" y="557.2540101640858" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x1075)"/><rect x="422.5186025567353" y="576.5176756645553" width="152.0" height="26.0" fill="url(#bevelr1x1075)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x1075)"/><polygon points="306.7,38