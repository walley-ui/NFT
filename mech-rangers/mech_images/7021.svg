url(#wmr1x7021)"/><polygon points="826.7,293.9 968.1,293.1 968.3,593.2 897.5,726.8 829.2,591.6" fill="url(#carbonr1x7021)"/><polygon points="858.9,362.3 934.8,360.0 934.8,543.1 899.5,629.8 860.9,543.0" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="845.5769707412087" y1="431.30649079587306" x2="950.6628403719143" y2="432.8889042438939" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.6525328288413" y1="330.5151452591642" x2="898.9332941562496" y2="592.7548481062055" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="831.2486141535081" y1="295.1546727307141" x2="967.4172906769068" y2="294.79901021691035" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.5368359860591" cy="430.5467454372905" r="18.0" fill="url(#bevelr1x7021)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x7021)"/></g><rect x="450.22680619116875" y="555.294075485412" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x7021)"/><rect x="422.8753903971985" y="576.2220346911811" width="152.0" height="26.0" fill="url(#bevelr1x7021)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x7021)"/><polygon points="308.0,380.0 349.7,296.2 500.2,277.7 649.6,295.2 691.9,380.8 669.9,505.2 499.2,563.5 331.9,502.5" fill="url(#suitr1x7021)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x7021) url(#metalr1x7021)"/><polygon points="307.8,379.3 349.9,293.3 500.7,276.4 649.0,293.2 693.2,380.4 669.7,504.5 501.3,565.6 330.2,503.8" fill="url(#carbonr1x7021)"/><polygon points="380.3,301.6 500.3,286.1 620.6,302.5 608.8,379.6 391.3,378.8" fill="url(#suitHir1x7021)"/><polygon points="380.3,380.2 366.0,426.6 434.3,503.8 501.2,528.4 567.9,504.8 634.2,424.3 618.7,380.8" fill="#0a0520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x7021)"/><polygon points="380.7,413.1 475.2,412.0 486.2,439.0 389.4,441.1" fill="#ff2040" filter="url(#glowr1x7021)"/