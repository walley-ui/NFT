e="#ffcc00" stroke-width="1.8" filter="url(#wmr1x6049)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="116.1,689.9 149.1,693.1 191.3,272.3" fill="url(#blader1x6049)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x6049)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="69.8522628681175" y="683.0644694411195" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x6049)" stroke="#ffcc00" stroke-width="1.4" filter="url(#wmr1x6049)"/></g><rect x="449.510616027005" y="557.7994358350522" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x6049)"/><rect x="422.61043848572297" y="575.2166624168866" width="152.0" height="26.0" fill="url(#bevelr1x6049)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x6049)"/><polygon points="308.3,379.6 351.8,294.6 500.6,276.6 649.0,293.1 691.6,379.4 668.9,502.4 498.8,563.8 332.0,502.9" fill="url(#suitr1x6049)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x6049) url(#metalr1x6049)"/><polygon points="306.3,381.2 350.4,294.0 500.7,277.5 650.9,293.8 691.7,379.3 668.8,503.8 499.8,566.3 331.8,503.7" fill="url(#carbonr1x6049)"/><polygon points="380.8,303.9 500.6,285.7 617.4,302.9 606.1,381.3 390.8,381.2" fill="url(#suitHir1x6049)"/><polygon points="380.7,381.2 364.7,424.0 433.2,504.0 499.9,527.1 568.6,501.8 634.4,424.4 617.9,381.2" fill="#1e0600" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x6049)"/><polygon points="381.1,411.9 477.9,411.3 483.0,439.5 388.9,441.7" fill="#ffcc00" filter="url(#glowr1x6049)"/><polygon points="522.8,411.4 619.2,410.4 610.7,441.5 514.8,438.5" fill="#ffcc00" filter="url(#glowr1x6049)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.3633866870403" y1="413.93