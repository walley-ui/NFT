ight="42.0" fill="url(#bevelr1x6049)" stroke="#ffcc00" stroke-width="1.4" filter="url(#glowr1x6049)"/><rect x="485.9" y="640.5" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.3,468.0 233.4,466.5 259.0,734.6 128.3,736.3" fill="url(#suitr1x6049)" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x6049) url(#metalr1x6049)"/><polygon points="172.4,433.4 254.8,431.1 244.8,510.5 161.1,511.4" fill="url(#bevelr1x6049)" fill-opacity=".72" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x6049)"/><polygon points="161.0,621.1 242.4,621.0 237.4,661.9 165.7,660.6" fill="#ffcc00" fill-opacity=".42" stroke="#ffcc00" stroke-width="1" filter="url(#skr1x6049)"/><polygon points="765.3,467.0 846.4,465.3 872.8,734.9 742.3,736.3" fill="url(#suitr1x6049)" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x6049) url(#metalr1x6049)"/><polygon points="746.7,431.2 826.5,433.7 839.3,509.8 756.7,511.7" fill="url(#bevelr1x6049)" fill-opacity=".72" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x6049)"/><polygon points="758.6,623.4 838.1,622.0 834.7,659.2 761.0,660.6" fill="#ffcc00" fill-opacity=".42" stroke="#ffcc00" stroke-width="1" filter="url(#skr1x6049)"/><rect x="120.8"  y="700.9" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x6049)" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x6049)"/><rect x="747.4"   y="699.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x6049)" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x6049)"/><line x1="149.7" y1="701.9" x2="148.9" y2="782.3" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="779.6" y1="700.8" x2="778.7" y2="784.5" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="182.7" y1="703.5" x2="181.3" y2="782.2" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="811.7" y1="701.3" x2="810.9" y2="782.8" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="216.3" y1="701.1" x2="213.6" y2="785.0" stroke="#ffcc00" stroke