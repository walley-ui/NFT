ffcc00" stroke-width="2.6" filter="url(#wmr1x7341)"/><rect x="42.33022371711206" y="394.68209325149655" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x7341)"/><rect x="17.735843915250122" y="446.60326041691" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x7341)" stroke="#ffcc00" stroke-width="1.4" filter="url(#wmr1x7341)"/><circle cx="117.78865934753787" cy="472.8282101772725" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x7341)"/><circle cx="118.99922565151003" cy="473.0656081084162" r="34.0" fill="#ffcc00" fill-opacity=".4" filter="url(#bloomr1x7341)"/><circle cx="119.82995268855241" cy="469.6182227964513" r="18.0" fill="#ffcc00" filter="url(#glowr1x7341)"/><rect x="47.810117468833894" y="379.9054709483869" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x7341)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x7341)"/><rect x="42.47472138958049" y="399.3368996045552" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="52.44852956304324" y1="519.4047932483255" x2="51.85571690643203" y2="549.3937888479792" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="77.57104326006022" y1="519.5986886007711" x2="75.78753921682012" y2="549.848750143405" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="100.97306471750137" y1="518.4945336471311" x2="100.83880974430588" y2="549.307821350079" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="124.72496144141999" y1="517.7236475842074" x2="125.76895612156015" y2="548.9505306524225" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.57573164040224" y="555.5122501980513" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x7341)"/><rect x="424.1527189379558" y="576.9704375904985" width="152.0" height="26.0" fill="url(#bevelr1x7341)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x7341)"/><polygon points="307.5,380.3 350.0