illeryr1x248)" stroke="#2060ff" stroke-width="2.6" filter="url(#wmr1x248)"/><rect x="837.207804639414" y="396.9307178214192" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x248)"/><rect x="981.2488709476404" y="446.0093048442155" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x248)" stroke="#2060ff" stroke-width="1.4" filter="url(#wmr1x248)"/><circle cx="881.621332685426" cy="470.3702166045084" r="48.0" fill="rgba(0,0,0,.55)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x248)"/><circle cx="880.7704649040103" cy="472.0697962957434" r="34.0" fill="#2060ff" fill-opacity=".4" filter="url(#bloomr1x248)"/><circle cx="881.4039002565295" cy="472.9988986197859" r="18.0" fill="#2060ff" filter="url(#glowr1x248)"/><rect x="843.1872073226236" y="380.58182613113894" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x248)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x248)"/><rect x="840.422536522951" y="397.03885951023545" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="848.2002718573063" y1="518.6394289317541" x2="849.0245764756203" y2="551.0941541766748" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/><line x1="871.3030759366789" y1="518.31631926978" x2="872.4838810152002" y2="550.3996383124031" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/><line x1="897.3998142914475" y1="519.2850335696712" x2="895.9653640169278" y2="549.1021363076753" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/><line x1="918.875146670416" y1="520.2635558035224" x2="918.8167131636851" y2="548.0878973779269" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.15370116867126" y="555.6690535108559" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x248)"/><rect x="425.7070220434107" y="574.2834308412857" width="152.0" height="26.0" fill="url(#bevelr1x248)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x248)"/><polygon points="308.2,379.0 348.6,292.9 498.7,277.0 650.7,293.1 691.2,378.8 670.1,502.3 499.2,565.8 331.3,502.3" fill="url(#suitr1x248)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x248) url(#metalr1x248)"/><polygon points="307.3,381.4 349.8,292.8 499.8,276.8 649.6,292.8 692.7,381.2 668.5,504.1 501.8,564.5 330.1,504.3" fill="url(#carbonr1x248)"/><polygon points="381.9,303.7 501.7,285.6 617.6,304.3 608.0,381.2 391.4,379.9" fill="url(#suitHir1x248)"/><polygon points="382.2,381.0 364.7,424.9 432.3,503.5 499.0,526.7 568.5,504.0 633.1,424.0 620.1,381.4" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x248)"/><polygon points="381.6,411.9 477.2,410.3 483.8,441.2 388.5,440.1" fill="#2060ff" filter="url(#glowr1x248)"/><polygon points="523.6,412.2 619.9,412.4 612.8,441.4 513.9,440.2" fill="#2060ff" filter="url(#glowr1x248)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.30594832250847" y1="414.05115843666715" x2="514.2591585233249" y2="414.60354453809555" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.2724848405085" y1="437.3439994116314" x2="514.4479746067337" y2="436.8661459878087" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.4927798265591" y1="455.1645988359116" x2="501.7718537208624" y2="484.0387969790958" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x248)"/><line x1="455.02308932121844" y1="491.84968236936254" x2="452.8930466619134" y2="519.9993441236205" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x248)"/><line x1="476.01854662815106" y1="490.4306221324019" x2="476.91438023302703" y2="520.9783689950593" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x248)"/><line x1="500.07091434327884" y1="491.8890511350706" x2="500.38913505068047" y2="519.5825858606025" stroke="#2060ff" stroke-opacity=".52" s