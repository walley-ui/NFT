idth="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x5199)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x5199)"/><rect x="829.2435894122906" y="421.48736374275757" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x5199)"/><rect x="836.7129295207188" y="403.9373426211998" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x5199)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x5199)"/><circle cx="878.6316391614824" cy="415.26562561308964" r="15.0" fill="#4444ff" opacity=".8" filter="url(#glowr1x5199)"/><circle cx="876.5711474735849" cy="415.30337374536316" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="946.7665704662539" y="454.59307377682995" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x5199)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x5199)"/><circle cx="1018.7537555339374" cy="470.69386733090505" r="18.0" fill="#4444ff" filter="url(#glowr1x5199)" opacity=".88"/><circle cx="1018.7143234731258" cy="469.94841900719325" r="7.0" fill="#ffffff"/><rect x="874.7660133001954" y="502.9767677400261" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x5199)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x5199)"/><rect x="832.0664394804836" y="424.83192502083256" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="858.4361378581822" y1="484.63802031781523" x2="857.3671064642817" y2="519.4510008473881" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="872.9009388954006" y1="485.26590115828435" x2="875.623398919087" y2="518.3969547649846" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="891.0704398005829" y1="485.3299870483577" x2="889.4804977447353" y2="519.8145745299756" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.935818003118" y="556.8295285237953" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x5199)"/><rect x="425.4945693367161" y="575.0795933504589" width="152.0" height="26.0" fill="url(#bevelr1x5199)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x5199)"/><polygon points="309.1,379.4 350.0,293.8 499.4,279.2 649.5,294.5 692.4,381.5 668.7,504.8 499.1,565.9 332.8,502.0" fill="url(#suitr1x5199)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x5199) url(#metalr1x5199)"/><polygon points="307.3,380.2 350.6,296.3 499.5,276.4 650.9,294.8 693.7,379.8 668.2,504.8 500.1,564.2 330.1,505.1" fill="url(#carbonr1x5199)"/><polygon points="381.5,304.2 498.6,285.0 617.8,303.8 609.3,381.7 391.1,381.8" fill="url(#suitHir1x5199)"/><polygon points="382.1,378.8 364.2,424.8 431.1,502.1 500.0,527.2 566.0,503.6 633.8,425.8 618.8,381.1" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x5199)"/><polygon points="380.2,411.9 476.9,411.6 483.8,439.9 389.0,439.9" fill="#4444ff" filter="url(#glowr1x5199)"/><polygon points="522.2,411.2 618.0,412.0 611.1,441.2 514.4,441.6" fill="#4444ff" filter="url(#glowr1x5199)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.79434658536684" y1="414.3039233660325" x2="515.6688737672195" y2="413.2798424910754" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.40772225499154" y1="439.7632005021907" x2="514.5196374740824" y2="439.3188462395221" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="498.3774438432418" y1="453.60099189085884" x2="499.82764251017943" y2="483.121550154686" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5199)"/><line x1="453.9959665329009" y1="490.44001648984846" x2="455.71869842203336" y2="518.9305739508942" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5199)"/><line x1="478.7339422698505" y1="489.5899103795178" x2="476.06844987370073" y2="518.7183713819832" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5199)"/><line x1="500.17637700298803" y1="490.0551612431183" x2="498.63975269505755" y2="520.1270061859861" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5199)"/><line x1="524.4542886114307" y1="490.9430029740557" x2="522.3938014765829" y2="521.2924142490141" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5199)"/><line x1="547.5567212993466" y1="489.583003222756" x2="545.2625906177052" y2="518.6233132004738" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5199)"/><polygon points="431.5,503.6 568.2,502.5 553.3,556.5 444.8,557.1" fill="#141428" fill-opacity=".72" stroke="#4444ff" stroke-width="1.3" filter="url(#skr1x5199)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#4444ff" fill-opacity=".48">OBSIDIAN RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#4444ff" fill-opacity=".32">MECH RANGERS</text></svg>