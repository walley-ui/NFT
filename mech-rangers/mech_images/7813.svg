ine x1="903.2147506922112" y1="812.3227898968383" x2="902.460996477455" y2="131.86382179269566" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="882.5805684827827" y="621.7506234644912" width="32.0" height="18.0" fill="url(#bevelr1x7813)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7813)"/><rect x="882.8359441822023" y="440.47528306925665" width="32.0" height="18.0" fill="url(#bevelr1x7813)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7813)"/><rect x="880.3161677922682" y="262.81183571368456" width="32.0" height="18.0" fill="url(#bevelr1x7813)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7813)"/><circle cx="897.3970015235805" cy="110.79377827560526" r="58.0" fill="rgba(0,0,0,.52)" stroke="#ff2040" stroke-width="2.2" filter="url(#wmr1x7813)"/><circle cx="896.2320017095283" cy="111.21881722025572" r="46.0" fill="url(#orbr1x7813)" filter="url(#bloomr1x7813)"/><circle cx="896.1803397085146" cy="110.81818710938094" r="20.0" fill="#ff2040" filter="url(#glowr1x7813)"/><circle cx="896.5237055621669" cy="111.41408954337237" r="66.0" fill="none" stroke="#ff2040" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="897.2622059167921" cy="112.87570700440554" rx="66.0" ry="30.0" fill="none" stroke="#ff2040" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="449.3139677147381" y="558.4135328796692" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x7813)"/><rect x="424.54273737836627" y="575.7562069749459" width="152.0" height="26.0" fill="url(#bevelr1x7813)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x7813)"/><polygon points="307.3,379.3 350.4,294.1 498.4,278.3 648.1,295.0 693.3,380.0 667.5,503.4 501.5,563.6 329.5,504.2" fill="url(#suitr1x7813)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x7813) url(#metalr1x7813)"/><polygon points="307.5,379.5 350.8,295.