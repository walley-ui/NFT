.62020027488467" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="486.1243790245242" y1="437.0950288675725" x2="515.2533038502" y2="439.3250241388567" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.60134830409663" y1="455.72451284946874" x2="498.39061518767846" y2="482.4468299325556" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5577)"/><line x1="453.35102291366087" y1="492.17580161569634" x2="453.7606043489464" y2="520.0154579712078" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5577)"/><line x1="475.4361562227271" y1="489.87224437166003" x2="476.1646146189794" y2="519.7018535525538" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5577)"/><line x1="498.61132071036843" y1="490.24024022314694" x2="499.7762081172317" y2="518.9540267732925" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5577)"/><line x1="524.3892039580829" y1="489.85427712937815" x2="523.9137270100042" y2="520.326507369522" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5577)"/><line x1="544.3800350371004" y1="489.7579723275266" x2="546.6165329452791" y2="520.5742906941101" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5577)"/><polygon points="434.4,504.0 568.7,504.8 554.6,555.1 447.9,555.9" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x5577)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>