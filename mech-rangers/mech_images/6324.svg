.4" y="521.8" width="9.3" height="17.4" rx="1" fill="#ccccff" stroke="#0d1520" stroke-width=".6"/></g><g><polygon points="72.9,691.7 102.5,690.5 37.7,269.8" fill="url(#blader1x6324)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x6324)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="115.8,692.0 147.1,689.9 191.9,270.0" fill="url(#blader1x6324)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x6324)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="68.81828977162016" y="682.2490862523206" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x6324)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x6324)"/></g><rect x="450.0861499836668" y="555.2154433136806" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x6324)"/><rect x="425.5645478882827" y="576.5701842981391" width="152.0" height="26.0" fill="url(#bevelr1x6324)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x6324)"/><polygon points="308.2,381.2 350.8,295.2 500.6,279.8 648.9,294.3 693.5,380.9 669.3,503.4 501.6,564.7 331.5,505.0" fill="url(#suitr1x6324)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x6324) url(#metalr1x6324)"/><polygon points="308.9,382.3 351.7,293.2 499.2,279.4 650.3,295.6 690.9,380.4 668.0,503.2 500.2,564.5 332.8,501.8" fill="url(#carbonr1x6324)"/><polygon points="380.7,304.4 499.2,284.9 617.7,302.2 608.8,381.7 391.7,381.1" fill="url(#suitHir1x6324)"/><polygon points="380.0,380.0 365.3,424.9 432.3,505.2 501.1,527.9 565.5,503.7 636.0,425.9 620.0,381.0" fill="#0d1520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x6324)"/><polygon points="381.1,410.7 478.6,410.5 485.9,440.7 390.1,441.7" fill="#ccccff" filter="url(#glowr1x6324)"/><polygon points="524.2,410.4 618.4,412.7 609.7,439.7 516.7,440.3" fill="#ccccff" filter="url(#glowr1x6324)"/><ellipse cx=