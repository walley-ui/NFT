roke-linecap="round" filter="url(#wmr1x9355)"/><line x1="97.91648366836827" y1="769.8621117614209" x2="87.49365733586248" y2="131.73907018108292" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="73.7,149.8 138.7,150.6 83.4,-9.0" fill="url(#blader1x9355)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#wmr1x9355)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="83.05151207506654" y="421.2713241053745" width="40.0" height="20.0" fill="url(#bevelr1x9355)" stroke="#c0c0d0" stroke-width="1" filter="url(#wmr1x9355)"/><rect x="83.24870735680682" y="512.9281466591171" width="40.0" height="20.0" fill="url(#bevelr1x9355)" stroke="#c0c0d0" stroke-width="1" filter="url(#wmr1x9355)"/><rect x="81.89891025921327" y="601.437069499027" width="40.0" height="20.0" fill="url(#bevelr1x9355)" stroke="#c0c0d0" stroke-width="1" filter="url(#wmr1x9355)"/><rect x="84.48156406827268" y="691.2273330410942" width="40.0" height="20.0" fill="url(#bevelr1x9355)" stroke="#c0c0d0" stroke-width="1" filter="url(#wmr1x9355)"/><ellipse cx="103.34147989213463" cy="791.1315467286855" rx="22.0" ry="15.0" fill="url(#bevelr1x9355)" stroke="#c0c0d0" stroke-width="1" filter="url(#wmr1x9355)"/></g><rect x="449.0298956536688" y="555.247253932897" width="100.0"  height="56.0" fill="#2c2c3c" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x9355)"/><rect x="425.41387809179724" y="574.8373159555719" width="152.0" height="26.0" fill="url(#bevelr1x9355)" fill-opacity=".65" stroke="#c0c0d0" stroke-width="1.2" filter="url(#skr1x9355)"/><polygon points="306.4,381.8 350.7,295.2 501.4,276.8 650.9,294.1 692.2,379.3 670.1,502.8 499.6,563.7 329.9,505.3" fill="url(#suitr1x9355)" stroke="#c0c0d0" stroke-width="2.8" filter="url(#skr1x9355) url(#metalr1x9355)"/><polygon points="307.7,381.9 349.5,293.6 498.5,278.2 648.4,295.3 693.3,381.9 667.8,505.0 499.7,566.8 331.2,502.7" fill="url(#carbonr1x9355)"/><polygon points="380.5,302.1 498.6,287.6 620.2,301.8 608.7,380.3 392.7,380.4" fill="url(#suitHir1x9355)"/><polygon points="382.4,380.4 366.7,427.1 433.9,503.7 500.0,529.0 567.3,502.4 635.4,424.2 618.2,380.8" fill="#0a0520" fill-opacity=".88" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x9355)"/><polygon points="382.0,411.7 475.5,409.8 485.2,440.9 388.7,440.7" fill="#c0c0d0" filter="url(#glowr1x9355)"/><polygon points="522.2,412.3 619.8,411.2 612.2,440.1 513.9,440.9" fill="#c0c0d0" filter="url(#glowr1x9355)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.56024054182694" y1="412.47945232680064" x2="513.8161473240144" y2="413.8536710908636" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="485.09795565908775" y1="439.6903448372148" x2="515.8230611509085" y2="436.43164013028144" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="500.0885520376265" y1="455.8502066649496" x2="501.21081759091464" y2="482.52096371538937" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x9355)"/><line x1="452.3339094479382" y1="490.4509462191723" x2="452.40799507254735" y2="521.5069581315853" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9355)"/><line x1="478.5785713614337" y1="491.11860214648766" x2="475.76282727740704" y2="519.0963150672615" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9355)"/><line x1="501.7804054246284" y1="491.0471789596602" x2="499.0665619764477" y2="519.8957147101871" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9355)"/><line x1="524.6994836127012" y1="492.67506584506475" x2="524.5596874035522" y2="518.4019159427844" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9355)"/><line x1="546.7035834923573" y1="490.17236261488864" x2="547.3488207548112" y2="519.7451279473491" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9355)"/><polygon points="431.4,503.9 567.3,505.1 554.2,558.1 445.0,555.4" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x9355)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".48">CHROME RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".32">MECH RANGERS</text></svg>