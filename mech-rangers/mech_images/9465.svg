.8,292.0 173.1,592.0 100.6,724.9 31.5,589.6" fill="url(#carbonr1x9465)"/><polygon points="62.9,361.3 139.7,360.5 141.2,540.8 100.7,630.7 65.9,540.4" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="50.38798870503899" y1="433.12192011522126" x2="154.19489957684647" y2="432.86505387956277" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.36374645898115" y1="331.2302723381668" x2="100.46218850141388" y2="590.5762227232568" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="35.12165431253609" y1="296.4512301142327" x2="168.6139079460315" y2="296.7507637917995" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.1514002779871" cy="430.34271109504624" r="18.0" fill="url(#bevelr1x9465)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x9465)"/></g><rect x="448.76383272428063" y="555.6697666280903" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x9465)"/><rect x="424.26470178626477" y="574.9211746303365" width="152.0" height="26.0" fill="url(#bevelr1x9465)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x9465)"/><polygon points="308.4,380.6 349.3,292.9 499.2,278.3 650.1,293.2 691.2,381.3 668.8,503.8 501.5,566.8 331.7,502.0" fill="url(#suitr1x9465)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x9465) url(#metalr1x9465)"/><polygon points="306.4,379.8 351.7,294.6 501.5,276.7 649.0,295.0 692.0,379.1 668.2,505.1 499.8,565.6 329.9,505.2" fill="url(#carbonr1x9465)"/><polygon points="380.1,303.6 499.6,285.6 619.6,304.3 607.6,380.9 392.1,379.5" fill="url(#suitHir1x9465)"/><polygon points="382.2,379.1 367.1,427.3 434.4,502.8 498.2,528.1 566.8,501.9 632.8,427.5 620.0,381.2" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x9465)"/><polygon points="380.4,409.8 477.5,410.8 483.3,441.1 389.0,439.3" fill="#2060ff" filter="url(#glowr1x9465)"/><polygon points="522.3,411.1 619.1,411.5 611.5