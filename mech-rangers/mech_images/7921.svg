r1x7921)"/><rect x="423.1395292506553" y="575.4471770662815" width="152.0" height="26.0" fill="url(#bevelr1x7921)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x7921)"/><polygon points="307.3,381.9 351.9,292.9 501.4,277.4 650.7,295.3 693.0,380.0 669.9,503.4 498.7,565.6 329.4,504.8" fill="url(#suitr1x7921)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x7921) url(#metalr1x7921)"/><polygon points="306.8,380.3 351.2,295.6 501.7,276.7 649.7,293.1 692.5,379.2 670.7,503.0 500.5,564.7 329.4,503.4" fill="url(#carbonr1x7921)"/><polygon points="381.1,301.4 498.7,285.6 618.2,303.8 607.6,381.8 390.7,381.3" fill="url(#suitHir1x7921)"/><polygon points="379.6,379.3 364.3,426.5 433.5,504.7 500.1,528.8 566.4,502.7 634.4,425.4 619.9,381.7" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x7921)"/><polygon points="381.5,410.0 475.4,411.4 485.7,439.2 388.4,440.4" fill="#2060ff" filter="url(#glowr1x7921)"/><polygon points="521.6,411.8 617.7,413.1 611.1,441.2 514.0,441.3" fill="#2060ff" filter="url(#glowr1x7921)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.0272446146794" y1="413.65643057618286" x2="516.7726075771637" y2="414.92360563902184" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="486.3330149779655" y1="439.5608567931689" x2="517.13657956779" y2="436.48090346194806" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.43579306975005" y1="454.6413034252822" x2="500.0102113264613" y2="482.1425480786711" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x7921)"/><line x1="453.9188442587666" y1="489.6600251118652" x2="455.47263559538874" y2="519.1273535723798" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7921)"/><line x1="477.2250318530388" y1="492.5118581404909" x2="476.5678049469739" y2="519.38