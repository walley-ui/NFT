lter="url(#wmr1x1360)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x1360)" opacity=".9"/><line x1="112.25835792094466" y1="671.8114109289833" x2="101.44021601853889" y2="-128.0065635437146" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="91.68594446722415" y1="670.4450408189557" x2="101.78899798568334" y2="-126.91164462510498" stroke="#ff2040" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="45.3012935633212" y="667.8242585536092" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x1360)" stroke="#ff2040" stroke-width="1.6" filter="url(#wmr1x1360)"/><rect x="70.66299592725929" y="672.6223179847002" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="91.58032229928297" y="679.06096883649" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="90.53299026716498" y="684.8707572015934" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="88.52024613091719" y="691.6774091908708" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="89.48951975436879" y="699.7791637075134" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="89.77962192254138" y="708.0728465853259" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="89.43232552962374" y="718.2185122630559" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><ellipse cx="101.52939634941515" cy="727.8539568080566" rx="22.0" ry="16.0" fill="url(#bevelr1x1360)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x1360)"/></g><rect x="449.5998270682991" y="555.934428855963" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x1360)"/><rect x="425.2778729286045" y="575.3798746351152" widt