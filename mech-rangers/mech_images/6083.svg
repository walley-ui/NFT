" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x6083)"/><line x1="904.6081134415791" y1="770.2336863888428" x2="913.0157470861078" y2="131.6385563034564" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.7,152.8 935.0,150.4 916.1,-6.9" fill="url(#blader1x6083)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x6083)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="878.1898975523748" y="420.3105078230612" width="40.0" height="20.0" fill="url(#bevelr1x6083)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x6083)"/><rect x="877.817438007202" y="511.55438540950416" width="40.0" height="20.0" fill="url(#bevelr1x6083)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x6083)"/><rect x="878.9110694654845" y="601.4366977775469" width="40.0" height="20.0" fill="url(#bevelr1x6083)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x6083)"/><rect x="877.3102277872712" y="693.1694989274256" width="40.0" height="20.0" fill="url(#bevelr1x6083)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x6083)"/><ellipse cx="896.6358773972466" cy="792.8321814374998" rx="22.0" ry="15.0" fill="url(#bevelr1x6083)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x6083)"/></g><rect x="448.56540312264116" y="557.1225996039808" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x6083)"/><rect x="425.0348302542232" y="574.0147017005831" width="152.0" height="26.0" fill="url(#bevelr1x6083)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x6083)"/><polygon points="309.8,381.7 350.1,295.9 501.4,276.4 648.7,296.1 692.3,380.0 667.6,502.5 499.6,564.8 331.0,504.6" fill="url(#suitr1x6083)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x6083) url(#metalr1x6083)"/><polygon points="308.7,380.9 348.7,295.3 499.1,277.5 651.1,293.1 692.3,379.3 668.3,503.7 499.4,565.6 330.1,504.5" fill="url(#carbonr1x6083)"/><polygon points="381.2,304.5 498.5,287.5 619.8,300.9 608.3,380.2 392.0,380.1" fill="url(#suitHir1x6083)"/><polygon points="379.3,381.3 366.4,424.4 433.6,504.7 499.2,529.2 568.9,502.6 634.4,427.0 619.4,380.4" fill="#0a0520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x6083)"/><polygon points="382.5,410.5 477.0,410.6 483.4,438.7 387.8,440.3" fill="#ccccff" filter="url(#glowr1x6083)"/><polygon points="523.3,412.1 619.0,410.7 609.8,439.4 513.9,440.0" fill="#ccccff" filter="url(#glowr1x6083)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.9808477975987" y1="413.0261524787172" x2="516.3049600650929" y2="411.7971352807246" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="485.2441704656556" y1="437.98800595086067" x2="516.0613557126745" y2="437.4574382283725" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="501.5950196811929" y1="454.7833508702926" x2="499.6507966386154" y2="481.6051703565754" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6083)"/><line x1="452.54892116894945" y1="492.4270593992434" x2="454.12912260506306" y2="519.4982622349635" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6083)"/><line x1="475.16958332745355" y1="489.6967999015003" x2="478.5134714597277" y2="519.8471236046404" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6083)"/><line x1="498.8646119997837" y1="489.6432780919596" x2="499.8387343974784" y2="518.6110283705406" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6083)"/><line x1="524.0403278991207" y1="492.3378204361535" x2="523.6206678513996" y2="518.7464199046605" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6083)"/><line x1="546.0844664236718" y1="491.74563329918305" x2="546.0710960182548" y2="520.1149793208576" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6083)"/><polygon points="433.3,504.5 565.8,502.0 553.9,556.4 447.0,555.2" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x6083)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>