roke-width="2.6" filter="url(#wmr1x6453)"/><polygon points="826.6,295.2 967.9,292.4 967.9,591.8 898.5,726.9 826.1,589.6" fill="url(#carbonr1x6453)"/><polygon points="859.5,362.9 935.6,363.1 935.5,542.8 898.9,632.5 860.5,541.0" fill="#ffd700" fill-opacity=".28" stroke="#ffd700" stroke-width="1.5"/><line x1="847.411444058884" y1="432.7587941880338" x2="950.4281735523232" y2="431.4827717246487" stroke="#ffd700" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.5385886991024" y1="332.32947742845863" x2="899.3276284142956" y2="590.3470953475684" stroke="#ffd700" stroke-opacity=".4" stroke-width="1"/><line x1="829.1232948064431" y1="297.893894378934" x2="966.9142602111772" y2="298.0426541819237" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="899.4577591633984" cy="431.3975803004578" r="18.0" fill="url(#bevelr1x6453)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x6453)"/></g><rect x="448.9634270911105" y="558.1308010153472" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x6453)"/><rect x="425.2257396902889" y="575.9824899970554" width="152.0" height="26.0" fill="url(#bevelr1x6453)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x6453)"/><polygon points="309.6,380.8 350.4,294.9 501.4,279.5 649.4,296.3 693.7,379.8 668.2,502.9 500.8,566.4 331.1,502.9" fill="url(#suitr1x6453)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x6453) url(#metalr1x6453)"/><polygon points="307.7,381.9 351.5,295.7 501.6,278.9 650.7,293.0 693.2,381.5 669.3,503.9 499.3,564.9 332.8,504.1" fill="url(#carbonr1x6453)"/><polygon points="381.0,302.6 498.7,287.3 617.4,304.2 606.8,380.6 392.1,378.8" fill="url(#suitHir1x6453)"/><polygon points="382.6,380.3 364.8,425.4 432.8,504.7 501.7,527.1 568.8,504.3 633.3,426.9 620.5,382.3" fill="#050508" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x6453)"/><polygon points="381.4,411.1 475.8,410.3 485.4,441.7 390.4,438.4" fill="#ffd700" filter="url(#glowr1x6453)"/><polygon points="521.8,410.5 620.7,412.9 612.7,439.4 517.1,440.8" fill="#ffd700" filter="url(#glowr1x6453)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.3557937178388" y1="414.9426073271781" x2="514.2179022837803" y2="411.986672554817" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="483.5616249222867" y1="437.52511351676657" x2="513.8642553880252" y2="439.0674087328836" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="498.4430987669155" y1="456.17660228526216" x2="501.12147721266376" y2="483.91434473553676" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6453)"/><line x1="453.31435350717976" y1="490.2236101819202" x2="453.69408847222104" y2="521.3657808982767" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6453)"/><line x1="475.3107820385508" y1="492.61737373359495" x2="477.2401835352555" y2="518.8105920093134" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6453)"/><line x1="501.3170932709239" y1="492.0994611593894" x2="499.6644797845744" y2="520.9592589037493" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6453)"/><line x1="523.0430536019243" y1="490.1660176633857" x2="523.5832810042984" y2="520.7459866489284" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6453)"/><line x1="546.2375079442003" y1="492.7446223820559" x2="545.4249840882793" y2="518.9863747915253" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6453)"/><polygon points="433.4,504.9 567.4,504.7 553.7,555.2 444.6,557.8" fill="#503400" fill-opacity=".72" stroke="#ffd700" stroke-width="1.3" filter="url(#skr1x6453)"/><polygon points="315.4,303.7 362.8,304.2 337.9,195.1" fill="url(#bevelr1x6453)" fill-opacity=".95" stroke="#ffd700" stroke-width="1.6" filter="u