-opacity=".38" stroke-width="1"/><line x1="845.3" y1="700.2" x2="844.3" y2="783.8" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><polygon points="235.7,419.2 766.1,416.3 722.4,663.0 278.3,660.8" fill="url(#suitr1x3826)" stroke="#ccccff" stroke-width="2.6" filter="url(#skr1x3826) url(#metalr1x3826)"/><polygon points="233.9,418.6 765.8,417.5 721.6,662.0 276.1,663.1" fill="url(#carbonr1x3826)"/><polygon points="367.2,417.0 631.4,416.9 610.3,514.5 388.3,514.5" fill="url(#suitHir1x3826)"/><line x1="360.5" y1="470.2" x2="638.2" y2="472.5" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3826)"/><line x1="397.5" y1="551.2" x2="599.5" y2="550.2" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x3826)"/><line x1="268.1" y1="489.7" x2="321.2" y2="492.1" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.1" y1="491.5" x2="733.1" y2="491.8" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.1" y1="524.4" x2="318.7" y2="521.6" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.7" y1="521.6" x2="734.3" y2="521.9" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.4" y1="555.7" x2="320.7" y2="554.8" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.5" y1="553.4" x2="731.6" y2="555.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.7" y1="586.4" x2="320.3" y2="586.1" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.5" y1="584.9" x2="732.3" y2="585.7" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x3826)"><ellipse cx="499.7" cy="508.9" rx="42.9" ry="23.2" fill="#1e0600" stroke="#ccccff" stroke-width="1.6" filter="url(#skr1x3826)"/><circle cx="498.6" cy="511.8" r="15.1" fill="#ccccff"/><circle cx="496.1" cy="507.3" r="5.8" fill="#1e0600"/><ellipse cx="496.1" cy="505.0" rx="3.5" ry="2.3" fill="rgba(255,255,255,.7)"/></g><rect x="450.581811790