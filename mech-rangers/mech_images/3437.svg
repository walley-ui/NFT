th="1.2" filter="url(#skr1x3437)"/><polygon points="307.6,380.6 351.6,295.3 498.6,278.1 648.2,292.9 691.8,382.1 669.9,504.0 498.5,566.4 329.7,502.6" fill="url(#suitr1x3437)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x3437) url(#metalr1x3437)"/><polygon points="307.2,380.7 350.0,294.2 500.0,278.4 648.1,293.4 693.7,379.0 669.8,502.7 498.7,566.0 331.4,504.5" fill="url(#carbonr1x3437)"/><polygon points="380.5,301.4 498.9,288.0 619.3,302.2 608.2,380.1 390.8,380.3" fill="url(#suitHir1x3437)"/><polygon points="379.9,379.1 367.1,425.1 432.5,503.0 498.8,529.8 566.3,502.3 633.6,425.5 620.3,381.3" fill="#0a0520" fill-opacity=".88" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x3437)"/><polygon points="379.4,410.1 477.6,410.3 485.4,440.1 387.0,438.6" fill="#00ff60" filter="url(#glowr1x3437)"/><polygon points="522.1,411.3 620.4,413.0 610.7,440.4 515.6,440.4" fill="#00ff60" filter="url(#glowr1x3437)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.77800931815057" y1="412.38326865602284" x2="515.3171032593958" y2="414.6732221969403" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="486.2774657746404" y1="438.9116842363961" x2="515.7711541703344" y2="439.64948858795685" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="501.0630781488493" y1="453.75912590119987" x2="499.112584722694" y2="483.4846359183081" stroke="#00ff60" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3437)"/><line x1="455.37587713308636" y1="490.4894652996212" x2="454.630795529373" y2="518.5741956929676" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3437)"/><line x1="478.09361149355766" y1="490.5467735492624" x2="476.1035414548032" y2="520.4953272008337" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3437)"/><line x1="499.1192077379674" y1="491.15287971738724" x2="501.738