th="2.6" filter="url(#wmr1x4150)"/><polygon points="827.1,294.7 968.5,292.1 969.0,590.8 897.1,728.1 828.3,591.0" fill="url(#carbonr1x4150)"/><polygon points="861.3,362.6 935.2,360.0 935.4,542.6 896.5,632.5 860.6,542.9" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="844.0439155926556" y1="433.19479686319823" x2="948.911829786338" y2="432.56156671727075" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.054153045509" y1="331.43413913454856" x2="898.0529151849076" y2="592.8770641719922" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="829.5557242109068" y1="296.91675592185925" x2="967.188416081816" y2="297.96703853225335" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.3450541144796" cy="431.21545610390604" r="18.0" fill="url(#bevelr1x4150)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x4150)"/></g><rect x="451.0966274832375" y="558.3156372009777" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x4150)"/><rect x="424.5008741373196" y="575.7807448900305" width="152.0" height="26.0" fill="url(#bevelr1x4150)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x4150)"/><polygon points="308.1,379.5 348.9,296.0 499.9,276.7 651.5,296.2 691.4,381.3 669.6,504.8 500.5,564.6 332.8,504.9" fill="url(#suitr1x4150)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x4150) url(#metalr1x4150)"/><polygon points="307.9,381.7 350.8,293.8 500.2,277.1 649.8,295.5 692.8,381.7 668.0,505.0 500.8,566.4 332.5,503.4" fill="url(#carbonr1x4150)"/><polygon points="382.5,303.3 499.5,286.1 620.0,302.3 606.1,379.3 391.4,380.8" fill="url(#suitHir1x4150)"/><polygon points="382.7,378.9 366.3,427.2 431.7,501.9 499.7,528.0 567.5,504.7 634.7,425.0 618.5,380.1" fill="#050508" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x4150)"/><polygon points="381.0,412.7 477.1,410.8 483.4,439.1 388.1,438.4" fill="#ffcc00" filter="url(#glowr1x4150)"/><polygon points="523.6,410.8 618.4,411.4 610.0,440.6 516.6,441.6" fill="#ffcc00" filter="url(#glowr1x4150)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.7754523557238" y1="414.54987935274835" x2="516.6657942592539" y2="412.1445775271393" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.43133419450373" y1="437.3662885584869" x2="515.1604021253437" y2="437.0468399014324" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="499.1450375071727" y1="455.729775145743" x2="500.67810415653514" y2="483.7581068986096" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x4150)"/><line x1="452.4792174306512" y1="490.0900268640369" x2="454.8928636839427" y2="519.7086856812239" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4150)"/><line x1="475.95863922242074" y1="490.77511197915294" x2="476.2246785617806" y2="518.3104378037154" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4150)"/><line x1="499.66070989537985" y1="492.52417614432045" x2="499.34929013010117" y2="521.3519515551627" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4150)"/><line x1="523.2531683393381" y1="489.618650335446" x2="521.7157738501764" y2="519.8635469866916" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4150)"/><line x1="544.4218841546402" y1="490.0213691528886" x2="544.5267115297914" y2="520.8337251130491" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4150)"/><polygon points="434.2,502.3 568.2,502.8 552.2,558.5 446.8,557.8" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x4150)"/><path d="M390.40381294606254 325.60021525137125 Q331.42004733342674 215.15891614984722 382.4653544539027 141.1844569725916" stroke="#ffcc00" stroke-