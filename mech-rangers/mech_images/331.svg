url(#carbonr1x331)"/><polygon points="64.6,361.2 139.7,361.1 139.2,542.5 102.3,630.6 65.2,539.9" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="50.94251235773784" y1="430.20307955173774" x2="155.1770840527862" y2="430.95962095465507" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="100.39213353371244" y1="332.0755430752411" x2="100.45536063075062" y2="592.5619169718585" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="34.851617873217876" y1="295.8371060354635" x2="171.92317232893777" y2="295.1831245813519" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.24917042603713" cy="432.87893120069054" r="18.0" fill="url(#bevelr1x331)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x331)"/></g><rect x="451.1861892409623" y="557.913646600768" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x331)"/><rect x="422.86509722899643" y="574.7869999289513" width="152.0" height="26.0" fill="url(#bevelr1x331)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x331)"/><polygon points="309.4,381.1 349.7,294.6 499.4,279.9 648.8,293.4 692.8,382.3 667.9,505.2 501.7,565.1 332.2,502.3" fill="url(#suitr1x331)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x331) url(#metalr1x331)"/><polygon points="309.6,381.2 349.0,295.6 500.3,279.4 649.5,296.1 692.0,382.2 670.7,504.9 500.3,565.7 331.5,502.7" fill="url(#carbonr1x331)"/><polygon points="381.9,301.5 501.4,285.8 620.3,303.8 607.0,379.2 391.8,381.5" fill="url(#suitHir1x331)"/><polygon points="379.8,380.6 365.7,425.9 432.4,502.5 501.6,529.3 568.6,505.2 635.4,426.3 617.6,379.0" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x331)"/><polygon points="380.8,410.1 475.2,411.7 484.0,441.0 389.8,438.4" fill="#ff2040" filter="url(#glowr1x331)"/><polygon points="524.6,411.5 619.5,411.2 611.9,440.6 517.1,438.5" fill="#ff2040" filter="url(#glowr1x331)"/><e