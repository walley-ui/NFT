ine x1="902.2949510753714" y1="811.0848161064088" x2="902.0812930468097" y2="132.45772888278586" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="880.7304423833825" y="620.6551707519218" width="32.0" height="18.0" fill="url(#bevelr1x3848)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x3848)"/><rect x="880.095346681457" y="442.176400978025" width="32.0" height="18.0" fill="url(#bevelr1x3848)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x3848)"/><rect x="880.5593703682163" y="259.7051841902546" width="32.0" height="18.0" fill="url(#bevelr1x3848)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x3848)"/><circle cx="899.4915987622552" cy="112.60011767996473" r="58.0" fill="rgba(0,0,0,.52)" stroke="#ff2040" stroke-width="2.2" filter="url(#wmr1x3848)"/><circle cx="897.7213258666545" cy="110.00637624748049" r="46.0" fill="url(#orbr1x3848)" filter="url(#bloomr1x3848)"/><circle cx="897.1839858949744" cy="112.47941771605981" r="20.0" fill="#ff2040" filter="url(#glowr1x3848)"/><circle cx="899.1655059013143" cy="110.30007082894443" r="66.0" fill="none" stroke="#ff2040" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="898.2648671684415" cy="111.25920054158193" rx="66.0" ry="30.0" fill="none" stroke="#ff2040" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="448.59228785242885" y="556.1815617943182" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3848)"/><rect x="422.5872474217787" y="574.09018180985" width="152.0" height="26.0" fill="url(#bevelr1x3848)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x3848)"/><polygon points="306.4,380.6 350.3,293.3 499.3,279.6 648.6,294.1 693.4,379.2 669.3,502.3 498.7,565.8 332.7,502.2" fill="url(#suitr1x3848)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x3848) url(#metalr1x3848)"/><polygon points="306.7,380.8 351.8,294.4 498.6,276.7 649.8,293.4 692.9,379.2 669.2,504.9 501.2,564.1 329.6,502.3" fill="url(#carbonr1x3848)"/><polygon points="380.2,302.2 500.4,284.7 617.4,301.9 607.9,379.3 392.2,381.9" fill="url(#suitHir1x3848)"/><polygon points="380.6,381.0 366.6,425.5 432.8,505.1 499.7,526.9 565.9,503.7 634.1,424.2 620.0,381.0" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x3848)"/><polygon points="381.6,412.5 478.7,410.1 484.9,439.0 389.0,441.2" fill="#ff2040" filter="url(#glowr1x3848)"/><polygon points="522.3,410.4 619.5,411.5 609.7,438.5 515.1,441.6" fill="#ff2040" filter="url(#glowr1x3848)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.57451185766604" y1="411.93470242749896" x2="513.635152329076" y2="414.32508925069124" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="483.2738499367237" y1="436.299101152271" x2="514.3397040949576" y2="439.04708615737036" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="499.2626249653287" y1="455.4603631288744" x2="498.2650517619215" y2="483.036637087632" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3848)"/><line x1="454.95283380307256" y1="489.6677000987343" x2="453.561039615497" y2="521.1010703948326" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3848)"/><line x1="478.5900124656409" y1="490.4475597651675" x2="475.6735860654525" y2="518.9813421049155" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3848)"/><line x1="500.4807795319706" y1="491.7825132381171" x2="500.412425363902" y2="520.6482617422938" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3848)"/><line x1="523.7176197060011" y1="491.3153273853473" x2="522.4777514135092" y2="520.0606522727758" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3848)"/><line x1="546.4527617924102" y1="490.7475310593843" x2="547.6184392590262" y2="518.9610518391244" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3848)"/><polygon points="431.9,503.8 565.5,503.8 552.8,556.7 447.3,555.1" fill="#cc0020" fill-opacity=".72" stroke="#ff2040" stroke-width="1.3" filter="url(#skr1x3848)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".48">CRIMSON RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".32">MECH RANGERS</text></svg>