ight="42.0" fill="url(#bevelr1x8654)" stroke="#4444ff" stroke-width="1.4" filter="url(#glowr1x8654)"/><rect x="485.3" y="639.3" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.3,465.5 233.7,466.0 257.1,735.6 127.8,736.7" fill="url(#suitr1x8654)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x8654) url(#metalr1x8654)"/><polygon points="173.5,433.2 254.1,433.0 243.1,511.2 160.2,511.0" fill="url(#bevelr1x8654)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x8654)"/><polygon points="160.1,620.6 241.5,622.2 238.7,661.7 165.2,661.3" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x8654)"/><polygon points="765.0,468.3 846.9,465.8 870.8,736.7 742.6,735.0" fill="url(#suitr1x8654)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x8654) url(#metalr1x8654)"/><polygon points="747.1,431.6 825.4,432.3 840.6,512.2 758.1,511.5" fill="url(#bevelr1x8654)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x8654)"/><polygon points="756.3,620.5 837.1,623.1 834.9,660.0 759.7,662.6" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x8654)"/><rect x="120.3"  y="701.3" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x8654)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x8654)"/><rect x="747.1"   y="698.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x8654)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x8654)"/><line x1="149.5" y1="703.3" x2="149.1" y2="782.6" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="779.1" y1="701.3" x2="777.8" y2="782.8" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="181.4" y1="700.1" x2="184.2" y2="785.3" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="812.7" y1="700.7" x2="810.9" y2="784.6" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="217.0" y1="702.2" x2="216.5" y2="782.8" stroke="#4444ff" stroke