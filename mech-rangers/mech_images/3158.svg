url(#wmr1x3158)"/><polygon points="826.4,294.4 969.2,292.3 968.0,589.9 896.7,725.9 828.1,589.6" fill="url(#carbonr1x3158)"/><polygon points="859.5,363.0 936.2,360.0 936.2,540.1 896.3,630.7 861.6,541.1" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="845.7577808254957" y1="430.08663677321744" x2="951.2076237585954" y2="431.41952162766825" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.0053856089339" y1="330.1282494825311" x2="897.561045914758" y2="593.1801360579208" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="829.5795964872092" y1="295.7716445895843" x2="966.1097957831436" y2="298.0350158709101" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="899.0489500794188" cy="431.1247518961318" r="18.0" fill="url(#bevelr1x3158)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x3158)"/></g><rect x="449.1409292271361" y="556.4054484428838" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3158)"/><rect x="424.03293877644467" y="576.1912588221021" width="152.0" height="26.0" fill="url(#bevelr1x3158)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x3158)"/><polygon points="306.4,381.9 348.7,293.4 500.5,276.8 649.3,296.0 691.1,378.8 668.8,503.0 500.8,564.2 331.2,502.8" fill="url(#suitr1x3158)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x3158) url(#metalr1x3158)"/><polygon points="309.1,379.6 350.5,295.7 501.3,278.5 648.7,295.4 692.7,380.5 669.0,505.3 499.8,565.0 332.5,505.4" fill="url(#carbonr1x3158)"/><polygon points="379.5,303.2 501.3,287.6 619.4,304.2 607.1,380.0 391.6,381.0" fill="url(#suitHir1x3158)"/><polygon points="379.8,379.0 365.8,427.5 432.0,503.9 501.0,528.1 566.9,502.4 632.9,424.3 620.2,381.4" fill="#0a0520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x3158)"/><polygon points="382.4,411.8 477.0,411.0 485.1,439.1 388.3,439.9" fill="#ff2040" filter="url(#glowr1x3158)"/