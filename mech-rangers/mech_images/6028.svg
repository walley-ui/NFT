ter="url(#skr1x6028)"/><line x1="475.71556952813637" y1="492.13911456866185" x2="477.9758618162386" y2="520.5233834935352" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6028)"/><line x1="499.55425295755265" y1="491.13854592787095" x2="499.0404685117304" y2="521.0062253408134" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6028)"/><line x1="523.3975891562737" y1="492.5808796773664" x2="523.9412800624593" y2="518.6124653724022" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6028)"/><line x1="547.6329780715704" y1="491.88010619515546" x2="546.4497289641947" y2="519.3648063722998" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6028)"/><polygon points="431.0,505.0 568.2,502.6 555.3,556.9 445.6,556.7" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x6028)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>