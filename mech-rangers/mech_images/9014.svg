.9" y="521.5" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#0d1520" stroke-width=".6"/></g><g><rect x="42.26061196098101" y="397.405544563476" width="175.0" height="118.0" rx="7" fill="url(#artilleryr1x9014)" stroke="#ff2040" stroke-width="2.6" filter="url(#wmr1x9014)"/><rect x="42.59253946639594" y="396.6542471331544" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x9014)"/><rect x="18.66801273426038" y="446.49125940669325" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x9014)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x9014)"/><circle cx="117.38363605909046" cy="472.77229893775655" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x9014)"/><circle cx="118.82668248828497" cy="469.69255382893607" r="34.0" fill="#ff2040" fill-opacity=".4" filter="url(#bloomr1x9014)"/><circle cx="119.4098825922608" cy="470.58342312509194" r="18.0" fill="#ff2040" filter="url(#glowr1x9014)"/><rect x="47.19555205771697" y="382.8423377166502" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x9014)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x9014)"/><rect x="45.873672878220646" y="398.6994569127448" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="52.5411613176949" y1="521.020264173951" x2="52.57036128085103" y2="549.1272278684191" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="77.55976528780532" y1="518.9623052985407" x2="76.04537183143195" y2="550.0277769811452" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="101.53228788789359" y1="519.63717243867" x2="99.81090633342039" y2="550.678235209547" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="122.48569420943033" y1="520.5987089997158" x2="124.54338243486356" y2="549.7064837915823" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/></g><rect x="448.88770171143113" y="555.5830902944318" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1