lter="url(#wmr1x4659)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x4659)" opacity=".9"/><line x1="112.80814138276499" y1="669.6539828628302" x2="102.40982670681548" y2="-130.36279637794945" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="94.31077774306756" y1="670.1515685842372" x2="99.77690484670919" y2="-129.24357081772763" stroke="#ff00ff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="44.51496568195519" y="669.514249638468" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x4659)" stroke="#ff00ff" stroke-width="1.6" filter="url(#wmr1x4659)"/><rect x="68.69041024515403" y="673.7401041994802" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="91.29947073472661" y="677.9372893609107" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="91.82694433800873" y="684.2814901025965" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="89.74120573833582" y="693.213096165657" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="90.16916785243896" y="702.7218138297088" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="89.11646485351022" y="711.1284410791471" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="90.87906858850268" y="717.101013003569" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><ellipse cx="103.73513410709795" cy="726.367031079717" rx="22.0" ry="16.0" fill="url(#bevelr1x4659)" stroke="#ff00ff" stroke-width="1.2" filter="url(#wmr1x4659)"/></g><rect x="449.85432756040245" y="555.8651087808422" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x4659)"/><rect x="423.80491440389306" y="575.022799730394" wid