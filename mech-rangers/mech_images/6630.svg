olygon points="379.4,304.1 499.2,286.8 620.7,301.4 608.7,379.9 392.1,380.7" fill="url(#suitHir1x6630)"/><polygon points="379.6,379.3 364.9,425.1 433.3,504.6 501.0,528.7 567.4,503.5 633.6,425.9 619.5,381.9" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x6630)"/><polygon points="382.1,410.8 475.8,410.6 484.6,439.7 389.6,440.0" fill="#4444ff" filter="url(#glowr1x6630)"/><polygon points="523.9,411.7 619.4,410.2 612.7,440.2 516.5,440.6" fill="#4444ff" filter="url(#glowr1x6630)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.1393857903406" y1="413.9352214934304" x2="514.1392340287939" y2="413.6746815123595" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.1559403032623" y1="437.2139822172001" x2="517.0857707682438" y2="437.79156114030627" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="498.32791698537767" y1="454.8284627106972" x2="498.6327989139594" y2="482.7800192371011" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6630)"/><line x1="452.64151007112116" y1="489.64505620794364" x2="455.7014142319374" y2="519.0745852087624" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6630)"/><line x1="477.11652690697457" y1="490.1967076187953" x2="478.17163344513625" y2="519.1677780765109" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6630)"/><line x1="500.3317253313959" y1="490.30406179744745" x2="499.28624129937964" y2="520.1535557343625" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6630)"/><line x1="521.8785601210408" y1="489.76940948385743" x2="523.7788063636608" y2="518.7702654795721" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6630)"/><line x1="547.5082963298262" y1="489.95283847870303" x2="547.470427454561" y2="520.2524414507673" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6630)"/><polygon points="434.3,502.1 565.5,502.1 552.6,556.3 444.7,557.0" fill="#141428" fill-opacity=".72" stroke="#4444ff" stroke-width="1.3" filter="url(#skr1x6630)"/><polygon points="476.5,303.3 522.6,301.8 510.4,177.4 489.8,177.3" fill="url(#bevelr1x6630)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x6630)"/><polygon points="365.3,324.6 458.1,321.6 468.7,230.0" fill="url(#bevelr1x6630)" fill-opacity=".78" stroke="#4444ff" stroke-width="1.5" filter="url(#skr1x6630)"/><polygon points="541.6,323.5 635.6,323.8 531.4,229.2" fill="url(#bevelr1x6630)" fill-opacity=".78" stroke="#4444ff" stroke-width="1.5" filter="url(#skr1x6630)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#4444ff" fill-opacity=".48">OBSIDIAN RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#4444ff" fill-opacity=".32">MECH RANGERS</text></svg>