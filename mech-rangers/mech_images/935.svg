93.3 172.3,593.0 101.9,727.1 32.2,590.3" fill="url(#carbonr1x935)"/><polygon points="63.2,362.5 141.5,359.7 138.5,541.5 103.3,629.9 65.5,539.9" fill="#ffd700" fill-opacity=".28" stroke="#ffd700" stroke-width="1.5"/><line x1="50.308818457871645" y1="432.6952776303515" x2="152.74800500249486" y2="430.2370609187521" stroke="#ffd700" stroke-opacity=".65" stroke-width="1.3"/><line x1="101.96697966124859" y1="330.71268399776886" x2="102.05622034262862" y2="590.5318417454138" stroke="#ffd700" stroke-opacity=".4" stroke-width="1"/><line x1="35.428518593069136" y1="297.26452453024683" x2="170.46096711628135" y2="295.13448120960965" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.71036431606856" cy="430.32711699083444" r="18.0" fill="url(#bevelr1x935)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x935)"/></g><rect x="451.2138212425634" y="557.8234180391765" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x935)"/><rect x="424.04217756493017" y="574.9276973946952" width="152.0" height="26.0" fill="url(#bevelr1x935)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x935)"/><polygon points="308.1,381.0 349.3,295.8 498.9,277.1 651.1,294.0 692.4,379.7 669.1,503.8 499.7,563.8 329.3,504.8" fill="url(#suitr1x935)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x935) url(#metalr1x935)"/><polygon points="309.4,379.8 350.4,295.5 501.5,277.8 650.5,294.0 692.1,381.6 669.9,502.8 500.1,564.8 332.3,503.5" fill="url(#carbonr1x935)"/><polygon points="381.7,303.8 499.2,285.5 619.1,303.9 608.3,379.5 393.4,379.6" fill="url(#suitHir1x935)"/><polygon points="381.5,378.8 364.0,425.1 431.4,503.0 498.8,529.2 567.3,505.3 635.0,427.5 619.1,381.3" fill="#0a0520" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x935)"/><polygon points="382.1,411.6 476.0,411.4 484.8,438.8 387.4,439.3" fill="#ffd700" filter="url(#glowr1x935)"/><polygon points="522.3,413.1 619.2,409.6 612.6,441.4 515.6,