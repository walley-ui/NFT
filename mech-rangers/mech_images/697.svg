" stroke-width="2" filter="url(#wmr1x697)"/><rect x="115.7" y="700.7" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x697)"/><rect x="749.3"  y="703.1" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x697)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x697)"/><rect x="750.2"  y="703.4" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x697)"/><rect x="123.1" y="700.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><rect x="755.4" y="698.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><rect x="149.7" y="701.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><rect x="785.9" y="698.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><rect x="179.8" y="701.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><rect x="813.7" y="698.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><rect x="209.4" y="699.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><rect x="842.7" y="700.8" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x697)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x697)"/><ellipse cx="184.25157343292608" cy="709.3998940451816" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x697)"/><ellipse cx="815.8122660515085" cy="711.0306551824137" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x697)"/></g><rect x="449.9306848718785" y="558.6443106881343" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x697)"/><rect x="425.464875596482