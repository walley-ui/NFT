.4" y="522.9" width="9.3" height="17.4" rx="1" fill="#ffcc00" stroke="#0a0520" stroke-width=".6"/></g><g><rect x="829.8343354981021" y="419.9196254556998" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x2190)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x2190)"/><rect x="831.5402141283826" y="422.66589224440975" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x2190)"/><rect x="837.6849368616566" y="403.1107265572995" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x2190)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x2190)"/><circle cx="877.7398488852755" cy="413.6498586562462" r="15.0" fill="#ffcc00" opacity=".8" filter="url(#glowr1x2190)"/><circle cx="876.9754257835076" cy="413.26622391687704" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="944.7869899082557" y="454.9895133250393" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x2190)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x2190)"/><circle cx="1020.1322408618964" cy="470.8926644488238" r="18.0" fill="#ffcc00" filter="url(#glowr1x2190)" opacity=".88"/><circle cx="1019.1955100319907" cy="472.6109203371219" r="7.0" fill="#ffffff"/><rect x="872.3568705881573" y="499.6859507994726" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x2190)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x2190)"/><rect x="834.4079619237781" y="423.3475317101925" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="856.2641138903424" y1="486.180351462122" x2="859.6297843962535" y2="520.4146889038384" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="873.2194273677283" y1="487.1533785143867" x2="872.1020931839571" y2="520.2733939751982" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="890.0993978973106" y1="485.91159703489393" x2="891.6069030754827" y2="517.8561567067169" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.8007871463895" y="555.6363237514161" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x2190)"/><rect x="423.69315662560984" y="576.1060198104941" width="152.0" height="26.0" fill="url(#bevelr1x2190)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x2190)"/><polygon points="309.8,381.7 351.8,293.7 501.8,279.3 649.7,295.6 690.9,380.6 667.7,505.3 500.2,565.7 330.4,504.1" fill="url(#suitr1x2190)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x2190) url(#metalr1x2190)"/><polygon points="307.6,380.1 350.1,295.3 500.1,277.6 651.4,296.2 690.9,379.8 669.3,502.9 501.5,563.7 330.0,502.4" fill="url(#carbonr1x2190)"/><polygon points="382.2,304.3 500.7,288.0 618.3,303.1 606.4,381.9 391.2,381.0" fill="url(#suitHir1x2190)"/><polygon points="380.1,379.6 364.1,426.6 432.6,502.2 500.2,526.8 565.6,502.4 632.8,425.4 619.4,380.0" fill="#0a0520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x2190)"/><polygon points="379.8,411.7 476.3,412.9 483.6,441.0 387.8,440.6" fill="#ffcc00" filter="url(#glowr1x2190)"/><polygon points="523.1,412.3 619.7,412.7 610.5,441.5 515.8,438.3" fill="#ffcc00" filter="url(#glowr1x2190)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.9675548971258" y1="413.61186808068305" x2="516.0399684627913" y2="412.49466381305825" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="484.5478360854648" y1="438.97798043768853" x2="514.8344208694435" y2="437.82715444285424" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="499.7536410843022" y1="454.23727566553276" x2="500.1318431115709" y2="481.8195981548168" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2190)"/><line x1="452.55349577616903" y1="491.4095939036458" x2="453.91704505056146" y2="518.4786757448688" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2190)"/><line x1="477.88798094106835" y