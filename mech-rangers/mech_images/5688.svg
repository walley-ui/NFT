.1" y="522.4" width="9.3" height="17.4" rx="1" fill="#00ffff" stroke="#0d1520" stroke-width=".6"/></g><g><polygon points="868.7,691.6 900.9,692.0 833.7,272.2" fill="url(#blader1x5688)" stroke="#00ffff" stroke-width="1.8" filter="url(#wmr1x5688)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="911.8,692.4 943.5,692.3 985.1,270.7" fill="url(#blader1x5688)" stroke="#00ffff" stroke-width="1.8" filter="url(#wmr1x5688)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="864.1638845705986" y="683.1504889395088" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x5688)" stroke="#00ffff" stroke-width="1.4" filter="url(#wmr1x5688)"/></g><rect x="450.23103263173255" y="556.6749121685513" width="100.0"  height="56.0" fill="#08001e" stroke="#00ffff" stroke-width="2.2" filter="url(#skr1x5688)"/><rect x="424.9891506664455" y="573.8091945305467" width="152.0" height="26.0" fill="url(#bevelr1x5688)" fill-opacity=".65" stroke="#00ffff" stroke-width="1.2" filter="url(#skr1x5688)"/><polygon points="307.7,380.6 351.1,293.1 499.4,276.9 648.5,295.1 693.3,381.0 668.7,504.0 501.5,565.0 330.0,503.5" fill="url(#suitr1x5688)" stroke="#00ffff" stroke-width="2.8" filter="url(#skr1x5688) url(#metalr1x5688)"/><polygon points="308.7,379.7 348.9,295.0 498.7,278.0 648.8,292.8 693.3,379.8 669.8,504.7 499.5,565.3 329.8,504.1" fill="url(#carbonr1x5688)"/><polygon points="380.0,302.0 498.6,288.1 620.4,304.4 608.5,379.5 392.2,380.4" fill="url(#suitHir1x5688)"/><polygon points="380.2,381.8 364.0,424.6 432.4,504.6 500.8,526.9 565.5,504.6 635.2,426.2 618.7,380.6" fill="#0d1520" fill-opacity=".88" stroke="#00ffff" stroke-width="1.8" filter="url(#skr1x5688)"/><polygon points="380.8,411.7 475.4,410.7 485.5,441.5 387.0,438.6" fill="#00ffff" filter="url(#glowr1x5688)"/><polygon points="523.8,409.8 617.7,411.3 610.3,440.9 513.6,441.3" fill="#00ffff" filter="url(#glowr1x5688)"/><ellips