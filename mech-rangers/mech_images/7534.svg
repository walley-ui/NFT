3364" y="421.41441691284996" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x7534)"/><rect x="42.62434892471877" y="405.1455803603865" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x7534)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x7534)"/><circle cx="80.72819222941992" cy="414.29975090669467" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x7534)"/><circle cx="82.48202419629317" cy="414.68871365897354" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.20479573117566" y="456.8249984742142" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x7534)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x7534)"/><circle cx="-18.506079856455358" cy="471.2414231309667" r="18.0" fill="#ff2040" filter="url(#glowr1x7534)" opacity=".88"/><circle cx="-21.454264987688543" cy="472.3350769379176" r="7.0" fill="#ffffff"/><rect x="77.79296409770843" y="500.75128119587896" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x7534)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x7534)"/><rect x="35.73955236611884" y="424.7062064250931" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="60.64487157644701" y1="484.92093770215286" x2="62.09315520817411" y2="519.3164583128877" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.94251264784482" y1="486.2322023258544" x2="78.2214927823655" y2="518.12205140125" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.6986581432074" y1="486.9593922476284" x2="92.38769034551453" y2="519.024119791761" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.4528283568099" y="557.6848896574229" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x7534)"/><rect x="424.5795811468735" y="575.7750888622367" width="152.0" height="26.0" fill="url(#bevelr1x7534)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x7534)"/><polygon points="306.4,381.4 349.5,295.9 500.2,279.6 648.1,293.0 691.4,380.3 667.3,503.3 501.1,564.7 329.3,504.2" fill="url(#suitr1x7534)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x7534) url(#metalr1x7534)"/><polygon points="308.3,378.8 349.4,293.2 500.2,279.9 650.0,296.0 693.5,381.2 667.5,503.7 499.5,565.4 329.8,501.8" fill="url(#carbonr1x7534)"/><polygon points="381.8,304.0 498.3,287.3 617.4,302.8 607.6,381.8 393.4,379.3" fill="url(#suitHir1x7534)"/><polygon points="381.0,382.3 365.8,425.5 433.2,502.4 499.1,528.1 566.2,502.5 634.6,424.4 618.1,381.0" fill="#0a0520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x7534)"/><polygon points="381.7,409.8 478.0,412.6 485.0,440.1 390.1,441.0" fill="#ff2040" filter="url(#glowr1x7534)"/><polygon points="522.9,412.2 617.8,411.4 612.1,440.7 513.6,439.0" fill="#ff2040" filter="url(#glowr1x7534)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.65249289400873" y1="412.31908441353585" x2="514.1149099310302" y2="412.4632704650983" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="484.94474356934427" y1="439.50120740253476" x2="514.2375439771823" y2="438.9449733763933" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="498.86130929021164" y1="452.68304014671594" x2="500.0561037684791" y2="481.47629638584334" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x7534)"/><line x1="452.8427801689878" y1="492.5482710163109" x2="452.35364802524447" y2="518.4814533625729" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7534)"/><line x1="475.7919581418298" y1="491.14777843663467" x2="478.258482930474" y2="518.9810908255167" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7534)"/><line x1="501.36155662024396" y1="490.19825694151217" x2="499.74335625357924" y2="521.3742624547333" stroke="#ff2040" stroke-opacity=".52" stroke-width