2" stroke-width="1.3" filter="url(#skr1x1245)"/><line x1="400.8" y1="548.7" x2="601.8" y2="549.4" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1245)"/><line x1="265.9" y1="489.7" x2="321.0" y2="490.4" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.5" y1="489.2" x2="731.8" y2="492.4" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.4" y1="521.5" x2="318.1" y2="521.5" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.6" y1="521.2" x2="731.9" y2="522.8" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.2" y1="553.1" x2="320.6" y2="554.1" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.7" y1="556.3" x2="731.5" y2="555.5" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.4" y1="586.0" x2="321.4" y2="585.5" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.8" y1="588.0" x2="732.3" y2="587.1" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x1245)"><polygon points="499.5,451.4 514.3,489.0 556.4,493.2 522.7,519.9 535.9,555.9 499.5,537.8 465.9,559.2 474.0,519.1 443.1,492.1 484.5,490.0 " fill="#ff2040" stroke="#0a0520" stroke-width="1.4" filter="url(#skr1x1245)"/><polygon points="499.5,451.4 514.3,489.0 556.4,493.2 522.7,519.9 535.9,555.9 499.5,537.8 465.9,559.2 474.0,519.1 443.1,492.1 484.5,490.0 " fill="url(#suitHir1x1245)" opacity=".45"/></g><rect x="449.2384816568345" y="556.9085321236402" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x1245)"/><rect x="424.7305277213454" y="576.9438208108768" width="152.0" height="26.0" fill="url(#bevelr1x1245)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x1245)"/><polygon points="307.8,380.1 349.5,295.1 498.7,279.4 648.4,295.5 691.0,381.5 667.3,504.8 499.5,564.2 330.2,504.9" fill="url(#suitr1x1245)" stroke="#ff2040" stroke-width="2.8" filter="