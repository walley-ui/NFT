line x1="902.6956648595259" y1="771.7571290685795" x2="911.042960619703" y2="132.2279783369042" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.6,151.5 936.5,150.3 915.9,-9.2" fill="url(#blader1x7124)" stroke="#ffd700" stroke-width="1.8" filter="url(#wmr1x7124)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="878.8300221229531" y="422.1251708864234" width="40.0" height="20.0" fill="url(#bevelr1x7124)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x7124)"/><rect x="879.7123837035708" y="510.9164288450032" width="40.0" height="20.0" fill="url(#bevelr1x7124)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x7124)"/><rect x="877.3945676562004" y="600.4638778865337" width="40.0" height="20.0" fill="url(#bevelr1x7124)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x7124)"/><rect x="880.5132061284595" y="691.2645741914399" width="40.0" height="20.0" fill="url(#bevelr1x7124)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x7124)"/><ellipse cx="899.6226564450749" cy="792.2205752287991" rx="22.0" ry="15.0" fill="url(#bevelr1x7124)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x7124)"/></g><rect x="450.96121619967744" y="557.3883070979267" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x7124)"/><rect x="424.64715214595196" y="576.7241442288272" width="152.0" height="26.0" fill="url(#bevelr1x7124)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x7124)"/><polygon points="306.3,379.2 351.0,294.0 500.3,278.9 650.7,292.9 690.9,378.9 670.0,505.2 501.0,564.0 332.6,502.7" fill="url(#suitr1x7124)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x7124) url(#metalr1x7124)"/><polygon points="306.5,379.8 351.6,294.8 500.0,279.1 651.3,295.0 690.9,381.0 669.5,502.7 500.3,563.5 329.7,505.1" fill="url(#carbonr1x7124)"/><polygon points="382.2,304.1 499.2,284.6 620.5,302.7 608.1,382.1 393.4,380.8" fill="url(#suitHir1x7124)"/><polygon points="380.9,380.9 365.8,425.7 431.0,504.1 498.2,529.1 568.8,504.6 635.7,424.9 619.9,378.9" fill="#0a0520" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x7124)"/><polygon points="382.3,410.3 478.1,410.4 483.5,441.1 389.1,440.3" fill="#ffd700" filter="url(#glowr1x7124)"/><polygon points="523.3,413.0 620.8,409.9 609.6,441.7 515.0,440.2" fill="#ffd700" filter="url(#glowr1x7124)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.1071534893103" y1="414.06506334263827" x2="514.6019992649927" y2="412.43706380110234" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="485.1246260149963" y1="437.1572540782392" x2="515.6386900226026" y2="437.3793533211574" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="499.60891763539985" y1="455.0813400011509" x2="499.90845808135344" y2="484.798797994107" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x7124)"/><line x1="455.341401256416" y1="491.2255649573169" x2="453.8694002987631" y2="519.4659187505022" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7124)"/><line x1="478.118065111842" y1="489.93482922632245" x2="478.6157245319709" y2="521.3096990191377" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7124)"/><line x1="499.7301885728724" y1="489.9477151434868" x2="500.7708980339579" y2="519.1090710163116" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7124)"/><line x1="522.9310633029415" y1="489.771764382068" x2="522.4248140698858" y2="519.204856529925" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7124)"/><line x1="545.5431284115837" y1="489.5858272208832" x2="545.0669469880127" y2="521.1186111801304" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7124)"/><polygon points="433.0,504.3 568.3,501.9 552.4,558.7 445.9,558.7" fill="#503400" fill-opacity=".72" stroke="#ffd700" stroke-width="1.3" filter="url(#skr1x7124)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffd700" fill-opacity=".48">IMPERIAL RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffd700" fill-opacity=".32">MECH RANGERS</text></svg>