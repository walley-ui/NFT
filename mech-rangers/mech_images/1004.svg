.7" y="521.7" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#0d1520" stroke-width=".6"/></g><g><polygon points="71.0,689.6 103.0,690.9 36.4,270.9" fill="url(#blader1x1004)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x1004)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="117.6,692.5 148.5,690.2 190.2,272.5" fill="url(#blader1x1004)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x1004)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="67.01540368705984" y="681.8485373277217" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x1004)" stroke="#4444ff" stroke-width="1.4" filter="url(#wmr1x1004)"/></g><rect x="450.7516526662745" y="558.1824506019242" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x1004)"/><rect x="424.99967706529424" y="576.0944721739739" width="152.0" height="26.0" fill="url(#bevelr1x1004)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x1004)"/><polygon points="309.6,379.2 351.9,294.3 499.2,279.1 648.3,292.9 692.6,380.1 667.8,503.7 501.6,563.9 330.0,504.5" fill="url(#suitr1x1004)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x1004) url(#metalr1x1004)"/><polygon points="308.9,380.3 348.9,295.0 501.5,277.0 649.0,296.0 693.4,379.8 668.9,504.2 500.7,566.2 329.8,504.9" fill="url(#carbonr1x1004)"/><polygon points="379.6,302.8 501.0,285.7 618.2,301.6 608.9,381.2 393.4,380.3" fill="url(#suitHir1x1004)"/><polygon points="379.3,380.4 364.6,425.7 434.2,503.7 501.7,526.9 566.7,503.1 635.9,426.3 619.1,382.1" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x1004)"/><polygon points="380.8,410.1 477.7,411.6 485.2,440.4 387.5,438.7" fill="#4444ff" filter="url(#glowr1x1004)"/><polygon points="522.3,410.7 619.9,411.2 611.0,441.4 516.4,440.9" fill="#4444ff" filter="url(#glowr1x1004)"/><ellipse cx