lter="url(#wmr1x2702)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x2702)" opacity=".9"/><line x1="112.04612307332452" y1="670.2223048078828" x2="102.87539210636166" y2="-127.16885540056975" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="91.89608809119088" y1="673.0485239096917" x2="102.10069387599822" y2="-129.9595641027205" stroke="#ff2040" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="45.62358765186739" y="669.7759068157524" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x2702)" stroke="#ff2040" stroke-width="1.6" filter="url(#wmr1x2702)"/><rect x="68.73579902950671" y="674.1168240740895" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="89.38442277530206" y="676.5403765588068" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="91.42095759253945" y="686.0327901831828" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="90.58249450897794" y="692.2185751291923" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="90.30674070896578" y="701.2909817000851" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="88.64746221652251" y="710.8157200611196" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="89.86729798926038" y="718.8825588531791" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><ellipse cx="103.14162389677014" cy="726.0986867329106" rx="22.0" ry="16.0" fill="url(#bevelr1x2702)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x2702)"/></g><rect x="449.6781817303039" y="555.2872399997897" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x2702)"/><rect x="425.16558857401833" y="574.5051332094707"