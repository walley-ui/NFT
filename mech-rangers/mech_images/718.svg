2="913.3454287150503" y2="132.69621383948248" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="870.5,153.2 934.9,150.1 915.2,-7.9" fill="url(#blader1x718)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x718)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="878.5591786555574" y="420.1056546761654" width="40.0" height="20.0" fill="url(#bevelr1x718)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x718)"/><rect x="878.3650242251903" y="512.7821993417107" width="40.0" height="20.0" fill="url(#bevelr1x718)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x718)"/><rect x="877.9584060877189" y="602.308919545263" width="40.0" height="20.0" fill="url(#bevelr1x718)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x718)"/><rect x="877.3851044447721" y="693.1022205741144" width="40.0" height="20.0" fill="url(#bevelr1x718)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x718)"/><ellipse cx="897.1129333483615" cy="792.7283334994688" rx="22.0" ry="15.0" fill="url(#bevelr1x718)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x718)"/></g><rect x="451.4862577971071" y="555.7348729335703" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x718)"/><rect x="422.88367579784244" y="574.8679255360738" width="152.0" height="26.0" fill="url(#bevelr1x718)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x718)"/><polygon points="308.0,381.3 351.3,293.4 498.2,278.8 649.3,294.4 690.4,380.9 668.6,504.9 499.5,565.9 330.3,505.0" fill="url(#suitr1x718)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x718) url(#metalr1x718)"/><polygon points="307.8,380.0 349.1,295.6 501.2,276.3 649.3,293.8 692.6,381.3 668.9,502.0 501.5,566.7 331.4,504.9" fill="url(#carbonr1x718)"/><polygon points="382.3,301.7 499.9,287.3 619.7,303.1 608.5,381.8 392.8,379.6" fill="url(#suitHir1x718)"/><polygon points="382.7,381.9 364.