0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="151.2,466.9 234.2,466.6 257.3,735.1 126.6,736.7" fill="url(#suitr1x718)" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x718) url(#metalr1x718)"/><polygon points="174.4,433.5 254.5,433.0 243.0,510.7 161.1,512.1" fill="url(#bevelr1x718)" fill-opacity=".72" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x718)"/><polygon points="159.8,621.6 243.8,623.6 240.8,661.7 164.5,661.8" fill="#ffcc00" fill-opacity=".42" stroke="#ffcc00" stroke-width="1" filter="url(#skr1x718)"/><polygon points="765.3,464.9 847.8,467.8 872.4,734.4 740.6,735.3" fill="url(#suitr1x718)" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x718) url(#metalr1x718)"/><polygon points="748.7,431.6 827.9,431.8 841.8,509.1 757.7,511.8" fill="url(#bevelr1x718)" fill-opacity=".72" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x718)"/><polygon points="755.4,621.3 838.2,621.4 834.4,661.0 761.1,662.1" fill="#ffcc00" fill-opacity=".42" stroke="#ffcc00" stroke-width="1" filter="url(#skr1x718)"/><rect x="121.8"  y="700.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x718)" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x718)"/><rect x="747.2"   y="699.1" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x718)" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x718)"/><line x1="149.4" y1="700.8" x2="149.6" y2="785.5" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="777.9" y1="702.7" x2="778.3" y2="784.8" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="181.9" y1="703.6" x2="184.0" y2="782.1" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="809.5" y1="702.5" x2="812.6" y2="783.1" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="216.1" y1="702.5" x2="215.3" y2="783.9" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><line x1="845.4" y1="701.8" x2="842.7" y2="783.4" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><polygon points