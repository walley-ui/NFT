oke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="485.1566719687171" y1="437.6011457604356" x2="514.1122397156805" y2="438.7791297166608" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="501.2230461506173" y1="454.7002802327275" x2="501.1074154444039" y2="482.8346573426388" stroke="#00ff60" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x9084)"/><line x1="454.56643932711336" y1="490.7193058478646" x2="452.983172800839" y2="521.5825785388239" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9084)"/><line x1="475.2347906097211" y1="491.43833531970154" x2="476.01024680560454" y2="519.7633397132158" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9084)"/><line x1="498.4492437153123" y1="490.6804197800345" x2="500.81742472453044" y2="521.5061836814508" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9084)"/><line x1="521.6507455357909" y1="491.36697379769754" x2="523.4004212831705" y2="520.3181954326108" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9084)"/><line x1="544.6207461979427" y1="489.9196628699079" x2="546.9043558535353" y2="521.6555223269388" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9084)"/><polygon points="431.2,503.9 566.7,502.2 553.7,558.3 447.0,558.5" fill="#00441e" fill-opacity=".72" stroke="#00ff60" stroke-width="1.3" filter="url(#skr1x9084)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#00ff60" fill-opacity=".48">VIPER RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#00ff60" fill-opacity=".32">MECH RANGERS</text></svg>