roke-width="2.6" filter="url(#wmr1x3245)"/><polygon points="827.1,292.9 967.9,295.0 968.4,589.6 899.3,728.2 826.1,590.2" fill="url(#carbonr1x3245)"/><polygon points="860.9,361.3 937.5,361.9 935.9,540.7 896.3,631.6 859.3,543.1" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="844.5154398011603" y1="431.4514842434786" x2="948.5872256746144" y2="429.6585566855035" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.0676621025988" y1="333.10262179067354" x2="898.0784282413871" y2="592.5311301585286" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="829.1226574431732" y1="297.34908840302376" x2="966.2192336132377" y2="297.3194070797413" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="899.3311088738591" cy="431.6092571362853" r="18.0" fill="url(#bevelr1x3245)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x3245)"/></g><rect x="451.2950462437235" y="558.0008030766621" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3245)"/><rect x="425.77678972808644" y="577.0841877127998" width="152.0" height="26.0" fill="url(#bevelr1x3245)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x3245)"/><polygon points="306.6,382.4 352.0,293.4 500.8,277.0 649.9,295.3 692.2,379.1 668.2,503.6 499.7,566.8 331.9,502.0" fill="url(#suitr1x3245)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x3245) url(#metalr1x3245)"/><polygon points="309.2,382.2 348.7,295.7 499.2,278.1 649.2,294.4 691.5,382.1 668.0,505.3 500.1,566.0 332.7,502.9" fill="url(#carbonr1x3245)"/><polygon points="381.0,303.1 500.4,285.9 618.9,303.2 607.8,379.5 392.4,380.9" fill="url(#suitHir1x3245)"/><polygon points="381.2,382.3 365.6,425.2 431.5,504.6 501.1,526.9 568.7,505.1 633.6,425.0 620.3,382.3" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x3245)"/><polygon points="380.1,409.8 477.2,409.9 483.9,440.3 388.0,439.4" fill="#2060ff" filter="url(#glowr1x3245)"/><polygon points="524.4,412.6 617.8,409.8 610.4,439.4 516.2,438.3" fill="#2060ff" filter="url(#glowr1x3245)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.6854598436132" y1="414.7345354590565" x2="514.0869403918647" y2="412.4958425827324" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="482.9417307179049" y1="437.3282091616653" x2="516.1063102063164" y2="439.645046227891" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.26980624208227" y1="455.1276972104795" x2="499.6236689073965" y2="481.389340545889" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3245)"/><line x1="452.42661039603877" y1="491.8898337525315" x2="454.91493803950027" y2="519.0290619015693" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3245)"/><line x1="477.04362278956916" y1="490.56517384760076" x2="476.83922673719" y2="519.0022849571891" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3245)"/><line x1="498.76114251809196" y1="489.7889864061027" x2="499.19545695390553" y2="519.5336248122155" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3245)"/><line x1="523.5012037907354" y1="489.7648362495936" x2="521.798973549772" y2="518.6465847516432" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3245)"/><line x1="546.3423886710033" y1="490.80219388818364" x2="544.7896657713876" y2="521.3037930916064" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3245)"/><polygon points="433.7,502.8 568.8,504.3 552.7,555.9 446.5,556.0" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x3245)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0" 