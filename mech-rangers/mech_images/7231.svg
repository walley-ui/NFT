t x="114.8" y="702.0" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x7231)"/><rect x="747.0"  y="702.0" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x7231)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x7231)"/><rect x="749.8"  y="701.6" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x7231)"/><rect x="120.9" y="701.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><rect x="756.9" y="699.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><rect x="151.7" y="700.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><rect x="784.0" y="699.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><rect x="180.6" y="699.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><rect x="815.6" y="699.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><rect x="210.2" y="699.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><rect x="842.1" y="698.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x7231)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x7231)"/><ellipse cx="185.07204208750278" cy="710.3203315743058" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x7231)"/><ellipse cx="817.1699622010067" cy="711.1418444899655" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x7231)"/></g><rect x="448.7997823767364" y="556.8032670807094" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x7231)"/><rect x="424.53020893679934" y="574.2927044104784"