" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x5424)"/><line x1="902.7805002179556" y1="772.330681580212" x2="911.7935287372768" y2="132.22388499844817" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.3,150.4 934.4,151.1 916.1,-9.9" fill="url(#blader1x5424)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x5424)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="880.4660679244064" y="419.9051993194036" width="40.0" height="20.0" fill="url(#bevelr1x5424)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5424)"/><rect x="877.7586979155988" y="512.3510313474573" width="40.0" height="20.0" fill="url(#bevelr1x5424)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5424)"/><rect x="878.2363630575687" y="602.9098005967214" width="40.0" height="20.0" fill="url(#bevelr1x5424)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5424)"/><rect x="878.6349651032687" y="692.7781252606771" width="40.0" height="20.0" fill="url(#bevelr1x5424)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5424)"/><ellipse cx="898.3881672707945" cy="790.6352770934812" rx="22.0" ry="15.0" fill="url(#bevelr1x5424)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5424)"/></g><rect x="449.0594750563614" y="556.0856945370324" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5424)"/><rect x="424.22891450133176" y="575.2856414767914" width="152.0" height="26.0" fill="url(#bevelr1x5424)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x5424)"/><polygon points="306.5,381.9 349.9,293.6 500.9,279.9 648.0,295.0 691.7,379.7 669.3,502.0 500.1,565.6 329.4,504.9" fill="url(#suitr1x5424)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x5424) url(#metalr1x5424)"/><polygon points="306.3,379.4 348.9,293.7 500.8,277.5 651.2,293.5 693.7,379.3 669.7,503.4 499.2,565.3 331.9,503.5" fill="url(#carbonr1x5424)"/><polygon points="380.4,301.5 499.0,285.6 619.9,300.9 605.8,379.8 393.6,378.9" fill="url(#suitHir1x5424)"/><polygon points="379.6,379.4 366.0,425.5 433.9,502.2 500.7,528.8 567.5,502.0 632.9,424.1 619.6,382.2" fill="#050508" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x5424)"/><polygon points="381.1,411.5 477.8,412.4 483.8,438.8 389.4,438.5" fill="#ffcc00" filter="url(#glowr1x5424)"/><polygon points="521.4,410.0 619.3,410.1 611.3,440.0 516.6,439.2" fill="#ffcc00" filter="url(#glowr1x5424)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.6291675083898" y1="413.79622575435786" x2="517.116031715218" y2="414.3909551971592" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="485.85592494519426" y1="436.3806710519828" x2="515.9222502184473" y2="439.7063730251044" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="499.7082551707514" y1="455.6267558527179" x2="498.63881187671797" y2="482.16564700622115" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5424)"/><line x1="452.6048335282877" y1="491.8792105636559" x2="453.3972915983573" y2="518.2736035738141" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5424)"/><line x1="476.8669401421584" y1="493.09170836238184" x2="475.3166476290114" y2="520.4780163177289" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5424)"/><line x1="499.22022860255095" y1="489.62284291815007" x2="500.72979416986925" y2="520.4217503979802" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5424)"/><line x1="522.9329067927413" y1="491.47489638673136" x2="522.7855543682911" y2="521.7168620985001" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5424)"/><line x1="546.042925101351" y1="490.36479626987125" x2="547.8258536950872" y2="520.4241669