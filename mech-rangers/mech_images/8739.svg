.6,381.2" fill="url(#suitHir1x8739)"/><polygon points="379.9,378.8 366.6,424.2 431.8,503.9 501.4,527.7 566.8,504.3 633.8,424.0 619.4,379.3" fill="#050508" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x8739)"/><polygon points="381.8,411.1 475.5,412.7 483.5,438.4 386.9,440.0" fill="#ffcc00" filter="url(#glowr1x8739)"/><polygon points="524.5,412.8 618.4,411.0 611.1,439.0 516.7,438.6" fill="#ffcc00" filter="url(#glowr1x8739)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.9535570457205" y1="412.2196952724829" x2="514.8778346997127" y2="414.9536932021379" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="485.97050364963707" y1="439.77219920195637" x2="513.9248401923478" y2="439.05757186040285" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.95247330321" y1="454.8743114335462" x2="500.13359205015" y2="483.9132711822167" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8739)"/><line x1="454.793053487204" y1="489.53725431244817" x2="453.3424725543521" y2="521.727549135685" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8739)"/><line x1="477.99585415817796" y1="490.4186935920268" x2="478.25025778481734" y2="518.566085729748" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8739)"/><line x1="501.2902575207874" y1="489.52528591109433" x2="501.6005613270216" y2="520.6869135987945" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8739)"/><line x1="521.9497968331538" y1="491.3029549460858" x2="521.5194173857196" y2="518.9029926857911" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8739)"/><line x1="547.4563355005533" y1="491.3971547050401" x2="547.3415185790695" y2="520.703513276577" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1