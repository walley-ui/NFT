.1" y="523.9" width="9.3" height="17.4" rx="1" fill="#00ff60" stroke="#0a0520" stroke-width=".6"/></g><g><polygon points="31.2,293.8 172.6,292.8 173.6,591.4 102.9,726.3 32.2,593.0" fill="url(#titaniumr1x5814)" stroke="#00ff60" stroke-width="2.6" filter="url(#wmr1x5814)"/><polygon points="33.2,294.8 171.8,294.1 173.8,590.5 102.8,728.0 33.3,590.3" fill="url(#carbonr1x5814)"/><polygon points="64.5,361.7 139.4,360.8 141.9,542.3 103.3,630.0 64.6,540.2" fill="#00ff60" fill-opacity=".28" stroke="#00ff60" stroke-width="1.5"/><line x1="48.36506695937362" y1="431.3237529876642" x2="154.30964560419318" y2="431.4632862548344" stroke="#00ff60" stroke-opacity=".65" stroke-width="1.3"/><line x1="101.41662226285783" y1="332.00173344658685" x2="101.49706152597439" y2="591.2149255461991" stroke="#00ff60" stroke-opacity=".4" stroke-width="1"/><line x1="34.95413979081434" y1="297.55662084119393" x2="171.7141288046166" y2="296.5563726766035" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.2809060212597" cy="431.8636389825493" r="18.0" fill="url(#bevelr1x5814)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x5814)"/></g><rect x="450.4454297538847" y="557.9111021357588" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x5814)"/><rect x="425.34237431799994" y="574.0367447866128" width="152.0" height="26.0" fill="url(#bevelr1x5814)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x5814)"/><polygon points="307.1,379.4 350.3,293.7 499.7,278.9 649.8,293.2 690.6,382.2 669.6,503.7 500.8,565.4 332.5,504.7" fill="url(#suitr1x5814)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x5814) url(#metalr1x5814)"/><polygon points="306.5,381.8 348.6,294.3 500.6,277.8 648.4,293.5 693.8,380.9 668.8,503.1 500.7,563.9 330.3,505.3" fill="url(#carbonr1x5814)"/><polygon points="381.7,302.7 501.2,287.3 619.3,302.9 608.8,380.6 392.4,378.9" fill="url(#suitHir1x5814)"/><polygon points="379.3,382.3 364.9,427.2 432.4,505.0