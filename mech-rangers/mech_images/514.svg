"575.3084067794495" width="152.0" height="26.0" fill="url(#bevelr1x514)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x514)"/><polygon points="308.9,381.4 350.9,295.5 498.8,277.7 649.9,294.7 690.7,380.4 669.8,502.4 500.0,565.2 332.0,504.2" fill="url(#suitr1x514)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x514) url(#metalr1x514)"/><polygon points="306.8,382.0 348.9,296.0 501.7,279.9 649.2,295.4 693.5,378.9 667.6,502.1 498.3,563.4 330.5,504.7" fill="url(#carbonr1x514)"/><polygon points="380.4,303.9 500.9,284.7 617.5,303.9 607.6,379.6 391.9,382.3" fill="url(#suitHir1x514)"/><polygon points="381.5,381.5 364.7,424.0 432.6,504.9 500.6,529.7 566.1,505.2 635.1,425.3 618.5,379.7" fill="#0d1520" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x514)"/><polygon points="382.3,412.8 477.6,410.0 484.2,440.4 390.3,439.6" fill="#ffd700" filter="url(#glowr1x514)"/><polygon points="522.5,412.1 620.4,411.9 611.1,441.8 515.9,441.2" fill="#ffd700" filter="url(#glowr1x514)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.0431229895539" y1="413.84525892231613" x2="515.8019593819417" y2="412.59663233896714" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="486.27170740799977" y1="436.89980827672406" x2="513.5831880967505" y2="437.77665908960626" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="499.91637078318746" y1="455.40765293063595" x2="501.0006828626618" y2="483.9812399193645" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x514)"/><line x1="454.96523424040527" y1="490.83954002689563" x2="455.13037067705767" y2="521.1330711650662" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x514)"/><line x1="475.70049088498575" y1="490.7528998234309" x2="475.3937058159523" y2="519.057730749622" stroke="#ffd700" stroke-opacity="