lter="url(#wmr1x4022)"/><rect x="830.9430727351084" y="420.78395726922895" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x4022)"/><rect x="839.0800812758133" y="405.03448845893143" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x4022)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x4022)"/><circle cx="879.5931433172524" cy="412.73952765213323" r="15.0" fill="#ffd700" opacity=".8" filter="url(#glowr1x4022)"/><circle cx="878.3339615834504" cy="415.7644336850382" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="944.4690344922803" y="456.5657267119735" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x4022)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x4022)"/><circle cx="1019.892304883767" cy="470.6232613905333" r="18.0" fill="#ffd700" filter="url(#glowr1x4022)" opacity=".88"/><circle cx="1020.5514008058794" cy="471.70147922541946" r="7.0" fill="#ffffff"/><rect x="872.9263212285564" y="502.99484687903896" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x4022)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x4022)"/><rect x="833.7577791154944" y="422.4804310355335" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="858.2578813592531" y1="488.03062442000953" x2="857.5681965297647" y2="519.0449999406934" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/><line x1="872.8953164740093" y1="487.43734261821953" x2="874.0281356279366" y2="519.9029893139377" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/><line x1="891.1860467667319" y1="484.76590692214666" x2="888.2187169931457" y2="521.0044144552201" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.8279326270334" y="558.047835060209" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x4022)"/><rect x="425.2432532628998" y="574.2584468916059" width="152.0" height="26.0" fill="url(#bevelr1x4022)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x4022)"/><polyg