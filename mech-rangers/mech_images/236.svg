ill="#ffd700" stroke="#050508" stroke-width=".6"/></g><rect x="448.5180293242447" y="556.0689830061048" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x236)"/><rect x="422.4519043652341" y="573.6839470338076" width="152.0" height="26.0" fill="url(#bevelr1x236)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x236)"/><polygon points="307.3,379.9 350.8,293.8 499.3,278.3 649.9,293.5 690.7,380.3 670.2,503.6 498.3,564.3 331.3,504.8" fill="url(#suitr1x236)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x236) url(#metalr1x236)"/><polygon points="307.5,379.1 350.3,295.9 501.6,276.8 651.1,295.0 691.6,381.0 667.8,503.5 498.6,565.9 331.6,502.2" fill="url(#carbonr1x236)"/><polygon points="381.3,304.3 501.0,286.1 619.1,304.1 609.1,381.6 393.1,380.8" fill="url(#suitHir1x236)"/><polygon points="381.5,378.9 364.9,424.5 434.3,503.7 501.7,529.2 566.1,502.6 635.5,425.6 618.9,379.7" fill="#050508" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x236)"/><polygon points="380.5,409.6 477.5,411.8 483.4,441.5 389.0,439.9" fill="#ffd700" filter="url(#glowr1x236)"/><polygon points="523.4,411.0 620.4,413.1 612.5,438.7 514.4,440.5" fill="#ffd700" filter="url(#glowr1x236)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.7766445195861" y1="412.84195546600967" x2="513.9943264152296" y2="412.40150370597837" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="483.7805703417025" y1="437.8120088727213" x2="517.0306826735288" y2="439.6040352436714" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="501.496682556998" y1="454.26469415575264" x2="501.6399595224299" y2="483.1511565211229" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x236)"/><line x1="454.0001832571626" y1="491.3232540749013" x2="452.3494290697202" y2="5