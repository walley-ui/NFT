line x1="98.01851547177878" y1="772.1495878213085" x2="89.84384738117453" y2="132.16618152698499" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="74.7,151.9 141.1,150.6 84.9,-9.2" fill="url(#blader1x5093)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x5093)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="82.73228263076392" y="421.25812803180884" width="40.0" height="20.0" fill="url(#bevelr1x5093)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x5093)"/><rect x="84.3346349835768" y="510.02399793239306" width="40.0" height="20.0" fill="url(#bevelr1x5093)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x5093)"/><rect x="83.49881733929735" y="601.5330016045831" width="40.0" height="20.0" fill="url(#bevelr1x5093)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x5093)"/><rect x="84.52758589921515" y="690.9103629253805" width="40.0" height="20.0" fill="url(#bevelr1x5093)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x5093)"/><ellipse cx="102.19153587300328" cy="790.8415927693247" rx="22.0" ry="15.0" fill="url(#bevelr1x5093)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x5093)"/></g><rect x="448.31141259055585" y="557.5449342574924" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x5093)"/><rect x="422.8586208266206" y="573.5507422669791" width="152.0" height="26.0" fill="url(#bevelr1x5093)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x5093)"/><polygon points="308.9,379.0 351.5,293.8 498.4,279.2 649.9,296.1 693.2,379.8 668.4,502.4 499.7,564.8 331.9,505.0" fill="url(#suitr1x5093)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x5093) url(#metalr1x5093)"/><polygon points="309.2,381.8 352.0,296.1 499.6,276.9 650.8,294.2 691.0,380.8 667.2,502.9 501.3,566.6 330.8,503.3" fill="url(#carbonr1x5093)"/><polygon points="382.7,303.3 501.4,285.8 618.7,304.4 606.4,379.2 39