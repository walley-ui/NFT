ke-linecap="round" filter="url(#wmr1x5265)"/><line x1="903.5569966297224" y1="810.5987712824717" x2="900.6531862544455" y2="132.55914603369308" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="881.3397692215257" y="620.2434465099126" width="32.0" height="18.0" fill="url(#bevelr1x5265)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x5265)"/><rect x="883.6312202087231" y="442.2274732744321" width="32.0" height="18.0" fill="url(#bevelr1x5265)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x5265)"/><rect x="883.047810482569" y="259.74440748970954" width="32.0" height="18.0" fill="url(#bevelr1x5265)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x5265)"/><circle cx="898.6145751773939" cy="109.89392574680967" r="58.0" fill="rgba(0,0,0,.52)" stroke="#00ff60" stroke-width="2.2" filter="url(#wmr1x5265)"/><circle cx="897.2367209044844" cy="110.68014516551045" r="46.0" fill="url(#orbr1x5265)" filter="url(#bloomr1x5265)"/><circle cx="899.6157691651583" cy="111.32421437287701" r="20.0" fill="#00ff60" filter="url(#glowr1x5265)"/><circle cx="899.0669108206965" cy="110.45629491535945" r="66.0" fill="none" stroke="#00ff60" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="897.2453315439262" cy="112.29278329536317" rx="66.0" ry="30.0" fill="none" stroke="#00ff60" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="450.87158454107123" y="557.0838346135803" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x5265)"/><rect x="422.4493551233783" y="574.2441378748044" width="152.0" height="26.0" fill="url(#bevelr1x5265)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x5265)"/><polygon points="306.3,379.1 349.2,295.0 501.3,279.5 648.8,295.8 691.7,380.1 667.5,505.1 500.4,566.2 332.1,504.8" fill="url(#suitr1x5265)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x5265) url(#metalr1x5