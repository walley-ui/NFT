-opacity=".38" stroke-width="1"/><line x1="842.5" y1="701.7" x2="843.5" y2="783.8" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><polygon points="234.1,417.7 764.0,418.5 722.0,661.2 275.8,663.1" fill="url(#suitr1x5251)" stroke="#ccccff" stroke-width="2.6" filter="url(#skr1x5251) url(#metalr1x5251)"/><polygon points="233.8,418.9 766.0,419.3 722.1,662.3 278.6,661.7" fill="url(#carbonr1x5251)"/><polygon points="368.3,418.9 633.2,417.1 613.1,513.8 387.7,515.3" fill="url(#suitHir1x5251)"/><line x1="363.6" y1="470.7" x2="639.0" y2="471.5" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x5251)"/><line x1="397.5" y1="548.3" x2="600.5" y2="550.7" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x5251)"/><line x1="267.6" y1="490.3" x2="321.2" y2="489.3" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.5" y1="489.8" x2="732.1" y2="492.2" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.2" y1="521.1" x2="318.7" y2="524.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.0" y1="523.9" x2="733.8" y2="522.0" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.1" y1="553.5" x2="319.3" y2="553.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.8" y1="554.2" x2="733.0" y2="554.5" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.6" y1="585.4" x2="318.8" y2="586.1" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.5" y1="585.1" x2="731.5" y2="586.8" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x5251)"><ellipse cx="501.0" cy="510.1" rx="42.9" ry="23.2" fill="#1e0600" stroke="#ccccff" stroke-width="1.6" filter="url(#skr1x5251)"/><circle cx="498.5" cy="511.7" r="15.1" fill="#ccccff"/><circle cx="497.2" cy="506.8" r="5.8" fill="#1e0600"/><ellipse cx="494.3" cy="505.6" rx="3.5" ry="2.3" fill="rgba(255,255,255,.7)"/></g><g><rect x="33.8236022