oke-linecap="round" filter="url(#wmr1x4826)"/><line x1="97.64846550080922" y1="771.5418876557611" x2="89.60650886598971" y2="130.25491089317944" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="74.4,151.0 140.3,153.2 82.5,-8.4" fill="url(#blader1x4826)" stroke="#ffd700" stroke-width="1.8" filter="url(#wmr1x4826)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="82.77089719031002" y="419.9375262110494" width="40.0" height="20.0" fill="url(#bevelr1x4826)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x4826)"/><rect x="84.95772744895888" y="510.8050112303346" width="40.0" height="20.0" fill="url(#bevelr1x4826)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x4826)"/><rect x="84.2743714391626" y="603.0559253799729" width="40.0" height="20.0" fill="url(#bevelr1x4826)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x4826)"/><rect x="83.69409733939912" y="691.5817525438033" width="40.0" height="20.0" fill="url(#bevelr1x4826)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x4826)"/><ellipse cx="101.58346331123259" cy="790.8539583681151" rx="22.0" ry="15.0" fill="url(#bevelr1x4826)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x4826)"/></g><rect x="449.9131703789346" y="556.6064490139485" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x4826)"/><rect x="423.2131929252297" y="576.0130185371265" width="152.0" height="26.0" fill="url(#bevelr1x4826)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x4826)"/><polygon points="308.0,381.4 349.5,295.3 498.8,279.1 650.8,295.0 693.5,382.0 668.9,504.2 501.8,563.5 329.8,503.6" fill="url(#suitr1x4826)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x4826) url(#metalr1x4826)"/><polygon points="309.1,379.0 350.8,295.2 499.3,279.6 649.6,293.8 692.7,380.2 669.9,502.5 499.7,565.4 332.1,503.7" fill="url(#carbonr1x4826)"/><polygon points="381.8,