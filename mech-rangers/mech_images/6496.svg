 x2="84.36978767406193" y2="112.80889446530489" stroke="url(#chromer1x6496)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x6496)"/><line x1="98.83157586170357" y1="771.8231228290125" x2="87.58460245126855" y2="132.40312482956796" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="75.4,152.5 140.6,151.9 83.3,-7.3" fill="url(#blader1x6496)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x6496)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="83.98789215752852" y="420.7174995838664" width="40.0" height="20.0" fill="url(#bevelr1x6496)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x6496)"/><rect x="83.5142494062334" y="509.6777196096256" width="40.0" height="20.0" fill="url(#bevelr1x6496)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x6496)"/><rect x="82.05095667181533" y="602.186274335254" width="40.0" height="20.0" fill="url(#bevelr1x6496)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x6496)"/><rect x="84.07142925973979" y="691.7383297656662" width="40.0" height="20.0" fill="url(#bevelr1x6496)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x6496)"/><ellipse cx="100.60260171921921" cy="791.4443132663146" rx="22.0" ry="15.0" fill="url(#bevelr1x6496)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x6496)"/></g><rect x="451.7229220745154" y="556.6129602322354" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x6496)"/><rect x="424.6274688238278" y="573.7039958245122" width="152.0" height="26.0" fill="url(#bevelr1x6496)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x6496)"/><polygon points="308.4,378.9 352.0,295.9 501.6,278.6 649.1,294.5 693.1,381.8 669.7,503.4 499.2,563.8 329.4,502.2" fill="url(#suitr1x6496)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x6496) url(#metalr1x6496)"/><polygon points="307.8,381.8 349.4,294.7 498.8,279.3 648.1,295.5 6