.7" y="523.9" width="9.3" height="17.4" rx="1" fill="#ff44aa" stroke="#0d1520" stroke-width=".6"/></g><g><polygon points="33.9,292.4 172.7,292.9 171.9,590.7 102.3,728.2 32.2,591.7" fill="url(#titaniumr1x5131)" stroke="#ff44aa" stroke-width="2.6" filter="url(#wmr1x5131)"/><polygon points="31.3,294.8 173.6,293.9 173.4,593.0 102.4,726.6 33.5,589.6" fill="url(#carbonr1x5131)"/><polygon points="62.6,360.2 141.9,360.3 140.2,540.9 102.9,630.9 65.3,540.7" fill="#ff44aa" fill-opacity=".28" stroke="#ff44aa" stroke-width="1.5"/><line x1="50.711885510701656" y1="431.56749981231985" x2="152.91794603405518" y2="429.86690916884686" stroke="#ff44aa" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.7782915174402" y1="332.25301697766406" x2="103.77896190866825" y2="592.0171406184323" stroke="#ff44aa" stroke-opacity=".4" stroke-width="1"/><line x1="33.4739732434414" y1="295.7243662652559" x2="171.59437302019444" y2="296.396501961071" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.20280387405303" cy="432.56280892537904" r="18.0" fill="url(#bevelr1x5131)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x5131)"/></g><rect x="450.5135532528162" y="556.5192803524434" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x5131)"/><rect x="424.12059095306324" y="576.6141736189835" width="152.0" height="26.0" fill="url(#bevelr1x5131)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x5131)"/><polygon points="306.3,381.9 349.5,295.2 500.4,279.6 648.8,294.8 691.9,380.6 669.8,503.2 501.4,564.5 331.7,504.5" fill="url(#suitr1x5131)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x5131) url(#metalr1x5131)"/><polygon points="306.8,382.1 349.9,295.3 498.5,279.5 651.0,293.0 691.2,380.6 667.9,503.4 501.3,566.2 331.1,501.9" fill="url(#carbonr1x5131)"/><polygon points="380.6,302.3 500.6,287.1 617.6,303.8 608.9,381.5 391.7,380.7" fill="url(#suitHir1x5131)"/><polygon points="380.1,379.3 366.2,424.1 432.6,504