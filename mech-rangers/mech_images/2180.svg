7.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="114.4,689.9 147.0,690.1 189.7,271.0" fill="url(#blader1x2180)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x2180)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="67.51143429217856" y="681.9656919896603" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x2180)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x2180)"/></g><rect x="450.0421948500909" y="556.6512689453549" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x2180)"/><rect x="424.63336942549796" y="576.334041819349" width="152.0" height="26.0" fill="url(#bevelr1x2180)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x2180)"/><polygon points="309.7,381.6 349.9,293.8 498.7,276.8 651.4,294.7 692.0,379.0 669.3,504.2 499.2,566.5 329.5,502.7" fill="url(#suitr1x2180)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x2180) url(#metalr1x2180)"/><polygon points="306.5,381.9 351.2,295.2 498.7,277.5 650.0,293.3 691.7,381.9 670.2,503.8 499.7,566.4 331.4,505.3" fill="url(#carbonr1x2180)"/><polygon points="380.2,302.4 499.2,285.2 618.5,302.0 609.0,380.9 393.9,380.0" fill="url(#suitHir1x2180)"/><polygon points="381.9,382.2 364.5,426.2 432.2,504.3 501.4,527.8 565.7,501.9 633.3,426.0 619.0,380.7" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x2180)"/><polygon points="381.8,412.8 476.9,410.9 483.7,439.6 388.2,440.1" fill="#ff2040" filter="url(#glowr1x2180)"/><polygon points="521.7,412.8 619.5,409.9 611.7,440.0 514.3,440.2" fill="#ff2040" filter="url(#glowr1x2180)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.64543694589287" y1="414.7566877881065" x2="514.0917123065702" y2="413.276047419291" stroke="