 filter="url(#wmr1x1842)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x1842)" opacity=".9"/><line x1="908.4002542035655" y1="671.7470705626532" x2="899.3593014914728" y2="-127.1581605749205" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="887.5917461627349" y1="672.1394857873208" x2="895.6423386326992" y2="-128.16911057326945" stroke="#2060ff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="842.2964962431789" y="669.121311751008" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x1842)" stroke="#2060ff" stroke-width="1.6" filter="url(#wmr1x1842)"/><rect x="866.6157818018087" y="674.1196841227821" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="886.5790318896621" y="676.3953796804882" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="884.0501585992612" y="686.0811949548312" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="886.6967092034967" y="695.056619879324" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="886.1722654679418" y="701.8550432947465" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="887.4024185747468" y="709.5646357914433" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="884.8239872399346" y="719.1297758108936" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><ellipse cx="898.8312091269158" cy="725.0712695922703" rx="22.0" ry="16.0" fill="url(#bevelr1x1842)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x1842)"/></g><rect x="450.8225742364302" y="555.5883100525476" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1842)"/><rect x="425.79349385360257" y="573.6059367171489" width="152.0" height="26.0" fill="url(#bevelr1x1842)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1842)"/><polygon points="306.6,381.3 348.5,295.2 500.8,276.5 648.3,295.4 691.5,379.4 667.4,503.5 501.0,563.6 330.8,502.9" fill="url(#suitr1x1842)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x1842) url(#metalr1x1842)"/><polygon points="309.5,381.4 352.0,295.4 500.2,279.6 651.4,294.3 693.8,381.4 670.0,502.5 499.6,563.9 331.9,504.1" fill="url(#carbonr1x1842)"/><polygon points="380.4,301.1 500.2,284.9 619.0,301.3 607.2,379.6 390.8,378.8" fill="url(#suitHir1x1842)"/><polygon points="380.4,380.8 364.0,424.9 433.7,502.5 500.5,528.8 567.7,503.8 634.6,427.0 620.4,380.6" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x1842)"/><polygon points="382.1,412.3 477.3,411.1 483.7,439.7 387.4,440.1" fill="#2060ff" filter="url(#glowr1x1842)"/><polygon points="523.5,410.6 618.6,412.1 611.5,438.9 514.6,440.6" fill="#2060ff" filter="url(#glowr1x1842)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="482.90772255813704" y1="414.77867239192125" x2="514.4874776186795" y2="412.0833418504335" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.0729395221546" y1="439.23642993103715" x2="516.0158669657446" y2="439.0476991527714" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.41664770822973" y1="454.1664447037503" x2="498.40347613934426" y2="482.79264026265594" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1842)"/><line x1="452.18243412792685" y1="492.3181828716769" x2="455.64094186916947" y2="520.092574457638" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1842)"/><line x1="478.4823183765076" y1="491.94294608179473" x2="478.56532176271077" y2="520.8972309418954" stroke="#2060ff" stroke-opacity=".52" strok