 x1="501.3588796038181" y1="453.83712590811774" x2="499.27794540207833" y2="483.5818468927406" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2268)"/><line x1="454.24416581530124" y1="492.5116099162958" x2="454.75037330396475" y2="520.5248263786547" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2268)"/><line x1="478.6806906140782" y1="492.80238318741317" x2="476.13300666579977" y2="521.5260651031509" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2268)"/><line x1="499.8044177350588" y1="492.70140485009176" x2="499.1280129867606" y2="518.5243235090747" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2268)"/><line x1="522.8905020136945" y1="492.90342658925795" x2="524.5459767507016" y2="520.1065228765831" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2268)"/><line x1="547.2295017832146" y1="489.68921866118905" x2="545.3450917250664" y2="518.3708665252664" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2268)"/><polygon points="432.0,504.4 568.1,503.6 554.9,556.5 447.4,556.1" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x2268)"/><polygon points="478.1,304.4 524.8,302.3 512.9,174.2 488.5,176.1" fill="url(#bevelr1x2268)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x2268)"/><polygon points="364.6,324.9 458.8,321.6 467.7,227.9" fill="url(#bevelr1x2268)" fill-opacity=".78" stroke="#2060ff" stroke-width="1.5" filter="url(#skr1x2268)"/><polygon points="541.7,323.9 635.2,323.3 530.8,228.7" fill="url(#bevelr1x2268)" fill-opacity=".78" stroke="#2060ff" stroke-width="1.5" filter="url(#skr1x2268)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">CO