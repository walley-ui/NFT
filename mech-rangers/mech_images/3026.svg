ke-linecap="round" filter="url(#wmr1x3026)"/><line x1="904.3389309564233" y1="771.5777246328071" x2="913.5220483146236" y2="131.75265514142808" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.3,150.0 936.5,153.1 917.0,-7.0" fill="url(#blader1x3026)" stroke="#ff44aa" stroke-width="1.8" filter="url(#wmr1x3026)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.1435327690654" y="419.70417139399797" width="40.0" height="20.0" fill="url(#bevelr1x3026)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x3026)"/><rect x="878.4155254633725" y="513.1338335413485" width="40.0" height="20.0" fill="url(#bevelr1x3026)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x3026)"/><rect x="877.4168469450996" y="602.7813236482441" width="40.0" height="20.0" fill="url(#bevelr1x3026)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x3026)"/><rect x="877.1666670734622" y="691.5222452532499" width="40.0" height="20.0" fill="url(#bevelr1x3026)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x3026)"/><ellipse cx="896.3096259951219" cy="791.1042530919425" rx="22.0" ry="15.0" fill="url(#bevelr1x3026)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x3026)"/></g><rect x="449.6765735297464" y="556.9413358324207" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x3026)"/><rect x="422.77494644727557" y="574.2915415798315" width="152.0" height="26.0" fill="url(#bevelr1x3026)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x3026)"/><polygon points="308.5,381.8 351.2,295.8 500.6,279.6 650.8,293.2 693.4,379.9 668.5,502.2 499.7,565.6 330.7,503.6" fill="url(#suitr1x3026)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x3026) url(#metalr1x3026)"/><polygon points="307.2,380.1 348.7,295.4 499.8,277.6 648.6,295.6 691.1,380.9 669.8,502.1 499.5,565.2 332.2,504.8" fill="url(#carbonr1x3026)"/><polygon points="38