 x1="522.9253219456971" y1="492.6749167528003" x2="521.4023818398452" y2="520.6843481119722" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9249)"/><line x1="545.478205929622" y1="492.52834280682725" x2="544.7924405727722" y2="519.8385519008152" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9249)"/><polygon points="433.9,504.0 565.6,502.4 555.1,556.4 447.5,557.1" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x9249)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>