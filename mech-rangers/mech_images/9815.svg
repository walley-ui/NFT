ter="url(#wmr1x9815)"/><rect x="831.1987002151646" y="422.19687346303834" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x9815)"/><rect x="837.7211160039157" y="404.72625125115735" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x9815)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x9815)"/><circle cx="877.0787418244034" cy="412.9869252985343" r="15.0" fill="#ff44aa" opacity=".8" filter="url(#glowr1x9815)"/><circle cx="876.4051505155489" cy="415.2782376943156" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="945.3299700860493" y="455.56307142404836" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x9815)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x9815)"/><circle cx="1020.1333506191709" cy="471.92996096238494" r="18.0" fill="#ff44aa" filter="url(#glowr1x9815)" opacity=".88"/><circle cx="1019.6236376501248" cy="470.46548476191236" r="7.0" fill="#ffffff"/><rect x="873.2320602721162" y="501.332881849166" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x9815)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x9815)"/><rect x="833.7729007075169" y="423.72520019747316" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="856.6436359064281" y1="486.4134300057776" x2="859.1972869466618" y2="521.1215264717117" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="873.4139101247862" y1="485.1973936474882" x2="875.2269785562158" y2="518.0687415943481" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="888.3576285334863" y1="484.78723080735654" x2="888.2894170689956" y2="518.8219504632056" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.4556581232697" y="556.2186141121201" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x9815)"/><rect x="422.9787502645515" y="573.7820707078092" width="152.0" height="26.0" fill="url(#bevelr1x9815)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x9815)"/><polygo