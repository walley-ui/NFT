roke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x399)"/><line x1="544.3007031901926" y1="492.16389767872164" x2="547.2557466477342" y2="520.3498141825199" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x399)"/><polygon points="431.7,504.4 567.9,502.1 555.3,558.4 447.5,557.6" fill="#cc0020" fill-opacity=".72" stroke="#ff2040" stroke-width="1.3" filter="url(#skr1x399)"/><path d="M389.3992542838305 327.3892715904862 Q332.4752625597268 216.6043059051968 382.06027964944025 140.26636426914484" stroke="#ff2040" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#skr1x399)"/><path d="M387.34101683335376 327.95331426551564 Q329.7380335212312 217.30405038557947 381.09255342589694 139.7909909591079" stroke="rgba(255,255,255,.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M612.8935020230152 328.7706273288466 Q668.3419635086693 217.48517626561224 619.7946753901057 140.83871941165998" stroke="#ff2040" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#skr1x399)"/><path d="M613.0027860032767 326.063550620433 Q670.0643526944705 216.96265157684684 620.394227577988 141.20965327695012" stroke="rgba(255,255,255,.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".48">CRIMSON RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".32">MECH RANGERS</text></svg>