oke-linecap="round" filter="url(#wmr1x3099)"/><line x1="901.7659081384168" y1="811.4013420072384" x2="900.799379206039" y2="132.2170802081935" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="880.9664232607558" y="620.6145760490559" width="32.0" height="18.0" fill="url(#bevelr1x3099)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x3099)"/><rect x="883.1004968745261" y="440.24026034232224" width="32.0" height="18.0" fill="url(#bevelr1x3099)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x3099)"/><rect x="880.8557294200733" y="262.69908454492685" width="32.0" height="18.0" fill="url(#bevelr1x3099)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x3099)"/><circle cx="896.0538165313751" cy="111.31444736439732" r="58.0" fill="rgba(0,0,0,.52)" stroke="#00ff60" stroke-width="2.2" filter="url(#wmr1x3099)"/><circle cx="896.6312637094036" cy="111.80788059290497" r="46.0" fill="url(#orbr1x3099)" filter="url(#bloomr1x3099)"/><circle cx="899.412370230686" cy="111.62967008547855" r="20.0" fill="#00ff60" filter="url(#glowr1x3099)"/><circle cx="896.6415677464195" cy="110.6007540233433" r="66.0" fill="none" stroke="#00ff60" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="897.0554917904176" cy="110.88161771651355" rx="66.0" ry="30.0" fill="none" stroke="#00ff60" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="451.2226905182004" y="558.2378505084663" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x3099)"/><rect x="422.81917180502785" y="576.9010641528293" width="152.0" height="26.0" fill="url(#bevelr1x3099)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x3099)"/><polygon points="308.5,379.3 350.0,292.7 498.7,277.7 648.5,295.1 691.4,382.3 667.9,502.7 498.5,564.6 331.5,505.0" fill="url(#suitr1x3099)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x3099) url(#metalr1x30