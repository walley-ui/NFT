ccff" fill-opacity=".92" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x540)"/><path d="M474.21485083241015 311.0215612966567 C305.2918960775621 146.09488259656354 418.8467795313709 240.83094903370363 499.7551311427727 310.0632338344119" fill="url(#suitHir1x540)" opacity=".28"/><path d="M527.3846265192329 310.3627754152752 C696.2385047787428 148.6560367745347 579.299560762532 242.17614267272873 500.5374382830225 311.2240738356486" fill="#ccccff" fill-opacity=".92" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x540)"/><path d="M526.2455287607573 309.12395611964166 C697.1084276125395 148.36998158534988 579.5856212423741 240.70841231485826 498.3741005836986 309.8121025002561" fill="url(#suitHir1x540)" opacity=".28"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>