.5533421563916" y="556.002644042857" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x762)"/><rect x="425.0544821701944" y="573.7953883751296" width="152.0" height="26.0" fill="url(#bevelr1x762)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x762)"/><polygon points="309.7,379.2 351.6,295.4 499.4,278.8 649.7,294.2 693.8,380.2 668.1,504.7 500.1,566.4 332.8,502.9" fill="url(#suitr1x762)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x762) url(#metalr1x762)"/><polygon points="307.7,381.3 350.8,294.3 499.0,277.1 648.4,293.4 690.2,380.6 669.6,504.8 501.7,566.1 331.4,502.6" fill="url(#carbonr1x762)"/><polygon points="381.0,303.0 498.9,286.1 617.5,302.0 606.3,379.0 393.0,378.9" fill="url(#suitHir1x762)"/><polygon points="381.9,380.5 365.8,426.7 432.9,503.2 499.2,530.0 566.1,502.5 635.9,426.0 619.4,381.1" fill="#0a0520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x762)"/><polygon points="382.0,412.4 477.1,410.8 483.6,439.7 389.1,438.9" fill="#ffcc00" filter="url(#glowr1x762)"/><polygon points="524.2,412.7 619.3,409.7 612.9,441.4 513.8,438.6" fill="#ffcc00" filter="url(#glowr1x762)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.9248423378542" y1="413.9458983549848" x2="514.89332794616" y2="413.1950889073312" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.71338757729154" y1="438.56522574378175" x2="516.7990067902393" y2="439.3531978402287" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="499.96538819232956" y1="453.7916754723526" x2="499.3622720334679" y2="484.11126043302943" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x762)"/><line x1="454.53785665340723" y1="492.472200769931" x2="455.2474981413968" y2="520.6740725901909" stroke="#ffcc00" stroke-opacity=".52" stroke-widt