184)"/><polygon points="395.3,305.3 444.1,303.0 418.5,207.3" fill="url(#bevelr1x184)" fill-opacity=".95" stroke="#ff44aa" stroke-width="1.6" filter="url(#skr1x184) url(#glowr1x184)"/><polygon points="477.8,303.8 521.9,304.9 499.1,222.2" fill="url(#bevelr1x184)" fill-opacity=".95" stroke="#ff44aa" stroke-width="1.6" filter="url(#skr1x184) url(#glowr1x184)"/><polygon points="559.2,305.4 602.7,303.5 579.4,207.2" fill="url(#bevelr1x184)" fill-opacity=".95" stroke="#ff44aa" stroke-width="1.6" filter="url(#skr1x184) url(#glowr1x184)"/><polygon points="637.5,303.2 684.5,305.3 661.1,197.3" fill="url(#bevelr1x184)" fill-opacity=".95" stroke="#ff44aa" stroke-width="1.6" filter="url(#skr1x184) url(#glowr1x184)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".48">SAKURA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".32">MECH RANGERS</text></svg>