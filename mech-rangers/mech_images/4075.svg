.2857819160446" x2="913.7317507145555" y2="110.87680106591431" stroke="url(#chromer1x4075)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x4075)"/><line x1="903.7097560749949" y1="771.8386294764466" x2="911.3786700582691" y2="131.23478970369322" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="868.8,150.5 937.5,152.3 916.8,-8.9" fill="url(#blader1x4075)" stroke="#ff44aa" stroke-width="1.8" filter="url(#wmr1x4075)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="877.5105561598763" y="419.8811220242642" width="40.0" height="20.0" fill="url(#bevelr1x4075)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x4075)"/><rect x="878.7189038017392" y="512.7505306046456" width="40.0" height="20.0" fill="url(#bevelr1x4075)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x4075)"/><rect x="878.7147307036072" y="600.7202736283652" width="40.0" height="20.0" fill="url(#bevelr1x4075)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x4075)"/><rect x="878.1955447674356" y="691.9281479491852" width="40.0" height="20.0" fill="url(#bevelr1x4075)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x4075)"/><ellipse cx="897.1577006472834" cy="792.2156086586416" rx="22.0" ry="15.0" fill="url(#bevelr1x4075)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x4075)"/></g><rect x="450.8871510067955" y="557.8325395170599" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x4075)"/><rect x="425.67937057148663" y="575.6145938382484" width="152.0" height="26.0" fill="url(#bevelr1x4075)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x4075)"/><polygon points="309.6,380.6 349.8,294.8 500.6,278.8 648.0,295.9 691.7,382.1 668.0,504.8 500.4,565.7 332.8,503.5" fill="url(#suitr1x4075)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x4075) url(#metalr1x4075)"/><polygon points="309.3,381.6 349.8,293.7 501.4