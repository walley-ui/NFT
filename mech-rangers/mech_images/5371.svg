4aa" stroke-width="2" filter="url(#wmr1x5371)"/><rect x="33.086361297722874" y="421.9153783644549" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x5371)"/><rect x="41.27064413525161" y="403.2491764768958" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x5371)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x5371)"/><circle cx="81.40977715648708" cy="415.26351296277716" r="15.0" fill="#ff44aa" opacity=".8" filter="url(#glowr1x5371)"/><circle cx="83.74982385089618" cy="412.989037253987" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="55.90754270222035" y="457.0954856470227" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x5371)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x5371)"/><circle cx="-18.967988793235303" cy="472.66570383682847" r="18.0" fill="#ff44aa" filter="url(#glowr1x5371)" opacity=".88"/><circle cx="-21.49404505003247" cy="471.341144497972" r="7.0" fill="#ffffff"/><rect x="77.56978463031348" y="502.0238594396971" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x5371)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x5371)"/><rect x="37.29135912287977" y="421.7977081402205" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="62.165375679116664" y1="487.3877430062741" x2="63.67348435599354" y2="517.7463334172032" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="76.68886980976906" y1="485.3619129472412" x2="79.89466401444744" y2="519.9062187681906" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="94.27359950033944" y1="484.9687785007991" x2="95.30780620215458" y2="520.1527019296773" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.9142758001573" y="555.3960835110396" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x5371)"/><rect x="423.34389736363664" y="575.0508737105877" width="152.0" height="26.0" fill="url(#bevelr1x5371)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="ur