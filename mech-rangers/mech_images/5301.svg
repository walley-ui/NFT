="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="912.3,692.3 945.0,690.2 987.5,272.1" fill="url(#blader1x5301)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x5301)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="863.5133728933148" y="681.1889449756592" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x5301)" stroke="#2060ff" stroke-width="1.4" filter="url(#wmr1x5301)"/></g><rect x="450.53418428655715" y="557.2138748574071" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x5301)"/><rect x="425.04582733046266" y="575.4257039479911" width="152.0" height="26.0" fill="url(#bevelr1x5301)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x5301)"/><polygon points="309.7,380.2 348.7,295.1 500.0,279.7 648.0,293.9 693.1,379.1 668.4,502.2 498.3,565.8 331.3,503.5" fill="url(#suitr1x5301)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x5301) url(#metalr1x5301)"/><polygon points="307.2,381.0 351.2,294.0 500.9,276.9 649.5,295.5 690.2,381.6 668.2,505.0 499.5,563.9 330.6,505.3" fill="url(#carbonr1x5301)"/><polygon points="382.2,302.7 501.4,286.3 620.6,302.8 606.4,382.0 392.3,379.2" fill="url(#suitHir1x5301)"/><polygon points="380.7,380.3 365.9,425.0 431.2,502.1 501.6,528.6 567.9,503.6 633.2,426.1 617.3,381.1" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x5301)"/><polygon points="380.2,410.7 478.2,412.2 484.9,438.6 387.8,438.3" fill="#2060ff" filter="url(#glowr1x5301)"/><polygon points="524.0,413.0 618.0,410.8 610.1,441.4 514.3,438.9" fill="#2060ff" filter="url(#glowr1x5301)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.0249963811226" y1="412.79274490512904" x2="516.9092065219209" y2="413.90516971433533" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="482.8795655459724" y1="437.14908754555506" x2="516.8991629760154" y2="437.509212922398" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="498.7657693663612" y1="453.706428010948" x2="500.0993377700448" y2="484.5507107266225" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5301)"/><line x1="454.4580178865977" y1="490.85702513875435" x2="452.5401853709296" y2="519.7955163626" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5301)"/><line x1="475.22707722451537" y1="490.69768159799276" x2="475.4890239957161" y2="520.0894594825804" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5301)"/><line x1="501.3711526915431" y1="492.10456147370854" x2="498.8192120398395" y2="518.2722427676432" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5301)"/><line x1="522.3084788228012" y1="489.816007169988" x2="522.1184547747113" y2="518.53176374482" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5301)"/><line x1="545.5660589324497" y1="492.1817014722153" x2="546.9520210169443" y2="520.1501424658112" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5301)"/><polygon points="432.8,505.2 566.3,502.5 553.6,556.4 447.1,557.0" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x5301)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>