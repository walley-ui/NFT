3" y="421.2664282985963" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x5401)"/><rect x="836.7338429047354" y="404.78211414385584" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x5401)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x5401)"/><circle cx="878.7898726272956" cy="413.769956313353" r="15.0" fill="#4444ff" opacity=".8" filter="url(#glowr1x5401)"/><circle cx="879.3007437121682" cy="412.70448166523124" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="944.7887264290453" y="456.5034674791619" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x5401)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x5401)"/><circle cx="1018.2319655114412" cy="472.9462610566057" r="18.0" fill="#4444ff" filter="url(#glowr1x5401)" opacity=".88"/><circle cx="1019.8747120275722" cy="471.7189250060357" r="7.0" fill="#ffffff"/><rect x="874.0839228395931" y="500.92579908687617" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x5401)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x5401)"/><rect x="833.8114247114956" y="422.0130226289853" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="856.2404183238373" y1="487.55551683893424" x2="858.924341303818" y2="518.5849312834441" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="872.9769720468298" y1="484.82025155881416" x2="875.4419447132015" y2="519.6398189005441" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="888.437336329706" y1="486.78427181933074" x2="889.1418248725682" y2="520.1705686025322" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.2131549494341" y="555.4424110149033" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x5401)"/><rect x="424.5113748414442" y="575.9601362525485" width="152.0" height="26.0" fill="url(#bevelr1x5401)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x5401)"/><polygon points="307.6,380.9 349.3,295.2 499.7,279.3 648.6