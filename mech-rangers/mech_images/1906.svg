.9" y="520.9" width="9.3" height="17.4" rx="1" fill="#2060ff" stroke="#050508" stroke-width=".6"/></g><g><rect x="837.3184778069705" y="397.5415549142286" width="175.0" height="118.0" rx="7" fill="url(#artilleryr1x1906)" stroke="#2060ff" stroke-width="2.6" filter="url(#wmr1x1906)"/><rect x="836.5264132395946" y="395.21222253171726" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x1906)"/><rect x="983.978724933099" y="447.8476755456999" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x1906)" stroke="#2060ff" stroke-width="1.4" filter="url(#wmr1x1906)"/><circle cx="881.5799917777628" cy="470.67735624313354" r="48.0" fill="rgba(0,0,0,.55)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x1906)"/><circle cx="883.5632779441402" cy="471.46978957569223" r="34.0" fill="#2060ff" fill-opacity=".4" filter="url(#bloomr1x1906)"/><circle cx="880.920573573988" cy="470.71361984312534" r="18.0" fill="#2060ff" filter="url(#glowr1x1906)"/><rect x="844.207313808389" y="380.95817240588366" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x1906)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1906)"/><rect x="841.4498254833371" y="398.0627811089158" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="848.5593584959023" y1="518.2915514768101" x2="847.8475668536126" y2="549.9883504842408" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/><line x1="870.4623297492601" y1="520.4518815011717" x2="872.3227377675101" y2="549.2202158941888" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/><line x1="895.6802214468457" y1="520.4838923229836" x2="896.6725506466441" y2="548.0886188896372" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/><line x1="920.518059726581" y1="519.5950138034299" x2="920.0240963108465" y2="550.2980840126053" stroke="#2060ff" stroke-opacity=".6" stroke-width="2"/></g><rect x="450.404972356651" y="557.4044520884752" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1906)"/><rect x="422.7075381551869" y="575.4120707464405" width="152.0" height="26.0" fill="url(#bevelr1x1906)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1906)"/><polygon points="309.5,382.0 351.5,292.9 498.6,279.8 649.6,295.7 693.0,380.8 669.4,504.2 500.4,563.7 331.1,503.1" fill="url(#suitr1x1906)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x1906) url(#metalr1x1906)"/><polygon points="309.2,381.4 350.1,294.7 500.4,277.0 649.2,293.4 690.8,381.9 667.9,505.3 501.4,566.1 330.1,504.9" fill="url(#carbonr1x1906)"/><polygon points="382.3,301.2 501.7,287.7 618.7,303.6 606.0,379.3 393.8,381.3" fill="url(#suitHir1x1906)"/><polygon points="381.2,380.4 366.0,427.3 433.3,502.1 501.4,528.5 565.8,505.0 635.7,424.9 619.8,380.7" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x1906)"/><polygon points="382.1,411.8 477.3,410.6 483.3,438.4 387.1,440.1" fill="#2060ff" filter="url(#glowr1x1906)"/><polygon points="521.7,412.3 619.8,412.8 610.4,438.6 513.9,441.8" fill="#2060ff" filter="url(#glowr1x1906)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.09235972795636" y1="413.93234143629667" x2="515.9572688945942" y2="412.2762813943438" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.954871579688" y1="439.4162408589385" x2="514.6432928710617" y2="436.21454489361497" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="498.55746925650163" y1="453.85324576804413" x2="499.0469381264411" y2="484.4038128108718" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1906)"/><line x1="453.6416968114488" y1="492.3500191780738" x2="455.48640724670145" y2="519.0184857385233" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1906)"/><line x1="477.61008921846746" y1="490.2366303905844" x2="476.28242411961776" y2="521.69587