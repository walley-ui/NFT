l="#050508" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#050508" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#ff44aa"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#ff44aa"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#ff44aa" stroke="#050508" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#ff44aa" stroke="#050508" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><g><polygon points="827.2,291.7 966.3,293.0 968.6,592.7 896.7,724.8 829.4,590.8" fill="url(#titaniumr1x8114)" stroke="#ff44aa" stroke-width="2.6" filter="url(#wmr1x8114)"/><polygon points="827.0,294.5 966.8,293.4 968.8,590.4 898.1,724.8 827.8,591.0" fill="url(#carbonr1x8114)"/><polygon points="860.8,360.4 934.3,361.2 936.5,540.9 898.1,631.7 861.2,541.7" fill="#ff44aa" fill-opacity=".28" stroke="#ff44aa" stroke-width="1.5"/><line x1="844.1916748931259" y1="432.61076303897426" x2="948.7050377359242" y2="429.6477996183559" stroke="#ff44aa" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.0902693779767" y1="331.6931365084834" x2="898.052853263598" y2="592.1745002808981" stroke="#ff44aa" stroke-opacity=".4" stroke-width="1"/><line x1="829.3589660739154" y1="296.96888298606495" x2="967.3565245778859" y2="296.589933670219" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.9232969925366" cy="430.3329584397375" r="18.0" fill="url(#bevelr1x8114)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x8114)"/></g><rect x="448.9226663620211" y="558.2200812702067" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x8114)"/><rect x="425.565365635138" y="574.966597259976" width="152.0" height="26.0" fill="url(#bevelr1x8114)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x8114)"/><polygon points="306.4,379.7 348.9,293.3 500.4,279.9 650.7,295.8 690.3,380.5 669.4,502.5 499.8,566.3 332.3,505.0" fill="url(#suitr1x8114)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x8114) url(#metalr1x8114)"/><polygon points="308.2,381.5 350.6,295.1 500.0,279.5 649.1,293.8 691.0,379.5 668.0,501.9 498.9,563.7 331.6,504.8" fill="url(#carbonr1x8114)"/><polygon points="379.8,301.5 500.3,285.8 617.5,301.7 607.0,380.1 392.7,380.5" fill="url(#suitHir1x8114)"/><polygon points="382.4,379.3 364.3,424.8 432.4,504.5 499.7,529.4 566.5,503.1 633.2,424.6 617.3,382.2" fill="#050508" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x8114)"/><polygon points="380.6,412.2 475.9,411.1 483.6,438.9 387.1,438.6" fill="#ff44aa" filter="url(#glowr1x8114)"/><polygon points="523.4,412.4 619.0,412.1 612.9,439.2 514.2,439.5" fill="#ff44aa" filter="url(#glowr1x8114)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.90775454003364" y1="411.7267406062223" x2="516.1267917169631" y2="413.7278188993223" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="484.83495186116545" y1="437.54882641285656" x2="515.3059632901475" y2="439.2768143311143" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="499.0680810321122" y1="454.1246556643396" x2="500.34840448638425" y2="482.5671968792565" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8114)"/><line x1="455.71779868759216" y1="490.57044939147306" x2="454.54965015629307" y2="519.1055282305927" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8114)"/><line x1="476.3579432977736" y1="491.72160883853206" x2="478.19797222720456" y2="520.5763143302872" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8114)"/><line x1="498.94804872199893" y1="491.58300496516745" x2="498.69725934183225" y2="520.2760010963306" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8114)"/><line x1="521.7002672304027" y1="492.3399907799437" x2="523.6128774239309" y2="520.1599210991524" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8114)"/><line x1="544.5212263427861" y1="490.53669208781787" x2="547.6469442039914" y2="521.0827420174144" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8114)"/><polygon points="432.3,504.2 565.7,502.4 554.8,556.9 446.3,555.9" fill="#880050" fill-opacity=".72" stroke="#ff44aa" stroke-width="1.3" filter="url(#skr1x8114)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".48">SAKURA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".32">MECH RANGERS</text></svg>