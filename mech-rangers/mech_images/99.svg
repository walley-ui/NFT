 fill="rgba(255,255,255,.48)"/><polygon points="153.5,467.9 234.9,464.9 258.8,733.5 128.7,733.7" fill="url(#suitr1x99)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x99) url(#metalr1x99)"/><polygon points="174.9,430.8 253.3,430.7 241.9,509.2 158.4,511.9" fill="url(#bevelr1x99)" fill-opacity=".72" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x99)"/><polygon points="162.2,623.3 242.1,623.2 239.6,659.5 166.4,662.6" fill="#00ff60" fill-opacity=".42" stroke="#00ff60" stroke-width="1" filter="url(#skr1x99)"/><polygon points="764.9,467.2 847.1,467.6 870.4,734.1 742.7,733.3" fill="url(#suitr1x99)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x99) url(#metalr1x99)"/><polygon points="748.5,431.9 824.8,432.4 841.3,511.8 756.8,509.5" fill="url(#bevelr1x99)" fill-opacity=".72" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x99)"/><polygon points="756.5,620.2 840.1,622.4 833.3,660.6 760.5,661.3" fill="#00ff60" fill-opacity=".42" stroke="#00ff60" stroke-width="1" filter="url(#skr1x99)"/><rect x="120.8"  y="700.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x99)" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x99)"/><rect x="749.5"   y="699.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x99)" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x99)"/><line x1="149.4" y1="701.2" x2="149.5" y2="784.7" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="778.0" y1="702.8" x2="776.4" y2="785.3" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="184.1" y1="700.7" x2="181.0" y2="782.6" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="810.6" y1="703.2" x2="812.3" y2="784.6" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="215.0" y1="702.3" x2="216.3" y2="783.8" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="842.1" y1="703.3" x2="843.6" y2="784.7" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><polygon points="235.4,416.7 764.2,417.9 721.0,661.1 2