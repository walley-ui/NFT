fcc00" stroke-width="2.6" filter="url(#wmr1x2677)"/><rect x="837.5541301388853" y="398.05796124115585" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x2677)"/><rect x="983.0211044801958" y="448.0441626136191" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x2677)" stroke="#ffcc00" stroke-width="1.4" filter="url(#wmr1x2677)"/><circle cx="882.662932986077" cy="471.14228361388666" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x2677)"/><circle cx="883.628472918421" cy="470.52397640133273" r="34.0" fill="#ffcc00" fill-opacity=".4" filter="url(#bloomr1x2677)"/><circle cx="880.2786278689839" cy="470.7927210854366" r="18.0" fill="#ffcc00" filter="url(#glowr1x2677)"/><rect x="843.1793804363907" y="380.37213611733165" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x2677)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x2677)"/><rect x="841.168550048452" y="397.2589350633323" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="848.44733138863" y1="518.6786605242639" x2="849.6245285020769" y2="549.6178136529401" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="871.6389750317298" y1="517.7082101000473" x2="871.2074891672097" y2="549.1106792330742" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="897.3409570417926" y1="519.0182108249516" x2="894.907730268743" y2="548.1937556467019" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="919.9228310919926" y1="520.6162320422009" x2="921.0203147925064" y2="549.730180774629" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/></g><rect x="448.760737911053" y="557.1519385483116" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x2677)"/><rect x="423.9228237019852" y="575.2783410889097" width="152.0" height="26.0" fill="url(#bevelr1x2677)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x2677)"/><polygon points="307.1,380.1 348.6,295.1 499.0