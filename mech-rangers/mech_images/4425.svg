.0,294.3 172.9,590.6 101.1,728.2 33.5,592.7" fill="url(#carbonr1x4425)"/><polygon points="65.7,361.4 141.1,363.0 141.8,540.2 102.9,630.4 62.8,542.0" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="50.459846687167854" y1="430.5735782202333" x2="153.27824941821393" y2="429.7980942157097" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.24598689520728" y1="331.23456904673947" x2="103.30309297585856" y2="592.0474664430134" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="32.90254553420466" y1="296.71496261637657" x2="168.54882652055468" y2="297.78977780090645" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.99836059048769" cy="433.1218287868425" r="18.0" fill="url(#bevelr1x4425)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x4425)"/></g><rect x="448.5288937275298" y="558.2219521277584" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x4425)"/><rect x="424.66134922411294" y="574.8321207002737" width="152.0" height="26.0" fill="url(#bevelr1x4425)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x4425)"/><polygon points="308.4,381.1 350.2,293.8 500.7,276.4 649.2,294.1 693.3,379.8 668.6,502.9 498.4,564.4 332.1,505.2" fill="url(#suitr1x4425)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x4425) url(#metalr1x4425)"/><polygon points="309.5,380.2 350.6,295.4 501.4,279.2 648.2,295.2 692.7,380.6 668.6,505.1 500.0,564.7 329.3,502.5" fill="url(#carbonr1x4425)"/><polygon points="381.6,301.8 501.2,287.3 617.8,304.1 606.3,381.7 392.8,380.2" fill="url(#suitHir1x4425)"/><polygon points="379.3,381.9 365.7,425.0 431.1,502.2 500.0,529.0 566.7,503.0 634.8,424.2 620.0,380.8" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x4425)"/><polygon points="379.8,411.1 476.5,412.1 485.1,440.7 387.0,439.3" fill="#2060ff" filter="url(#glowr1x4425)"/><polygon points="521.7,411.3 618.4,410.7 609