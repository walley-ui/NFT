lter="url(#wmr1x2347)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x2347)" opacity=".9"/><line x1="112.22034057451408" y1="670.0375486216508" x2="101.50221320874986" y2="-128.4870891735889" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="92.99514778899025" y1="669.9700710330159" x2="101.32205052010711" y2="-129.0802165119909" stroke="#ff2040" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="45.82411446854469" y="668.6150116012432" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x2347)" stroke="#ff2040" stroke-width="1.6" filter="url(#wmr1x2347)"/><rect x="68.71351457232606" y="673.0797605422325" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="91.38807985981923" y="677.9380243482068" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="90.59772425353523" y="685.1808989001438" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="90.52766863372173" y="693.9638528693467" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="89.20738331111144" y="700.9691012869589" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="91.35091761419547" y="708.6123743745499" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><rect x="91.35129857169461" y="716.1787835006602" width="24.0" height="6.0" rx="1" fill="#ff2040" fill-opacity=".35"/><ellipse cx="102.99673267066476" cy="727.3009194461629" rx="22.0" ry="16.0" fill="url(#bevelr1x2347)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x2347)"/></g><rect x="448.73615730777385" y="555.6173267403617" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x2347)"/><rect x="422.59722443548964" y="575.1809531498701"