.5" y="520.9" width="9.3" height="17.4" rx="1" fill="#ff2040" stroke="#050508" stroke-width=".6"/></g><g><polygon points="867.9,693.1 900.0,692.9 834.5,271.6" fill="url(#blader1x6250)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x6250)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="911.4,692.6 942.7,690.3 984.9,270.2" fill="url(#blader1x6250)" stroke="#ff2040" stroke-width="1.8" filter="url(#wmr1x6250)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="863.3241121256352" y="679.8503536712378" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x6250)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x6250)"/></g><rect x="450.60975762605665" y="556.8336359580978" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6250)"/><rect x="423.70472536524755" y="576.6544996365905" width="152.0" height="26.0" fill="url(#bevelr1x6250)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x6250)"/><polygon points="309.6,380.1 351.5,295.7 500.0,278.2 650.4,295.9 691.7,380.0 669.6,503.7 501.4,564.4 329.6,505.4" fill="url(#suitr1x6250)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x6250) url(#metalr1x6250)"/><polygon points="308.7,380.1 348.6,294.4 499.5,276.6 648.4,296.1 692.0,379.7 668.5,503.0 499.4,565.3 329.7,503.3" fill="url(#carbonr1x6250)"/><polygon points="380.6,301.0 500.8,287.7 619.7,301.9 608.5,380.4 391.3,382.1" fill="url(#suitHir1x6250)"/><polygon points="382.0,379.9 365.4,426.1 432.9,503.6 500.3,527.0 567.5,504.6 633.9,426.1 618.5,379.3" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x6250)"/><polygon points="379.9,410.2 475.5,410.3 483.4,441.0 387.3,441.8" fill="#ff2040" filter="url(#glowr1x6250)"/><polygon points="522.4,411.2 619.4,412.1 609.9,440.3 516.8,438.7" fill="#ff2040" filter="url(#glowr1x6250)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.91797394227234" y1="413.9592646230943" x2="515.6423318279349" y2="413.9474331166595" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="483.08333860585464" y1="439.40034720730034" x2="514.1737514310889" y2="439.75698893275114" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="499.1768973231316" y1="454.1534720833413" x2="500.9126095381565" y2="482.63690342716876" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6250)"/><line x1="455.1805869229883" y1="490.5021696086041" x2="452.3826843493432" y2="520.2376317351125" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6250)"/><line x1="478.34171657761556" y1="489.52179408147924" x2="476.4083169617131" y2="519.8842193591408" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6250)"/><line x1="498.59044241383674" y1="490.3533027016557" x2="500.2043928379193" y2="518.7946066487581" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6250)"/><line x1="523.0883263094909" y1="489.79849678166204" x2="522.4168083867617" y2="519.332566494029" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6250)"/><line x1="546.3028758857586" y1="489.6942072036676" x2="547.5061406166479" y2="519.6736758563668" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6250)"/><polygon points="434.0,505.4 566.6,502.0 552.3,557.6 445.7,556.3" fill="#cc0020" fill-opacity=".72" stroke="#ff2040" stroke-width="1.3" filter="url(#skr1x6250)"/><polygon points="476.5,304.0 524.0,301.5 510.1,175.7 487.0,176.0" fill="url(#bevelr1x6250)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6250)"/><polygon points="366.1,324.9 458.5,322.2 470.4,229.8" fill="url(#bevelr1x6250)" fill-opacity=".78" stroke="#ff2040" stroke-width="1.5" filter="url(#skr1x6250)"/><polygon points="540.7,322.8 633.7,324.0 532.2,227.6" fill="url(#bevelr1x6250)" fill-opacity=".78" stroke="#ff2040" stroke-width="1.5" filter="url(#skr1x6250)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".48">CRIMSON RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".32">MECH RANGERS</text></svg>