ke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="871.6,150.4 936.2,150.4 915.8,-10.0" fill="url(#blader1x68)" stroke="#00ff60" stroke-width="1.8" filter="url(#wmr1x68)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="878.8875702199153" y="420.13257058328014" width="40.0" height="20.0" fill="url(#bevelr1x68)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x68)"/><rect x="880.2162538474054" y="512.6469744456932" width="40.0" height="20.0" fill="url(#bevelr1x68)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x68)"/><rect x="879.4322550932504" y="602.9620847168378" width="40.0" height="20.0" fill="url(#bevelr1x68)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x68)"/><rect x="877.3835843556188" y="692.3183281527832" width="40.0" height="20.0" fill="url(#bevelr1x68)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x68)"/><ellipse cx="898.7625451352075" cy="789.8306230902672" rx="22.0" ry="15.0" fill="url(#bevelr1x68)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x68)"/></g><rect x="450.46580594507975" y="556.9193489897996" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x68)"/><rect x="423.46093060532587" y="573.8812619227916" width="152.0" height="26.0" fill="url(#bevelr1x68)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x68)"/><polygon points="309.5,380.2 350.2,292.8 499.0,278.7 650.0,296.0 693.3,381.6 669.1,503.5 499.8,565.9 331.6,503.0" fill="url(#suitr1x68)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x68) url(#metalr1x68)"/><polygon points="307.3,381.0 349.8,296.0 501.3,279.2 650.4,294.2 690.6,382.0 667.6,504.0 499.4,563.6 332.4,503.0" fill="url(#carbonr1x68)"/><polygon points="382.5,303.7 499.3,285.0 617.3,301.4 608.2,382.1 391.5,379.5" fill="url(#suitHir1x68)"/><polygon points="381.6,379.6 366.9,425.9 431.5,502.9 501.1,526.5 565.7,503.9 635.4,424.9 617.7,381.