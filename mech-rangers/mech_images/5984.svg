 points="887.4,-28.6 908.2,-28.6 897.8,-138.6" fill="url(#blader1x5984)" filter="url(#wmr1x5984)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x5984)" opacity=".9"/><line x1="905.8534306911752" y1="670.4127782265656" x2="897.7780694953352" y2="-128.06928783888" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="890.2742020959221" y1="669.7704486362636" x2="898.1872767943889" y2="-130.21848815679553" stroke="#ffcc00" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="842.9888631542773" y="667.6528785973787" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x5984)" stroke="#ffcc00" stroke-width="1.6" filter="url(#wmr1x5984)"/><rect x="866.5022532065027" y="673.3589577646926" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="884.5170340760238" y="675.9324715060181" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="886.6771704197489" y="684.2492271942086" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="887.5435018846393" y="693.5728316800669" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="885.6822612517141" y="700.3291370906867" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="885.351802714225" y="709.1584937125444" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="886.8563458812051" y="715.7763044224121" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><ellipse cx="898.5973824263178" cy="726.8244385715574" rx="22.0" ry="16.0" fill="url(#bevelr1x5984)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x5984)"/></g><rect x="448.69113563988356" y="556.9512459526769" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter