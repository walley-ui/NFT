 stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x3948)"/><line x1="96.74610940733922" y1="771.2292455860413" x2="87.99079745769498" y2="133.10732338456435" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="74.9,152.1 139.0,152.4 83.4,-9.1" fill="url(#blader1x3948)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x3948)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="82.23583311572668" y="422.49946626704184" width="40.0" height="20.0" fill="url(#bevelr1x3948)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x3948)"/><rect x="82.6953758680634" y="510.0915224261582" width="40.0" height="20.0" fill="url(#bevelr1x3948)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x3948)"/><rect x="83.41640643546354" y="600.7352533181198" width="40.0" height="20.0" fill="url(#bevelr1x3948)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x3948)"/><rect x="83.33796393614259" y="690.0490357433446" width="40.0" height="20.0" fill="url(#bevelr1x3948)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x3948)"/><ellipse cx="103.57423735776914" cy="792.3757980172522" rx="22.0" ry="15.0" fill="url(#bevelr1x3948)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x3948)"/></g><rect x="449.6046994761564" y="556.8929465614259" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x3948)"/><rect x="422.2277154652402" y="573.5814843360334" width="152.0" height="26.0" fill="url(#bevelr1x3948)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x3948)"/><polygon points="308.0,379.5 348.5,294.6 501.1,277.1 649.9,294.0 692.7,379.7 667.9,502.7 499.9,565.1 331.2,505.0" fill="url(#suitr1x3948)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x3948) url(#metalr1x3948)"/><polygon points="306.7,379.2 349.2,292.8 500.5,277.0 649.8,294.9 692.4,382.3 667.6,505.0 500.7,565.8 329.3,503.8" fill="url(#carbonr1x3948)"/><polygon points="381.0,302.6 499.5,286.1 617.3,304.0 606.5,379.2 392.7,382.2" fill="url(#suitHir1x3948)"/><polygon points="382.4,381.1 366.5,426.3 431.8,502.3 498.6,530.0 565.9,504.3 634.8,425.6 620.8,379.7" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x3948)"/><polygon points="382.6,410.7 476.9,411.5 482.9,441.5 387.0,439.7" fill="#4444ff" filter="url(#glowr1x3948)"/><polygon points="524.4,412.3 619.4,411.5 612.2,439.8 516.6,441.7" fill="#4444ff" filter="url(#glowr1x3948)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.59508083198216" y1="415.0745428861119" x2="516.873237420097" y2="413.31967109972607" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.1846123128757" y1="437.3110508216545" x2="515.9960546184703" y2="437.99359045084566" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.47213300373403" y1="454.0027039813809" x2="498.9234086164273" y2="482.97765587801115" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3948)"/><line x1="452.7380145969615" y1="491.14742706222455" x2="455.3326080767252" y2="521.4484213229268" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3948)"/><line x1="475.58075789514925" y1="491.1038626351393" x2="475.73057105945423" y2="521.1254185126163" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3948)"/><line x1="499.47437931112944" y1="491.67275640619914" x2="500.84255337184294" y2="519.5144626734779" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3948)"/><line x1="523.2705536629632" y1="490.74031776702026" x2="521.6031429349072" y2="519.0358112505637" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3948)"/><line x1="545.4494613183849" y1="491.4348212319426" x2="544.5292934837006" y2="520.4270613