" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x159)"/><line x1="521.6736997095495" y1="489.96116311000657" x2="523.0420969283766" y2="521.5890334650874" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x159)"/><line x1="547.4690906784684" y1="490.27156901536506" x2="546.5589099937305" y2="518.2537921208889" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x159)"/><polygon points="431.3,503.3 565.5,502.9 554.5,557.4 446.8,556.8" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x159)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>