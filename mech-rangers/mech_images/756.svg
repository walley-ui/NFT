r1x756)"/><polygon points="380.0,301.7 499.6,287.4 619.2,302.5 609.0,379.4 392.5,381.2" fill="url(#suitHir1x756)"/><polygon points="379.7,380.6 366.2,427.2 431.6,503.9 499.2,529.7 566.2,503.5 632.7,426.1 620.3,379.5" fill="#050508" fill-opacity=".88" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x756)"/><polygon points="381.9,411.4 475.2,411.6 485.1,439.8 387.5,438.8" fill="#00ff60" filter="url(#glowr1x756)"/><polygon points="524.4,412.7 617.7,412.2 612.4,439.2 515.7,439.7" fill="#00ff60" filter="url(#glowr1x756)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.04964680816977" y1="413.40451098941264" x2="516.0801299352571" y2="412.1260438031517" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="485.84794136514887" y1="437.30541546950116" x2="513.8868153156154" y2="438.5644195237197" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="498.9424835020676" y1="455.7088382186368" x2="500.3664025120437" y2="483.13867381289606" stroke="#00ff60" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x756)"/><line x1="455.7169152383506" y1="491.78001883067185" x2="453.2274703785591" y2="518.2380543592386" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x756)"/><line x1="477.92699025137347" y1="490.2996877708472" x2="478.3663549523242" y2="521.7635846238584" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x756)"/><line x1="498.6917491130531" y1="491.0542179587297" x2="500.80216787708923" y2="521.544113788195" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x756)"/><line x1="521.4129813800193" y1="490.33989434214305" x2="522.2559405197948" y2="518.595676144585" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x756)"/><line x1="546.9198640507833" y1="492.82548971064386" x2="547.6595258488506" y2="519.00977492276