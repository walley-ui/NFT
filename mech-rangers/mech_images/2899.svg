l="#050508" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#050508" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#ffcc00"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#ffcc00"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#ffcc00" stroke="#050508" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#ffcc00" stroke="#050508" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><g><polygon points="30.6,293.0 173.9,291.9 170.7,591.8 102.9,727.0 30.6,592.9" fill="url(#titaniumr1x2899)" stroke="#ffcc00" stroke-width="2.6" filter="url(#wmr1x2899)"/><polygon points="31.2,293.6 172.0,295.1 173.9,592.6 103.9,726.8 30.6,590.6" fill="url(#carbonr1x2899)"/><polygon points="64.3,363.1 139.8,361.4 141.2,539.8 101.2,629.8 64.4,541.8" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="51.714477288946476" y1="432.8566054517403" x2="153.35146106597034" y2="431.24072139048945" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.11412615397941" y1="332.4487459301017" x2="102.99282614890483" y2="591.2430182490498" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="35.418913106378135" y1="294.85379462102424" x2="168.68681880416347" y2="296.3066887605004" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.8470113778859" cy="430.87950358763334" r="18.0" fill="url(#bevelr1x2899)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x2899)"/></g><rect x="448.34186074063183" y="556.8563361283392" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x2899)"/><rect x="423.0687685652636" y="575.8092895316892" width="152.0" height="26.0" fill="url(#bevelr1x2899)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x2899)"/><polygon points="309.5,380.0 349.8,293.8 498.8,277.9 650.4,295.8 692.4,382.0 667.3,502.9 498.7,566.7 330.7,502.6" fill="url(#suitr1x2899)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x2899) url(#metalr1x2899)"/><polygon points="307.3,380.3 349.2,296.2 500.9,277.3 649.5,295.8 692.1,381.0 668.0,504.6 498.2,565.4 330.8,504.5" fill="url(#carbonr1x2899)"/><polygon points="379.6,301.9 501.5,286.8 617.9,303.8 609.0,380.2 390.7,381.5" fill="url(#suitHir1x2899)"/><polygon points="380.4,378.9 363.8,427.0 433.6,504.1 501.7,526.8 566.2,505.1 633.7,425.0 617.3,381.9" fill="#050508" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x2899)"/><polygon points="382.5,412.6 476.3,411.9 485.5,440.7 387.9,440.4" fill="#ffcc00" filter="url(#glowr1x2899)"/><polygon points="521.4,412.1 618.3,411.8 610.0,438.3 514.7,438.4" fill="#ffcc00" filter="url(#glowr1x2899)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.94288133937863" y1="413.28026929842304" x2="515.0618320504576" y2="413.86808635666966" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="485.1229041901976" y1="436.34367738487197" x2="517.0820744621009" y2="438.8363137599081" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="499.12867818633094" y1="452.72906010262665" x2="499.5044986307621" y2="481.30333114685493" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2899)"/><line x1="452.15087458526716" y1="490.2059975595213" x2="455.06952031392603" y2="520.5856765137985" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2899)"/><line x1="477.0987373333797" y1="491.4885800448246" x2="477.93665252629665" y2="520.6313932032324" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2899)"/><line x1="499.3734812657349" y1="489.9929842191748" x2="500.24154624147343" y2="521.0990075606853" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2899)"/><line x1="523.3970179522037" y1="491.72196240397165" x2="521.9365755015612" y2="518.3787972247228" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2899)"/><line x1="547.3648588207737" y1="492.71240694709115" x2="545.1385621195845" y2="520.8717215592042" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2899)"/><polygon points="432.7,502.6 565.6,505.1 554.9,556.5 444.8,556.0" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x2899)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>