0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.1,467.6 236.0,466.6 258.8,736.6 129.6,734.3" fill="url(#suitr1x306)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x306) url(#metalr1x306)"/><polygon points="172.0,432.9 252.5,432.8 243.5,511.8 158.8,509.7" fill="url(#bevelr1x306)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x306)"/><polygon points="160.8,621.6 242.5,621.8 239.6,661.0 165.6,660.3" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x306)"/><polygon points="765.2,465.9 845.2,467.5 871.0,733.6 741.2,734.0" fill="url(#suitr1x306)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x306) url(#metalr1x306)"/><polygon points="747.0,432.2 827.8,433.6 839.0,510.8 758.1,511.3" fill="url(#bevelr1x306)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x306)"/><polygon points="755.8,621.4 837.6,622.1 835.8,659.8 760.4,662.2" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x306)"/><rect x="119.4"  y="701.3" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x306)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x306)"/><rect x="747.0"   y="699.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x306)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x306)"/><line x1="149.1" y1="701.7" x2="147.9" y2="783.1" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="777.1" y1="701.1" x2="777.5" y2="782.3" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="182.7" y1="701.3" x2="181.6" y2="784.3" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="810.7" y1="700.8" x2="809.8" y2="784.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="214.3" y1="701.0" x2="215.9" y2="785.1" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="844.6" y1="703.0" x2="843.2" y2="783.5" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><polygon points