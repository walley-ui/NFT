-width="28.0" stroke-linecap="round" filter="url(#wmr1x1894)"/><line x1="902.6707455326431" y1="771.6675087012351" x2="910.6447596815974" y2="130.06009639967232" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="871.6,152.3 935.5,153.1 914.4,-8.7" fill="url(#blader1x1894)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x1894)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="877.6653398078494" y="421.4940709802322" width="40.0" height="20.0" fill="url(#bevelr1x1894)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1894)"/><rect x="878.0926598799043" y="510.176792847272" width="40.0" height="20.0" fill="url(#bevelr1x1894)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1894)"/><rect x="878.0852863926068" y="603.0461958000436" width="40.0" height="20.0" fill="url(#bevelr1x1894)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1894)"/><rect x="877.1026961168833" y="690.5798692090436" width="40.0" height="20.0" fill="url(#bevelr1x1894)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1894)"/><ellipse cx="898.4414610967599" cy="790.8011872887611" rx="22.0" ry="15.0" fill="url(#bevelr1x1894)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1894)"/></g><rect x="449.72424761401487" y="555.782263693586" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x1894)"/><rect x="423.24762684125454" y="574.232165335305" width="152.0" height="26.0" fill="url(#bevelr1x1894)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x1894)"/><polygon points="308.6,379.1 349.9,295.3 500.8,277.8 649.9,294.3 692.0,379.3 670.3,503.1 501.2,565.6 332.2,503.3" fill="url(#suitr1x1894)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x1894) url(#metalr1x1894)"/><polygon points="308.3,379.8 350.2,292.7 500.0,279.5 651.2,293.9 691.3,382.3 668.2,505.3 500.6,564.3 331.3,502.5" fill="url(#carbonr1x1894)"/><pol