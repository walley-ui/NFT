roke-linecap="round" filter="url(#wmr1x5685)"/><line x1="96.4477239424735" y1="811.4502522529102" x2="99.65246742865068" y2="132.15962125528603" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="84.68985170278695" y="621.1754512590356" width="32.0" height="18.0" fill="url(#bevelr1x5685)" stroke="#c0c0d0" stroke-width=".8" filter="url(#wmr1x5685)"/><rect x="86.77859256858002" y="443.1063803458586" width="32.0" height="18.0" fill="url(#bevelr1x5685)" stroke="#c0c0d0" stroke-width=".8" filter="url(#wmr1x5685)"/><rect x="87.82028621094298" y="261.35640343921256" width="32.0" height="18.0" fill="url(#bevelr1x5685)" stroke="#c0c0d0" stroke-width=".8" filter="url(#wmr1x5685)"/><circle cx="101.45975717607882" cy="112.66453458648172" r="58.0" fill="rgba(0,0,0,.52)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#wmr1x5685)"/><circle cx="103.87017718873915" cy="110.0093073009513" r="46.0" fill="url(#orbr1x5685)" filter="url(#bloomr1x5685)"/><circle cx="100.3836546007916" cy="111.82244421755892" r="20.0" fill="#c0c0d0" filter="url(#glowr1x5685)"/><circle cx="101.79660494918001" cy="112.54537164568899" r="66.0" fill="none" stroke="#c0c0d0" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="103.27746866973114" cy="111.07402871856463" rx="66.0" ry="30.0" fill="none" stroke="#c0c0d0" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,102.2,111.4)"/></g><rect x="448.98728443924335" y="555.2089701877907" width="100.0"  height="56.0" fill="#2c2c3c" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x5685)"/><rect x="425.58185132993384" y="575.5583931607194" width="152.0" height="26.0" fill="url(#bevelr1x5685)" fill-opacity=".65" stroke="#c0c0d0" stroke-width="1.2" filter="url(#skr1x5685)"/><polygon points="309.3,382.1 350.4,294.4 499.8,279.5 648.7,294.7 693.5,380.9 668.1,504.5 500.5,565.8 332.7,501.9" fill="url(#suitr1x5685)" stroke="#c0c0d0" stroke-width="2.8" filter="url(#skr1x5685) url(#metalr1x5685)"/><polygon points="308.7,381.4 349.2,295.3 500.4,279.8 648.3,294.2 690.7,379.3 669.4,501.9 500.3,566.4 330.1,504.9" fill="url(#carbonr1x5685)"/><polygon points="381.8,303.2 499.9,285.9 619.2,302.8 606.9,381.6 392.5,381.4" fill="url(#suitHir1x5685)"/><polygon points="380.6,381.9 366.6,427.4 434.2,505.4 498.8,529.7 566.1,503.6 635.1,426.9 617.6,379.9" fill="#050508" fill-opacity=".88" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x5685)"/><polygon points="379.9,410.2 477.6,411.5 485.6,441.2 389.5,441.4" fill="#c0c0d0" filter="url(#glowr1x5685)"/><polygon points="523.8,410.7 618.9,410.7 612.9,439.5 514.3,441.3" fill="#c0c0d0" filter="url(#glowr1x5685)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.8352717423439" y1="412.2729455175809" x2="516.7389569273591" y2="414.5677330663427" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="483.5992592710629" y1="438.5130280209705" x2="516.3738037933036" y2="439.084136294201" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="498.31792276697234" y1="454.58941392768173" x2="500.2873325124383" y2="481.8159168539569" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5685)"/><line x1="454.4431246528216" y1="491.79484883220863" x2="452.14425334360453" y2="518.4959078615532" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5685)"/><line x1="477.7034513101354" y1="491.5842067515477" x2="478.3835842007212" y2="518.4148685363122" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5685)"/><line x1="498.78517422238366" y1="491.58946893131355" x2="501.0973020294681" y2="521.5516648821533" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5685)"/><line x1="521.396388868764" y1="490.68200798220926" x2="522.5607720932551" y2="518.8364843376912" stroke="#c0c0d0" stroke-op