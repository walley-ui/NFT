f60" stroke-width="2" filter="url(#wmr1x1741)"/><rect x="33.453986064754396" y="420.44279722068455" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x1741)"/><rect x="40.53073246594515" y="402.74824314741414" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x1741)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1741)"/><circle cx="80.40168559666719" cy="416.03707103896886" r="15.0" fill="#00ff60" opacity=".8" filter="url(#glowr1x1741)"/><circle cx="82.69953416701404" cy="414.3626454240642" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="55.129576196745006" y="455.11730802096423" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x1741)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x1741)"/><circle cx="-20.300715766996177" cy="471.71814919635653" r="18.0" fill="#00ff60" filter="url(#glowr1x1741)" opacity=".88"/><circle cx="-20.390538236275347" cy="471.35321284430097" r="7.0" fill="#ffffff"/><rect x="77.95707511244339" y="499.79586324729024" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x1741)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1741)"/><rect x="36.503876069411604" y="421.78005158994347" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.37207725768906" y1="488.0245494672097" x2="61.5822097104415" y2="518.1520474071614" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/><line x1="76.86746731134129" y1="487.40746183162554" x2="78.5480595016293" y2="518.5696879358962" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.21469750212502" y1="484.89011275954545" x2="95.84347672922533" y2="520.5516994955949" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.62363084275273" y="558.5937932536006" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x1741)"/><rect x="425.44777612257747" y="575.592318278458" width="152.0" height="26.0" fill="url(#bevelr1x1741)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" 