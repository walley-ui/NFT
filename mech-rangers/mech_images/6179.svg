.7508829800412" x2="896.7626590077393" y2="110.50322582824154" stroke="url(#chromer1x6179)" stroke-width="22.0" stroke-linecap="round" filter="url(#wmr1x6179)"/><line x1="903.4931432301738" y1="811.8852814848534" x2="902.3561105714739" y2="130.5642736338079" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="883.0728514333815" y="622.5065714605153" width="32.0" height="18.0" fill="url(#bevelr1x6179)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x6179)"/><rect x="880.4211741646379" y="440.87997381575406" width="32.0" height="18.0" fill="url(#bevelr1x6179)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x6179)"/><rect x="880.9994014505857" y="261.6743383513763" width="32.0" height="18.0" fill="url(#bevelr1x6179)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x6179)"/><circle cx="896.3195627471991" cy="111.02763228192923" r="58.0" fill="rgba(0,0,0,.52)" stroke="#4444ff" stroke-width="2.2" filter="url(#wmr1x6179)"/><circle cx="897.8344747298956" cy="110.61574148563666" r="46.0" fill="url(#orbr1x6179)" filter="url(#bloomr1x6179)"/><circle cx="896.5845228293539" cy="109.92905381182206" r="20.0" fill="#4444ff" filter="url(#glowr1x6179)"/><circle cx="898.9049195943028" cy="112.75382239678872" r="66.0" fill="none" stroke="#4444ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="896.221220971886" cy="112.91342443292959" rx="66.0" ry="30.0" fill="none" stroke="#4444ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="449.2953322067857" y="555.6150240957737" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x6179)"/><rect x="424.5784384998493" y="574.7111842786893" width="152.0" height="26.0" fill="url(#bevelr1x6179)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x6179)"/><polygon points="308.2,381.8 349.3,294.8 499.8,277.8 651.3,296.1 692.1,380.5 669.4,502.2 499.7,563.