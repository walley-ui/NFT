.2" y="523.5" width="9.3" height="17.4" rx="1" fill="#ccccff" stroke="#050508" stroke-width=".6"/></g><g><rect x="34.10051056038585" y="422.29980670409276" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x4991)" stroke="#ccccff" stroke-width="2" filter="url(#wmr1x4991)"/><rect x="32.86106909954917" y="422.7425861102529" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x4991)"/><rect x="41.06777559252453" y="402.62274639550594" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x4991)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x4991)"/><circle cx="80.60910000758243" cy="412.9456204045564" r="15.0" fill="#ccccff" opacity=".8" filter="url(#glowr1x4991)"/><circle cx="81.25677075445648" cy="415.23242016807194" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="52.673127733953265" y="453.8373169586062" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x4991)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x4991)"/><circle cx="-18.279040033984963" cy="471.86179972812533" r="18.0" fill="#ccccff" filter="url(#glowr1x4991)" opacity=".88"/><circle cx="-20.384937921315462" cy="470.9013984698802" r="7.0" fill="#ffffff"/><rect x="77.64944456335154" y="500.988344160188" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x4991)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x4991)"/><rect x="36.570834989231045" y="423.73603026177733" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="61.126912030801144" y1="484.9021849975921" x2="61.85035333665085" y2="517.6132151826284" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.26490049980578" y1="487.2186100698076" x2="77.87404975224283" y2="520.9471874262206" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="93.60774392032992" y1="487.98843775819984" x2="95.89765653325242" y2="520.7843492646701" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.8021302758716" y="557.0492328809574" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x4991)"/><rect x="424.0276458686218" y="574.6136825796217" width="152.0" height="26.0" fill="url(#bevelr1x4991)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x4991)"/><polygon points="307.2,380.1 349.1,294.2 500.0,278.3 649.9,295.9 691.3,381.2 670.1,503.9 501.0,563.9 329.9,502.9" fill="url(#suitr1x4991)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x4991) url(#metalr1x4991)"/><polygon points="306.5,380.9 349.5,295.4 501.6,279.0 649.4,293.9 691.4,379.6 667.2,503.4 499.6,566.0 329.5,503.3" fill="url(#carbonr1x4991)"/><polygon points="382.0,303.5 498.5,286.7 617.7,301.8 607.6,380.8 391.7,380.6" fill="url(#suitHir1x4991)"/><polygon points="380.3,380.0 364.4,424.3 431.7,501.9 499.0,527.7 566.2,503.1 633.2,426.2 619.9,382.0" fill="#050508" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x4991)"/><polygon points="381.2,411.4 477.5,412.7 484.5,440.1 389.6,438.7" fill="#ccccff" filter="url(#glowr1x4991)"/><polygon points="524.8,409.9 617.9,411.0 611.7,439.5 514.6,441.0" fill="#ccccff" filter="url(#glowr1x4991)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.4508597220853" y1="413.9103055578656" x2="514.5572220343538" y2="414.72458728412164" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="485.38161133570594" y1="439.090472882241" x2="516.674837368019" y2="436.30908951172603" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="499.62230468895285" y1="453.8408578172326" x2="499.9127167134546" y2="481.65132536925375" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x4991)"/><line x1="454.9573339488171" y1="490.08780645094805" x2="453.0796010605805" y2="519.661782586202" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4991)"/><line x1="475.24156703226265" y1="491.86047087199984" x2="475.20372483491894" y2="521.5461940181442" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4991)"/><line x1="499.2317437717691" y1="492.6669562162831" x2="501.4181241552345" y2="521.3026810368523" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4991)"/><line x1="522.3208227409608" y1="492.02366236597294" x2="521.6115954321436" y2="518.215317302756" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4991)"/><line x1="546.6152395505645" y1="490.9094386494718" x2="546.3366476926208" y2="519.5164127877913" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4991)"/><polygon points="431.9,504.6 567.7,502.6 554.4,556.6 447.5,557.7" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x4991)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>