lter="url(#wmr1x1901)"/><rect x="32.61313008362424" y="419.7996092522517" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x1901)"/><rect x="43.66398084018376" y="402.8682121314108" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x1901)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1901)"/><circle cx="82.60238044852387" cy="416.0005622146651" r="15.0" fill="#00ff60" opacity=".8" filter="url(#glowr1x1901)"/><circle cx="82.19964866679159" cy="415.31853540875017" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="53.98803568765518" y="454.7821188689209" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x1901)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x1901)"/><circle cx="-20.13246215922761" cy="473.1865584146231" r="18.0" fill="#00ff60" filter="url(#glowr1x1901)" opacity=".88"/><circle cx="-20.720562659073654" cy="470.331425290741" r="7.0" fill="#ffffff"/><rect x="76.61078466953707" y="499.86374839423223" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x1901)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1901)"/><rect x="38.79220742959526" y="424.92275432767343" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.73412170479071" y1="484.97696592621503" x2="61.70493486536664" y2="521.1092835051938" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.71242766654116" y1="485.1256110312417" x2="77.54443618016315" y2="519.6510920951142" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/><line x1="92.39960652425881" y1="486.2827898498624" x2="95.26665408596394" y2="518.7134972628206" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.60255206953735" y="556.8620872764848" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x1901)"/><rect x="422.7812097481452" y="577.0098258910701" width="152.0" height="26.0" fill="url(#bevelr1x1901)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x1901)"/><polygo