dth="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x3017)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x3017)"/><rect x="32.97175080072132" y="419.9973996642045" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x3017)"/><rect x="40.70717000722882" y="402.18363092541694" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x3017)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x3017)"/><circle cx="82.96501500256356" cy="413.085675114952" r="15.0" fill="#ffcc00" opacity=".8" filter="url(#glowr1x3017)"/><circle cx="82.46570704145354" cy="414.13408599607646" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.407424911055685" y="454.65868619000537" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x3017)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x3017)"/><circle cx="-21.30517638191584" cy="469.97104587601495" r="18.0" fill="#ffcc00" filter="url(#glowr1x3017)" opacity=".88"/><circle cx="-18.94504266275096" cy="469.61024402007456" r="7.0" fill="#ffffff"/><rect x="78.7507474260777" y="500.60051299752666" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x3017)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x3017)"/><rect x="36.15587117349726" y="424.17191678471863" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="62.66114815095436" y1="487.44865526724607" x2="61.73991855880242" y2="519.9729233173654" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="76.46860118288544" y1="487.4207337756641" x2="79.8211179036088" y2="518.1719684945419" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.27655202228573" y1="485.32215161845085" x2="93.85376392383125" y2="519.7427266673185" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.56583682801573" y="558.256403051503" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x3017)"/><rect x="423.06340235602113" y="574.0554673624225" width="152.0" height="26.0" fill="url(#bevelr1x3017)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x3017)"/><polygon points="307.7,380.7 350.0,294.2 498.2,277.9 648.9,294.8 690.5,378.9 668.8,505.3 498.6,563.6 329.9,502.5" fill="url(#suitr1x3017)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x3017) url(#metalr1x3017)"/><polygon points="309.5,380.0 349.0,295.7 499.4,278.8 649.1,295.9 691.0,379.9 668.5,503.1 499.5,566.0 331.7,504.7" fill="url(#carbonr1x3017)"/><polygon points="380.0,302.2 499.8,286.6 617.9,302.5 606.2,381.4 391.3,380.5" fill="url(#suitHir1x3017)"/><polygon points="382.0,381.4 365.4,426.6 433.3,505.2 501.5,529.8 568.3,504.4 634.4,426.9 618.5,379.0" fill="#0d1520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x3017)"/><polygon points="379.7,410.8 476.5,410.6 486.2,438.8 390.1,440.8" fill="#ffcc00" filter="url(#glowr1x3017)"/><polygon points="522.1,410.9 617.9,410.1 611.7,441.5 513.9,439.2" fill="#ffcc00" filter="url(#glowr1x3017)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.21959728129207" y1="412.6930437427014" x2="516.1318847968615" y2="415.0092290489003" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.4011852540634" y1="438.3892816392705" x2="515.8835690562986" y2="437.23851542919874" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.6954351647757" y1="453.88530178675427" x2="498.66129085021095" y2="483.6156769664027" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3017)"/><line x1="452.8111360361614" y1="490.84988255025814" x2="453.6004825359024" y2="521.2511794746854" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3017)"/><line x1="478.71619366113094" y1="490.15973705137145" x2="475.6256085621565" y2="518.4606253013014" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3017)"/><line x1="499.85100077716635" y1="489.90895462147887" x2="498.374880252406" y2="518.5171314748935" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3017)"/><line x1="523.6936310696043" y1="492.3241205808706" x2="523.2162256660498" y2="519.1552584334277" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3017)"/><line x1="545.3461909429357" y1="492.1367070756852" x2="544.4462230355665" y2="520.7309498616494" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3017)"/><polygon points="433.6,502.1 568.3,505.4 553.2,556.0 446.3,556.8" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x3017)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>