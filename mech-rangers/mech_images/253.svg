 points="829.1,293.4 967.1,292.7 968.8,589.9 899.6,728.1 827.4,591.1" fill="url(#carbonr1x253)"/><polygon points="859.9,362.4 935.2,361.7 934.3,540.2 898.9,632.6 861.2,541.9" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="846.6908610331453" y1="432.491151631996" x2="950.6587543240377" y2="430.45788107234983" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.0048844691925" y1="332.4812934284098" x2="898.6422610863671" y2="592.5384263018146" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="831.4075155513921" y1="294.736883872468" x2="967.0523715044" y2="298.02533160606396" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.0465186857247" cy="431.2711082227528" r="18.0" fill="url(#bevelr1x253)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x253)"/></g><rect x="449.9488174287602" y="557.1196317179129" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x253)"/><rect x="424.4933641700074" y="576.2845655990765" width="152.0" height="26.0" fill="url(#bevelr1x253)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x253)"/><polygon points="309.2,379.0 349.8,295.8 500.1,279.8 650.8,292.8 691.0,379.9 669.0,502.3 500.4,566.7 331.1,501.8" fill="url(#suitr1x253)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x253) url(#metalr1x253)"/><polygon points="306.5,382.0 349.4,296.3 499.7,279.7 648.0,295.6 692.0,381.5 667.5,502.1 499.5,566.5 331.0,502.3" fill="url(#carbonr1x253)"/><polygon points="380.5,301.0 499.4,286.2 619.1,304.3 605.9,379.1 392.6,381.4" fill="url(#suitHir1x253)"/><polygon points="381.1,380.0 365.2,424.9 433.0,502.6 498.4,528.7 567.2,503.1 632.7,426.5 618.7,379.8" fill="#0a0520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x253)"/><polygon points="381.7,412.7 475.5,412.2 486.1,438.8 389.9,440.5" fill="#2060ff" filter="url(#glowr1x253)"/><polygon points="524.2,409.9 620.2,410.2 61