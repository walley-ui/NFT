oke-linecap="round" filter="url(#wmr1x9550)"/><line x1="901.6998504399882" y1="810.460699825082" x2="900.7990059657582" y2="131.44747042162342" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="881.3078444206715" y="621.607959201932" width="32.0" height="18.0" fill="url(#bevelr1x9550)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x9550)"/><rect x="881.1430503084883" y="440.0641644893214" width="32.0" height="18.0" fill="url(#bevelr1x9550)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x9550)"/><rect x="881.2693068656698" y="261.4842918749898" width="32.0" height="18.0" fill="url(#bevelr1x9550)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x9550)"/><circle cx="896.1502437073365" cy="111.67050918703896" r="58.0" fill="rgba(0,0,0,.52)" stroke="#00ff60" stroke-width="2.2" filter="url(#wmr1x9550)"/><circle cx="898.2203089837544" cy="112.54125004513187" r="46.0" fill="url(#orbr1x9550)" filter="url(#bloomr1x9550)"/><circle cx="897.01411789326" cy="110.9015376991592" r="20.0" fill="#00ff60" filter="url(#glowr1x9550)"/><circle cx="897.3988570808061" cy="111.86281691063193" r="66.0" fill="none" stroke="#00ff60" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="899.1218905357272" cy="112.62199149262158" rx="66.0" ry="30.0" fill="none" stroke="#00ff60" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="448.36247644471007" y="558.4631345862523" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x9550)"/><rect x="422.3206500890665" y="576.8327731843107" width="152.0" height="26.0" fill="url(#bevelr1x9550)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x9550)"/><polygon points="309.3,380.6 348.6,292.9 498.4,279.5 648.6,294.4 693.3,379.7 668.9,502.3 498.8,565.1 330.3,502.8" fill="url(#suitr1x9550)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x9550) url(#metalr1x9550)