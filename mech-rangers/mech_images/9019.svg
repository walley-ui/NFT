-opacity=".38" stroke-width="1"/><line x1="842.1" y1="701.4" x2="843.3" y2="784.1" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><polygon points="235.3,417.7 764.0,415.8 723.7,662.5 277.4,660.8" fill="url(#suitr1x9019)" stroke="#00ff60" stroke-width="2.6" filter="url(#skr1x9019) url(#metalr1x9019)"/><polygon points="233.6,416.2 765.6,417.0 720.9,663.8 278.9,661.4" fill="url(#carbonr1x9019)"/><polygon points="368.6,416.1 634.1,418.2 609.8,516.1 387.9,513.7" fill="url(#suitHir1x9019)"/><line x1="363.6" y1="469.8" x2="637.4" y2="471.9" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x9019)"/><line x1="400.9" y1="550.2" x2="599.1" y2="550.3" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x9019)"/><line x1="268.1" y1="491.8" x2="320.2" y2="491.4" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.2" y1="490.0" x2="731.5" y2="489.4" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.9" y1="524.0" x2="318.5" y2="522.4" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.1" y1="524.5" x2="734.3" y2="521.1" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.3" y1="554.5" x2="320.6" y2="553.0" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.1" y1="553.2" x2="733.5" y2="554.5" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.8" y1="586.2" x2="320.8" y2="587.8" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.2" y1="586.2" x2="732.6" y2="588.0" stroke="#00ff60" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x9019)"><ellipse cx="499.9" cy="512.0" rx="42.9" ry="23.2" fill="#1e0600" stroke="#00ff60" stroke-width="1.6" filter="url(#skr1x9019)"/><circle cx="501.0" cy="512.2" r="15.1" fill="#00ff60"/><circle cx="498.0" cy="506.9" r="5.8" fill="#1e0600"/><ellipse cx="497.1" cy="505.8" rx="3.5" ry="2.3" fill="rgba(255,255,255,.7)"/></g><g><line x1="897.34989