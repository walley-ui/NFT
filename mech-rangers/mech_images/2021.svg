 filter="url(#skr1x2021)"/><rect x="423.1518796471879" y="577.0528452362865" width="152.0" height="26.0" fill="url(#bevelr1x2021)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x2021)"/><polygon points="307.4,381.9 350.7,293.1 500.7,276.6 649.4,295.7 690.7,382.1 667.4,502.5 501.0,564.7 331.8,503.0" fill="url(#suitr1x2021)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x2021) url(#metalr1x2021)"/><polygon points="306.3,379.8 350.9,294.7 501.2,279.9 648.6,294.9 691.2,379.4 669.9,502.7 499.8,563.4 330.8,504.6" fill="url(#carbonr1x2021)"/><polygon points="381.4,302.9 499.4,286.8 620.2,303.2 607.4,381.8 394.2,379.7" fill="url(#suitHir1x2021)"/><polygon points="380.4,380.8 363.9,425.3 432.4,503.1 500.6,528.7 566.5,502.4 634.6,426.7 620.1,379.4" fill="#050508" fill-opacity=".88" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x2021)"/><polygon points="382.8,412.4 476.4,411.3 483.7,440.9 389.5,439.2" fill="#00ff60" filter="url(#glowr1x2021)"/><polygon points="522.3,412.2 619.8,411.5 611.5,440.8 515.0,438.7" fill="#00ff60" filter="url(#glowr1x2021)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.12016123929993" y1="412.8200827145017" x2="514.9861243180372" y2="414.3817757894285" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="485.781383342538" y1="437.2715113358572" x2="515.6119620939158" y2="438.5608472001739" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="500.947571742069" y1="456.1739124227315" x2="500.95891924640165" y2="481.50467576738447" stroke="#00ff60" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2021)"/><line x1="452.45505877573044" y1="491.75079592708494" x2="454.3035519672372" y2="519.5268947281875" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2021)"/><line x1="476.95320442732424" y1="490.1626590632833" x2="476.88002812