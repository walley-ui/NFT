.2,293.2 170.9,590.8 101.9,727.9 32.4,591.9" fill="url(#carbonr1x7582)"/><polygon points="63.8,362.1 141.4,361.8 139.1,540.0 101.5,631.3 64.3,540.5" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="49.199986997377096" y1="432.746131728217" x2="153.3748966275155" y2="432.2595352526754" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.25942897353318" y1="329.91878646407275" x2="103.8930645671114" y2="592.676590725407" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="32.56002828538415" y1="296.2942959213629" x2="171.4650076360814" y2="294.97741156769916" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.39265032302585" cy="429.81009515225884" r="18.0" fill="url(#bevelr1x7582)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x7582)"/></g><rect x="449.7209645373747" y="557.3897599508055" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x7582)"/><rect x="424.8194655545056" y="576.7923847315833" width="152.0" height="26.0" fill="url(#bevelr1x7582)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x7582)"/><polygon points="307.3,379.7 348.5,294.8 500.0,278.5 651.3,293.1 692.6,381.0 670.0,503.7 501.7,565.1 329.5,504.4" fill="url(#suitr1x7582)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x7582) url(#metalr1x7582)"/><polygon points="307.9,380.0 350.3,294.7 500.2,277.2 649.2,294.6 693.3,382.2 669.9,504.2 501.3,564.7 331.7,502.7" fill="url(#carbonr1x7582)"/><polygon points="381.8,303.9 501.8,285.9 618.7,302.7 608.2,381.3 393.1,381.5" fill="url(#suitHir1x7582)"/><polygon points="379.6,382.2 365.3,424.9 431.3,503.2 500.2,529.9 566.5,502.9 632.7,423.9 619.7,379.7" fill="#0a0520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x7582)"/><polygon points="379.6,412.9 476.7,410.6 485.5,438.7 388.3,439.5" fill="#ffcc00" filter="url(#glowr1x7582)"/><polygon points="521.7,413.0 619.3,412.1 611.8,439.5 515.4,438.3" fill="#ffcc00" filter="url(#glowr1x7582)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.27364246105776" y1="412.1428951232694" x2="517.1066511309147" y2="413.8728808773681" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="485.18659903934224" y1="438.1766692841426" x2="516.0619927138463" y2="437.72272917525845" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.7975354005583" y1="455.9670355281792" x2="501.4858077299781" y2="484.48563004797325" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x7582)"/><line x1="452.6773265912943" y1="491.77038821587337" x2="453.7520883235894" y2="518.5203034636564" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7582)"/><line x1="478.21186214549465" y1="491.39749539252364" x2="478.39123130854216" y2="520.2381509512663" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7582)"/><line x1="501.77848842302336" y1="491.9579185337759" x2="499.95563064701855" y2="521.5818813455292" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7582)"/><line x1="522.1809190674312" y1="491.754479760956" x2="523.701630321294" y2="520.6489526944235" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7582)"/><line x1="546.4710324897618" y1="490.1612394999712" x2="546.5010433207452" y2="519.2133778342046" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7582)"/><polygon points="432.3,503.0 568.3,504.9 555.0,556.9 446.4,556.2" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x7582)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>