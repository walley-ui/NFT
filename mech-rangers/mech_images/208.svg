" x2="97.99513358468187" y2="132.77171006714923" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="85.58434137174856" y="621.1040510822087" width="32.0" height="18.0" fill="url(#bevelr1x208)" stroke="#ff00ff" stroke-width=".8" filter="url(#wmr1x208)"/><rect x="84.60489215975625" y="443.0955598436296" width="32.0" height="18.0" fill="url(#bevelr1x208)" stroke="#ff00ff" stroke-width=".8" filter="url(#wmr1x208)"/><rect x="85.64779834583399" y="262.30245439978313" width="32.0" height="18.0" fill="url(#bevelr1x208)" stroke="#ff00ff" stroke-width=".8" filter="url(#wmr1x208)"/><circle cx="103.63846802677956" cy="110.87816696995867" r="58.0" fill="rgba(0,0,0,.52)" stroke="#ff00ff" stroke-width="2.2" filter="url(#wmr1x208)"/><circle cx="103.21571371149268" cy="110.57682255655524" r="46.0" fill="url(#orbr1x208)" filter="url(#bloomr1x208)"/><circle cx="101.1406049743667" cy="111.00591020938006" r="20.0" fill="#ff00ff" filter="url(#glowr1x208)"/><circle cx="101.8093535657413" cy="110.10733373900874" r="66.0" fill="none" stroke="#ff00ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="101.1957895984314" cy="112.7979687576182" rx="66.0" ry="30.0" fill="none" stroke="#ff00ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,102.2,111.4)"/></g><rect x="449.3800905883312" y="558.2666194708087" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x208)"/><rect x="422.70730516342445" y="573.8515169221909" width="152.0" height="26.0" fill="url(#bevelr1x208)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x208)"/><polygon points="307.8,381.7 351.0,294.2 499.8,278.6 650.8,294.5 693.1,381.8 667.2,503.0 498.8,565.4 330.7,503.4" fill="url(#suitr1x208)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x208) url(#metalr1x208)"/><polygon points="307.8,380.4 350.6,293.3 499.5,276.6 650.8,295.9 692.6,379.9 670.1,505.2 501.6,565.3 3