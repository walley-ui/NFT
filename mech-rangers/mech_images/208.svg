0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="151.6,465.2 235.2,468.1 258.3,734.8 128.9,735.7" fill="url(#suitr1x208)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x208) url(#metalr1x208)"/><polygon points="174.0,432.7 253.7,433.7 244.3,509.8 158.0,511.3" fill="url(#bevelr1x208)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x208)"/><polygon points="162.3,622.8 242.2,623.1 238.2,661.6 166.8,661.8" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x208)"/><polygon points="766.1,466.6 845.9,465.8 872.0,735.4 743.4,734.0" fill="url(#suitr1x208)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x208) url(#metalr1x208)"/><polygon points="748.0,431.1 827.2,432.5 838.8,510.6 755.5,510.7" fill="url(#bevelr1x208)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x208)"/><polygon points="758.1,620.9 838.6,621.6 834.0,661.1 760.1,660.2" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x208)"/><rect x="122.0"  y="698.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x208)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x208)"/><rect x="748.2"   y="701.3" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x208)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x208)"/><line x1="149.2" y1="702.0" x2="148.6" y2="784.4" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="776.8" y1="703.3" x2="779.4" y2="784.5" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="181.5" y1="700.6" x2="181.7" y2="782.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="810.0" y1="701.4" x2="809.2" y2="784.9" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="215.9" y1="702.8" x2="214.0" y2="784.5" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="844.5" y1="702.2" x2="843.0" y2="785.4" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><polygon points