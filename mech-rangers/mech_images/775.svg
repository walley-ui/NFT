0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.5,466.3 234.3,467.9 257.2,736.5 129.9,735.2" fill="url(#suitr1x775)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x775) url(#metalr1x775)"/><polygon points="174.7,431.1 253.4,431.3 243.6,511.9 159.2,511.4" fill="url(#bevelr1x775)" fill-opacity=".72" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x775)"/><polygon points="162.6,620.2 244.0,622.3 239.5,660.1 164.1,661.4" fill="#00ff60" fill-opacity=".42" stroke="#00ff60" stroke-width="1" filter="url(#skr1x775)"/><polygon points="763.4,467.3 845.4,467.6 871.3,735.7 743.4,734.3" fill="url(#suitr1x775)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x775) url(#metalr1x775)"/><polygon points="746.6,431.3 827.4,430.7 839.5,511.8 756.2,510.2" fill="url(#bevelr1x775)" fill-opacity=".72" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x775)"/><polygon points="757.0,622.2 837.1,621.4 834.5,660.3 761.9,661.7" fill="#00ff60" fill-opacity=".42" stroke="#00ff60" stroke-width="1" filter="url(#skr1x775)"/><rect x="121.3"  y="701.1" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x775)" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x775)"/><rect x="747.7"   y="701.1" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x775)" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x775)"/><line x1="149.2" y1="701.4" x2="148.9" y2="783.4" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="778.2" y1="700.9" x2="778.4" y2="784.1" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="182.9" y1="700.1" x2="181.4" y2="782.3" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="811.3" y1="701.2" x2="810.4" y2="785.4" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="216.8" y1="702.6" x2="215.6" y2="783.7" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="844.6" y1="700.1" x2="842.1" y2="782.5" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><polygon points