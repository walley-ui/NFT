ight="42.0" fill="url(#bevelr1x1052)" stroke="#ccccff" stroke-width="1.4" filter="url(#glowr1x1052)"/><rect x="485.7" y="638.7" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.1,465.2 235.6,465.2 257.4,735.7 129.4,735.3" fill="url(#suitr1x1052)" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x1052) url(#metalr1x1052)"/><polygon points="173.5,430.8 253.0,432.8 242.0,512.3 160.9,510.5" fill="url(#bevelr1x1052)" fill-opacity=".72" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x1052)"/><polygon points="162.0,621.7 243.5,620.6 237.8,661.7 166.4,662.6" fill="#ccccff" fill-opacity=".42" stroke="#ccccff" stroke-width="1" filter="url(#skr1x1052)"/><polygon points="765.6,465.3 848.5,465.9 871.2,733.4 743.8,733.8" fill="url(#suitr1x1052)" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x1052) url(#metalr1x1052)"/><polygon points="747.5,432.7 827.9,431.5 839.7,509.4 755.7,510.9" fill="url(#bevelr1x1052)" fill-opacity=".72" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x1052)"/><polygon points="756.2,623.0 839.4,620.1 834.6,662.0 760.3,662.6" fill="#ccccff" fill-opacity=".42" stroke="#ccccff" stroke-width="1" filter="url(#skr1x1052)"/><rect x="118.8"  y="700.1" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x1052)" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x1052)"/><rect x="748.4"   y="698.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x1052)" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x1052)"/><line x1="151.1" y1="700.4" x2="148.7" y2="782.1" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="777.1" y1="701.9" x2="777.2" y2="785.1" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="182.6" y1="702.4" x2="182.4" y2="784.6" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="812.2" y1="700.7" x2="809.6" y2="782.8" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="216.4" y1="702.1" x2="213.8" y2="783.9" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="844.8" y1="701.5" x2="845.4" y2="784.6" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><polygon points="233.3,415.8 763.5,416.4 724.0,661.0 276.0,663.7" fill="url(#suitr1x1052)" stroke="#ccccff" stroke-width="2.6" filter="url(#skr1x1052) url(#metalr1x1052)"/><polygon points="233.8,416.4 763.5,416.9 722.9,662.8 277.7,661.9" fill="url(#carbonr1x1052)"/><polygon points="367.6,417.5 631.9,416.7 611.1,516.7 389.9,516.3" fill="url(#suitHir1x1052)"/><line x1="362.9" y1="471.9" x2="637.8" y2="469.7" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1052)"/><line x1="399.3" y1="550.3" x2="599.9" y2="549.8" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1052)"/><line x1="267.9" y1="491.5" x2="320.3" y2="490.2" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.5" y1="489.8" x2="735.0" y2="491.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.2" y1="523.7" x2="321.6" y2="524.5" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.5" y1="523.5" x2="734.1" y2="524.0" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.3" y1="554.2" x2="319.3" y2="556.2" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.8" y1="554.1" x2="731.4" y2="553.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.4" y1="588.2" x2="320.3" y2="585.6" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.6" y1="585.6" x2="733.7" y2="587.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x1052)"><ellipse cx="501.7" cy="511.0" rx="42.9" ry="23.2" fill="#1e0600" stroke="#ccccff" stroke-width="1.6" filter="url(#skr1x1052)"/><circle cx="500.2" cy="510.6" r="15.1" fill="#ccccff"/><circle cx="498.4" cy="507.9" r="5.8" fill="#1e0600"/><ellipse cx="495.8" cy="503.7" rx="3.5" ry="2.3" fill="rgba(255,255,255,.7)"/></g><g><rect x="838.263396