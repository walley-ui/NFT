81)" stroke="#4444ff" stroke-width="2.6" filter="url(#wmr1x781)"/><polygon points="829.4,293.1 968.0,292.4 967.3,593.0 896.8,727.8 826.3,592.6" fill="url(#carbonr1x781)"/><polygon points="860.4,360.5 936.0,361.2 934.7,539.8 898.3,632.1 860.7,541.6" fill="#4444ff" fill-opacity=".28" stroke="#4444ff" stroke-width="1.5"/><line x1="846.9357139463165" y1="430.94214168833565" x2="949.519053035006" y2="432.25275178933515" stroke="#4444ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.6967360928282" y1="331.74266550457105" x2="897.635726340171" y2="590.6317803554236" stroke="#4444ff" stroke-opacity=".4" stroke-width="1"/><line x1="829.1505402313173" y1="296.78090158598496" x2="965.2022065087781" y2="297.85962936077266" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.2676723550633" cy="430.5686575870961" r="18.0" fill="url(#bevelr1x781)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x781)"/></g><rect x="450.40937129594386" y="555.7830149250104" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x781)"/><rect x="424.8813505588099" y="573.9148204278201" width="152.0" height="26.0" fill="url(#bevelr1x781)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x781)"/><polygon points="307.6,381.5 350.7,295.1 501.3,278.5 650.3,295.8 692.0,381.1 667.5,505.2 501.4,564.1 332.7,503.3" fill="url(#suitr1x781)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x781) url(#metalr1x781)"/><polygon points="306.5,381.0 351.6,294.3 499.4,277.5 648.8,295.7 690.4,382.1 669.8,505.2 501.1,565.8 332.5,505.0" fill="url(#carbonr1x781)"/><polygon points="381.9,302.0 501.0,286.2 618.4,303.4 607.9,380.2 392.0,382.3" fill="url(#suitHir1x781)"/><polygon points="380.2,382.0 364.3,424.6 434.5,504.2 501.2,527.0 568.9,503.2 634.0,425.6 618.8,381.0" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x781)"/><polygon points="381.1,409.9 475.8,413.1 483.4,441.0 389.6,438.8" fill