oke-width="2" filter="url(#wmr1x2262)"/><rect x="32.540788908246874" y="420.8243470588699" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x2262)"/><rect x="42.6059544501267" y="404.4590588578023" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x2262)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x2262)"/><circle cx="80.36322469081726" cy="414.420527342055" r="15.0" fill="#2060ff" opacity=".8" filter="url(#glowr1x2262)"/><circle cx="83.4071660694107" cy="415.9635545606725" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="53.932967517562176" y="454.34093768298624" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x2262)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x2262)"/><circle cx="-18.851847425438496" cy="471.4752217270434" r="18.0" fill="#2060ff" filter="url(#glowr1x2262)" opacity=".88"/><circle cx="-19.853913974352214" cy="469.9574670721777" r="7.0" fill="#ffffff"/><rect x="78.81556185357269" y="500.38185877213255" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x2262)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x2262)"/><rect x="38.43849266473201" y="422.4854202670045" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="61.773375534675985" y1="485.04684578925367" x2="61.778399379216104" y2="520.8926917987875" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.74519440945235" y1="487.8055485310964" x2="76.60447653554377" y2="518.7267991704866" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="93.46850334586573" y1="485.08793071024115" x2="92.85791021673006" y2="521.1575126851909" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.56533624846486" y="557.0149135673419" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x2262)"/><rect x="422.92400782024487" y="575.2672957060859" width="152.0" height="26.0" fill="url(#bevelr1x2262)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#