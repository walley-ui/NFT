ke-width="2.6" filter="url(#wmr1x5197)"/><polygon points="30.7,292.1 172.2,293.0 171.0,592.6 101.5,726.5 31.3,590.7" fill="url(#carbonr1x5197)"/><polygon points="65.0,359.6 141.5,360.2 138.9,542.6 100.6,630.6 63.5,543.0" fill="#ccccff" fill-opacity=".28" stroke="#ccccff" stroke-width="1.5"/><line x1="49.63489968482402" y1="430.6403689127415" x2="153.35064497957003" y2="430.8984563405625" stroke="#ccccff" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.39447934566063" y1="329.66079386658964" x2="100.46106282103804" y2="590.2751542228274" stroke="#ccccff" stroke-opacity=".4" stroke-width="1"/><line x1="33.53283525401723" y1="296.91249426724386" x2="170.81183772621674" y2="296.1751340107061" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.91049275159833" cy="432.67749772192906" r="18.0" fill="url(#bevelr1x5197)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x5197)"/></g><rect x="448.3981301187538" y="556.7169490717351" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x5197)"/><rect x="425.7431899882853" y="573.6087238952517" width="152.0" height="26.0" fill="url(#bevelr1x5197)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x5197)"/><polygon points="306.3,381.6 349.8,294.4 499.6,278.7 651.4,295.7 691.5,379.6 670.6,504.9 501.1,564.9 332.1,503.7" fill="url(#suitr1x5197)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x5197) url(#metalr1x5197)"/><polygon points="308.3,381.6 350.4,293.4 500.3,277.8 650.8,295.1 692.1,382.3 670.0,505.3 499.7,564.9 332.1,502.0" fill="url(#carbonr1x5197)"/><polygon points="379.2,301.1 498.8,284.9 620.3,303.7 607.7,382.1 392.5,379.1" fill="url(#suitHir1x5197)"/><polygon points="381.7,380.8 366.4,426.6 434.2,505.2 499.8,527.8 566.5,502.0 635.7,426.4 620.1,381.7" fill="#0d1520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x5197)"/><polygon points="379.6,412.1 476.5,409.7 485.4,440.5 389.8,440.5" fill="#ccccff" filter="url(#glowr1x5197)"/><polygon points="521.4,411.9 617.7,412.0 612.7,438.3 515.5,438.5" fill="#ccccff" filter="url(#glowr1x5197)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.1731531960517" y1="413.14255609447133" x2="515.2239595238492" y2="411.7007229977287" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="485.5081130057201" y1="437.8581673538312" x2="515.4593161346763" y2="437.6036186054349" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="499.90943104596806" y1="453.8370861510746" x2="499.9343705514446" y2="483.93698270032183" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5197)"/><line x1="453.62073767397555" y1="490.8409346708096" x2="452.2475401417166" y2="518.681632402353" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5197)"/><line x1="478.6516371020488" y1="492.5657803887501" x2="477.1913088313676" y2="520.4521698836237" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5197)"/><line x1="499.39960538977755" y1="491.76417857510967" x2="500.6900637392886" y2="519.0491486606188" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5197)"/><line x1="524.4820324896461" y1="492.2401775053702" x2="522.4542477096059" y2="519.4674494000152" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5197)"/><line x1="547.451220087912" y1="491.9087733710184" x2="544.3941798867844" y2="520.1411011901685" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5197)"/><polygon points="432.6,503.1 568.4,502.0 552.5,557.1 447.4,556.7" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x5197)"/><path d="M387.04896178400145 327.1546434408054 Q331.24239235004404 214.99866055827587 382.2977242887393 139.7371836418286" stroke="#ccccff" str