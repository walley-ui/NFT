="495.0" y="520.8" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#1e0600" stroke-width=".6"/><rect x="508.6" y="520.5" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#1e0600" stroke-width=".6"/></g><g><line x1="898.3288743733988" y1="830.2975223314016" x2="897.0011161935143" y2="111.48264284785834" stroke="url(#chromer1x5748)" stroke-width="22.0" stroke-linecap="round" filter="url(#wmr1x5748)"/><line x1="903.3202536479198" y1="810.9624073364772" x2="900.9202068187856" y2="132.04158636527134" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="880.236695278585" y="622.4812508181668" width="32.0" height="18.0" fill="url(#bevelr1x5748)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x5748)"/><rect x="881.5438511537016" y="440.34905297877265" width="32.0" height="18.0" fill="url(#bevelr1x5748)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x5748)"/><rect x="880.9493888253905" y="261.9195147817023" width="32.0" height="18.0" fill="url(#bevelr1x5748)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x5748)"/><circle cx="899.5964356684685" cy="109.6532352867536" r="58.0" fill="rgba(0,0,0,.52)" stroke="#4444ff" stroke-width="2.2" filter="url(#wmr1x5748)"/><circle cx="896.4975606719591" cy="111.52577588269484" r="46.0" fill="url(#orbr1x5748)" filter="url(#bloomr1x5748)"/><circle cx="896.4253592991829" cy="111.81658061025662" r="20.0" fill="#4444ff" filter="url(#glowr1x5748)"/><circle cx="898.3575606214441" cy="110.00597980190066" r="66.0" fill="none" stroke="#4444ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="899.181316721309" cy="112.26078176070003" rx="66.0" ry="30.0" fill="none" stroke="#4444ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="451.5363287997432" y="556.1363341822289" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x5748)"/><rect x="425.1072053620592" y