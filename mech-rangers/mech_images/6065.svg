 897.7,724.7 826.4,591.0" fill="url(#titaniumr1x6065)" stroke="#ccccff" stroke-width="2.6" filter="url(#wmr1x6065)"/><polygon points="827.2,294.2 969.5,291.8 968.9,591.7 897.6,728.0 826.8,591.7" fill="url(#carbonr1x6065)"/><polygon points="860.7,362.4 935.1,359.7 936.1,542.9 899.5,631.7 859.0,541.0" fill="#ccccff" fill-opacity=".28" stroke="#ccccff" stroke-width="1.5"/><line x1="845.9163521557674" y1="430.9193908293731" x2="950.3587695140019" y2="432.76505060652266" stroke="#ccccff" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.2521061510407" y1="330.89802125776185" x2="897.5552559123003" y2="591.6002414355054" stroke="#ccccff" stroke-opacity=".4" stroke-width="1"/><line x1="830.7739200324379" y1="295.8886093779467" x2="966.8725330243446" y2="297.07930477531625" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.108597905431" cy="431.9124620891176" r="18.0" fill="url(#bevelr1x6065)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x6065)"/></g><rect x="449.34112652773035" y="557.0643599631264" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x6065)"/><rect x="424.63125312151385" y="574.2266883902251" width="152.0" height="26.0" fill="url(#bevelr1x6065)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x6065)"/><polygon points="306.5,381.3 348.7,294.0 500.8,278.1 651.5,295.9 692.6,381.5 669.6,504.6 500.7,565.2 332.7,503.7" fill="url(#suitr1x6065)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x6065) url(#metalr1x6065)"/><polygon points="308.9,381.3 351.7,295.6 498.4,279.4 649.2,295.2 692.3,380.4 667.4,502.3 498.3,564.7 329.9,504.6" fill="url(#carbonr1x6065)"/><polygon points="381.4,301.6 500.8,287.4 620.7,302.0 608.8,381.5 392.4,381.7" fill="url(#suitHir1x6065)"/><polygon points="380.5,381.7 366.2,426.8 433.0,504.7 498.9,526.4 568.2,501.9 634.5,427.4 619.9,382.3" fill="#050508" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x6065)"/><polygo