.9" y="522.8" width="9.3" height="17.4" rx="1" fill="#2060ff" stroke="#0d1520" stroke-width=".6"/></g><g><line x1="898.1862217348628" y1="790.6604701205157" x2="912.4480984335393" y2="112.4269061496481" stroke="url(#chromer1x7553)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x7553)"/><line x1="901.6011066971906" y1="771.478310154099" x2="911.309765969459" y2="133.06170689994468" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="870.5,151.2 936.5,149.8 914.7,-7.1" fill="url(#blader1x7553)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x7553)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="880.263963667918" y="422.71178403850644" width="40.0" height="20.0" fill="url(#bevelr1x7553)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7553)"/><rect x="878.1516923750379" y="512.9592529922724" width="40.0" height="20.0" fill="url(#bevelr1x7553)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7553)"/><rect x="878.1507329631224" y="599.6355061911046" width="40.0" height="20.0" fill="url(#bevelr1x7553)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7553)"/><rect x="880.2316357612237" y="692.525015965011" width="40.0" height="20.0" fill="url(#bevelr1x7553)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7553)"/><ellipse cx="899.4270641210117" cy="792.8057871865109" rx="22.0" ry="15.0" fill="url(#bevelr1x7553)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7553)"/></g><rect x="448.70496737686915" y="558.0251373215578" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x7553)"/><rect x="423.55578523734584" y="573.6031098700129" width="152.0" height="26.0" fill="url(#bevelr1x7553)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x7553)"/><polygon points="309.7,378.9 351.6,296.2 501.6,276.5 651.5,296.2 690.6,380.9 667.8,504.7 499.7,565.3 329.5,503.6" fill="url(#sui