talr1x851)" stroke="#ff44aa" stroke-width="2" filter="url(#wmr1x851)"/><rect x="830.3217864902318" y="420.075477596838" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x851)"/><rect x="839.0936919736304" y="402.34841541601344" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x851)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x851)"/><circle cx="877.6033680817671" cy="415.9761016285047" r="15.0" fill="#ff44aa" opacity=".8" filter="url(#glowr1x851)"/><circle cx="877.0096707571857" cy="412.9002056111581" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="946.9965125704744" y="455.5695006061345" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x851)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x851)"/><circle cx="1018.2743316893094" cy="472.2262422109022" r="18.0" fill="#ff44aa" filter="url(#glowr1x851)" opacity=".88"/><circle cx="1021.0387225716934" cy="472.75215065553783" r="7.0" fill="#ffffff"/><rect x="874.2229118027352" y="500.99884303873404" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x851)" stroke="#ff44aa" stroke-width="1" filter="url(#wmr1x851)"/><rect x="833.0266401757113" y="422.179615206737" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="858.6138352347166" y1="485.58476897459474" x2="859.0123794897087" y2="519.3116469655185" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="875.3298974633776" y1="486.54412893056866" x2="872.3064152174258" y2="520.0933378749527" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/><line x1="889.6241106828303" y1="487.1342358912341" x2="890.1299621199817" y2="520.1007311997004" stroke="#ff44aa" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.7670976145193" y="557.383163911011" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x851)"/><rect x="423.8076574722305" y="574.9450250877068" width="152.0" height="26.0" fill="url(#bevelr1x851)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" 