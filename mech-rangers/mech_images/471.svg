 x="43.414101905692334" y="397.5576973994262" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x471)"/><rect x="15.530152320899038" y="447.89108874816446" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x471)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x471)"/><circle cx="118.1275044879317" cy="471.3088506444357" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x471)"/><circle cx="117.82837079729882" cy="470.51882858173917" r="34.0" fill="#ff2040" fill-opacity=".4" filter="url(#bloomr1x471)"/><circle cx="119.02908998023716" cy="471.82925479384136" r="18.0" fill="#ff2040" filter="url(#glowr1x471)"/><rect x="48.567486165594275" y="382.146611137595" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x471)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x471)"/><rect x="43.980373425353285" y="399.61076799687" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="51.49998464932662" y1="518.670603828039" x2="50.39005802780387" y2="550.7790767617523" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="77.12203170940276" y1="519.0022619633935" x2="75.71068548712876" y2="547.6664354381152" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="98.59467857688662" y1="520.3752284250222" x2="100.92906988304105" y2="549.7752032488585" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="123.98228762069714" y1="520.7910614038817" x2="125.27890424247828" y2="547.6508771372028" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/></g><rect x="449.84329341351986" y="556.7023444863968" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x471)"/><rect x="423.5034912961535" y="576.1203531138599" width="152.0" height="26.0" fill="url(#bevelr1x471)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x471)"/><polygon points="309.6,379.5 348.7,294.7 500.7,277.6 650.1,295.8 690.7,381.7 667.9,504.1 500.2,566.0 