line x1="545.948616318144" y1="490.5470613930374" x2="544.4870828454569" y2="520.7176436616107" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9278)"/><polygon points="434.3,504.5 566.7,502.5 552.3,556.9 446.1,557.0" fill="#050508" fill-opacity=".72" stroke="#ff00ff" stroke-width="1.3" filter="url(#skr1x9278)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff00ff" fill-opacity=".48">VOID RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff00ff" fill-opacity=".32">MECH RANGERS</text></svg>