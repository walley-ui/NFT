.1634173320606" x2="912.3652248000354" y2="112.40790101233867" stroke="url(#chromer1x9278)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x9278)"/><line x1="903.3803731284663" y1="769.7245225023478" x2="910.8790183008276" y2="129.70874631637705" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="868.7,149.8 934.8,150.5 917.5,-10.0" fill="url(#blader1x9278)" stroke="#ff00ff" stroke-width="1.8" filter="url(#wmr1x9278)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="877.0647403942049" y="423.1961441233754" width="40.0" height="20.0" fill="url(#bevelr1x9278)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x9278)"/><rect x="877.1530219117739" y="510.38877488831054" width="40.0" height="20.0" fill="url(#bevelr1x9278)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x9278)"/><rect x="877.1803359014541" y="601.680282636173" width="40.0" height="20.0" fill="url(#bevelr1x9278)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x9278)"/><rect x="879.4776218424179" y="692.3370739892125" width="40.0" height="20.0" fill="url(#bevelr1x9278)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x9278)"/><ellipse cx="897.5950023246556" cy="789.8565856095403" rx="22.0" ry="15.0" fill="url(#bevelr1x9278)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x9278)"/></g><rect x="449.8366174707189" y="555.4161990300752" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x9278)"/><rect x="424.7813769887201" y="575.2145535811782" width="152.0" height="26.0" fill="url(#bevelr1x9278)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x9278)"/><polygon points="307.6,380.8 351.2,294.7 500.6,276.8 649.8,295.0 693.2,380.9 669.8,504.6 501.0,564.3 329.8,503.6" fill="url(#suitr1x9278)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x9278) url(#metalr1x9278)"/><polygon points="307.1,380.0 350.1,295.5 500.4