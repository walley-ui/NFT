.8" height="88.0" rx="5" fill="url(#bevelr1x6982)" stroke="#ff44aa" stroke-width="2" filter="url(#wmr1x6982)"/><rect x="114.5" y="701.7" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x6982)"/><rect x="747.3"  y="702.2" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x6982)" stroke="#ff44aa" stroke-width="2" filter="url(#wmr1x6982)"/><rect x="750.0"  y="700.7" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x6982)"/><rect x="122.9" y="698.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><rect x="754.8" y="699.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><rect x="150.2" y="699.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><rect x="783.6" y="698.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><rect x="181.4" y="698.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><rect x="813.4" y="700.8" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><rect x="209.8" y="699.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><rect x="843.3" y="700.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x6982)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x6982)"/><ellipse cx="184.27569165354595" cy="711.3334970203041" rx="45.1" ry="30.0" fill="#ff44aa" fill-opacity=".25" filter="url(#glowr1x6982)"/><ellipse cx="819.2667134161294" cy="710.298399274405" rx="45.1" ry="30.0" fill="#ff44aa" fill-opacity=".25" filter="url(#glowr1x6982)"/></g><rect x="448.7596681212075" y="557.2654501702636" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x6982)"/><rect x="423.89723898107184" y="575.0691351165996" width="152.0" height="26.0" fill="url(#bevelr1x6982)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x6982)"/><polygon points="306.3,380.7 350.3,294.0 499.8,278.1 648.9,293.5 693.6,381.9 670.1,505.2 499.9,565.3 332.0,502.9" fill="url(#suitr1x6982)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x6982) url(#metalr1x6982)"/><polygon points="308.9,378.9 348.6,295.7 501.7,278.5 649.0,292.9 692.3,380.7 667.4,504.9 498.9,566.4 330.4,504.3" fill="url(#carbonr1x6982)"/><polygon points="379.4,304.4 501.5,285.6 618.5,301.2 608.0,380.6 391.5,380.6" fill="url(#suitHir1x6982)"/><polygon points="381.7,379.8 367.1,427.2 431.9,503.8 499.3,526.9 566.3,502.6 633.1,426.3 617.5,382.1" fill="#1e0600" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x6982)"/><polygon points="381.6,412.9 476.7,409.7 485.8,439.3 388.0,439.7" fill="#ff44aa" filter="url(#glowr1x6982)"/><polygon points="523.5,411.1 620.3,410.5 612.8,439.3 514.6,440.9" fill="#ff44aa" filter="url(#glowr1x6982)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.9148444448225" y1="411.61875854590903" x2="515.1489939301647" y2="414.1722129450179" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="484.77853522306305" y1="437.5466025908478" x2="515.2606233261898" y2="436.7253562926315" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="500.71723228450867" y1="454.5661827211268" x2="501.2372519057244" y2="483.67446612315257" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6982)"/><line x1="455.0672119654529" y1="489.5772788648493" x2="452.89175379274417" y2="520.5139817340299" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6982)"/><line x1="477.59110143756493"