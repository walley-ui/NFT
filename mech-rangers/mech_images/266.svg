0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.6,466.1 233.5,466.0 259.3,735.5 127.7,736.5" fill="url(#suitr1x266)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x266) url(#metalr1x266)"/><polygon points="174.2,433.8 254.8,430.6 244.7,510.2 159.9,510.2" fill="url(#bevelr1x266)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x266)"/><polygon points="161.5,621.2 241.7,622.9 237.8,661.5 164.7,661.4" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x266)"/><polygon points="765.5,468.0 846.5,466.1 869.9,735.6 740.7,735.4" fill="url(#suitr1x266)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x266) url(#metalr1x266)"/><polygon points="746.4,430.9 828.3,432.4 840.8,512.0 755.1,510.2" fill="url(#bevelr1x266)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x266)"/><polygon points="757.5,620.4 839.5,620.2 836.3,661.8 760.7,662.3" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x266)"/><rect x="121.4"  y="700.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x266)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x266)"/><rect x="748.3"   y="698.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x266)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x266)"/><line x1="148.5" y1="703.2" x2="148.4" y2="783.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="778.4" y1="701.0" x2="778.5" y2="785.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="184.1" y1="703.5" x2="183.0" y2="784.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="811.2" y1="700.7" x2="810.4" y2="782.8" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="213.7" y1="702.2" x2="216.7" y2="785.1" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="844.7" y1="702.2" x2="842.7" y2="785.5" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><polygon points