.8" y="521.0" width="9.3" height="17.4" rx="1" fill="#00ffff" stroke="#0d1520" stroke-width=".6"/></g><g><rect x="35.09275055577975" y="422.7059547274373" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x1182)" stroke="#00ffff" stroke-width="2" filter="url(#wmr1x1182)"/><rect x="33.179283085502654" y="421.38964990945533" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x1182)"/><rect x="42.86001090588045" y="402.91965908128765" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x1182)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x1182)"/><circle cx="82.92363572254774" cy="414.57330144718287" r="15.0" fill="#00ffff" opacity=".8" filter="url(#glowr1x1182)"/><circle cx="81.03863459857178" cy="415.58974693221967" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.727267216648876" y="454.84882242316377" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x1182)" stroke="#00ffff" stroke-width="1.2" filter="url(#wmr1x1182)"/><circle cx="-18.102977044750038" cy="470.004863714613" r="18.0" fill="#00ffff" filter="url(#glowr1x1182)" opacity=".88"/><circle cx="-19.71209844319153" cy="470.15949876736846" r="7.0" fill="#ffffff"/><rect x="78.18449825862419" y="502.77639121087265" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x1182)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x1182)"/><rect x="36.93181540820744" y="422.6861477615312" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="62.63187866745513" y1="486.37993144644423" x2="61.69513387497511" y2="520.5302279765717" stroke="#00ffff" stroke-opacity=".5" stroke-width="1.2"/><line x1="78.36662859659639" y1="485.8004495522007" x2="77.70958271365609" y2="518.2908387711271" stroke="#00ffff" stroke-opacity=".5" stroke-width="1.2"/><line x1="93.37172864194956" y1="485.7771975551732" x2="92.51141067625952" y2="520.2261841402388" stroke="#00ffff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.21770101962613" y="557.300480400864" width="100.0"  height="56.0" fill="#08