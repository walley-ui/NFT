8" y="422.4295950625092" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x3123)"/><rect x="839.110665288996" y="404.9295426533557" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x3123)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x3123)"/><circle cx="876.4726680456289" cy="414.9325310181826" r="15.0" fill="#ffcc00" opacity=".8" filter="url(#glowr1x3123)"/><circle cx="877.5363702422567" cy="414.1566170488484" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="947.5177026867494" y="454.47911838842555" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x3123)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x3123)"/><circle cx="1021.3009814740718" cy="473.1532395280897" r="18.0" fill="#ffcc00" filter="url(#glowr1x3123)" opacity=".88"/><circle cx="1021.4237730161846" cy="472.31661395467813" r="7.0" fill="#ffffff"/><rect x="875.1919960404374" y="500.3670195706188" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x3123)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x3123)"/><rect x="831.6518540481665" y="424.514446285367" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="857.2250295786746" y1="486.3636118901893" x2="858.4906601291709" y2="519.0313147922977" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="875.5848058549315" y1="488.1432456969283" x2="872.3780504161119" y2="518.6886918141506" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="890.2710954111628" y1="487.66483228234574" x2="890.1122166226246" y2="520.2456653805449" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.57940455880015" y="556.8306230922229" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x3123)"/><rect x="422.5447582243942" y="573.7066094041802" width="152.0" height="26.0" fill="url(#bevelr1x3123)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x3123)"/><polygon points="308.9,379.9 351.3,293.5 499.3,278.1 649.5,