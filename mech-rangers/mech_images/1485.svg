1x1485)" filter="url(#wmr1x1485)"/><polygon points="887.4,-28.6 908.2,-28.6 897.8,-138.6" fill="url(#blader1x1485)" filter="url(#wmr1x1485)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x1485)" opacity=".9"/><line x1="906.4690631303006" y1="672.1869991485961" x2="897.3386154508404" y2="-127.06564624989407" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="890.135022440292" y1="670.8051371323876" x2="897.9358801151626" y2="-129.300847388804" stroke="#2060ff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.7846028108709" y="667.8913643436506" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x1485)" stroke="#2060ff" stroke-width="1.6" filter="url(#wmr1x1485)"/><rect x="864.1347801152244" y="674.5402797007001" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="886.1285183463805" y="678.4949954135343" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="887.3950291224384" y="685.2012965800241" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="885.0399505223706" y="695.1125388603657" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="885.8011286952161" y="700.2078722208738" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="886.1315530370549" y="708.6788363170809" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><rect x="885.3812466946989" y="716.4606922788545" width="24.0" height="6.0" rx="1" fill="#2060ff" fill-opacity=".35"/><ellipse cx="898.3578356534802" cy="727.4064736580476" rx="22.0" ry="16.0" fill="url(#bevelr1x1485)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x1485)"/></g><rect x="449.3304257433862" y="555.3770454772748" width="100.0"  height="56.0" fill="#003ccc"