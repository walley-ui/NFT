.7" y="522.8" width="9.3" height="17.4" rx="1" fill="#ff00ff" stroke="#0a0520" stroke-width=".6"/></g><g><polygon points="72.1,692.7 104.6,691.4 38.2,270.4" fill="url(#blader1x6199)" stroke="#ff00ff" stroke-width="1.8" filter="url(#wmr1x6199)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="115.1,693.0 147.6,692.2 190.2,272.3" fill="url(#blader1x6199)" stroke="#ff00ff" stroke-width="1.8" filter="url(#wmr1x6199)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="68.0225770336948" y="682.5547219822183" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x6199)" stroke="#ff00ff" stroke-width="1.4" filter="url(#wmr1x6199)"/></g><rect x="449.91733479006217" y="556.4108562431298" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x6199)"/><rect x="424.7554907129146" y="573.7195917400531" width="152.0" height="26.0" fill="url(#bevelr1x6199)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x6199)"/><polygon points="306.8,380.5 348.9,294.8 498.2,276.9 651.2,295.3 690.9,382.1 670.7,504.5 501.4,564.0 331.0,502.6" fill="url(#suitr1x6199)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x6199) url(#metalr1x6199)"/><polygon points="307.8,381.2 349.5,293.1 501.8,279.6 649.3,295.9 692.0,381.0 667.9,504.8 498.3,565.3 332.6,502.1" fill="url(#carbonr1x6199)"/><polygon points="381.6,302.9 498.4,287.7 618.3,302.3 608.3,379.6 390.8,381.1" fill="url(#suitHir1x6199)"/><polygon points="380.6,380.2 363.9,424.4 433.0,503.3 501.7,528.5 566.4,502.6 636.1,426.4 617.8,380.5" fill="#0a0520" fill-opacity=".88" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x6199)"/><polygon points="382.6,410.4 478.3,411.9 484.0,438.9 390.0,440.6" fill="#ff00ff" filter="url(#glowr1x6199)"/><polygon points="523.9,410.6 619.7,409.6 610.7,438.9 516.4,439.1" fill="#ff00ff" filter="url(#glowr1x6199)"/><ellipse cx=