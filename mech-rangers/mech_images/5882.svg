line x1="903.0376421302185" y1="770.2334037133493" x2="913.094743371904" y2="130.9110378990881" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.6,151.6 934.2,152.7 915.7,-8.8" fill="url(#blader1x5882)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x5882)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.4705590731093" y="419.60450842622663" width="40.0" height="20.0" fill="url(#bevelr1x5882)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5882)"/><rect x="877.0877377808653" y="512.8374710998497" width="40.0" height="20.0" fill="url(#bevelr1x5882)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5882)"/><rect x="878.3032654724643" y="602.9357660613954" width="40.0" height="20.0" fill="url(#bevelr1x5882)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5882)"/><rect x="880.2108274963313" y="690.3638367775827" width="40.0" height="20.0" fill="url(#bevelr1x5882)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5882)"/><ellipse cx="896.9230558637157" cy="792.2510712688788" rx="22.0" ry="15.0" fill="url(#bevelr1x5882)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x5882)"/></g><rect x="450.3729978670366" y="558.4390436051414" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x5882)"/><rect x="425.1605217864737" y="576.372769451607" width="152.0" height="26.0" fill="url(#bevelr1x5882)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x5882)"/><polygon points="307.3,379.1 351.8,295.2 501.6,279.2 648.3,294.0 692.8,380.6 668.5,503.2 498.8,566.8 330.5,503.2" fill="url(#suitr1x5882)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x5882) url(#metalr1x5882)"/><polygon points="306.5,380.8 351.2,295.1 498.6,277.0 650.4,296.0 693.8,379.1 668.1,502.2 500.1,564.6 330.0,502.1" fill="url(#carbonr1x5882)"/><polygon points="380.9,302.5 498.8,285.3 620.5,301.2 606.7,381.6 392.