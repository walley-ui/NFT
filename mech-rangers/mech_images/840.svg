url(#wmr1x840)"/><line x1="902.4442283024639" y1="811.6184965483844" x2="900.5344940178655" y2="131.5854215928353" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="880.8579686890915" y="621.4525918834843" width="32.0" height="18.0" fill="url(#bevelr1x840)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x840)"/><rect x="882.8407090762258" y="440.950501305703" width="32.0" height="18.0" fill="url(#bevelr1x840)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x840)"/><rect x="882.79830529714" y="260.5601305034943" width="32.0" height="18.0" fill="url(#bevelr1x840)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x840)"/><circle cx="897.9778951960244" cy="110.51414673896504" r="58.0" fill="rgba(0,0,0,.52)" stroke="#2060ff" stroke-width="2.2" filter="url(#wmr1x840)"/><circle cx="897.6493329425901" cy="109.82895007999612" r="46.0" fill="url(#orbr1x840)" filter="url(#bloomr1x840)"/><circle cx="897.0451112090237" cy="111.19015139136461" r="20.0" fill="#2060ff" filter="url(#glowr1x840)"/><circle cx="897.4367160293833" cy="111.49810712225732" r="66.0" fill="none" stroke="#2060ff" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="898.164796478916" cy="111.71758721740915" rx="66.0" ry="30.0" fill="none" stroke="#2060ff" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,897.8,111.4)"/></g><rect x="448.49683074094355" y="556.1692695044912" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x840)"/><rect x="422.9844197008759" y="575.373824140709" width="152.0" height="26.0" fill="url(#bevelr1x840)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x840)"/><polygon points="307.4,380.0 348.7,296.0 500.3,279.1 650.6,293.5 690.4,381.4 669.5,504.9 500.7,564.6 331.3,502.9" fill="url(#suitr1x840)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x840) url(#metalr1x840)"/><polygon points="308.1,379.9 349.2,295.5 49