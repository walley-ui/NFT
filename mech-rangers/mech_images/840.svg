0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.1,467.0 236.6,465.8 256.2,734.4 128.3,735.5" fill="url(#suitr1x840)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x840) url(#metalr1x840)"/><polygon points="172.2,433.1 253.9,432.7 241.8,511.3 160.7,511.3" fill="url(#bevelr1x840)" fill-opacity=".72" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x840)"/><polygon points="160.5,623.1 242.7,621.2 240.5,660.4 166.7,660.2" fill="#2060ff" fill-opacity=".42" stroke="#2060ff" stroke-width="1" filter="url(#skr1x840)"/><polygon points="764.6,467.2 848.5,466.3 873.1,736.6 742.9,734.1" fill="url(#suitr1x840)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x840) url(#metalr1x840)"/><polygon points="747.5,433.3 825.5,431.2 841.6,511.3 758.1,508.8" fill="url(#bevelr1x840)" fill-opacity=".72" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x840)"/><polygon points="758.3,621.5 839.6,622.1 834.0,659.2 762.4,659.1" fill="#2060ff" fill-opacity=".42" stroke="#2060ff" stroke-width="1" filter="url(#skr1x840)"/><rect x="119.3"  y="701.7" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x840)" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x840)"/><rect x="749.8"   y="701.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x840)" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x840)"/><line x1="151.0" y1="700.1" x2="151.3" y2="784.8" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="778.9" y1="703.5" x2="779.7" y2="782.8" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="183.2" y1="700.5" x2="182.6" y2="783.8" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="810.7" y1="701.5" x2="810.8" y2="783.1" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="216.0" y1="702.0" x2="214.8" y2="783.4" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="842.9" y1="702.6" x2="843.6" y2="783.9" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><polygon points