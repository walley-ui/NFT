="545.8372289730422" y1="492.23682397799564" x2="544.8761689382792" y2="519.2394088529051" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x840)"/><polygon points="431.9,502.1 568.4,502.0 554.5,556.9 447.8,557.4" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x840)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>