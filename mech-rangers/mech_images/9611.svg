.7" y="523.6" width="9.3" height="17.4" rx="1" fill="#2060ff" stroke="#08001e" stroke-width=".6"/></g><g><line x1="897.1256538679451" y1="791.3226947648451" x2="915.4294959793426" y2="112.26982190981505" stroke="url(#chromer1x9611)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x9611)"/><line x1="901.6423511040025" y1="769.6124910540879" x2="913.2212021517195" y2="132.1865896079689" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="868.3,151.6 936.8,151.2 915.6,-7.3" fill="url(#blader1x9611)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x9611)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="877.9577374918014" y="422.06233305167405" width="40.0" height="20.0" fill="url(#bevelr1x9611)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x9611)"/><rect x="880.6152634690144" y="510.299937812332" width="40.0" height="20.0" fill="url(#bevelr1x9611)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x9611)"/><rect x="878.3432876745798" y="603.1739570270292" width="40.0" height="20.0" fill="url(#bevelr1x9611)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x9611)"/><rect x="877.4556862435862" y="690.0441120793112" width="40.0" height="20.0" fill="url(#bevelr1x9611)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x9611)"/><ellipse cx="896.8022801299207" cy="792.8553411229514" rx="22.0" ry="15.0" fill="url(#bevelr1x9611)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x9611)"/></g><rect x="448.33666629586367" y="556.882528989017" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x9611)"/><rect x="423.38639962924645" y="575.6316871975549" width="152.0" height="26.0" fill="url(#bevelr1x9611)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x9611)"/><polygon points="307.1,381.8 350.9,295.0 499.2,277.1 651.0,294.6 692.7,380.9 668.1,502.1 499.2,566.9 330.5,504.1" fill="url(#suitr1x9611)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x9611) url(#metalr1x9611)"/><polygon points="308.7,379.6 349.6,295.4 501.3,277.8 651.3,293.8 693.7,380.2 667.8,503.6 500.9,564.1 331.8,502.8" fill="url(#carbonr1x9611)"/><polygon points="380.5,303.1 499.9,287.3 618.8,304.0 609.0,381.8 392.1,381.7" fill="url(#suitHir1x9611)"/><polygon points="380.2,381.5 367.2,425.4 433.7,504.6 498.5,527.1 568.2,503.6 636.2,424.1 619.1,380.3" fill="#08001e" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x9611)"/><polygon points="381.2,410.3 476.6,412.6 485.1,441.3 387.9,439.8" fill="#2060ff" filter="url(#glowr1x9611)"/><polygon points="523.8,412.6 617.3,411.3 610.9,439.2 514.3,441.1" fill="#2060ff" filter="url(#glowr1x9611)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.0943533929624" y1="412.0042524442076" x2="516.0143168693781" y2="413.285328129027" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.12661936074494" y1="436.90159767139704" x2="514.511558429189" y2="437.02656940184534" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.88404380436987" y1="456.18067553648723" x2="501.7146239442751" y2="482.7413449372165" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x9611)"/><line x1="455.67620324835184" y1="492.75339785329993" x2="453.7826388049685" y2="519.8544580448419" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9611)"/><line x1="478.69799120504405" y1="492.2629401735961" x2="476.45285232080147" y2="519.789275464043" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9611)"/><line x1="500.62582110259683" y1="492.387023408059" x2="499.33643436683343" y2="521.5730360957793" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9611)"/><line x1="522.7798489509709" y1="492.1783