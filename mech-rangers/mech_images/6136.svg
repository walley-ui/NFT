th="2.6" filter="url(#wmr1x6136)"/><polygon points="827.8,294.7 967.9,294.6 969.1,593.1 898.3,725.4 827.1,589.8" fill="url(#carbonr1x6136)"/><polygon points="858.6,360.3 937.5,362.4 934.1,540.1 898.9,632.2 860.1,541.6" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="844.6635604605638" y1="430.01573455268516" x2="949.6816464684531" y2="430.6027636617422" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.6605290907063" y1="332.72171109020707" x2="898.9983111282438" y2="592.9856127249077" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="828.1130410944671" y1="295.137161645852" x2="965.3607769069821" y2="296.0932014444843" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.6078563084453" cy="432.9933997099288" r="18.0" fill="url(#bevelr1x6136)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x6136)"/></g><rect x="451.2021870746277" y="556.1296583492309" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6136)"/><rect x="422.36268884046" y="576.9173716265708" width="152.0" height="26.0" fill="url(#bevelr1x6136)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x6136)"/><polygon points="306.7,379.6 350.9,295.8 501.6,277.5 650.2,293.7 692.5,379.0 670.0,504.9 498.8,565.8 332.7,504.2" fill="url(#suitr1x6136)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x6136) url(#metalr1x6136)"/><polygon points="309.3,380.3 351.9,296.1 499.1,278.4 649.3,292.9 690.8,380.7 668.4,504.0 500.7,564.0 331.1,505.0" fill="url(#carbonr1x6136)"/><polygon points="380.3,302.3 500.9,284.9 617.9,302.5 606.2,379.9 393.5,380.3" fill="url(#suitHir1x6136)"/><polygon points="379.5,380.1 364.0,425.7 433.0,504.3 501.7,528.9 568.1,502.3 635.7,427.1 617.3,380.0" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x6136)"/><polygon points="379.8,409.8 478.3,410.8 484.1,438.4 388.1,438.3" fill="#ff2040" filter="url(#