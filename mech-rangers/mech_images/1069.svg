.0,502.4" fill="url(#suitr1x1069)" stroke="#00ffff" stroke-width="2.8" filter="url(#skr1x1069) url(#metalr1x1069)"/><polygon points="306.2,382.4 350.8,292.9 501.2,276.6 649.1,294.8 692.0,382.2 669.5,502.0 501.5,565.4 332.2,504.2" fill="url(#carbonr1x1069)"/><polygon points="380.5,302.8 498.4,284.7 618.5,301.3 608.8,381.8 391.4,381.0" fill="url(#suitHir1x1069)"/><polygon points="380.7,380.1 365.2,424.5 431.6,504.7 501.8,529.8 568.9,503.0 634.4,426.7 618.2,378.8" fill="#0a0520" fill-opacity=".88" stroke="#00ffff" stroke-width="1.8" filter="url(#skr1x1069)"/><polygon points="380.5,411.6 476.4,410.7 485.1,438.4 389.6,439.4" fill="#00ffff" filter="url(#glowr1x1069)"/><polygon points="524.5,411.7 617.8,412.5 610.1,438.5 516.3,438.9" fill="#00ffff" filter="url(#glowr1x1069)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.75446370976044" y1="411.6783284191042" x2="514.3705396674947" y2="414.5649802775122" stroke="#00ffff" stroke-opacity=".52" stroke-width="2"/><line x1="483.5778607961349" y1="439.157396121975" x2="514.0181666726619" y2="436.3509385571815" stroke="#00ffff" stroke-opacity=".52" stroke-width="2"/><line x1="498.7549139065668" y1="455.9460285007022" x2="498.6094933724962" y2="481.4177358245477" stroke="#00ffff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1069)"/><line x1="454.5314071460441" y1="492.21425670702007" x2="454.6527986555174" y2="519.8414336703718" stroke="#00ffff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1069)"/><line x1="476.09667568201195" y1="492.207679148484" x2="477.03290895711626" y2="521.2543578010052" stroke="#00ffff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1069)"/><line x1="498.8640456479974" y1="491.5055170581676" x2="500.8549804435112" y2="519.7442559746094" stroke="#00ffff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1069)"/><line x1="523.3251482102