2="913.066371406857" y2="112.5533658288419" stroke="url(#chromer1x5046)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x5046)"/><line x1="903.172604779955" y1="770.3498056870885" x2="911.9668285625614" y2="131.1278273563832" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="870.3,152.8 935.0,150.6 917.1,-8.7" fill="url(#blader1x5046)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x5046)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.3698094452359" y="419.7059146404266" width="40.0" height="20.0" fill="url(#bevelr1x5046)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x5046)"/><rect x="879.0269651261717" y="510.35564456610007" width="40.0" height="20.0" fill="url(#bevelr1x5046)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x5046)"/><rect x="878.3238087099604" y="600.6407907311805" width="40.0" height="20.0" fill="url(#bevelr1x5046)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x5046)"/><rect x="878.778398075197" y="691.6660194423981" width="40.0" height="20.0" fill="url(#bevelr1x5046)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x5046)"/><ellipse cx="897.5290951006674" cy="790.6297018303536" rx="22.0" ry="15.0" fill="url(#bevelr1x5046)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x5046)"/></g><rect x="451.1749820915982" y="557.0565717501565" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x5046)"/><rect x="424.25619516037403" y="575.9021075867116" width="152.0" height="26.0" fill="url(#bevelr1x5046)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x5046)"/><polygon points="306.8,381.0 349.7,295.5 498.9,279.4 649.7,293.2 692.6,378.8 670.6,503.3 498.9,565.6 332.2,502.8" fill="url(#suitr1x5046)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x5046) url(#metalr1x5046)"/><polygon points="309.7,382.0 348.8,295.1 499.0,278.5 648.1,295.5 69