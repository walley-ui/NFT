.9,292.1 171.3,592.6 101.9,727.4 30.9,591.5" fill="url(#carbonr1x4301)"/><polygon points="64.1,360.6 141.7,360.0 138.5,543.0 102.8,632.2 62.8,540.2" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="51.04511917144057" y1="430.20283466773105" x2="154.79317428976293" y2="431.50291951317337" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="100.37898601735007" y1="331.78336209366097" x2="101.21620608897877" y2="593.1838596169837" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="35.3045795533247" y1="297.4873588057235" x2="169.06567589979616" y2="296.31351296911015" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.36808696653691" cy="432.7569559712894" r="18.0" fill="url(#bevelr1x4301)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x4301)"/></g><rect x="450.8890400648117" y="557.7342894565314" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x4301)"/><rect x="424.7214332348667" y="574.8090520062484" width="152.0" height="26.0" fill="url(#bevelr1x4301)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x4301)"/><polygon points="307.1,379.3 349.1,293.5 498.8,279.1 650.0,294.0 691.6,380.9 668.1,505.0 499.4,565.5 332.2,502.0" fill="url(#suitr1x4301)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x4301) url(#metalr1x4301)"/><polygon points="309.0,382.2 349.3,294.1 500.6,278.6 649.6,296.1 691.0,380.4 670.6,502.5 501.2,565.3 331.3,502.0" fill="url(#carbonr1x4301)"/><polygon points="381.6,301.4 498.9,287.3 620.7,303.8 608.4,380.5 393.1,382.3" fill="url(#suitHir1x4301)"/><polygon points="381.5,379.3 366.2,426.5 433.2,502.4 499.2,528.9 568.3,502.9 633.8,424.3 617.8,379.1" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x4301)"/><polygon points="382.4,411.7 478.6,411.7 483.4,439.3 390.4,440.1" fill="#ff2040" filter="url(#glowr1x4301)"/><polygon points="521.8,410.6 618.8,411.3 613.0