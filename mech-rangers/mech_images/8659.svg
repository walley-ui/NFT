evelr1x8659)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x8659)"/><polygon points="307.1,381.8 351.1,294.1 501.2,278.9 650.4,293.4 691.1,379.1 670.1,505.1 499.1,564.3 331.5,504.2" fill="url(#suitr1x8659)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x8659) url(#metalr1x8659)"/><polygon points="309.5,379.8 349.4,293.9 501.3,278.2 650.8,293.1 693.0,378.9 669.2,504.2 499.1,563.7 331.3,503.2" fill="url(#carbonr1x8659)"/><polygon points="379.4,302.6 499.1,287.4 617.7,303.2 608.3,380.0 392.9,381.2" fill="url(#suitHir1x8659)"/><polygon points="380.7,379.1 366.8,426.1 431.6,504.5 500.2,528.2 567.6,504.1 634.1,425.9 620.5,379.9" fill="#0d1520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x8659)"/><polygon points="381.3,410.9 478.7,410.9 485.9,441.7 390.1,439.8" fill="#ff44aa" filter="url(#glowr1x8659)"/><polygon points="524.6,410.2 618.1,410.1 609.8,439.9 513.6,439.7" fill="#ff44aa" filter="url(#glowr1x8659)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.26491317652165" y1="414.9440483833663" x2="516.839556265194" y2="415.19743853146207" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="484.0341046359017" y1="438.03149592652915" x2="513.9046078371257" y2="438.7806409763172" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="500.5797421858646" y1="453.44254551632326" x2="499.2998146583326" y2="482.0844378921204" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8659)"/><line x1="454.8322464491986" y1="492.30282555455335" x2="453.3266458079033" y2="519.5789561595768" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8659)"/><line x1="476.09093679659065" y1="492.6232614698819" x2="478.07443071598186" y2="520.0628708912991" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8659)"/><l