kr1x2228)"/><rect x="425.5304174675606" y="574.9532007239759" width="152.0" height="26.0" fill="url(#bevelr1x2228)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x2228)"/><polygon points="309.4,379.7 349.0,294.0 498.7,276.3 649.2,296.0 691.4,380.1 670.5,503.4 500.4,564.7 330.4,502.6" fill="url(#suitr1x2228)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x2228) url(#metalr1x2228)"/><polygon points="307.2,379.0 348.7,295.1 499.2,278.8 648.2,293.8 690.9,381.9 670.4,505.2 498.3,564.3 329.7,503.4" fill="url(#carbonr1x2228)"/><polygon points="379.6,303.9 500.0,286.5 618.5,302.5 606.5,379.2 392.9,379.6" fill="url(#suitHir1x2228)"/><polygon points="380.4,381.8 366.0,425.6 431.2,503.7 498.2,528.9 568.1,504.2 635.0,424.4 620.8,380.0" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x2228)"/><polygon points="379.2,410.1 475.4,412.9 486.3,440.5 388.5,440.7" fill="#4444ff" filter="url(#glowr1x2228)"/><polygon points="523.6,411.9 618.2,410.6 611.2,439.8 514.6,439.9" fill="#4444ff" filter="url(#glowr1x2228)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.4534802369401" y1="412.70995002463457" x2="514.6257225362025" y2="413.9265780765563" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.4723905205354" y1="437.5809447384439" x2="513.9744402854145" y2="436.99430049872024" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.95657676188273" y1="455.6067474133335" x2="500.9102437174879" y2="482.93365427851677" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2228)"/><line x1="454.29680739173665" y1="492.9793695061467" x2="454.1614763271809" y2="518.4177968480624" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2228)"/><line x1="475.170197236482" y1="491.8849405173212" x2="477.3476399664208" y2="521.