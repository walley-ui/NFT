lygon points="309.0,380.8 351.5,295.0 501.2,276.3 649.7,294.2 693.2,381.5 669.3,503.3 499.6,566.2 329.9,504.5" fill="url(#suitr1x478)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x478) url(#metalr1x478)"/><polygon points="309.2,378.8 351.7,295.4 498.6,277.8 649.5,293.5 693.6,380.3 668.9,501.8 499.2,564.1 330.5,504.7" fill="url(#carbonr1x478)"/><polygon points="381.4,301.8 500.6,286.6 617.8,302.3 606.8,379.8 394.2,379.1" fill="url(#suitHir1x478)"/><polygon points="380.4,380.1 364.3,427.4 432.5,503.1 499.1,529.2 567.2,503.3 635.9,424.1 619.6,381.7" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x478)"/><polygon points="382.0,409.8 475.8,412.4 484.4,438.7 388.6,439.2" fill="#ff2040" filter="url(#glowr1x478)"/><polygon points="522.0,412.9 620.0,410.1 609.9,438.5 516.6,441.1" fill="#ff2040" filter="url(#glowr1x478)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.25698023397473" y1="414.33462612228465" x2="514.0401175057888" y2="415.1025240836665" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="486.189683287926" y1="436.9583706082776" x2="516.7444353451393" y2="437.79588476149365" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="498.43332798155024" y1="454.8196544368751" x2="500.35126438587906" y2="483.5393181880936" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x478)"/><line x1="455.34662219051273" y1="490.92976219644765" x2="453.1875200168975" y2="519.7022132325917" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x478)"/><line x1="477.7825212108344" y1="491.0491770260036" x2="475.93294060653074" y2="521.4570579990744" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x478)"/><line x1="498.87547903666274" y1="492.31200319621706" x2="498.95007637981325" y2="520.6399001476354" stroke="#