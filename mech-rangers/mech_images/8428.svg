" fill="url(#blader1x8428)" stroke="#00ffff" stroke-width="1.8" filter="url(#wmr1x8428)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="910.5,690.7 943.8,692.3 987.2,272.2" fill="url(#blader1x8428)" stroke="#00ffff" stroke-width="1.8" filter="url(#wmr1x8428)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.4676901355945" y="681.7535398345441" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x8428)" stroke="#00ffff" stroke-width="1.4" filter="url(#wmr1x8428)"/></g><rect x="449.07956581609324" y="556.5628116651438" width="100.0"  height="56.0" fill="#08001e" stroke="#00ffff" stroke-width="2.2" filter="url(#skr1x8428)"/><rect x="423.731107247062" y="574.4174367864616" width="152.0" height="26.0" fill="url(#bevelr1x8428)" fill-opacity=".65" stroke="#00ffff" stroke-width="1.2" filter="url(#skr1x8428)"/><polygon points="308.9,378.8 350.5,293.3 498.4,278.9 651.3,295.4 692.4,382.4 667.7,502.8 500.1,564.0 332.7,502.5" fill="url(#suitr1x8428)" stroke="#00ffff" stroke-width="2.8" filter="url(#skr1x8428) url(#metalr1x8428)"/><polygon points="306.8,380.7 351.8,292.8 501.4,279.0 650.1,293.2 690.8,379.8 669.0,502.7 499.0,566.1 330.7,503.8" fill="url(#carbonr1x8428)"/><polygon points="382.7,301.3 498.5,286.8 618.2,302.5 608.9,381.8 394.0,378.9" fill="url(#suitHir1x8428)"/><polygon points="381.3,379.4 365.0,424.8 434.1,503.5 500.3,528.9 566.4,505.3 635.1,426.4 619.2,379.7" fill="#0d1520" fill-opacity=".88" stroke="#00ffff" stroke-width="1.8" filter="url(#skr1x8428)"/><polygon points="382.6,410.3 478.0,411.9 484.2,440.8 389.9,439.0" fill="#00ffff" filter="url(#glowr1x8428)"/><polygon points="522.5,409.7 617.5,409.6 611.9,438.5 514.2,440.6" fill="#00ffff" filter="url(#glowr1x8428)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><li