t x="115.6" y="701.7" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x2059)"/><rect x="747.7"  y="703.0" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x2059)" stroke="#00ff60" stroke-width="2" filter="url(#wmr1x2059)"/><rect x="750.2"  y="702.8" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x2059)"/><rect x="120.2" y="699.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><rect x="756.0" y="700.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><rect x="152.9" y="699.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><rect x="783.1" y="700.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><rect x="182.4" y="701.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><rect x="814.3" y="700.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><rect x="210.9" y="701.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><rect x="842.6" y="701.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2059)" stroke="#00ff60" stroke-width=".8" filter="url(#wmr1x2059)"/><ellipse cx="182.93382047437132" cy="711.3734021683036" rx="45.1" ry="30.0" fill="#00ff60" fill-opacity=".25" filter="url(#glowr1x2059)"/><ellipse cx="817.5374589428492" cy="711.9276707563363" rx="45.1" ry="30.0" fill="#00ff60" fill-opacity=".25" filter="url(#glowr1x2059)"/></g><rect x="450.363335198164" y="555.6907000540756" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x2059)"/><rect x="422.9671818333678" y="574.8638617890887" w