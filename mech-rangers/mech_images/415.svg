ba(255,255,255,.58)" stroke-width="1.3"/><polygon points="913.2,693.2 942.7,690.1 986.4,271.8" fill="url(#blader1x415)" stroke="#ff44aa" stroke-width="1.8" filter="url(#wmr1x415)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="863.6938252077997" y="681.310586701706" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x415)" stroke="#ff44aa" stroke-width="1.4" filter="url(#wmr1x415)"/></g><rect x="451.2730304944329" y="555.3278417409398" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x415)"/><rect x="424.1798295005225" y="576.8600367769599" width="152.0" height="26.0" fill="url(#bevelr1x415)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x415)"/><polygon points="306.9,380.6 348.8,295.6 500.9,276.6 648.2,293.4 691.7,379.0 669.6,503.0 501.3,565.2 330.7,502.9" fill="url(#suitr1x415)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x415) url(#metalr1x415)"/><polygon points="307.2,380.3 349.2,295.5 500.2,279.7 650.0,293.0 692.1,379.0 668.2,504.2 500.2,565.1 330.5,504.4" fill="url(#carbonr1x415)"/><polygon points="380.1,302.6 501.5,286.2 617.6,302.5 607.9,380.1 393.7,379.9" fill="url(#suitHir1x415)"/><polygon points="379.7,379.0 365.3,427.4 433.9,503.7 499.1,526.6 568.7,503.7 635.2,425.9 620.7,379.6" fill="#050508" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x415)"/><polygon points="382.3,409.6 475.6,410.2 484.1,440.1 388.3,439.6" fill="#ff44aa" filter="url(#glowr1x415)"/><polygon points="522.4,410.3 617.5,412.0 611.1,441.8 515.9,439.5" fill="#ff44aa" filter="url(#glowr1x415)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.8445608800836" y1="413.8738217459991" x2="513.660540066883" y2="412.29653576882555" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="483.4