lter="url(#wmr1x1042)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x1042)" opacity=".9"/><line x1="111.12628120750186" y1="672.1310248075985" x2="101.99462198931721" y2="-128.73437263416128" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.8480448693968" y1="670.3365667912177" x2="101.24778129158538" y2="-127.45015192264694" stroke="#ccccff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="44.41598658947271" y="670.4649452999234" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x1042)" stroke="#ccccff" stroke-width="1.6" filter="url(#wmr1x1042)"/><rect x="68.70020082354543" y="673.6293797153979" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="90.23295758388933" y="678.2453240099363" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="89.13056419951837" y="684.8987936534919" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="91.64379327785221" y="692.2004198389128" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="88.47414173906665" y="700.4433652781881" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="90.71214165411887" y="709.7453246105462" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><rect x="90.19161890413609" y="716.9154576179571" width="24.0" height="6.0" rx="1" fill="#ccccff" fill-opacity=".35"/><ellipse cx="101.17757753835988" cy="725.0894318479113" rx="22.0" ry="16.0" fill="url(#bevelr1x1042)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x1042)"/></g><rect x="450.32576035168023" y="555.5263619392178" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x1042)"/><rect x="423.48222632231193" y="574.098574170284"