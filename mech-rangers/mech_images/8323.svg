9" y="641.4" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.7,468.0 233.4,467.0 259.3,736.7 130.0,735.5" fill="url(#suitr1x8323)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x8323) url(#metalr1x8323)"/><polygon points="173.7,431.3 252.8,433.1 244.2,512.2 159.3,510.7" fill="url(#bevelr1x8323)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x8323)"/><polygon points="161.6,622.9 242.3,621.9 240.7,661.8 164.1,662.6" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x8323)"/><polygon points="765.7,465.7 848.5,466.1 872.4,734.6 743.1,736.5" fill="url(#suitr1x8323)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x8323) url(#metalr1x8323)"/><polygon points="748.0,433.7 827.3,432.0 841.5,511.1 757.8,512.0" fill="url(#bevelr1x8323)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x8323)"/><polygon points="755.1,620.5 839.8,620.5 835.3,660.8 760.8,661.6" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x8323)"/><rect x="118.7"  y="699.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x8323)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x8323)"/><rect x="749.0"   y="699.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x8323)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x8323)"/><line x1="150.0" y1="700.1" x2="149.2" y2="783.5" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="779.5" y1="702.9" x2="779.9" y2="783.0" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="183.1" y1="703.6" x2="180.7" y2="783.7" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="809.6" y1="700.3" x2="812.4" y2="783.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="216.0" y1="702.3" x2="214.4" y2="785.1" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="845.3" y1="702.2" x2="844.0" y2="785.0" stroke="#ff2040" stroke-opacity=