28.6 102.2,-138.6" fill="url(#blader1x4145)" filter="url(#wmr1x4145)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x4145)" opacity=".9"/><line x1="109.8133525891043" y1="669.6772954710759" x2="102.15197415333239" y2="-128.08178044613453" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.18749780096111" y1="671.6958997235633" x2="101.58309216227379" y2="-129.94963067406792" stroke="#4444ff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="44.63119525503364" y="670.0891316314228" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x4145)" stroke="#4444ff" stroke-width="1.6" filter="url(#wmr1x4145)"/><rect x="70.86131213432175" y="673.9672324275598" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="91.91225372072306" y="675.8087573133408" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="91.54179462151599" y="686.3720004862174" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="89.65034545868632" y="693.2587727451697" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="89.47575939096507" y="700.5535623905249" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="90.42928219711405" y="710.1332627455704" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="89.09808131814" y="716.5208716580644" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><ellipse cx="103.1084381265938" cy="727.2460479155183" rx="22.0" ry="16.0" fill="url(#bevelr1x4145)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x4145)"/></g><rect x="449.43699809582904" y="555.1193846204318" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x4145)"/><rect 