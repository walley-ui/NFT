0" rx="5" fill="url(#carbonr1x527)"/><rect x="42.68660284172741" y="402.82659850176424" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x527)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x527)"/><circle cx="82.78207156633955" cy="414.33316749855874" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x527)"/><circle cx="82.38575165554877" cy="414.84325675303114" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="53.036936353743044" y="454.89445981979367" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x527)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x527)"/><circle cx="-18.263979468084905" cy="472.98714948063713" r="18.0" fill="#ff2040" filter="url(#glowr1x527)" opacity=".88"/><circle cx="-18.091627284009043" cy="471.16918364902955" r="7.0" fill="#ffffff"/><rect x="76.9465780570544" y="501.77297264672814" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x527)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x527)"/><rect x="37.054486227445274" y="422.2029980461113" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="62.769540643729236" y1="487.05170366186644" x2="60.42329566184428" y2="519.6288276933134" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="78.44614910757166" y1="486.5043639246374" x2="78.53811052454633" y2="519.4684827757999" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="92.50669113419947" y1="485.31145763769746" x2="93.56756376879287" y2="517.86624332387" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.5839304946363" y="558.1383733926341" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x527)"/><rect x="424.8437880982645" y="576.8699769941159" width="152.0" height="26.0" fill="url(#bevelr1x527)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x527)"/><polygon points="309.8,381.8 350.2,293.8 501.6,277.3 648.4,294.5 693.0,381.9 668.9,504.1 499.9,565.0 330.9,503.6