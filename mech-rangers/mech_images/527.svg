0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.2,465.7 233.8,467.7 257.6,735.0 128.8,733.8" fill="url(#suitr1x527)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x527) url(#metalr1x527)"/><polygon points="174.6,433.0 254.1,431.4 242.3,512.4 159.1,509.9" fill="url(#bevelr1x527)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x527)"/><polygon points="162.3,622.8 244.9,623.4 239.8,662.3 166.0,660.2" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x527)"/><polygon points="765.9,465.5 847.5,466.5 872.4,733.7 741.6,735.5" fill="url(#suitr1x527)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x527) url(#metalr1x527)"/><polygon points="747.6,431.4 825.9,432.6 839.4,510.6 757.9,510.9" fill="url(#bevelr1x527)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x527)"/><polygon points="756.0,622.4 839.8,622.8 835.3,661.4 761.8,659.2" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x527)"/><rect x="121.8"  y="700.8" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x527)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x527)"/><rect x="749.8"   y="698.7" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x527)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x527)"/><line x1="148.6" y1="703.3" x2="150.5" y2="784.3" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="778.8" y1="702.5" x2="778.7" y2="785.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="180.9" y1="701.9" x2="183.8" y2="784.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="811.5" y1="700.3" x2="812.4" y2="782.1" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="215.8" y1="702.9" x2="213.5" y2="783.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="845.4" y1="702.4" x2="844.3" y2="782.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><polygon points