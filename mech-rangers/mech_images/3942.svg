 filter="url(#wmr1x3942)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x3942)" opacity=".9"/><line x1="905.7619624888525" y1="672.4356316915713" x2="897.9212942716852" y2="-130.32658930383624" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="887.4174384077266" y1="669.8134604486637" x2="898.1500971236267" y2="-127.55700831683355" stroke="#00ff60" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="842.6812010481582" y="669.7215257806703" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x3942)" stroke="#00ff60" stroke-width="1.6" filter="url(#wmr1x3942)"/><rect x="864.5159117710405" y="672.4435841397382" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="884.8153673284315" y="676.3019675027579" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="887.2983346123807" y="684.4406279950402" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="884.2641488562897" y="694.8100469451398" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="886.5599974073098" y="700.2441597914323" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="884.2440203394368" y="710.5598706014454" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><rect x="887.5220716590621" y="715.9600635921582" width="24.0" height="6.0" rx="1" fill="#00ff60" fill-opacity=".35"/><ellipse cx="897.6870715228468" cy="727.3986200360581" rx="22.0" ry="16.0" fill="url(#bevelr1x3942)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x3942)"/></g><rect x="448.30556587697936" y="558.2180363959633" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x3942)"/><rect x="423.35455627869817" y="575.018061359226