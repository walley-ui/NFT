oke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x8688)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="912.2,691.1 944.2,690.6 984.4,272.8" fill="url(#blader1x8688)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x8688)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.8068413336389" y="682.1524341085925" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x8688)" stroke="#ffcc00" stroke-width="1.4" filter="url(#wmr1x8688)"/></g><rect x="450.5269911828451" y="556.611546278093" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x8688)"/><rect x="425.56821868158875" y="576.216287967004" width="152.0" height="26.0" fill="url(#bevelr1x8688)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x8688)"/><polygon points="307.7,379.5 352.0,293.7 498.4,277.5 651.4,292.9 692.9,381.7 669.1,505.3 500.6,564.5 330.8,504.8" fill="url(#suitr1x8688)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x8688) url(#metalr1x8688)"/><polygon points="309.3,381.9 348.6,296.1 499.8,277.2 650.2,293.8 690.5,379.8 670.5,504.8 501.0,566.2 330.8,503.9" fill="url(#carbonr1x8688)"/><polygon points="379.3,303.0 500.0,286.6 619.3,302.5 606.5,380.1 392.2,379.9" fill="url(#suitHir1x8688)"/><polygon points="381.9,380.9 363.9,426.6 431.1,502.3 500.8,529.8 567.1,503.7 635.1,424.6 618.3,381.0" fill="#1e0600" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x8688)"/><polygon points="382.0,410.7 476.2,410.6 484.3,440.9 388.2,441.5" fill="#ffcc00" filter="url(#glowr1x8688)"/><polygon points="524.0,413.0 619.6,409.8 611.1,438.3 514.1,439.8" fill="#ffcc00" filter="url(#glowr1x8688)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.72197956699875" y1="4