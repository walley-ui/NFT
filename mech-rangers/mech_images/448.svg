118.0" rx="7" fill="url(#carbonr1x448)"/><rect x="983.03152114233" y="448.46439195601266" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x448)" stroke="#ff2040" stroke-width="1.4" filter="url(#wmr1x448)"/><circle cx="880.0511260334962" cy="471.01595812728624" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x448)"/><circle cx="880.1714092357644" cy="472.41986482879145" r="34.0" fill="#ff2040" fill-opacity=".4" filter="url(#bloomr1x448)"/><circle cx="881.1690667359718" cy="470.40803056405855" r="18.0" fill="#ff2040" filter="url(#glowr1x448)"/><rect x="842.3528031941131" y="382.3564530113712" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x448)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x448)"/><rect x="841.5605852577463" y="399.43273706585165" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="847.6965836661495" y1="520.5847680658102" x2="847.6246609329805" y2="550.7841419072821" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="870.9054918328859" y1="520.3612503416836" x2="870.7567186909356" y2="548.9250400275923" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="897.0025501517207" y1="519.916812880244" x2="894.4866473711655" y2="549.0495343675836" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/><line x1="918.5539604548924" y1="518.6672502696514" x2="919.5328703023121" y2="548.6647815837524" stroke="#ff2040" stroke-opacity=".6" stroke-width="2"/></g><rect x="450.93065060907975" y="558.0262883219867" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x448)"/><rect x="425.5246007955633" y="574.3915069624782" width="152.0" height="26.0" fill="url(#bevelr1x448)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x448)"/><polygon points="306.4,382.3 351.6,295.1 500.0,278.3 649.2,294.2 690.8,381.6 667.7,505.3 498.8,566.2 332.7,505.4" fill="url(#suitr1x448)" stroke="#ff2040" stroke-width="2.8" 