l="#050508" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#050508" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#00ffff"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#00ffff"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#00ffff" stroke="#050508" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#00ffff" stroke="#050508" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><g><line x1="897.4572386507504" y1="792.6353772679344" x2="913.5438784141653" y2="109.7404906590469" stroke="url(#chromer1x7292)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x7292)"/><line x1="903.5186135633477" y1="771.8608879807405" x2="912.4042416806892" y2="131.60031714588402" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="868.9,153.0 935.7,152.2 914.4,-10.0" fill="url(#blader1x7292)" stroke="#00ffff" stroke-width="1.8" filter="url(#wmr1x7292)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.2478140028753" y="420.07652335995806" width="40.0" height="20.0" fill="url(#bevelr1x7292)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x7292)"/><rect x="877.3775828240998" y="510.27459007967263" width="40.0" height="20.0" fill="url(#bevelr1x7292)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x7292)"/><rect x="880.2931646821648" y="603.0495552006178" width="40.0" height="20.0" fill="url(#bevelr1x7292)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x7292)"/><rect x="877.1919864979201" y="692.6405669534579" width="40.0" height="20.0" fill="url(#bevelr1x7292)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x7292)"/><ellipse cx="897.6188478710689" cy="791.5201569590718" rx="22.0" ry="15.0" fill="url(#bevelr1x7292)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x7292)"/></g><rect x="449.6268403806724" y="556.13