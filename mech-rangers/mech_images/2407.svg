" stroke-width="1.5" filter="url(#skr1x2407)"/><line x1="545.0995088336244" y1="491.00505681838837" x2="545.0732819499634" y2="518.5677446408197" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2407)"/><polygon points="434.0,504.5 568.5,501.9 552.9,556.4 446.1,556.0" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x2407)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>