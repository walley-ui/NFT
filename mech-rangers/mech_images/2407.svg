f" fill-opacity=".88" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x2407)"/><path d="M500,493.20000000000005 C452.53373742559927,463.97720548771326 476.88286100951956,516.7778830324299 500,522.3627449654043" fill="rgba(255,255,255,.14)"/><path d="M500,493.20000000000005 C544.4648745130747,464.1013889599592 524.7078700273298,517.4531105287373 500,523.9518580928445" fill="rgba(255,255,255,.14)"/></g><g><polygon points="33.9,293.9 173.3,294.0 170.9,591.5 103.0,725.8 33.1,591.5" fill="url(#titaniumr1x2407)" stroke="#2060ff" stroke-width="2.6" filter="url(#wmr1x2407)"/><polygon points="31.7,294.8 173.1,292.8 171.7,591.3 101.1,725.7 33.7,592.2" fill="url(#carbonr1x2407)"/><polygon points="63.1,360.0 141.7,361.0 140.9,539.9 101.5,631.5 64.1,539.9" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="49.23664631959048" y1="430.50234942901875" x2="152.49181657614184" y2="430.5144809162244" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.58855609003452" y1="332.5638379297219" x2="103.9231203795783" y2="592.404243807774" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="35.30391377959397" y1="297.1055065593682" x2="171.83901875367386" y2="297.3368203436024" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.00202837729823" cy="432.09049464957786" r="18.0" fill="url(#bevelr1x2407)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x2407)"/></g><rect x="450.3536068562418" y="557.8982573628425" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x2407)"/><rect x="423.72570544239136" y="574.5998357342556" width="152.0" height="26.0" fill="url(#bevelr1x2407)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x2407)"/><polygon points="307.5,380.3 349.6,293.4 498.8,276.8 648.6,295.0 691.7,379.9 668.5,502.8 501.0,563.5 330.4,503.2" fill="url(#suitr1x2407)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x2407) url(#metalr1x2