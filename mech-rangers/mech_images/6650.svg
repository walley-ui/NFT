d700" stroke-width="2" filter="url(#wmr1x6650)"/><rect x="33.21806039981541" y="419.6110092291608" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x6650)"/><rect x="43.03861160011959" y="404.04869104744864" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x6650)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6650)"/><circle cx="82.0263772578351" cy="415.14566227514297" r="15.0" fill="#ffd700" opacity=".8" filter="url(#glowr1x6650)"/><circle cx="82.69789393752811" cy="413.7589632629417" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.03640964742747" y="454.4762220812961" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x6650)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x6650)"/><circle cx="-19.494866791889102" cy="469.6306172583252" r="18.0" fill="#ffd700" filter="url(#glowr1x6650)" opacity=".88"/><circle cx="-19.512425891645286" cy="470.0555553946644" r="7.0" fill="#ffffff"/><rect x="76.36826095398513" y="500.8003564879298" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x6650)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6650)"/><rect x="38.26683907624331" y="422.43989125592634" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="62.03802539169785" y1="488.101967133861" x2="61.32628371728581" y2="519.926961441338" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/><line x1="76.39283569077027" y1="488.05062519581986" x2="78.4481169730797" y2="520.1063844623044" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.16358472280201" y1="485.80439695250243" x2="95.27636648299169" y2="518.193618206121" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.4126290727407" y="555.1376347921788" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x6650)"/><rect x="424.22060590041804" y="575.1528560507112" width="152.0" height="26.0" fill="url(#bevelr1x6650)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x6650)"/><polygon points="307.2,380.1 348.9,296.1 498.2,276.8 648.2,295.2 691.1,382.0 667.8,502.5 500.7,566.3 332.6,502.5" fill="url(#suitr1x6650)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x6650) url(#metalr1x6650)"/><polygon points="307.2,380.1 349.4,293.4 498.5,279.6 650.4,294.3 691.4,381.6 670.3,503.9 499.7,566.6 330.8,501.8" fill="url(#carbonr1x6650)"/><polygon points="381.4,303.4 501.7,287.0 618.1,303.4 605.7,379.2 391.0,379.1" fill="url(#suitHir1x6650)"/><polygon points="382.2,382.2 365.8,425.6 432.8,502.9 499.7,529.5 567.0,502.8 634.5,424.8 620.3,381.3" fill="#050508" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x6650)"/><polygon points="382.7,412.2 476.4,412.7 484.5,440.9 387.2,440.0" fill="#ffd700" filter="url(#glowr1x6650)"/><polygon points="522.9,410.1 618.2,412.3 609.8,441.5 515.1,439.0" fill="#ffd700" filter="url(#glowr1x6650)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.3873791648634" y1="413.44496925165873" x2="514.4391603624821" y2="415.1313263883814" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="484.48550982005895" y1="439.71318610422315" x2="516.585761790853" y2="437.16278400951995" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="501.32522143209354" y1="453.20214321604" x2="501.773710304033" y2="483.8263586171903" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6650)"/><line x1="454.9875761261955" y1="490.962278980948" x2="452.1245058093965" y2="519.3341181896627" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6650)"/><line x1="475.339310761299" y1="491.7220383699983" x2="478.36655915811656" y2="519.3749637654051" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6650)"/><line x1="501.12712704539297" y1="492.66284386431795" x2="500.07352036833765" y2="521.7