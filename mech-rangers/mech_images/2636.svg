/><rect x="422.42547294553367" y="575.1637765238993" width="152.0" height="26.0" fill="url(#bevelr1x2636)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x2636)"/><polygon points="308.1,379.5 349.4,294.7 498.3,279.4 648.5,295.8 691.2,380.4 670.5,504.1 499.4,565.7 331.9,501.9" fill="url(#suitr1x2636)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x2636) url(#metalr1x2636)"/><polygon points="309.6,380.8 349.0,295.5 500.7,277.6 649.9,295.5 690.3,380.7 669.0,502.4 501.6,566.2 332.2,502.7" fill="url(#carbonr1x2636)"/><polygon points="382.2,304.4 499.2,284.7 618.1,303.3 606.6,380.1 391.5,379.6" fill="url(#suitHir1x2636)"/><polygon points="379.7,381.3 364.6,425.1 431.6,504.8 500.0,528.9 565.7,504.4 635.9,424.3 618.3,379.1" fill="#0a0520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x2636)"/><polygon points="382.2,411.9 477.2,411.4 484.8,438.6 387.2,440.0" fill="#ff44aa" filter="url(#glowr1x2636)"/><polygon points="523.3,410.8 617.5,411.1 610.9,439.6 515.9,440.2" fill="#ff44aa" filter="url(#glowr1x2636)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.0576487118937" y1="413.54600138319654" x2="515.3974923325144" y2="413.80217971689996" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="486.27529561357574" y1="439.32843063315374" x2="515.9178879642301" y2="439.71608422771095" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="500.9020996717736" y1="455.85528664058074" x2="498.65328015806153" y2="483.25515604335817" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2636)"/><line x1="455.33527414387095" y1="492.7470996183343" x2="453.3947730275616" y2="521.7571624088101" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2636)"/><line x1="476.2613600859791" y1="490.07230246476826" x2="477.7978153652884" y2="519.737