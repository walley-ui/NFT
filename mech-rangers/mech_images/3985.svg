 filter="url(#wmr1x3985)"/><rect x="838.3785895198212" y="395.0026672729291" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x3985)"/><rect x="983.1261697144806" y="445.83538011871275" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x3985)" stroke="#ffcc00" stroke-width="1.4" filter="url(#wmr1x3985)"/><circle cx="880.9759553462826" cy="473.0156538195908" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x3985)"/><circle cx="881.8233408953622" cy="470.84228089423846" r="34.0" fill="#ffcc00" fill-opacity=".4" filter="url(#bloomr1x3985)"/><circle cx="882.0925179280899" cy="473.12159645557404" r="18.0" fill="#ffcc00" filter="url(#glowr1x3985)"/><rect x="844.4904176339135" y="381.36722763199356" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x3985)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x3985)"/><rect x="838.7532621910424" y="397.9225586774759" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="849.09737064844" y1="518.2274395567365" x2="848.6313325129078" y2="547.9847722440958" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="872.2951542434841" y1="518.5478123353794" x2="871.6933143165521" y2="548.9276705973781" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="896.3843373830989" y1="520.0163492427207" x2="895.7071834141948" y2="551.0392298157327" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="919.3427378686704" y1="520.3144226066768" x2="918.165755121559" y2="547.7416076180525" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.7024597324431" y="556.9575259720906" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x3985)"/><rect x="422.31781133208426" y="576.4756617034785" width="152.0" height="26.0" fill="url(#bevelr1x3985)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x3985)"/><polygon points="308.0,381.3 350.4,295.1 501.0,279.7 649.3,294.3 