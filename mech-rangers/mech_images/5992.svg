="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="911.7,690.3 945.1,691.8 985.0,270.3" fill="url(#blader1x5992)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x5992)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.8601154646464" y="682.2411202114075" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x5992)" stroke="#4444ff" stroke-width="1.4" filter="url(#wmr1x5992)"/></g><rect x="449.1690790325403" y="557.8867706803604" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x5992)"/><rect x="422.23434779280797" y="574.5073899220675" width="152.0" height="26.0" fill="url(#bevelr1x5992)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x5992)"/><polygon points="307.5,380.1 351.3,295.4 499.0,277.7 648.1,294.3 690.5,380.0 669.9,504.0 500.8,564.7 332.4,502.2" fill="url(#suitr1x5992)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x5992) url(#metalr1x5992)"/><polygon points="309.2,380.4 348.9,294.8 500.9,277.1 648.9,293.7 691.9,382.2 668.4,504.4 501.6,566.3 330.9,505.3" fill="url(#carbonr1x5992)"/><polygon points="381.7,303.3 498.3,285.5 617.4,301.7 609.1,381.2 392.4,379.6" fill="url(#suitHir1x5992)"/><polygon points="382.8,380.3 364.1,426.8 433.2,504.1 500.5,527.5 565.7,505.3 633.2,425.8 617.3,378.9" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x5992)"/><polygon points="382.6,412.2 475.2,412.3 483.7,440.1 389.1,441.6" fill="#4444ff" filter="url(#glowr1x5992)"/><polygon points="521.3,411.1 618.1,411.5 609.6,438.4 516.2,440.8" fill="#4444ff" filter="url(#glowr1x5992)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.3802089596726" y1="413.3618597782217" x2="514.7896627872624" y2="414.7064331388101" stroke="#4444ff" stroke-opacity=".52" stroke-width