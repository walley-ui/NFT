1.2,380.0" fill="url(#suitHir1x2403)"/><polygon points="382.6,382.1 367.2,427.4 434.5,502.5 501.4,529.3 566.2,501.8 634.5,425.2 620.0,381.3" fill="#0a0520" fill-opacity=".88" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x2403)"/><polygon points="382.7,409.8 475.6,413.1 485.5,438.9 387.6,440.3" fill="#c0c0d0" filter="url(#glowr1x2403)"/><polygon points="521.3,409.6 618.0,410.1 610.9,439.7 515.4,441.3" fill="#c0c0d0" filter="url(#glowr1x2403)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="482.97345495741814" y1="413.1368865089491" x2="514.1267688186281" y2="412.720891612675" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="485.67699986459684" y1="436.9996968358755" x2="516.3682854391076" y2="437.15523728756233" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="501.09677114067597" y1="455.7314837145619" x2="499.90709945196284" y2="484.8469669627026" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2403)"/><line x1="453.6089703159221" y1="492.8151877883821" x2="455.3134809592553" y2="519.540193603281" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2403)"/><line x1="478.5663659206964" y1="489.80570405498145" x2="477.7365932161361" y2="520.7395992632024" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2403)"/><line x1="498.6524586318061" y1="492.05635917112227" x2="499.25708296662197" y2="518.9252400279045" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2403)"/><line x1="522.3257927703298" y1="490.0572164732031" x2="522.7809752893261" y2="518.780120721832" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2403)"/><line x1="544.3307344763726" y1="490.80999621795485" x2="544.3181213004701" y2="518.2531119721941" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2403)"/><polygon points="434.1,501.9 567.1,501.8 554.0,555.4 444.8,558.6" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x2403)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".48">CHROME RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".32">MECH RANGERS</text></svg>