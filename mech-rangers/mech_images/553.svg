er="url(#wmr1x553)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x553)" opacity=".9"/><line x1="907.28780436432" y1="670.4396129331551" x2="898.5374205331505" y2="-126.84498760048302" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="889.8284060646035" y1="671.6553989927285" x2="896.5468477739022" y2="-129.8610961571336" stroke="#ff00ff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.4728912070021" y="670.1138788644224" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x553)" stroke="#ff00ff" stroke-width="1.6" filter="url(#wmr1x553)"/><rect x="865.8503581405245" y="672.5649497642181" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="885.4456158763356" y="676.5135913054459" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="884.0936990121938" y="685.2623631359078" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="887.3401573235728" y="691.8324614109471" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="886.4043863389269" y="702.2629810128361" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="885.9584162515216" y="708.4652132687158" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><rect x="886.5469705559873" y="716.4569226612336" width="24.0" height="6.0" rx="1" fill="#ff00ff" fill-opacity=".35"/><ellipse cx="897.5658076244965" cy="724.9443345937877" rx="22.0" ry="16.0" fill="url(#bevelr1x553)" stroke="#ff00ff" stroke-width="1.2" filter="url(#wmr1x553)"/></g><rect x="448.93954494763165" y="556.0468997632153" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x553)"/><rect x="424.70395715199413" y="575.5660534868017" width="152.0