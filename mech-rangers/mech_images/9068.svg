" fill="url(#gunmetalr1x9068)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x9068)"/><rect x="35.39096259245646" y="422.4810040825978" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x9068)"/><rect x="43.58130897333842" y="403.57860879451033" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x9068)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9068)"/><circle cx="82.39508577309546" cy="412.95603689905255" r="15.0" fill="#4444ff" opacity=".8" filter="url(#glowr1x9068)"/><circle cx="83.24469830499959" cy="414.20426543084903" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.665847089458225" y="454.9581821766682" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x9068)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x9068)"/><circle cx="-21.15263526938859" cy="471.8528797972947" r="18.0" fill="#4444ff" filter="url(#glowr1x9068)" opacity=".88"/><circle cx="-19.496252730358425" cy="470.61973431752995" r="7.0" fill="#ffffff"/><rect x="79.61951525876296" y="501.45410956703125" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x9068)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x9068)"/><rect x="38.88388837384057" y="424.7209624781273" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="60.37707884939384" y1="485.92337201880287" x2="63.83473026523363" y2="520.3855758995749" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="79.24800549302248" y1="486.67801668085156" x2="79.08146281860766" y2="521.0927022516727" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.79140241233628" y1="485.3555550901219" x2="92.75322939412665" y2="519.8873975390568" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.2757472645491" y="557.1482722150162" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x9068)"/><rect x="425.6005219354294" y="575.9549183191732" width="152.0" height="26.0" fill="url(#bevelr1x9068)" fill-opacity=".65