th="2.6" filter="url(#wmr1x2691)"/><polygon points="827.8,293.7 968.7,295.1 967.6,591.1 897.3,728.0 828.7,593.1" fill="url(#carbonr1x2691)"/><polygon points="858.2,359.9 935.2,361.9 935.3,541.0 896.6,630.9 861.4,542.0" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="844.9585556242242" y1="431.3987013322301" x2="951.2818972392566" y2="432.87871192423626" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="898.4841675849259" y1="329.95062434962017" x2="897.7249072543905" y2="591.9613058336079" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="828.4035425739922" y1="295.4542589611374" x2="965.8330771950633" y2="295.795669436641" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.8512749328837" cy="432.4072149468586" r="18.0" fill="url(#bevelr1x2691)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x2691)"/></g><rect x="451.49275511316955" y="556.5930736548268" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x2691)"/><rect x="425.63056238973513" y="573.7318335473537" width="152.0" height="26.0" fill="url(#bevelr1x2691)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x2691)"/><polygon points="309.4,379.2 351.0,292.7 500.7,279.7 648.2,295.9 691.2,382.1 667.2,502.9 500.6,565.8 331.6,502.7" fill="url(#suitr1x2691)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x2691) url(#metalr1x2691)"/><polygon points="307.8,381.0 350.6,296.0 498.5,278.4 650.1,294.6 692.4,379.3 667.8,505.3 499.6,564.9 329.6,504.5" fill="url(#carbonr1x2691)"/><polygon points="382.4,302.1 498.7,287.0 619.9,303.1 608.2,378.9 390.9,380.8" fill="url(#suitHir1x2691)"/><polygon points="382.4,381.5 364.5,424.9 431.4,503.7 499.3,528.1 565.9,501.9 635.6,426.0 619.7,379.8" fill="#0a0520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x2691)"/><polygon points="380.8,411.2 477.5,411.6 486.1,438.6 388.5,440.6" fill="#2060ff" filter="url(#glowr1x2691)"/><polygon points="523.1,411.3 618.4,412.1 610.8,440.8 514.5,438.6" fill="#2060ff" filter="url(#glowr1x2691)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.1634220009297" y1="414.2803772488609" x2="514.1260688685253" y2="414.7474086642265" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.4392307141423" y1="436.3224677533843" x2="514.9781848259643" y2="438.98741965172815" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.4528265588917" y1="454.63077918561174" x2="499.6625957665965" y2="483.64505339208995" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2691)"/><line x1="454.39432986618954" y1="491.05211130063975" x2="452.1810455877148" y2="519.36906321235" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2691)"/><line x1="478.3957742430642" y1="492.7890496456064" x2="478.62644812347366" y2="518.9088994129561" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2691)"/><line x1="498.737958303839" y1="490.01565795373165" x2="501.0367195226252" y2="519.9843850960955" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2691)"/><line x1="521.6919924546592" y1="492.11682167509565" x2="522.6193207933195" y2="520.1548370423727" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2691)"/><line x1="545.6286220721156" y1="492.53578618997705" x2="544.3659294340015" y2="519.9554479424842" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2691)"/><polygon points="433.4,502.5 567.3,504.5 552.7,557.3 445.3,556.0" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x2691)"/><polygon points="316.5,305.5 360.8,304.8 339.6,195.3" fill="url(#bevelr1x2691)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#