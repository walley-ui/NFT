ll="url(#carbonr1x525)"/><polygon points="859.9,362.1 937.3,362.9 936.4,541.1 897.9,632.4 859.6,540.1" fill="#4444ff" fill-opacity=".28" stroke="#4444ff" stroke-width="1.5"/><line x1="845.0422374031134" y1="432.20418784115463" x2="949.1424751322344" y2="433.06657653674483" stroke="#4444ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.5421703064442" y1="329.81688834112134" x2="896.88048603829" y2="591.4361208469606" stroke="#4444ff" stroke-opacity=".4" stroke-width="1"/><line x1="831.1361486224085" y1="296.4777360423468" x2="964.9575442948006" y2="294.6527775694616" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.0493077630737" cy="431.6179085696116" r="18.0" fill="url(#bevelr1x525)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x525)"/></g><rect x="448.68506182031706" y="557.7295929085464" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x525)"/><rect x="422.8945681103505" y="575.1621276627295" width="152.0" height="26.0" fill="url(#bevelr1x525)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x525)"/><polygon points="309.2,380.6 348.8,295.1 499.1,277.7 648.6,295.6 690.3,381.5 668.2,503.1 500.0,563.9 330.3,501.8" fill="url(#suitr1x525)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x525) url(#metalr1x525)"/><polygon points="306.9,379.0 351.6,296.2 499.2,277.8 651.1,294.1 692.8,380.4 669.5,502.0 501.7,565.5 331.6,502.6" fill="url(#carbonr1x525)"/><polygon points="382.7,301.9 498.6,286.9 620.5,301.3 608.9,380.9 394.0,379.1" fill="url(#suitHir1x525)"/><polygon points="380.6,380.4 366.8,427.2 434.3,503.1 499.0,530.0 566.1,503.9 634.9,426.5 619.6,379.9" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x525)"/><polygon points="381.5,412.8 476.4,409.7 484.5,440.9 388.6,438.3" fill="#4444ff" filter="url(#glowr1x525)"/><polygon points="523.9,411.4 618.2,410.3 610.9,440.8 513.9,438.7" fill="#4444ff" filter="url(#glowr1x525)"/><e