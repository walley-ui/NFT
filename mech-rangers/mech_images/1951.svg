oke-linecap="round" filter="url(#wmr1x1951)"/><line x1="98.90017922291528" y1="771.9673524186946" x2="89.93617168007415" y2="130.25523829115554" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="72.4,149.9 140.6,150.3 83.8,-8.9" fill="url(#blader1x1951)" stroke="#00ff60" stroke-width="1.8" filter="url(#wmr1x1951)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="84.41035247756164" y="419.955464410875" width="40.0" height="20.0" fill="url(#bevelr1x1951)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1951)"/><rect x="84.73880899915468" y="509.809679094702" width="40.0" height="20.0" fill="url(#bevelr1x1951)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1951)"/><rect x="83.7860104531422" y="599.7291129404679" width="40.0" height="20.0" fill="url(#bevelr1x1951)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1951)"/><rect x="82.58284607542676" y="692.3021293831058" width="40.0" height="20.0" fill="url(#bevelr1x1951)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1951)"/><ellipse cx="100.61486179403957" cy="792.6671739245764" rx="22.0" ry="15.0" fill="url(#bevelr1x1951)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1951)"/></g><rect x="451.20607395591213" y="557.5846166614443" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x1951)"/><rect x="422.26704709576444" y="574.3078625274823" width="152.0" height="26.0" fill="url(#bevelr1x1951)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x1951)"/><polygon points="309.3,382.0 352.0,294.0 499.6,279.2 648.5,295.2 692.5,381.2 670.5,502.4 498.7,565.8 330.6,502.9" fill="url(#suitr1x1951)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x1951) url(#metalr1x1951)"/><polygon points="308.4,381.2 349.6,293.7 499.5,278.1 651.4,294.8 690.3,379.2 669.4,505.0 500.3,564.0 332.4,502.7" fill="url(#carbonr1x1951)"/><polygon points="382.2,