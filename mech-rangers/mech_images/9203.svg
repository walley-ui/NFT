="2.6" filter="url(#wmr1x9203)"/><polygon points="30.8,294.9 171.8,294.4 172.5,590.4 103.1,727.5 32.6,591.7" fill="url(#carbonr1x9203)"/><polygon points="63.3,359.8 140.9,360.5 141.7,540.5 103.2,629.9 63.7,540.0" fill="#ccccff" fill-opacity=".28" stroke="#ccccff" stroke-width="1.5"/><line x1="48.59308042706918" y1="429.7100578654557" x2="154.7180513015389" y2="432.25040697287767" stroke="#ccccff" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.72718557188284" y1="330.4167224442586" x2="103.72082846149799" y2="593.1740464845672" stroke="#ccccff" stroke-opacity=".4" stroke-width="1"/><line x1="35.3590938145667" y1="297.29716057749465" x2="171.7767747667059" y2="295.7319772722199" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.81902117732909" cy="431.9062032088637" r="18.0" fill="url(#bevelr1x9203)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x9203)"/></g><rect x="450.666309709847" y="556.1628662032075" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x9203)"/><rect x="422.8107657267712" y="573.6653874323704" width="152.0" height="26.0" fill="url(#bevelr1x9203)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x9203)"/><polygon points="309.3,378.9 350.4,293.1 501.6,278.9 651.2,294.5 690.2,378.9 668.0,502.6 498.9,566.9 329.4,503.9" fill="url(#suitr1x9203)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x9203) url(#metalr1x9203)"/><polygon points="308.3,381.7 350.3,296.1 500.7,277.4 649.6,293.1 692.7,379.7 667.6,502.7 499.6,564.5 329.4,504.2" fill="url(#carbonr1x9203)"/><polygon points="382.1,303.1 500.2,287.5 620.4,301.1 607.4,378.8 394.0,380.4" fill="url(#suitHir1x9203)"/><polygon points="380.1,379.6 366.4,424.7 431.4,504.3 499.3,527.3 566.4,502.0 634.6,427.0 619.2,381.5" fill="#0d1520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x9203)"/><polygon points="381.8,411.0 475.4,410.3 485.5,440.3 389.6,439.9" fill="#ccccff" filter="url(#glowr1x9203)"/><polygon points="523.7,412.3 618.6,411.0 611.7,440.5 514.8,438.6" fill="#ccccff" filter="url(#glowr1x9203)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.42157423939557" y1="413.68370704846456" x2="515.0837198525109" y2="412.6822274423204" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="483.24507168723267" y1="436.84507264439014" x2="516.0578047604673" y2="439.5933748902753" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="498.37506054546685" y1="453.8811783882789" x2="501.08023822810503" y2="484.87961963545536" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x9203)"/><line x1="453.0621081476845" y1="492.9336433996446" x2="453.1770955269039" y2="518.3751819489523" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9203)"/><line x1="476.90435612894595" y1="492.1913928826339" x2="475.23391414511946" y2="521.3063093464822" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9203)"/><line x1="499.537576183863" y1="490.7017198019661" x2="501.7948359496892" y2="520.9424426887184" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9203)"/><line x1="523.5206443067267" y1="490.16475893119343" x2="521.9352450395561" y2="519.0446369612589" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9203)"/><line x1="544.9065645841137" y1="491.29280018992716" x2="546.8252289332636" y2="518.4014369228855" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9203)"/><polygon points="433.1,504.8 567.2,502.5 553.4,557.6 444.9,555.8" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x9203)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="97