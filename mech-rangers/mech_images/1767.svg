l="#0d1520" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#0d1520" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#00ff60"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#00ff60"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#00ff60" stroke="#0d1520" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#00ff60" stroke="#0d1520" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><rect x="450.449124211818" y="556.3660066448152" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x1767)"/><rect x="422.40984722394495" y="576.4254444810562" width="152.0" height="26.0" fill="url(#bevelr1x1767)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x1767)"/><polygon points="306.2,379.1 349.0,292.7 499.2,277.7 649.8,294.6 690.9,380.2 669.2,505.0 501.8,563.4 329.9,505.4" fill="url(#suitr1x1767)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x1767) url(#metalr1x1767)"/><polygon points="308.6,380.4 351.7,296.0 498.3,279.7 649.6,295.3 691.1,381.9 669.3,503.6 501.6,564.8 331.8,503.2" fill="url(#carbonr1x1767)"/><polygon points="381.9,302.9 500.1,287.9 620.3,302.7 609.1,382.2 391.6,379.4" fill="url(#suitHir1x1767)"/><polygon points="382.5,380.1 365.6,425.6 431.1,502.6 501.7,529.9 567.2,504.6 635.0,427.1 618.3,381.6" fill="#0d1520" fill-opacity=".88" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x1767)"/><polygon points="382.5,411.5 478.5,413.1 483.3,440.4 390.1,440.1" fill="#00ff60" filter="url(#glowr1x1767)"/><polygon points="522.3,410.9 619.3,411.7 610.1,439.5 514.6,439.3" fill="#00ff60" filter="url(#glowr1x1767)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.9687086719647" y1="412.1473743938841" x2="517.0691867310926" y2="414.