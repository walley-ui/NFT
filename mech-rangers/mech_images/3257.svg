)"/><polygon points="382.4,303.2 498.3,285.2 618.6,303.7 606.4,378.9 393.4,380.7" fill="url(#suitHir1x3257)"/><polygon points="381.9,380.5 366.4,427.1 432.7,503.0 499.2,527.5 568.6,504.0 632.9,427.0 620.6,380.8" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x3257)"/><polygon points="380.3,410.4 475.7,411.9 484.1,441.0 389.3,439.3" fill="#2060ff" filter="url(#glowr1x3257)"/><polygon points="523.6,412.8 619.2,411.9 612.8,439.3 516.0,438.8" fill="#2060ff" filter="url(#glowr1x3257)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.45821199236434" y1="414.69943010481074" x2="514.0202279779502" y2="414.16755642564965" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.6676438679546" y1="436.524000534229" x2="514.6575970950909" y2="438.89793928563597" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="501.7240323665552" y1="455.253614967782" x2="498.2046667327173" y2="482.29019218748437" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3257)"/><line x1="452.7905677527003" y1="491.08453387087206" x2="455.3931830314733" y2="519.4092448055744" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3257)"/><line x1="478.24498259130866" y1="490.0675085593015" x2="478.54691488206385" y2="519.6999217996374" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3257)"/><line x1="501.3590794225223" y1="491.209991138149" x2="500.5281975817867" y2="521.0342072919011" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3257)"/><line x1="521.9256209307908" y1="490.9528214247897" x2="522.3251458843797" y2="519.3020709585398" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3257)"/><line x1="544.4614832081087" y1="490.81546911876643" x2="544.4075468011387" y2="520.8296025200