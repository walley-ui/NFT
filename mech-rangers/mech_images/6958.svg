2" stroke-width="1.3" filter="url(#skr1x6958)"/><line x1="398.0" y1="548.6" x2="599.7" y2="548.8" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x6958)"/><line x1="265.5" y1="490.2" x2="320.7" y2="491.2" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.0" y1="492.0" x2="734.8" y2="489.7" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.2" y1="523.3" x2="320.2" y2="521.5" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.8" y1="523.3" x2="732.7" y2="524.3" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.4" y1="554.9" x2="318.6" y2="555.0" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.9" y1="556.1" x2="734.1" y2="554.8" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.4" y1="584.9" x2="320.1" y2="585.5" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.4" y1="588.3" x2="731.9" y2="588.1" stroke="#ff2040" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x6958)"><polygon points="498.7,451.1 541.9,509.2 500.4,569.7 457.0,510.3" fill="#ff2040" stroke="#0d1520" stroke-width="1.4" filter="url(#skr1x6958)"/><polygon points="499.2,451.4 543.1,509.1 498.5,567.2 458.0,511.5" fill="url(#suitHir1x6958)" opacity=".45"/></g><rect x="450.0747319464572" y="558.4986307878047" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x6958)"/><rect x="424.84848095066843" y="575.493735559471" width="152.0" height="26.0" fill="url(#bevelr1x6958)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x6958)"/><polygon points="307.4,379.1 350.9,293.6 500.1,277.4 651.1,295.2 691.5,379.6 669.0,504.6 498.6,565.4 329.6,503.4" fill="url(#suitr1x6958)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x6958) url(#metalr1x6958)"/><polygon points="308.7,381.8 351.7,295.9 498.3,277.2 649.0,293.6 691.3,380.3 670.3,503.0 499.6,564.9 329.3,50