)" stroke="#00ff60" stroke-width="2.6" filter="url(#wmr1x447)"/><polygon points="33.3,293.9 173.0,293.2 173.5,592.2 101.3,726.3 31.8,589.7" fill="url(#carbonr1x447)"/><polygon points="63.9,360.2 141.1,360.5 139.1,541.3 101.3,632.2 63.1,542.0" fill="#00ff60" fill-opacity=".28" stroke="#00ff60" stroke-width="1.5"/><line x1="49.49027426227924" y1="430.7741263655014" x2="154.8811714361794" y2="432.57279063295573" stroke="#00ff60" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.13632114533331" y1="331.0687394434586" x2="100.40679683260616" y2="592.0781071958132" stroke="#00ff60" stroke-opacity=".4" stroke-width="1"/><line x1="35.61425027608868" y1="296.26475029103455" x2="171.67501356717196" y2="294.7162834201008" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="100.76511718001214" cy="432.79680252140383" r="18.0" fill="url(#bevelr1x447)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x447)"/></g><rect x="448.3072029029019" y="556.0095937863923" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x447)"/><rect x="422.5455069789663" y="574.423906479124" width="152.0" height="26.0" fill="url(#bevelr1x447)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x447)"/><polygon points="308.1,380.6 351.4,293.9 498.8,276.5 648.4,293.1 691.8,379.8 667.2,504.6 501.3,566.2 329.7,503.3" fill="url(#suitr1x447)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x447) url(#metalr1x447)"/><polygon points="307.2,381.2 349.9,294.7 501.6,278.5 648.3,295.2 692.5,381.9 669.3,502.0 500.3,565.9 331.4,502.0" fill="url(#carbonr1x447)"/><polygon points="380.1,302.6 498.4,285.6 618.7,302.2 608.1,379.9 393.0,380.6" fill="url(#suitHir1x447)"/><polygon points="382.0,379.1 366.6,426.5 433.0,504.0 499.9,526.5 567.4,504.5 635.1,426.7 619.4,381.5" fill="#0a0520" fill-opacity=".88" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x447)"/><polygon points="381.9,410.7 475.7,410.7 485.4,441.8 388.3,440.6" fill="#0