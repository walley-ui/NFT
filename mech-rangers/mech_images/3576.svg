-linecap="round" filter="url(#wmr1x3576)"/><line x1="95.63988666333255" y1="770.3224050008691" x2="87.8602114656381" y2="133.19050347637383" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="72.5,151.6 141.3,150.1 83.4,-9.4" fill="url(#blader1x3576)" stroke="#00ff60" stroke-width="1.8" filter="url(#wmr1x3576)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="84.86537354601543" y="423.18552032010626" width="40.0" height="20.0" fill="url(#bevelr1x3576)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3576)"/><rect x="83.86630576210094" y="510.78627643873915" width="40.0" height="20.0" fill="url(#bevelr1x3576)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3576)"/><rect x="83.78804251648482" y="602.1569426018744" width="40.0" height="20.0" fill="url(#bevelr1x3576)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3576)"/><rect x="83.5037593353912" y="690.9834980941378" width="40.0" height="20.0" fill="url(#bevelr1x3576)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3576)"/><ellipse cx="101.56847366461527" cy="790.5995352418162" rx="22.0" ry="15.0" fill="url(#bevelr1x3576)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x3576)"/></g><rect x="448.9514773537405" y="556.7458569758571" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x3576)"/><rect x="423.2807390736416" y="575.73311578976" width="152.0" height="26.0" fill="url(#bevelr1x3576)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x3576)"/><polygon points="308.3,379.2 350.8,293.7 501.2,277.7 649.8,295.4 691.2,380.8 669.6,505.4 498.5,564.1 331.0,503.9" fill="url(#suitr1x3576)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x3576) url(#metalr1x3576)"/><polygon points="308.8,380.8 350.7,296.2 501.6,278.4 650.2,294.4 692.0,381.5 669.1,503.5 500.4,563.6 332.1,503.3" fill="url(#carbonr1x3576)"/><polygon points="382.0,303.