2" stroke-width="1.3" filter="url(#skr1x5594)"/><line x1="398.5" y1="549.5" x2="600.8" y2="550.5" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x5594)"/><line x1="265.6" y1="491.1" x2="318.4" y2="491.1" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.7" y1="491.6" x2="732.3" y2="489.2" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.6" y1="521.1" x2="320.1" y2="523.5" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.1" y1="523.9" x2="734.2" y2="523.7" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.8" y1="556.2" x2="320.1" y2="553.8" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.1" y1="556.0" x2="732.0" y2="554.5" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.8" y1="586.4" x2="319.2" y2="586.1" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.8" y1="587.5" x2="732.7" y2="586.6" stroke="#ff00ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x5594)"><polygon points="461.9,529.9 463.4,498.7 480.4,469.0 501.5,497.0 519.5,467.4 539.4,496.4 537.4,530.0" fill="#ff00ff" stroke="#0d1520" stroke-width="1.4" filter="url(#skr1x5594)"/><polygon points="462.1,530.7 460.9,499.4 482.3,468.4 500.1,496.4 519.3,466.4 538.6,496.2 537.6,530.5" fill="url(#suitHir1x5594)" opacity=".38"/></g><rect x="448.8322559676133" y="556.6890242516994" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x5594)"/><rect x="424.69832813991235" y="574.0714660434984" width="152.0" height="26.0" fill="url(#bevelr1x5594)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x5594)"/><polygon points="309.5,381.2 351.7,293.0 499.5,276.7 651.3,293.9 690.8,381.9 668.6,503.2 500.6,563.5 330.8,503.1" fill="url(#suitr1x5594)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x5594) url(#metalr1x5594)"/><polygon points="307.0,381.7 350.0,2