lr1x3868)"/><polygon points="306.6,380.9 349.6,292.8 498.9,277.4 650.6,295.6 692.0,379.3 670.6,502.4 501.4,565.5 330.0,502.3" fill="url(#carbonr1x3868)"/><polygon points="379.5,301.6 499.8,286.7 619.3,303.3 608.0,381.8 391.0,382.0" fill="url(#suitHir1x3868)"/><polygon points="379.9,379.3 364.4,424.7 432.8,503.1 501.6,528.1 568.3,502.7 634.2,424.5 620.7,379.9" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x3868)"/><polygon points="380.6,411.2 477.5,410.0 484.3,440.1 390.2,438.3" fill="#4444ff" filter="url(#glowr1x3868)"/><polygon points="523.3,412.9 619.3,411.7 610.8,440.3 517.0,441.0" fill="#4444ff" filter="url(#glowr1x3868)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.7777211693674" y1="411.6669409674592" x2="516.0552473755926" y2="414.579714915622" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.1939311721921" y1="436.7179690338671" x2="514.6576244427264" y2="438.58427468575536" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.01747029013933" y1="453.5284286227077" x2="500.5850249105133" y2="484.64209192981946" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3868)"/><line x1="455.4950750272535" y1="491.93283307002855" x2="453.8286882978678" y2="520.3958585733548" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3868)"/><line x1="476.48288285596294" y1="492.03885735245416" x2="477.3121691058762" y2="521.6137568934821" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3868)"/><line x1="500.61398448236287" y1="489.5735738658346" x2="500.75851151393726" y2="518.6000710748136" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3868)"/><line x1="523.8449420330674" y1="490.30360221769655" x2="522.1210911305249" y2="518.3646598718129" stroke="#4444ff" stroke-