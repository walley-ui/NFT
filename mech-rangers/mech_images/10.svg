 filter="url(#skr1x10)"/><polygon points="765.6,467.2 847.5,467.5 872.1,735.0 742.8,735.6" fill="url(#suitr1x10)" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x10) url(#metalr1x10)"/><polygon points="745.7,430.5 827.9,432.9 841.5,509.7 755.6,509.2" fill="url(#bevelr1x10)" fill-opacity=".72" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x10)"/><polygon points="756.0,622.7 839.3,623.6 832.9,661.4 761.2,661.1" fill="#ccccff" fill-opacity=".42" stroke="#ccccff" stroke-width="1" filter="url(#skr1x10)"/><rect x="121.5"  y="699.8" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x10)" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x10)"/><rect x="747.8"   y="699.3" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x10)" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x10)"/><line x1="151.4" y1="701.7" x2="151.4" y2="784.5" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="776.4" y1="702.2" x2="778.6" y2="783.1" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="181.8" y1="703.6" x2="183.7" y2="783.1" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="811.9" y1="701.0" x2="809.9" y2="783.7" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="214.9" y1="702.5" x2="216.8" y2="784.3" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="844.4" y1="702.9" x2="845.2" y2="784.4" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><polygon points="233.5,417.7 766.6,416.5 721.3,663.3 276.4,661.9" fill="url(#suitr1x10)" stroke="#ccccff" stroke-width="2.6" filter="url(#skr1x10) url(#metalr1x10)"/><polygon points="233.6,417.8 764.0,419.1 721.4,662.2 277.5,661.4" fill="url(#carbonr1x10)"/><polygon points="366.5,417.3 633.3,418.3 610.6,515.7 387.8,513.8" fill="url(#suitHir1x10)"/><line x1="363.2" y1="469.9" x2="636.8" y2="470.3" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x10)"/><line x1="400.5" y1="549.5" x2="599.4" y2="549.1" stroke="#ccccff" strok