" rx="5" fill="url(#bevelr1x2873)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x2873)"/><rect x="115.3" y="700.9" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x2873)"/><rect x="749.5"  y="702.2" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x2873)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x2873)"/><rect x="749.4"  y="702.2" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x2873)"/><rect x="123.1" y="699.0" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><rect x="755.8" y="700.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><rect x="151.9" y="701.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><rect x="783.1" y="699.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><rect x="179.5" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><rect x="816.0" y="698.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><rect x="211.1" y="700.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><rect x="843.5" y="698.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2873)" stroke="#4444ff" stroke-width=".8" filter="url(#wmr1x2873)"/><ellipse cx="184.04800404407084" cy="712.2909581449627" rx="45.1" ry="30.0" fill="#4444ff" fill-opacity=".25" filter="url(#glowr1x2873)"/><ellipse cx="816.1843999471702" cy="712.0973450564593" rx="45.1" ry="30.0" fill="#4444ff" fill-opacity=".25" filter="url(#glowr1x2873)"/></g><rect x="449.1934159085155" y="556.3130297989584" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x2873)"/><rect x="425.5383496665396" y="576.8703003587201" width="152.0" height="26.0" fill="url(#bevelr1x2873)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x2873)"/><polygon points="306.4,381.0 349.1,294.3 498.5,277.9 650.7,294.5 691.5,381.4 667.9,502.1 499.2,565.8 330.6,502.7" fill="url(#suitr1x2873)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x2873) url(#metalr1x2873)"/><polygon points="307.8,381.5 349.0,294.5 501.7,276.4 651.2,293.1 692.7,381.0 667.6,503.5 500.2,563.5 332.7,502.3" fill="url(#carbonr1x2873)"/><polygon points="381.7,301.6 500.3,285.9 617.9,303.5 605.8,382.4 393.5,379.4" fill="url(#suitHir1x2873)"/><polygon points="380.2,380.7 364.0,424.8 434.5,503.7 498.2,528.2 566.3,503.4 634.9,426.6 619.3,379.6" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x2873)"/><polygon points="379.3,410.7 476.7,410.4 484.7,439.0 387.8,440.7" fill="#4444ff" filter="url(#glowr1x2873)"/><polygon points="524.2,412.4 620.3,411.7 611.9,441.4 516.1,441.1" fill="#4444ff" filter="url(#glowr1x2873)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="482.9519219898246" y1="414.2865720511414" x2="513.9428751570546" y2="412.0879318350926" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.636741847042" y1="439.16609991034494" x2="516.3284379493817" y2="438.3835972010158" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.5085327576846" y1="453.1820194793865" x2="498.91182605419306" y2="482.1227394588292" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2873)"/><line x1="453.32807385034863" y1="491.78081828905266" x2="455.1916947057285" y2="520.5058558695018" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2873)"/><line x1="477.1060051014088" y1="490.3458197986