0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.9,465.2 236.4,467.8 258.2,734.0 127.8,735.3" fill="url(#suitr1x156)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x156) url(#metalr1x156)"/><polygon points="172.3,430.5 254.7,433.4 242.7,510.6 157.9,510.1" fill="url(#bevelr1x156)" fill-opacity=".72" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x156)"/><polygon points="161.6,623.5 243.0,623.0 240.4,661.0 165.7,661.4" fill="#c0c0d0" fill-opacity=".42" stroke="#c0c0d0" stroke-width="1" filter="url(#skr1x156)"/><polygon points="765.3,467.2 846.4,466.2 872.4,736.5 742.8,733.4" fill="url(#suitr1x156)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x156) url(#metalr1x156)"/><polygon points="745.6,433.1 826.3,432.4 839.4,511.2 755.5,511.4" fill="url(#bevelr1x156)" fill-opacity=".72" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x156)"/><polygon points="758.3,623.4 838.1,622.8 836.1,659.1 760.0,661.1" fill="#c0c0d0" fill-opacity=".42" stroke="#c0c0d0" stroke-width="1" filter="url(#skr1x156)"/><rect x="120.3"  y="701.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x156)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x156)"/><rect x="749.2"   y="700.9" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x156)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x156)"/><line x1="149.8" y1="700.9" x2="148.8" y2="782.1" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="778.4" y1="700.1" x2="777.2" y2="784.1" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="183.2" y1="700.8" x2="182.0" y2="784.3" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="811.3" y1="700.1" x2="809.6" y2="783.5" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="213.6" y1="703.0" x2="216.2" y2="784.5" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><line x1="842.1" y1="700.2" x2="844.2" y2="784.8" stroke="#c0c0d0" stroke-opacity=".38" stroke-width="1"/><polygon points