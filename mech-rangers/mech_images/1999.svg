60ff" stroke-width="1.3" filter="url(#skr1x1999)"/><polygon points="317.2,303.0 361.8,304.6 339.0,195.3" fill="url(#bevelr1x1999)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x1999) url(#glowr1x1999)"/><polygon points="396.1,303.2 441.5,303.6 418.5,207.4" fill="url(#bevelr1x1999)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x1999) url(#glowr1x1999)"/><polygon points="478.0,304.4 523.0,304.3 498.6,222.1" fill="url(#bevelr1x1999)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x1999) url(#glowr1x1999)"/><polygon points="558.1,306.2 603.2,304.9 579.8,208.8" fill="url(#bevelr1x1999)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x1999) url(#glowr1x1999)"/><polygon points="637.7,305.7 685.5,305.7 662.3,194.8" fill="url(#bevelr1x1999)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x1999) url(#glowr1x1999)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>