 x2="85.31943433195349" y2="109.99745534854007" stroke="url(#chromer1x3809)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x3809)"/><line x1="95.9521228645369" y1="769.8793884756975" x2="89.41365104060617" y2="130.16903529027473" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="72.7,151.2 141.5,152.0 83.9,-7.2" fill="url(#blader1x3809)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x3809)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="81.85227008186277" y="421.1800063841976" width="40.0" height="20.0" fill="url(#bevelr1x3809)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3809)"/><rect x="83.42126261679452" y="512.591614727024" width="40.0" height="20.0" fill="url(#bevelr1x3809)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3809)"/><rect x="82.85487494425846" y="602.9831718937494" width="40.0" height="20.0" fill="url(#bevelr1x3809)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3809)"/><rect x="83.0100984988175" y="692.2262866341508" width="40.0" height="20.0" fill="url(#bevelr1x3809)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3809)"/><ellipse cx="103.89136666761708" cy="789.8121239525266" rx="22.0" ry="15.0" fill="url(#bevelr1x3809)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x3809)"/></g><rect x="449.03836932359263" y="557.7044583930634" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3809)"/><rect x="425.20971965044737" y="576.3454375699163" width="152.0" height="26.0" fill="url(#bevelr1x3809)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x3809)"/><polygon points="308.9,382.2 348.5,294.6 498.3,278.4 651.0,293.6 691.3,381.2 669.8,504.9 499.0,566.1 331.7,502.4" fill="url(#suitr1x3809)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x3809) url(#metalr1x3809)"/><polygon points="309.6,379.6 348.6,296.1 499.1,278.2 649.1,294.4 