kr1x6073)"/><rect x="425.0700259176083" y="574.469362596143" width="152.0" height="26.0" fill="url(#bevelr1x6073)" fill-opacity=".65" stroke="#00ffff" stroke-width="1.2" filter="url(#skr1x6073)"/><polygon points="308.3,380.7 348.9,295.7 501.5,278.8 648.8,293.7 693.0,380.3 667.3,502.2 500.2,563.5 330.6,504.7" fill="url(#suitr1x6073)" stroke="#00ffff" stroke-width="2.8" filter="url(#skr1x6073) url(#metalr1x6073)"/><polygon points="306.8,378.9 351.1,294.3 499.4,277.4 650.3,295.9 690.5,382.1 668.5,503.6 499.0,566.7 329.5,503.4" fill="url(#carbonr1x6073)"/><polygon points="382.3,303.5 500.8,285.9 620.6,301.5 606.0,380.9 392.8,380.6" fill="url(#suitHir1x6073)"/><polygon points="381.4,381.7 366.6,425.5 432.5,504.4 501.5,528.7 567.3,505.2 635.2,426.8 618.9,378.9" fill="#08001e" fill-opacity=".88" stroke="#00ffff" stroke-width="1.8" filter="url(#skr1x6073)"/><polygon points="380.3,412.9 476.5,411.6 483.3,441.5 387.0,440.2" fill="#00ffff" filter="url(#glowr1x6073)"/><polygon points="524.3,412.6 618.2,412.7 609.9,441.5 515.7,440.6" fill="#00ffff" filter="url(#glowr1x6073)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.0319877961278" y1="412.5507204878144" x2="513.5641966638528" y2="411.8531368318945" stroke="#00ffff" stroke-opacity=".52" stroke-width="2"/><line x1="484.758822199665" y1="438.825868052803" x2="514.4977439463511" y2="438.3665536385961" stroke="#00ffff" stroke-opacity=".52" stroke-width="2"/><line x1="499.49238069290294" y1="454.61220933226866" x2="498.5056483538821" y2="483.1759001624771" stroke="#00ffff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6073)"/><line x1="453.90995683128017" y1="489.93263690937306" x2="452.39360929930587" y2="519.9729188947938" stroke="#00ffff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6073)"/><line x1="478.30923522174356" y1="490.12284107198934" x2="475.344990827553" y2="520.9