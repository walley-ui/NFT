 filter="url(#wmr1x5846)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x5846)" opacity=".9"/><line x1="907.370744462125" y1="672.2163957604207" x2="897.4568665185199" y2="-129.45869549326602" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="887.823943433091" y1="669.7431806724518" x2="896.8846798858606" y2="-127.63932348340752" stroke="#4444ff" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="840.1614373962022" y="669.5087770234793" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x5846)" stroke="#4444ff" stroke-width="1.6" filter="url(#wmr1x5846)"/><rect x="864.2895280303061" y="674.8247575313784" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="887.6296110031755" y="676.3306042791344" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="884.718752873093" y="687.0364750638604" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="887.2769978969917" y="692.1969748549163" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="885.7122384503111" y="700.924745998811" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="884.4834542197734" y="710.0405471785925" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="886.6985108013824" y="716.7686478161253" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><ellipse cx="896.7816934263893" cy="724.928136492148" rx="22.0" ry="16.0" fill="url(#bevelr1x5846)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x5846)"/></g><rect x="449.6509587496519" y="557.4861783601343" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x5846)"/><rect x="423.23090479271485" y="576.0679781364278" width="152.0" height="26.0" fill="url(#bevelr1x5846)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x5846)"/><polygon points="308.2,382.0 350.9,293.6 500.3,278.2 648.7,293.6 693.3,379.2 669.0,502.5 500.0,566.4 332.7,504.5" fill="url(#suitr1x5846)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x5846) url(#metalr1x5846)"/><polygon points="308.8,380.5 350.9,295.2 498.6,277.3 650.9,292.7 693.0,382.3 667.5,502.0 498.5,564.6 330.0,502.3" fill="url(#carbonr1x5846)"/><polygon points="379.4,302.3 501.1,284.7 618.4,301.3 607.1,379.1 391.6,380.3" fill="url(#suitHir1x5846)"/><polygon points="379.4,382.2 365.9,425.4 433.3,502.8 500.4,526.6 567.2,503.2 633.9,427.0 617.5,381.1" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x5846)"/><polygon points="381.5,412.6 478.7,409.6 485.2,438.3 388.5,438.5" fill="#4444ff" filter="url(#glowr1x5846)"/><polygon points="524.8,412.6 619.0,410.8 611.9,440.5 513.8,440.2" fill="#4444ff" filter="url(#glowr1x5846)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.5249288612604" y1="413.13666867334393" x2="516.4805759644508" y2="411.8049846849404" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.510162135642" y1="438.24312575664374" x2="515.0215693807602" y2="437.2112530737184" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.46092463480306" y1="455.83298738012087" x2="499.92183382520454" y2="481.41729368586095" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5846)"/><line x1="455.64883586678656" y1="490.7298353086225" x2="455.3936300861463" y2="521.2091299097985" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5846)"/><line x1="476.0111481870897" y1="492.22327372711146" x2="477.81807946948334" y2="521.6692768665962" stroke="#4444ff" stroke-opacity=".52" stroke-w