.0" rx="5" fill="url(#carbonr1x633)"/><rect x="43.54731992095706" y="404.6360663224011" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x633)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x633)"/><circle cx="80.55496332174164" cy="415.68847029870375" r="15.0" fill="#ff00ff" opacity=".8" filter="url(#glowr1x633)"/><circle cx="83.4961685287207" cy="414.11361837424334" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="52.79588409302753" y="454.4657558527775" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x633)" stroke="#ff00ff" stroke-width="1.2" filter="url(#wmr1x633)"/><circle cx="-18.18042778555307" cy="469.9487184247002" r="18.0" fill="#ff00ff" filter="url(#glowr1x633)" opacity=".88"/><circle cx="-20.277586071155998" cy="472.1743588614277" r="7.0" fill="#ffffff"/><rect x="77.6376112137362" y="501.5246018043719" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x633)" stroke="#ff00ff" stroke-width="1" filter="url(#wmr1x633)"/><rect x="35.85781460519877" y="422.5206316104159" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.12072622546923" y1="486.66787459645417" x2="61.86071613835168" y2="517.975326207187" stroke="#ff00ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.09672861391675" y1="485.49044310403985" x2="78.20466292411086" y2="517.6812491829506" stroke="#ff00ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="93.21418412331488" y1="487.7428066339344" x2="94.61905420305204" y2="518.9621792514808" stroke="#ff00ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.42766135903076" y="558.0699001520871" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x633)"/><rect x="422.6307367285714" y="575.944391971454" width="152.0" height="26.0" fill="url(#bevelr1x633)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x633)"/><polygon points="307.1,381.5 348.8,294.3 500.4,279.8 649.3,294.5 690.7,381.2 670.0,503.1 501.7,563.8 332.8,501.8" fill="