"/><rect x="423.14965710928664" y="574.1087830567733" width="152.0" height="26.0" fill="url(#bevelr1x3053)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x3053)"/><polygon points="306.4,379.8 350.6,293.4 499.1,277.4 649.7,294.1 692.5,379.1 669.3,501.9 498.2,566.8 331.5,503.6" fill="url(#suitr1x3053)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x3053) url(#metalr1x3053)"/><polygon points="307.2,381.0 351.0,294.4 500.2,279.5 651.3,296.2 691.2,379.9 667.7,504.3 500.1,566.5 332.3,502.5" fill="url(#carbonr1x3053)"/><polygon points="381.7,304.0 500.1,284.7 620.2,303.4 606.1,379.2 392.1,382.0" fill="url(#suitHir1x3053)"/><polygon points="382.6,379.2 366.5,426.9 431.3,505.0 501.0,528.8 566.4,505.3 635.7,424.7 619.8,381.9" fill="#0a0520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x3053)"/><polygon points="382.3,412.2 478.3,411.2 483.2,441.4 387.9,439.9" fill="#ff2040" filter="url(#glowr1x3053)"/><polygon points="523.6,411.0 620.5,410.7 610.5,440.7 513.6,441.5" fill="#ff2040" filter="url(#glowr1x3053)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.7799391112849" y1="414.68509509908034" x2="514.4315129009448" y2="411.79898997880514" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="483.19090943491085" y1="439.63136190343647" x2="513.8342154198699" y2="437.14766663862395" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="500.4824843339622" y1="454.1644298166036" x2="498.97562895277514" y2="483.95611127205194" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3053)"/><line x1="452.5542617354356" y1="489.78797216061497" x2="454.57990617638455" y2="518.9138618047349" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3053)"/><line x1="478.0920503607392" y1="491.9738560655154" x2="477.02448000464585" y2="521.43