9,285.7 618.1,302.9 606.5,379.6 392.2,380.9" fill="url(#suitHir1x354)"/><polygon points="381.0,380.1 366.3,424.6 431.4,502.0 498.8,526.5 568.8,502.4 633.2,424.2 620.1,380.5" fill="#0d1520" fill-opacity=".88" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x354)"/><polygon points="382.7,410.1 477.5,410.8 484.1,441.7 388.1,441.5" fill="#c0c0d0" filter="url(#glowr1x354)"/><polygon points="522.3,411.4 620.7,411.7 610.4,440.8 516.2,440.3" fill="#c0c0d0" filter="url(#glowr1x354)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.157089139577" y1="415.0200559867546" x2="516.9745238828846" y2="412.7530904330313" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="486.4179168040491" y1="437.98821552861483" x2="514.7486723026633" y2="437.5279448021203" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="500.46569786127657" y1="453.2656736751087" x2="501.3799884948879" y2="481.88529166541997" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x354)"/><line x1="453.5284887577221" y1="493.0492888144217" x2="454.7156296732649" y2="518.7778421006166" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x354)"/><line x1="478.0837999268807" y1="492.8085109889507" x2="476.44910464029755" y2="521.7874861630611" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x354)"/><line x1="499.5443334453739" y1="492.786916472204" x2="500.5289813023061" y2="520.2516124436631" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x354)"/><line x1="524.7325583302043" y1="490.0549105965532" x2="521.8072912349924" y2="518.7442599602975" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x354)"/><line x1="545.231202012226" y1="492.63248374350366" x2="546.5827333163656" y2="521.003895177599" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x354)"/><polygon points="431.6,504.5 566.6,504.7 552.1,558.6 447.2,557.4" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x354)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".48">CHROME RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".32">MECH RANGERS</text></svg>