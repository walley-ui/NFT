(#blader1x726)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x726)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="115.2,691.8 149.1,691.0 190.0,270.1" fill="url(#blader1x726)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x726)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="66.83104930412021" y="680.2183927129954" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x726)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x726)"/></g><rect x="450.0102935118601" y="556.7775022938847" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x726)"/><rect x="423.50565538788214" y="574.3961329004727" width="152.0" height="26.0" fill="url(#bevelr1x726)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x726)"/><polygon points="307.3,382.1 348.9,294.9 501.1,277.4 648.0,293.5 691.0,380.1 669.7,504.4 501.0,566.0 332.6,503.9" fill="url(#suitr1x726)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x726) url(#metalr1x726)"/><polygon points="308.2,382.2 350.4,294.6 500.1,277.7 649.0,295.0 690.4,380.3 668.1,503.6 500.8,564.3 331.0,505.3" fill="url(#carbonr1x726)"/><polygon points="381.1,303.6 499.8,285.6 617.8,304.5 608.1,379.4 391.9,381.6" fill="url(#suitHir1x726)"/><polygon points="380.2,379.0 365.2,427.5 431.5,503.3 500.0,527.0 567.5,502.7 635.4,427.3 619.7,379.5" fill="#1e0600" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x726)"/><polygon points="382.1,412.5 476.5,409.7 484.8,441.0 390.1,439.2" fill="#ccccff" filter="url(#glowr1x726)"/><polygon points="523.3,412.3 620.2,412.5 612.7,438.3 514.7,440.1" fill="#ccccff" filter="url(#glowr1x726)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.8720450147614" y1=