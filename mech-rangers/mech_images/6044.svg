37" y="422.9684229871258" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x6044)"/><rect x="40.43765165083107" y="403.14511407613753" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x6044)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x6044)"/><circle cx="83.70815014144402" cy="412.8320064303465" r="15.0" fill="#2060ff" opacity=".8" filter="url(#glowr1x6044)"/><circle cx="83.50040269320827" cy="413.4075560729019" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="55.15880096949634" y="455.45585874030365" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x6044)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x6044)"/><circle cx="-20.253641493395" cy="469.7093269534409" r="18.0" fill="#2060ff" filter="url(#glowr1x6044)" opacity=".88"/><circle cx="-18.78952662335712" cy="472.6205732947215" r="7.0" fill="#ffffff"/><rect x="76.74800552468744" y="500.3855050609447" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x6044)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x6044)"/><rect x="35.39973331395534" y="423.2911795155145" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.06366729386148" y1="486.78091441616414" x2="61.766407242827086" y2="520.4825591678731" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="78.86942629352208" y1="486.2066839854233" x2="76.51916052777317" y2="521.1374282001517" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.03556175412606" y1="485.99956142567095" x2="92.91083752721545" y2="519.2808303469792" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.21916789291424" y="556.7833081297576" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x6044)"/><rect x="422.9617174049839" y="574.3153598842212" width="152.0" height="26.0" fill="url(#bevelr1x6044)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x6044)"/><polygon points="308.6,379.4 349.1,295.3 498.8,277.5 649