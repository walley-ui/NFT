43)"/><polygon points="379.3,301.7 501.7,287.6 618.2,302.4 608.3,381.8 394.0,380.4" fill="url(#suitHir1x7543)"/><polygon points="380.0,381.9 364.4,426.3 431.6,502.3 498.3,529.8 565.4,503.2 633.2,425.9 618.3,381.1" fill="#0a0520" fill-opacity=".88" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x7543)"/><polygon points="382.7,410.7 476.2,409.9 485.3,440.8 389.9,438.3" fill="#c0c0d0" filter="url(#glowr1x7543)"/><polygon points="522.4,409.8 618.7,410.7 610.3,440.4 515.3,441.3" fill="#c0c0d0" filter="url(#glowr1x7543)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.7358769224584" y1="415.1404138122685" x2="517.1019163337909" y2="412.1939287497662" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="484.57602775931355" y1="439.22912129284816" x2="514.3063730052114" y2="439.0119180109352" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="498.3595535879023" y1="453.1139448083937" x2="499.63647150173784" y2="484.197506818641" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x7543)"/><line x1="453.8991295430623" y1="491.05268838293847" x2="454.940230452437" y2="520.5112264725379" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7543)"/><line x1="475.5557531591877" y1="492.36659355927253" x2="476.482594484128" y2="519.4466916318983" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7543)"/><line x1="501.6696293650195" y1="492.302562253829" x2="498.5097960674204" y2="520.1545237972401" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7543)"/><line x1="522.6129595415293" y1="492.0821055370383" x2="524.2031907487287" y2="520.2919374068267" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7543)"/><line x1="545.7280667399243" y1="491.5439953740686" x2="546.7628310017475" y2="519.2801162990742