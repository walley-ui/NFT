/><rect x="422.7152885825373" y="573.6914191266522" width="152.0" height="26.0" fill="url(#bevelr1x46)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x46)"/><polygon points="307.4,380.4 349.0,293.4 500.3,278.0 650.0,293.6 693.7,381.9 669.0,502.4 500.4,565.3 330.4,503.6" fill="url(#suitr1x46)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x46) url(#metalr1x46)"/><polygon points="307.0,381.2 350.6,295.6 499.6,278.9 648.4,293.3 693.0,381.0 669.1,504.9 500.0,565.4 331.8,502.8" fill="url(#carbonr1x46)"/><polygon points="379.8,302.7 501.6,284.9 619.7,303.2 608.8,380.5 392.1,380.3" fill="url(#suitHir1x46)"/><polygon points="380.7,380.1 366.1,427.3 433.3,502.3 499.1,529.3 566.3,502.4 636.1,426.8 618.1,380.1" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x46)"/><polygon points="381.2,411.7 478.2,409.9 485.6,440.5 389.3,441.2" fill="#ff2040" filter="url(#glowr1x46)"/><polygon points="524.7,411.5 619.7,410.0 611.9,441.6 516.7,441.2" fill="#ff2040" filter="url(#glowr1x46)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.0827997565828" y1="412.90521353920917" x2="515.0912210649252" y2="413.5959509312175" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="484.2410204769671" y1="437.05142840165644" x2="516.4112329824269" y2="438.93311796225606" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="499.18508125832307" y1="454.1946344598196" x2="499.2819506978616" y2="484.5319055614062" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x46)"/><line x1="452.3530924165435" y1="490.136673910357" x2="453.4846025208756" y2="518.7639877408743" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x46)"/><line x1="475.5582113408856" y1="491.0461632004007" x2="477.32311851842326" y2="520.2747220036574" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x46)"/><line x1="499.58988434411583" y1="491.97945507457473" x2="501.59852577345447" y2="519.3930358099751" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x46)"/><line x1="521.8143521024473" y1="492.21762528661634" x2="523.4482888787612" y2="520.3621441791765" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x46)"/><line x1="545.1427346619964" y1="492.41028595371165" x2="544.6497304561734" y2="521.6841966383159" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x46)"/><polygon points="431.0,505.3 565.9,505.2 554.9,555.8 446.2,555.1" fill="#cc0020" fill-opacity=".72" stroke="#ff2040" stroke-width="1.3" filter="url(#skr1x46)"/><path d="M472.98996876671913 312.2454072535038 C303.142993796654 147.38768752859903 419.0161873431318 240.8517529341392 499.6622479838319 310.27698268592354" fill="#ff2040" fill-opacity=".92" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x46)"/><path d="M471.94434505363927 310.6872412331402 C305.3013545574061 145.60863688020032 417.5824614653736 241.96407115235922 498.7334056161344 309.9164516115561" fill="url(#suitHir1x46)" opacity=".28"/><path d="M527.4889482770301 309.80747761251405 C695.5962544234097 145.3421315447427 581.4161009318753 241.8651337631978 499.4695202170871 310.61351008005437" fill="#ff2040" fill-opacity=".92" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x46)"/><path d="M526.8361724423431 309.8752931008115 C697.4856717961468 147.53806940587236 579.671819927413 242.13623647866768 499.2868319385685 310.6583425516262" fill="url(#suitHir1x46)" opacity=".28"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".48">CRIMSON RANGER</text><text x="970.0" y="975.0" text-anchor="end"  