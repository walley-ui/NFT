 fill="rgba(255,255,255,.48)"/><polygon points="152.7,467.3 235.2,466.7 258.0,733.3 129.5,736.7" fill="url(#suitr1x46)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x46) url(#metalr1x46)"/><polygon points="172.7,432.0 254.6,432.4 244.4,512.1 159.7,511.6" fill="url(#bevelr1x46)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x46)"/><polygon points="161.0,620.5 244.2,620.3 237.8,660.1 166.0,659.2" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x46)"/><polygon points="764.2,466.4 846.8,466.4 870.4,734.0 743.3,733.2" fill="url(#suitr1x46)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x46) url(#metalr1x46)"/><polygon points="745.3,432.8 825.9,431.9 841.8,509.8 758.3,511.0" fill="url(#bevelr1x46)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x46)"/><polygon points="757.1,622.6 837.0,621.7 833.5,662.3 762.0,659.2" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x46)"/><rect x="118.9"  y="701.0" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x46)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x46)"/><rect x="749.2"   y="700.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x46)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x46)"/><line x1="148.9" y1="701.9" x2="149.8" y2="782.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="779.3" y1="702.2" x2="778.7" y2="782.7" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="183.1" y1="700.7" x2="181.8" y2="782.9" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="809.8" y1="703.1" x2="810.9" y2="783.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="215.8" y1="700.3" x2="215.0" y2="782.5" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="844.9" y1="702.1" x2="844.6" y2="784.9" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><polygon points="235.9,417.6 763.4,416.5 722.8,662.6 2