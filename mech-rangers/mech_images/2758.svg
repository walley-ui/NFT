roke-width="2" filter="url(#wmr1x2758)"/><rect x="33.68011689497155" y="422.7990941664204" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x2758)"/><rect x="43.37264272015538" y="403.5756403476931" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x2758)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x2758)"/><circle cx="80.63233344037083" cy="414.3173781999387" r="15.0" fill="#ccccff" opacity=".8" filter="url(#glowr1x2758)"/><circle cx="81.91660774912683" cy="413.2005548328161" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="55.8073284449428" y="453.7702561953105" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x2758)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x2758)"/><circle cx="-20.520712761543724" cy="472.28459440981965" r="18.0" fill="#ccccff" filter="url(#glowr1x2758)" opacity=".88"/><circle cx="-19.36928135106343" cy="469.6665336471982" r="7.0" fill="#ffffff"/><rect x="76.81566778592762" y="501.37235120190303" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x2758)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x2758)"/><rect x="35.4654208080284" y="423.60767368497324" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="62.42648977613074" y1="486.6872610474936" x2="60.39511436479163" y2="518.8544554216787" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.44838475821537" y1="486.5927974253893" x2="78.48575378194448" y2="519.8162001891993" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.92456934325394" y1="485.3668868775479" x2="92.58396412501108" y2="520.4006297834218" stroke="#ccccff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.97013418516144" y="558.5429066020995" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x2758)"/><rect x="422.74776936592536" y="576.6340999148787" width="152.0" height="26.0" fill="url(#bevelr1x2758)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1