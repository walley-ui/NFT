l="#08001e" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#08001e" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#ffcc00"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#ffcc00"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#ffcc00" stroke="#08001e" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#ffcc00" stroke="#08001e" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><rect x="451.24175129374487" y="558.4286644821987" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x1690)"/><rect x="422.2983905890025" y="575.9152734644712" width="152.0" height="26.0" fill="url(#bevelr1x1690)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x1690)"/><polygon points="306.5,380.1 349.8,296.2 500.4,277.1 650.2,293.9 690.7,380.4 667.5,504.0 499.3,566.7 330.9,504.7" fill="url(#suitr1x1690)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x1690) url(#metalr1x1690)"/><polygon points="307.1,382.3 349.9,292.9 501.7,277.7 648.8,293.6 692.2,380.0 667.3,504.8 501.5,564.1 330.7,505.4" fill="url(#carbonr1x1690)"/><polygon points="379.6,303.4 498.8,286.2 619.4,303.8 607.1,382.1 391.3,381.2" fill="url(#suitHir1x1690)"/><polygon points="380.4,379.5 366.6,427.3 434.0,504.6 498.7,528.3 566.4,502.2 633.0,426.1 619.5,380.2" fill="#08001e" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x1690)"/><polygon points="381.4,410.2 475.9,410.4 485.3,441.5 388.1,441.1" fill="#ffcc00" filter="url(#glowr1x1690)"/><polygon points="521.5,411.3 619.3,412.3 610.7,438.7 516.6,441.2" fill="#ffcc00" filter="url(#glowr1x1690)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.4976337978244" y1="412.61689391182733" x2="514.606082875412" y2="411.646982701309" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="485.2850738404877" y1="436.7549593289383" x2="517.0638062818349" y2="438.50685849934814" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.31694558039305" y1="454.9669505072757" x2="500.2472524332814" y2="482.6308640312404" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1690)"/><line x1="453.7104304022901" y1="492.49985468769444" x2="455.40377931360155" y2="518.9713301210664" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1690)"/><line x1="476.3156087297387" y1="491.03983023418107" x2="476.04138464801014" y2="518.8818809591234" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1690)"/><line x1="500.3621360889636" y1="490.8461951993405" x2="498.39724240899085" y2="521.263583227899" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1690)"/><line x1="524.5384984636306" y1="489.58118724068623" x2="524.3388876456395" y2="521.7388541555032" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1690)"/><line x1="544.8751286150143" y1="491.95549257798115" x2="545.6628310027719" y2="518.928627097141" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1690)"/><polygon points="431.9,501.9 568.8,503.6 553.2,555.2 447.7,557.8" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x1690)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>