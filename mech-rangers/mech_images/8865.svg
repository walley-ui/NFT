904640362598" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x8865)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x8865)"/><rect x="830.1426841801591" y="420.17666349690404" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x8865)"/><rect x="837.5213947174699" y="402.98203854663296" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x8865)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x8865)"/><circle cx="876.780315939393" cy="413.1636099249124" r="15.0" fill="#2060ff" opacity=".8" filter="url(#glowr1x8865)"/><circle cx="877.8191053503753" cy="414.8858537844382" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="946.5107330496982" y="454.86408265102654" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x8865)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x8865)"/><circle cx="1020.4104368048348" cy="470.5822036931291" r="18.0" fill="#2060ff" filter="url(#glowr1x8865)" opacity=".88"/><circle cx="1018.2951400304772" cy="471.3089175999164" r="7.0" fill="#ffffff"/><rect x="873.3980743258819" y="502.65444368701424" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x8865)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x8865)"/><rect x="833.6968522423506" y="424.7801527441479" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="858.239310316518" y1="485.78207663754" x2="856.1210318209231" y2="518.8298364083282" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="874.7694361643494" y1="484.63870279081164" x2="872.159591080863" y2="518.9666917018592" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="890.9182612472773" y1="486.1079362284392" x2="891.5333702985756" y2="520.6486450335942" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.47592026544737" y="556.3653231358155" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x8865)"/><rect x="422.9077939413488" y="573.9501864424907" width="152.0" height="26.0" fill