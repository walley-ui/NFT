t x="113.8" y="700.5" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x5850)"/><rect x="746.9"  y="702.4" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x5850)" stroke="#ffd700" stroke-width="2" filter="url(#wmr1x5850)"/><rect x="746.9"  y="701.1" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x5850)"/><rect x="121.5" y="700.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><rect x="753.8" y="701.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><rect x="149.7" y="699.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><rect x="785.6" y="699.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><rect x="182.0" y="698.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><rect x="815.9" y="700.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><rect x="209.1" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><rect x="842.0" y="699.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5850)" stroke="#ffd700" stroke-width=".8" filter="url(#wmr1x5850)"/><ellipse cx="182.79120091082527" cy="712.236558921989" rx="45.1" ry="30.0" fill="#ffd700" fill-opacity=".25" filter="url(#glowr1x5850)"/><ellipse cx="818.0788646673038" cy="711.6263465567305" rx="45.1" ry="30.0" fill="#ffd700" fill-opacity=".25" filter="url(#glowr1x5850)"/></g><rect x="448.8197480063885" y="556.0984600481577" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x5850)"/><rect x="422.4038746032864" y="575.7729571263307" w