roke-width="2.6" filter="url(#wmr1x8192)"/><polygon points="826.6,292.1 969.0,292.9 967.3,590.7 898.2,726.4 829.2,590.6" fill="url(#carbonr1x8192)"/><polygon points="858.5,362.5 934.2,360.9 936.0,542.6 896.8,632.0 858.6,541.7" fill="#ff00ff" fill-opacity=".28" stroke="#ff00ff" stroke-width="1.5"/><line x1="845.3942947270908" y1="429.93521200194954" x2="948.9766045230068" y2="430.27122442452236" stroke="#ff00ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="898.323996863477" y1="330.0617380758747" x2="896.7441195044295" y2="590.864368673414" stroke="#ff00ff" stroke-opacity=".4" stroke-width="1"/><line x1="830.803823777903" y1="297.87360984049735" x2="965.0531265640259" y2="296.4617522072978" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.5630513748713" cy="432.4246456425637" r="18.0" fill="url(#bevelr1x8192)" stroke="#ff00ff" stroke-width="1.2" filter="url(#wmr1x8192)"/></g><rect x="448.5806382475421" y="556.6166838223114" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x8192)"/><rect x="425.2287701682188" y="574.5892006070353" width="152.0" height="26.0" fill="url(#bevelr1x8192)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x8192)"/><polygon points="309.6,381.4 351.4,294.7 501.0,276.5 649.2,294.2 691.4,378.9 670.3,502.0 498.7,565.8 332.1,505.1" fill="url(#suitr1x8192)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x8192) url(#metalr1x8192)"/><polygon points="308.1,380.2 348.9,293.9 499.2,277.2 651.4,296.1 692.4,379.6 668.3,504.2 500.7,565.6 330.6,503.1" fill="url(#carbonr1x8192)"/><polygon points="379.5,301.4 498.7,287.7 619.8,303.1 607.7,379.5 391.5,378.9" fill="url(#suitHir1x8192)"/><polygon points="381.1,382.0 365.7,427.5 434.0,504.7 501.4,528.5 568.1,504.6 633.0,424.9 619.6,379.9" fill="#08001e" fill-opacity=".88" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x8192)"/><polygon points="382.7,410.2 476.2,411.8 484.5,438.4 389.8,440.5" fill="#ff00ff" filter="url(#glowr1x8192)"/><polygon points="522.9,411.5 617.5,412.5 611.7,439.8 514.0,439.7" fill="#ff00ff" filter="url(#glowr1x8192)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.2962233056873" y1="414.52891985820605" x2="514.8625489623658" y2="413.2580670886673" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.0119910858199" y1="439.48294272003693" x2="516.550317340009" y2="438.4695341267623" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.23741624895484" y1="455.5806636196561" x2="499.2426160397939" y2="482.9146458311938" stroke="#ff00ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8192)"/><line x1="455.55655051440004" y1="491.51676014913244" x2="454.42178641444076" y2="521.7019966641441" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8192)"/><line x1="477.7540952669829" y1="492.9565149756148" x2="477.1297943465784" y2="519.5795571613126" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8192)"/><line x1="498.79750091237946" y1="491.07598671428855" x2="500.3000609235838" y2="518.9416602675803" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8192)"/><line x1="521.6630714714154" y1="491.23750257445494" x2="524.1835840958729" y2="521.5989187874832" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8192)"/><line x1="544.6865473305062" y1="490.4071642674505" x2="546.7841583939456" y2="520.3151209631003" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8192)"/><polygon points="431.5,501.9 566.0,505.4 554.2,558.1 447.6,557.8" fill="#050508" fill-opacity=".72" stroke="#ff00ff" stroke-width="1.3" filter="url(#skr1x8192)"/><path d="M387.60419224571433 328.38839676026254 Q330.9124630400538 216.28645715229212 380.43334304302937 141.11265061544253" stroke="#ff00ff"