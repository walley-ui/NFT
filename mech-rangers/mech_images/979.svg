r1x979)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x979)"/><polygon points="306.3,380.7 348.8,294.6 501.1,278.4 648.3,293.7 691.0,381.3 670.5,505.1 501.0,563.6 329.6,502.9" fill="url(#suitr1x979)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x979) url(#metalr1x979)"/><polygon points="309.1,382.0 352.0,293.2 498.3,278.3 648.6,295.2 690.8,379.1 668.7,503.4 499.1,566.7 332.5,504.3" fill="url(#carbonr1x979)"/><polygon points="381.4,303.9 498.5,286.6 617.9,301.3 606.0,381.5 391.1,378.8" fill="url(#suitHir1x979)"/><polygon points="379.5,380.3 366.0,425.9 433.1,504.7 499.8,529.0 567.2,503.7 635.8,426.0 618.4,382.2" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x979)"/><polygon points="379.2,410.3 476.1,410.2 485.2,440.4 387.8,438.4" fill="#ff2040" filter="url(#glowr1x979)"/><polygon points="524.6,410.7 617.8,412.8 611.1,440.1 516.8,440.3" fill="#ff2040" filter="url(#glowr1x979)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.5273519186862" y1="412.59922632090746" x2="513.981399344597" y2="411.89268007781357" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="485.937882517986" y1="439.262867210526" x2="515.2210316387378" y2="439.1414895965718" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="501.08381745666264" y1="452.76801540832963" x2="500.4998025319539" y2="481.3660177896731" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x979)"/><line x1="455.44415421530607" y1="491.8891200913116" x2="453.64400957467035" y2="521.5445964600891" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x979)"/><line x1="477.23171485759315" y1="489.8435166751034" x2="477.8017479857802" y2="520.0962094442918" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x979)"/><line x1="499.77717511141674" y1="492.7176385773345" x2="501.3085918024182" y2="518.2905459934846" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x979)"/><line x1="523.3923880269379" y1="490.4702993638813" x2="521.8092325550131" y2="519.2300618381239" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x979)"/><line x1="545.2948181050085" y1="492.30658540725705" x2="547.649404652156" y2="521.231042389851" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x979)"/><polygon points="433.4,501.8 565.7,502.6 555.0,557.2 445.7,555.5" fill="#cc0020" fill-opacity=".72" stroke="#ff2040" stroke-width="1.3" filter="url(#skr1x979)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".48">CRIMSON RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff2040" fill-opacity=".32">MECH RANGERS</text></svg>