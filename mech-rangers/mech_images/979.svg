0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.1,468.2 234.4,468.1 256.3,736.1 128.9,736.1" fill="url(#suitr1x979)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x979) url(#metalr1x979)"/><polygon points="175.0,431.8 253.1,431.6 244.3,509.9 161.2,512.3" fill="url(#bevelr1x979)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x979)"/><polygon points="162.7,620.3 243.7,622.3 239.6,659.8 164.4,660.4" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x979)"/><polygon points="764.9,465.4 845.9,465.4 872.1,734.7 742.5,733.8" fill="url(#suitr1x979)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x979) url(#metalr1x979)"/><polygon points="748.0,432.5 825.7,432.6 841.0,512.3 758.5,509.0" fill="url(#bevelr1x979)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x979)"/><polygon points="755.9,620.9 840.5,623.5 835.9,659.4 760.1,660.3" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x979)"/><rect x="119.2"  y="700.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x979)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x979)"/><rect x="747.5"   y="699.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x979)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x979)"/><line x1="150.7" y1="701.0" x2="149.0" y2="783.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="776.6" y1="702.9" x2="778.9" y2="785.1" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="182.4" y1="702.9" x2="184.0" y2="783.7" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="811.4" y1="703.4" x2="810.9" y2="783.8" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="213.6" y1="703.1" x2="216.6" y2="784.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="844.3" y1="701.5" x2="845.3" y2="784.2" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><polygon points