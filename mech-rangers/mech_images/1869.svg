.8" y="522.6" width="9.3" height="17.4" rx="1" fill="#4444ff" stroke="#050508" stroke-width=".6"/></g><g><rect x="34.172587092258006" y="421.9717669324018" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x1869)" stroke="#4444ff" stroke-width="2" filter="url(#wmr1x1869)"/><rect x="33.822486653495545" y="421.04911983888593" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x1869)"/><rect x="42.670068625770476" y="403.57130449982355" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x1869)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1869)"/><circle cx="83.43561380034309" cy="414.09506929209454" r="15.0" fill="#4444ff" opacity=".8" filter="url(#glowr1x1869)"/><circle cx="82.65458616012704" cy="412.9556454767473" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="52.96031376257535" y="457.0173532588407" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x1869)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x1869)"/><circle cx="-18.46084616497162" cy="470.0213470021263" r="18.0" fill="#4444ff" filter="url(#glowr1x1869)" opacity=".88"/><circle cx="-18.45859431974593" cy="470.3624787651002" r="7.0" fill="#ffffff"/><rect x="79.55712494807315" y="500.45199527395886" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x1869)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1869)"/><rect x="35.5059680844098" y="423.35129801528524" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="61.73268358664584" y1="484.7205991589464" x2="62.94250491293144" y2="519.9337581891566" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="78.47031591305506" y1="488.0283330960199" x2="77.46636588260529" y2="517.9516511511989" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="94.13188328048211" y1="485.0577737374231" x2="94.40280028818172" y2="517.9060264866799" stroke="#4444ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.45967802191154" y="555.2239019473083" width="100.0"  height="56.0" fill="#1414