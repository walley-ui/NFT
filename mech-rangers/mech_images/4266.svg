.66274133222176" stroke="url(#chromer1x4266)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x4266)"/><line x1="98.52389814261343" y1="770.8260829795151" x2="86.69017904544246" y2="130.6204928772524" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="73.9,150.2 141.0,151.2 83.4,-9.5" fill="url(#blader1x4266)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x4266)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="84.68560124695298" y="419.8289595942944" width="40.0" height="20.0" fill="url(#bevelr1x4266)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x4266)"/><rect x="82.48291677519676" y="512.2309856640175" width="40.0" height="20.0" fill="url(#bevelr1x4266)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x4266)"/><rect x="83.75518616935236" y="601.8992006911895" width="40.0" height="20.0" fill="url(#bevelr1x4266)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x4266)"/><rect x="83.47868472369385" y="691.4716768374666" width="40.0" height="20.0" fill="url(#bevelr1x4266)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x4266)"/><ellipse cx="101.7920087401196" cy="793.0240453736857" rx="22.0" ry="15.0" fill="url(#bevelr1x4266)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x4266)"/></g><rect x="449.6612459566444" y="555.3434477130883" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x4266)"/><rect x="424.23084654258565" y="575.0622750711627" width="152.0" height="26.0" fill="url(#bevelr1x4266)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x4266)"/><polygon points="309.3,379.5 350.3,294.9 499.9,279.7 648.2,296.2 691.8,379.6 668.5,502.9 498.6,565.0 330.9,502.6" fill="url(#suitr1x4266)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x4266) url(#metalr1x4266)"/><polygon points="306.4,380.2 350.4,293.7 498.3,279.9 651.0,295.7 690.5,382.2 669.7,504.9 499.7,5