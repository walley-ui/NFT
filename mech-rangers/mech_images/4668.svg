.1,292.5 171.3,591.1 103.9,726.9 33.7,593.1" fill="url(#carbonr1x4668)"/><polygon points="63.3,360.8 140.4,360.3 141.8,541.0 102.6,630.5 63.9,542.3" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="50.32350709274408" y1="432.6286107268184" x2="153.41408799611028" y2="432.95946183493356" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="100.77512202499432" y1="330.67338090427216" x2="102.06490035405379" y2="592.4235805281438" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="33.19119355114174" y1="296.84922150475904" x2="168.64807690925892" y2="294.79446998471394" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.7198170926794" cy="430.2023870724253" r="18.0" fill="url(#bevelr1x4668)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x4668)"/></g><rect x="451.1126952613704" y="555.7200378224253" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x4668)"/><rect x="424.08506263792515" y="576.3278626870364" width="152.0" height="26.0" fill="url(#bevelr1x4668)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x4668)"/><polygon points="308.3,380.1 349.8,293.1 501.1,277.7 648.1,295.1 691.0,379.9 670.6,504.3 500.5,563.4 331.7,504.1" fill="url(#suitr1x4668)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x4668) url(#metalr1x4668)"/><polygon points="308.1,379.4 348.6,293.4 500.2,277.3 648.2,294.5 691.9,381.6 667.8,504.1 498.3,565.5 332.5,502.4" fill="url(#carbonr1x4668)"/><polygon points="382.3,302.1 498.5,286.1 620.0,303.3 609.3,382.3 393.5,378.9" fill="url(#suitHir1x4668)"/><polygon points="381.0,379.0 364.6,424.3 432.7,502.4 501.6,529.8 566.0,504.1 634.5,426.9 617.8,381.8" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x4668)"/><polygon points="382.4,412.0 475.5,410.0 485.2,441.0 389.9,440.3" fill="#ff2040" filter="url(#glowr1x4668)"/><polygon points="523.5,411.6 620.0,410.0 610.