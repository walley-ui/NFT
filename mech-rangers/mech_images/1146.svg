th="2.6" filter="url(#wmr1x1146)"/><polygon points="826.4,294.6 968.2,293.3 967.1,593.1 897.8,724.7 829.1,591.6" fill="url(#carbonr1x1146)"/><polygon points="858.6,360.9 935.4,359.8 936.0,540.3 899.3,629.8 860.1,540.3" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="846.1152310668118" y1="429.97432980006556" x2="949.3130862516911" y2="432.29774491265414" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.1860686805659" y1="331.89583356585354" x2="899.6318762535789" y2="592.7939105829224" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="828.3164613273553" y1="295.28177342014385" x2="965.60701183673" y2="294.62718306686725" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.042537616808" cy="433.07178793894127" r="18.0" fill="url(#bevelr1x1146)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x1146)"/></g><rect x="451.63334722761067" y="555.1343781185336" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1146)"/><rect x="422.65573030402885" y="574.9540604867973" width="152.0" height="26.0" fill="url(#bevelr1x1146)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1146)"/><polygon points="308.2,380.0 350.7,295.4 501.5,279.6 648.2,294.8 691.6,379.7 669.1,503.0 501.4,566.8 329.6,502.0" fill="url(#suitr1x1146)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x1146) url(#metalr1x1146)"/><polygon points="309.3,381.0 350.5,293.9 500.9,276.8 650.4,295.7 691.7,379.8 670.1,502.1 501.8,564.9 329.7,504.9" fill="url(#carbonr1x1146)"/><polygon points="379.8,301.1 498.2,287.7 618.0,302.1 606.6,382.4 393.0,381.2" fill="url(#suitHir1x1146)"/><polygon points="380.8,379.9 365.0,425.8 433.0,502.1 499.1,527.5 568.3,504.1 632.8,427.1 618.7,379.3" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x1146)"/><polygon points="379.4,412.8 476.3,409.6 484.2,440.2 389.4,438.3" fill="#2060ff" filter=