"892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="911.8,691.9 942.8,690.3 985.8,270.7" fill="url(#blader1x2501)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x2501)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="864.8481187272445" y="682.3161027071998" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x2501)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x2501)"/></g><rect x="451.14247112832965" y="555.1301660185679" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x2501)"/><rect x="423.95993500659245" y="575.4045302371495" width="152.0" height="26.0" fill="url(#bevelr1x2501)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x2501)"/><polygon points="306.8,381.6 348.8,293.9 500.0,278.1 651.4,295.6 691.6,381.4 669.9,502.6 501.5,566.6 330.2,501.9" fill="url(#suitr1x2501)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x2501) url(#metalr1x2501)"/><polygon points="308.7,379.9 350.4,295.4 501.3,276.6 648.5,295.9 693.0,380.1 667.2,504.0 501.5,563.8 332.2,504.4" fill="url(#carbonr1x2501)"/><polygon points="380.5,301.6 501.3,287.7 617.9,303.5 606.4,381.5 391.6,380.6" fill="url(#suitHir1x2501)"/><polygon points="382.4,380.4 367.0,424.3 431.1,504.6 498.5,526.7 567.6,504.4 633.1,425.1 619.9,380.7" fill="#050508" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x2501)"/><polygon points="382.2,410.3 475.2,411.8 483.8,441.4 387.2,441.5" fill="#ccccff" filter="url(#glowr1x2501)"/><polygon points="521.4,412.3 618.4,409.6 611.4,441.6 515.2,440.7" fill="#ccccff" filter="url(#glowr1x2501)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.2534177350439" y1="412.655208426062" x2="516.8727264676616" y2="414.13022183133285" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="483.83522559745234" y1="436.9219975909218" x2="516.8389075880311" y2="437.4652063574642" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="501.4782404757105" y1="453.33199417721477" x2="498.9347840727307" y2="484.46506377365444" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2501)"/><line x1="453.652813367527" y1="492.61720831422133" x2="452.6697037742287" y2="518.4433294611983" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2501)"/><line x1="475.957991576232" y1="489.6337009989656" x2="477.9796852456778" y2="520.7853104247712" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2501)"/><line x1="501.01240961458535" y1="491.6439300504513" x2="498.42181040756407" y2="521.6752763085067" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2501)"/><line x1="524.302286748644" y1="491.0266462548635" x2="524.7031521697156" y2="520.633370412048" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2501)"/><line x1="547.5629202556983" y1="490.4775340317748" x2="545.1824131650105" y2="520.0031129692682" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2501)"/><polygon points="431.9,502.6 567.5,503.3 553.8,555.5 446.8,557.4" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x2501)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>