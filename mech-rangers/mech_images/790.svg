94.0 171.9,593.1 102.1,726.0 31.7,591.0" fill="url(#carbonr1x790)"/><polygon points="63.0,362.9 141.3,361.2 138.7,543.1 103.9,629.7 64.1,541.0" fill="#4444ff" fill-opacity=".28" stroke="#4444ff" stroke-width="1.5"/><line x1="49.138306021168795" y1="430.6617246969603" x2="153.57185514144595" y2="432.05306703876704" stroke="#4444ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.44851072052491" y1="330.33178437398743" x2="101.86476399324832" y2="592.1641096043401" stroke="#4444ff" stroke-opacity=".4" stroke-width="1"/><line x1="34.07389280008149" y1="296.71588264927266" x2="169.38865856420244" y2="294.73490680530665" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.63455892106515" cy="432.6204047991894" r="18.0" fill="url(#bevelr1x790)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x790)"/></g><rect x="449.055856869556" y="557.6312080946751" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x790)"/><rect x="425.25680302763357" y="575.4185995105654" width="152.0" height="26.0" fill="url(#bevelr1x790)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x790)"/><polygon points="307.1,381.7 351.5,295.0 501.7,279.5 648.9,295.1 692.4,382.1 668.8,502.8 500.9,565.0 329.6,504.5" fill="url(#suitr1x790)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x790) url(#metalr1x790)"/><polygon points="307.5,380.4 348.6,295.1 499.5,278.9 649.1,295.2 693.2,380.8 668.5,503.7 498.3,563.5 331.6,505.0" fill="url(#carbonr1x790)"/><polygon points="381.5,304.4 499.8,287.6 617.4,302.2 606.0,379.3 392.2,380.5" fill="url(#suitHir1x790)"/><polygon points="379.2,380.3 365.8,425.2 433.7,504.8 501.7,528.1 566.9,503.1 633.6,425.0 619.5,379.3" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x790)"/><polygon points="382.4,411.4 476.1,409.8 484.1,440.0 387.9,440.5" fill="#4444ff" filter="url(#glowr1x790)"/><polygon points="524.0,411.1 618.6,412.0 610.9,438.8 516.5,43