0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.3,466.7 234.6,467.7 257.3,735.0 128.5,734.1" fill="url(#suitr1x790)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x790) url(#metalr1x790)"/><polygon points="173.1,433.4 254.4,432.4 242.9,509.4 160.1,510.9" fill="url(#bevelr1x790)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x790)"/><polygon points="160.6,620.3 244.7,622.3 239.8,659.1 165.5,660.6" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x790)"/><polygon points="766.4,466.4 845.9,467.3 872.2,736.8 741.1,733.4" fill="url(#suitr1x790)" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x790) url(#metalr1x790)"/><polygon points="747.6,431.0 827.2,431.1 841.0,510.1 757.9,509.3" fill="url(#bevelr1x790)" fill-opacity=".72" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x790)"/><polygon points="758.3,623.0 839.0,622.6 835.0,662.5 761.3,659.4" fill="#4444ff" fill-opacity=".42" stroke="#4444ff" stroke-width="1" filter="url(#skr1x790)"/><rect x="118.9"  y="700.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x790)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x790)"/><rect x="749.8"   y="700.1" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x790)" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x790)"/><line x1="150.8" y1="701.0" x2="149.3" y2="784.8" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="779.4" y1="701.9" x2="779.5" y2="783.4" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="183.6" y1="702.4" x2="181.5" y2="783.7" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="810.9" y1="700.1" x2="811.1" y2="785.5" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="216.4" y1="701.8" x2="215.9" y2="784.5" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><line x1="845.1" y1="703.3" x2="842.4" y2="785.3" stroke="#4444ff" stroke-opacity=".38" stroke-width="1"/><polygon points