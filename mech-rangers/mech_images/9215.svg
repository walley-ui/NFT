" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9215)"/><line x1="501.0867306482978" y1="492.2039515309035" x2="500.1225396525115" y2="519.4145889100619" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9215)"/><line x1="524.5377895985357" y1="490.4373540026135" x2="521.6751078567095" y2="519.2412194211036" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9215)"/><line x1="544.6424991150574" y1="491.7977913219481" x2="544.2944448187203" y2="518.7852328781039" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x9215)"/><polygon points="434.5,505.1 566.3,502.8 554.3,557.7 446.8,556.3" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x9215)"/><path d="M473.09437331508843 312.68808555295686 C304.4138612915203 148.28085732357573 418.98740531759336 241.39419142557307 499.1855463458225 310.52899080822243" fill="#2060ff" fill-opacity=".92" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x9215)"/><path d="M473.2078845984116 309.8040742161684 C303.3497278250195 146.50025538858023 418.3255494300649 240.96240965053437 501.451467375271 310.0587661048397" fill="url(#suitHir1x9215)" opacity=".28"/><path d="M526.2006378547475 312.4856814883649 C695.551893318221 147.9182112184353 581.9237084841915 240.64628130001947 501.3407264241017 310.568953188695" fill="#2060ff" fill-opacity=".92" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x9215)"/><path d="M525.5537810149789 311.41483560437337 C696.0813613425568 148.4004990428686 581.6138931140862 242.8278950544074 499.6242684883997 312.19645151505244" fill="url(#suitHir1x9215)" opacity=".28"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970