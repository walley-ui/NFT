roke-width="2.6" filter="url(#wmr1x2401)"/><polygon points="828.0,292.5 967.8,292.6 967.4,593.0 896.5,726.0 827.5,591.1" fill="url(#carbonr1x2401)"/><polygon points="860.0,361.5 936.5,360.6 935.2,543.1 898.1,633.0 860.6,542.8" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="844.1757322970406" y1="430.8635809253901" x2="948.4345453277789" y2="432.2358416131697" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="899.4790823755413" y1="332.7780610519461" x2="897.2135945957713" y2="590.12603718061" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="829.2420420626737" y1="296.88250281102955" x2="967.0448762531952" y2="297.4466926127672" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="898.2550977862068" cy="432.321046537254" r="18.0" fill="url(#bevelr1x2401)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x2401)"/></g><rect x="450.0704357416369" y="557.2924918537028" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x2401)"/><rect x="424.5577743500471" y="575.5475693652406" width="152.0" height="26.0" fill="url(#bevelr1x2401)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x2401)"/><polygon points="307.4,381.6 350.9,296.3 500.5,276.7 648.3,295.9 693.5,379.3 668.5,504.5 500.9,564.7 331.3,503.0" fill="url(#suitr1x2401)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x2401) url(#metalr1x2401)"/><polygon points="308.9,380.5 351.7,293.5 501.7,276.8 650.7,295.4 693.6,380.0 669.9,505.0 500.8,565.9 331.1,504.7" fill="url(#carbonr1x2401)"/><polygon points="381.5,302.9 499.8,284.7 618.7,303.6 609.0,381.3 392.0,379.4" fill="url(#suitHir1x2401)"/><polygon points="382.1,381.6 367.3,424.4 433.0,502.5 501.4,527.1 567.8,504.9 633.2,426.9 617.9,380.6" fill="#0a0520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x2401)"/><polygon points="381.9,411.3 477.2,413.0 483.3,441.0 388.1,440.8" fill="#2060ff" filter