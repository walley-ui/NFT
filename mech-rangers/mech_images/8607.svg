<line x1="99.83593382187185" y1="811.3209246368148" x2="99.30342646077273" y2="132.53486899277192" stroke="rgba(255,255,255,.35)" stroke-width="4.0" stroke-linecap="round"/><rect x="84.59235276890915" y="622.5669470458291" width="32.0" height="18.0" fill="url(#bevelr1x8607)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x8607)"/><rect x="86.21610289089378" y="440.0451694924384" width="32.0" height="18.0" fill="url(#bevelr1x8607)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x8607)"/><rect x="86.72938072694463" y="259.67786221178244" width="32.0" height="18.0" fill="url(#bevelr1x8607)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x8607)"/><circle cx="101.63218840736893" cy="109.89722297210244" r="58.0" fill="rgba(0,0,0,.52)" stroke="#ff2040" stroke-width="2.2" filter="url(#wmr1x8607)"/><circle cx="103.79611554391678" cy="110.07075754264368" r="46.0" fill="url(#orbr1x8607)" filter="url(#bloomr1x8607)"/><circle cx="102.93021013787013" cy="110.33230262203139" r="20.0" fill="#ff2040" filter="url(#glowr1x8607)"/><circle cx="102.0060406417958" cy="111.30195765895766" r="66.0" fill="none" stroke="#ff2040" stroke-opacity=".4" stroke-width="1.3" stroke-dasharray="4,4"/><ellipse cx="102.06998746016991" cy="110.02135764798147" rx="66.0" ry="30.0" fill="none" stroke="#ff2040" stroke-opacity=".24" stroke-width="1" stroke-dasharray="3,5" transform="rotate(60,102.2,111.4)"/></g><rect x="448.6837269837968" y="555.9607173885219" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x8607)"/><rect x="424.0084306967445" y="574.831213749852" width="152.0" height="26.0" fill="url(#bevelr1x8607)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x8607)"/><polygon points="307.6,382.1 349.5,295.4 499.4,277.4 648.1,294.4 691.1,379.6 668.1,504.3 501.7,563.6 332.5,502.7" fill="url(#suitr1x8607)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x8607) url(#metalr1x8607)"/><polygon points="308.0,379.7 350.9,