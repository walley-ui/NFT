.0" y="523.5" width="9.3" height="17.4" rx="1" fill="#ffd700" stroke="#0a0520" stroke-width=".6"/></g><g><line x1="899.6230708363094" y1="789.9971802787855" x2="914.24356653044" y2="111.58327124239875" stroke="url(#chromer1x6393)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x6393)"/><line x1="901.9494699404203" y1="770.696655293554" x2="911.6446755372547" y2="130.93281788388265" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="870.6,151.4 934.3,149.8 914.8,-9.3" fill="url(#blader1x6393)" stroke="#ffd700" stroke-width="1.8" filter="url(#wmr1x6393)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.8463730525784" y="422.78134798761454" width="40.0" height="20.0" fill="url(#bevelr1x6393)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6393)"/><rect x="877.9429274500907" y="512.3615487273782" width="40.0" height="20.0" fill="url(#bevelr1x6393)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6393)"/><rect x="879.0881825613417" y="601.3994393738918" width="40.0" height="20.0" fill="url(#bevelr1x6393)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6393)"/><rect x="877.3358774042316" y="692.746818237938" width="40.0" height="20.0" fill="url(#bevelr1x6393)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6393)"/><ellipse cx="898.442104820218" cy="789.6130671339109" rx="22.0" ry="15.0" fill="url(#bevelr1x6393)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x6393)"/></g><rect x="448.712710288167" y="556.7473049856723" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x6393)"/><rect x="423.32114606797694" y="576.6986997807398" width="152.0" height="26.0" fill="url(#bevelr1x6393)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x6393)"/><polygon points="307.9,382.3 350.5,293.9 499.8,276.8 651.5,293.4 692.2,379.0 670.4,504.4 500.6,566.4 331.6,504.3" fill="url(#suitr1x6393)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x6393) url(#metalr1x6393)"/><polygon points="308.1,380.5 348.5,295.6 501.2,277.2 648.8,294.9 693.1,382.4 669.5,504.2 500.3,564.2 330.7,503.4" fill="url(#carbonr1x6393)"/><polygon points="380.6,302.9 498.7,287.9 619.2,301.0 607.1,380.2 392.2,380.5" fill="url(#suitHir1x6393)"/><polygon points="381.4,379.9 367.2,425.8 432.2,504.5 501.7,527.9 568.5,502.1 633.1,425.5 619.9,380.8" fill="#0a0520" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x6393)"/><polygon points="380.5,412.5 476.6,410.1 483.7,439.6 388.1,440.6" fill="#ffd700" filter="url(#glowr1x6393)"/><polygon points="523.7,410.6 618.9,412.8 612.6,438.9 514.0,440.6" fill="#ffd700" filter="url(#glowr1x6393)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.9784636934846" y1="413.51323960823936" x2="517.1068095891178" y2="412.5908720679581" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="484.1096201461367" y1="439.55920601673427" x2="516.5891657454334" y2="436.8283767993562" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="499.3502987479791" y1="455.4555801349692" x2="499.33947621397675" y2="483.56070350175725" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6393)"/><line x1="453.9775833931565" y1="489.8316531841643" x2="453.6342665619031" y2="519.395023792889" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6393)"/><line x1="476.5997439928725" y1="490.9722442164085" x2="478.30557939264924" y2="520.9489390576258" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6393)"/><line x1="499.36853683805094" y1="490.89885012563315" x2="498.3871139946394" y2="519.3938450986519" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6393)"/><line x1="522.2072926126048" y1="492.707924890