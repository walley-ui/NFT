40)" stroke="#ff00ff" stroke-width="2.6" filter="url(#wmr1x240)"/><polygon points="828.6,294.2 967.1,293.5 966.7,592.0 898.7,726.9 828.1,591.2" fill="url(#carbonr1x240)"/><polygon points="858.9,359.7 936.9,361.1 936.1,543.0 897.0,629.6 859.7,539.7" fill="#ff00ff" fill-opacity=".28" stroke="#ff00ff" stroke-width="1.5"/><line x1="846.9226342395507" y1="432.5211756141856" x2="951.4235682881996" y2="431.18864378202704" stroke="#ff00ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="899.2102020395547" y1="330.1245071312412" x2="897.7111397638545" y2="592.3909359388985" stroke="#ff00ff" stroke-opacity=".4" stroke-width="1"/><line x1="828.5793062219956" y1="297.3194253548048" x2="965.328475606963" y2="295.40357235549016" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="899.0359887117148" cy="432.31297825723885" r="18.0" fill="url(#bevelr1x240)" stroke="#ff00ff" stroke-width="1.2" filter="url(#wmr1x240)"/></g><rect x="449.4552183969878" y="555.416038986016" width="100.0"  height="56.0" fill="#050508" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x240)"/><rect x="424.7159319504164" y="574.8087032981217" width="152.0" height="26.0" fill="url(#bevelr1x240)" fill-opacity=".65" stroke="#ff00ff" stroke-width="1.2" filter="url(#skr1x240)"/><polygon points="308.6,382.1 349.1,293.3 500.9,279.2 648.3,294.6 691.6,381.3 669.8,502.7 499.8,563.5 329.4,505.0" fill="url(#suitr1x240)" stroke="#ff00ff" stroke-width="2.8" filter="url(#skr1x240) url(#metalr1x240)"/><polygon points="308.3,380.2 349.1,295.0 499.0,279.5 650.9,293.7 692.2,381.3 667.9,503.6 499.3,565.8 331.6,502.1" fill="url(#carbonr1x240)"/><polygon points="381.7,303.5 500.1,287.7 619.5,302.0 607.2,381.1 391.1,381.6" fill="url(#suitHir1x240)"/><polygon points="381.3,382.1 364.4,424.5 434.3,505.3 499.9,530.0 566.6,504.1 636.1,424.6 617.4,380.7" fill="#0d1520" fill-opacity=".88" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x240)"/><polygon points="380.0,411.6 477.5,410.0 486.1,439.8 388.6,439.2" fill="#