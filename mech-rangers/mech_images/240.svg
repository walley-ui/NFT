0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="151.8,465.0 234.7,465.8 258.9,735.7 127.7,733.9" fill="url(#suitr1x240)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x240) url(#metalr1x240)"/><polygon points="174.4,433.6 251.5,433.2 244.7,510.5 157.9,511.6" fill="url(#bevelr1x240)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x240)"/><polygon points="159.7,621.7 244.7,620.8 240.4,660.3 163.9,662.3" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x240)"/><polygon points="766.4,468.1 845.6,467.0 872.7,735.5 742.1,736.5" fill="url(#suitr1x240)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x240) url(#metalr1x240)"/><polygon points="748.1,432.5 825.2,431.7 840.1,512.2 758.2,510.6" fill="url(#bevelr1x240)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x240)"/><polygon points="755.6,622.5 840.5,620.1 833.6,659.6 759.8,661.9" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x240)"/><rect x="118.5"  y="698.7" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x240)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x240)"/><rect x="749.3"   y="700.7" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x240)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x240)"/><line x1="151.5" y1="700.4" x2="148.2" y2="784.4" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="778.0" y1="702.1" x2="778.9" y2="783.1" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="183.7" y1="703.3" x2="181.2" y2="785.1" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="812.3" y1="703.2" x2="810.4" y2="782.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="214.5" y1="700.1" x2="214.2" y2="782.5" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="842.5" y1="703.2" x2="843.0" y2="785.3" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><polygon points