" rx="5" fill="url(#bevelr1x5168)" stroke="#ff44aa" stroke-width="2" filter="url(#wmr1x5168)"/><rect x="114.1" y="703.5" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x5168)"/><rect x="750.4"  y="700.1" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x5168)" stroke="#ff44aa" stroke-width="2" filter="url(#wmr1x5168)"/><rect x="747.0"  y="700.4" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x5168)"/><rect x="123.5" y="700.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><rect x="753.8" y="698.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><rect x="152.7" y="701.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><rect x="783.5" y="701.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><rect x="180.1" y="698.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><rect x="812.6" y="699.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><rect x="210.7" y="700.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><rect x="842.4" y="699.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x5168)" stroke="#ff44aa" stroke-width=".8" filter="url(#wmr1x5168)"/><ellipse cx="185.12262267464772" cy="711.7471413853391" rx="45.1" ry="30.0" fill="#ff44aa" fill-opacity=".25" filter="url(#glowr1x5168)"/><ellipse cx="817.0189019452966" cy="712.0876472766324" rx="45.1" ry="30.0" fill="#ff44aa" fill-opacity=".25" filter="url(#glowr1x5168)"/></g><rect x="449.1745553347282" y="557.791548222769" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x5168)"/><rect x="422.5468633125536" y="575.6266279143282" width="152.0" height="26.0" fill="url(#bevelr1x5168)" fill-opacity=".65" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x5168)"/><polygon points="309.6,382.0 351.9,293.2 498.6,277.3 650.6,295.2 692.0,380.4 667.3,504.9 501.6,563.9 330.5,505.2" fill="url(#suitr1x5168)" stroke="#ff44aa" stroke-width="2.8" filter="url(#skr1x5168) url(#metalr1x5168)"/><polygon points="309.6,381.2 349.3,295.6 501.0,277.4 648.2,293.5 690.7,380.7 668.4,504.8 498.3,566.1 330.0,502.1" fill="url(#carbonr1x5168)"/><polygon points="380.8,303.2 501.4,285.9 617.7,301.3 606.7,379.0 391.6,381.6" fill="url(#suitHir1x5168)"/><polygon points="381.6,380.0 367.0,425.9 433.5,504.9 500.0,527.4 567.1,503.2 634.2,424.8 619.2,379.5" fill="#0d1520" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x5168)"/><polygon points="380.8,412.4 478.4,411.2 484.8,438.9 389.6,439.8" fill="#ff44aa" filter="url(#glowr1x5168)"/><polygon points="522.5,411.4 619.2,412.1 612.4,440.1 515.6,438.6" fill="#ff44aa" filter="url(#glowr1x5168)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.7700988929346" y1="414.4084171439521" x2="514.3279047876038" y2="413.67797307064757" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="482.8662685651891" y1="436.8343125069514" x2="516.6757057172618" y2="437.5275260590017" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="498.9612289076671" y1="453.42554538724943" x2="500.4257056269795" y2="481.54434712734076" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5168)"/><line x1="455.43144523508846" y1="492.90171549580987" x2="453.4027974107117" y2="519.4862842480652" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5168)"/><line x1="476.66211260449137" y1="491.58883949