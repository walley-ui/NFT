="495.5" y="522.0" width="9.3" height="17.4" rx="1" fill="#ccccff" stroke="#1e0600" stroke-width=".6"/><rect x="507.6" y="522.4" width="9.3" height="17.4" rx="1" fill="#ccccff" stroke="#1e0600" stroke-width=".6"/></g><g><polygon points="868.7,689.7 899.2,690.4 832.4,272.2" fill="url(#blader1x8492)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x8492)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="913.3,692.9 944.2,692.4 987.3,272.0" fill="url(#blader1x8492)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x8492)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.5296967462265" y="681.5895711210557" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x8492)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x8492)"/></g><rect x="449.6467734030448" y="556.4320879969746" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x8492)"/><rect x="422.2572899661958" y="574.9277708344162" width="152.0" height="26.0" fill="url(#bevelr1x8492)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x8492)"/><polygon points="307.5,380.5 349.4,293.5 499.9,277.9 650.1,294.7 693.5,381.7 668.2,504.2 498.4,564.0 329.6,503.2" fill="url(#suitr1x8492)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x8492) url(#metalr1x8492)"/><polygon points="309.0,381.5 350.2,295.3 498.3,278.8 649.7,295.4 692.2,379.3 670.1,503.4 500.0,566.4 329.7,505.1" fill="url(#carbonr1x8492)"/><polygon points="380.5,303.6 498.6,287.5 617.8,301.0 609.0,381.4 394.1,380.0" fill="url(#suitHir1x8492)"/><polygon points="380.5,380.2 366.8,427.2 432.2,503.5 499.3,529.4 566.5,504.8 636.1,426.3 617.3,380.0" fill="#1e0600" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x8492)"/><polygon points="381.5,411.8 476.8,411.2 482.9,440.0 387.7,439.9" fill="#ccccff" filter="url(#glowr1x8492)"/><p