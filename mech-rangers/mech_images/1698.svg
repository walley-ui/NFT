idth="175.0" height="118.0" rx="7" fill="url(#artilleryr1x1698)" stroke="#00ffff" stroke-width="2.6" filter="url(#wmr1x1698)"/><rect x="43.310320455431906" y="397.10192103013395" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x1698)"/><rect x="17.53152912877497" y="446.78933674786236" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x1698)" stroke="#00ffff" stroke-width="1.4" filter="url(#wmr1x1698)"/><circle cx="118.10032114110884" cy="470.95066944668065" r="48.0" fill="rgba(0,0,0,.55)" stroke="#00ffff" stroke-width="2" filter="url(#wmr1x1698)"/><circle cx="117.64097010720518" cy="472.17854241346936" r="34.0" fill="#00ffff" fill-opacity=".4" filter="url(#bloomr1x1698)"/><circle cx="118.09564089760181" cy="469.96012990726155" r="18.0" fill="#00ffff" filter="url(#glowr1x1698)"/><rect x="47.273335023634104" y="381.88473343830555" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x1698)" stroke="#00ffff" stroke-width="1" filter="url(#wmr1x1698)"/><rect x="45.32704097930339" y="398.22229823973026" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="52.59408322520551" y1="519.3298414554447" x2="52.03381374184039" y2="548.1817056081258" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/><line x1="75.09829696103927" y1="519.5308288308792" x2="77.0533129620738" y2="549.7283356729895" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/><line x1="101.81301440451291" y1="517.9275474044495" x2="101.5386438381299" y2="548.6513182808645" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/><line x1="125.71982267335054" y1="519.7257682499476" x2="124.2718028947152" y2="548.2393806498497" stroke="#00ffff" stroke-opacity=".6" stroke-width="2"/></g><rect x="448.9671862456016" y="558.4331294264645" width="100.0"  height="56.0" fill="#08001e" stroke="#00ffff" stroke-width="2.2" filter="url(#skr1x1698)"/><rect x="425.44622136587276" y="575.0321514951996" width="152.0" height="26.0" fill="url(#bevelr1x1698)" fill-opacity=".65" stroke="#00ffff