lter="url(#wmr1x1062)"/><rect x="33.2886766122095" y="421.07398258792233" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x1062)"/><rect x="41.95032756220546" y="404.0395628523081" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x1062)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1062)"/><circle cx="83.36650946116072" cy="413.5067922676913" r="15.0" fill="#2060ff" opacity=".8" filter="url(#glowr1x1062)"/><circle cx="82.64913178835062" cy="414.58664112119004" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="53.612066167723356" y="456.9793866078369" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x1062)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x1062)"/><circle cx="-20.08464189289141" cy="470.6198159480467" r="18.0" fill="#2060ff" filter="url(#glowr1x1062)" opacity=".88"/><circle cx="-20.6441672702879" cy="472.7190130846575" r="7.0" fill="#ffffff"/><rect x="78.19398722177368" y="500.5913532797247" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x1062)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x1062)"/><rect x="36.43133428910744" y="421.6858232889324" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.86098946029317" y1="484.84835101328787" x2="61.598119711820004" y2="517.8271634069271" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.93992939474057" y1="487.27774391723796" x2="78.01025160349903" y2="518.5675090735778" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/><line x1="94.60882457638156" y1="485.8583093738183" x2="93.80395866692064" y2="519.8641594124026" stroke="#2060ff" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.7857037774287" y="557.2138227990828" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1062)"/><rect x="424.5020370174199" y="575.4103867541999" width="152.0" height="26.0" fill="url(#bevelr1x1062)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1062)"/><polygon