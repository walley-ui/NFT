url(#carbonr1x750)"/><polygon points="392.3,723.3 493.6,725.2 484.5,787.9 385.5,787.7" fill="url(#bevelr1x750)" fill-opacity=".5" stroke="#00ff60" stroke-width="1.4" filter="url(#skr1x750)"/><polygon points="511.5,661.9 602.9,662.9 611.2,877.5 518.1,878.6" fill="url(#suitr1x750)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x750) url(#metalr1x750)"/><polygon points="510.9,661.7 602.3,664.2 610.9,877.4 518.7,877.3" fill="url(#carbonr1x750)"/><polygon points="508.8,723.4 607.3,723.3 614.5,786.6 514.3,789.7" fill="url(#bevelr1x750)" fill-opacity=".5" stroke="#00ff60" stroke-width="1.4" filter="url(#skr1x750)"/><rect x="394.3" y="837.3" width="100.3" height="24.7" fill="url(#bevelr1x750)" stroke="#00ff60" stroke-width="1" filter="url(#skr1x750)"/><rect x="507.5"  y="840.2" width="100.3" height="24.7" fill="url(#bevelr1x750)" stroke="#00ff60" stroke-width="1" filter="url(#skr1x750)"/><polygon points="371.1,876.3 495.6,877.7 503.6,922.6 361.7,921.1" fill="#00441e" stroke="#00ff60" stroke-width="2" filter="url(#skr1x750)"/><polygon points="504.3,876.6 629.6,876.3 636.5,922.2 496.2,921.4" fill="#00441e" stroke="#00ff60" stroke-width="2" filter="url(#skr1x750)"/><polygon points="302.5,633.8 694.5,631.8 636.1,682.8 361.2,680.3" fill="#00ff60" fill-opacity=".52" stroke="#00ff60" stroke-width="2" filter="url(#skr1x750)"/><rect x="465.0" y="637.1" width="72.0" height="42.0" fill="url(#bevelr1x750)" stroke="#00ff60" stroke-width="1.4" filter="url(#glowr1x750)"/><rect x="486.8" y="642.1" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.5,465.2 235.6,468.1 258.4,734.0 126.9,735.2" fill="url(#suitr1x750)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x750) url(#metalr1x750)"/><polygon points="172.8,433.8 252.4,431.5 243.6,511.8 159.7,510.6" fill="url(#bevelr1x750)" fill-opacity=".72" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x750)"/><polygon points="160.4,622.8 241.8,621.2 237.8,661.9 166.0,662.1" fill="#00ff60" fill-opac