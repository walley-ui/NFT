0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.5,465.8 233.4,465.6 259.1,734.5 128.2,736.2" fill="url(#suitr1x701)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x701) url(#metalr1x701)"/><polygon points="172.7,432.2 252.2,433.5 244.3,511.5 157.8,509.7" fill="url(#bevelr1x701)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x701)"/><polygon points="162.5,620.8 242.7,620.6 237.7,662.3 164.0,662.4" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x701)"/><polygon points="765.3,468.2 847.3,466.9 873.0,735.1 742.8,733.8" fill="url(#suitr1x701)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x701) url(#metalr1x701)"/><polygon points="748.6,433.8 825.3,432.9 838.7,510.6 757.0,509.2" fill="url(#bevelr1x701)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x701)"/><polygon points="757.1,623.7 839.5,621.0 834.7,660.3 759.3,659.6" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x701)"/><rect x="120.9"  y="700.9" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x701)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x701)"/><rect x="748.3"   y="701.1" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x701)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x701)"/><line x1="148.7" y1="702.7" x2="149.3" y2="783.5" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="777.5" y1="700.1" x2="777.6" y2="785.0" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="183.1" y1="700.3" x2="181.9" y2="784.3" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="812.4" y1="700.9" x2="812.1" y2="783.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="215.2" y1="701.8" x2="215.5" y2="783.3" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="844.9" y1="703.3" x2="842.4" y2="783.1" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><polygon points