l="#050508" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#050508" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#ffcc00"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#ffcc00"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#ffcc00" stroke="#050508" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#ffcc00" stroke="#050508" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><g><polygon points="828.8,292.9 967.5,292.2 969.0,590.4 897.6,726.8 826.6,591.6" fill="url(#titaniumr1x3209)" stroke="#ffcc00" stroke-width="2.6" filter="url(#wmr1x3209)"/><polygon points="826.8,294.0 966.1,294.1 968.4,590.6 899.6,726.7 826.1,591.2" fill="url(#carbonr1x3209)"/><polygon points="860.1,362.4 936.0,361.4 935.3,540.9 898.8,632.5 860.1,540.3" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="844.9073092675395" y1="431.8063724630512" x2="950.212916219756" y2="432.12172358985987" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="898.8199683753402" y1="331.71203750232235" x2="898.7342877153866" y2="590.6060239555314" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="830.1836233758927" y1="296.83105336418373" x2="967.4373448261618" y2="294.6317799624055" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.9161180199683" cy="431.9617213144898" r="18.0" fill="url(#bevelr1x3209)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x3209)"/></g><rect x="448.8741019905545" y="557.7596817323007" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x3209)"/><rect x="423.1641011778265" y="576.1991108917631" width="152.0" height="26.0" fill="url(#bevelr1x3209)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x3209)"/><polygon points="307.5,379.3 351.4,296.3 500.0,279.3 649.3,293.3 691.5,380.8 667.8,504.6 4