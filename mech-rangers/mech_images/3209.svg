ine x1="523.026057941243" y1="489.89891850361596" x2="521.4459899182059" y2="521.3172580348328" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3209)"/><line x1="547.3625548090972" y1="492.8947612696327" x2="547.241155588273" y2="518.2561797495931" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3209)"/><polygon points="432.0,502.9 568.7,504.4 553.2,558.2 445.7,555.4" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x3209)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>