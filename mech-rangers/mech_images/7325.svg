.4,293.2 172.2,590.5 101.5,725.2 33.2,593.1" fill="url(#carbonr1x7325)"/><polygon points="64.0,359.7 138.5,360.1 138.7,541.6 102.2,630.7 63.5,541.6" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="50.340231067445096" y1="430.28009779723357" x2="154.49368397764857" y2="429.85101044112815" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="100.79602006677536" y1="332.46887349393216" x2="103.81467611765486" y2="592.6400977621786" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="32.77173552824181" y1="298.0094232374802" x2="170.03995399134232" y2="297.43638247456397" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.93301603863013" cy="430.2315556369722" r="18.0" fill="url(#bevelr1x7325)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x7325)"/></g><rect x="451.4691590976901" y="555.648313557636" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x7325)"/><rect x="424.77413993952797" y="576.8375724349171" width="152.0" height="26.0" fill="url(#bevelr1x7325)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x7325)"/><polygon points="307.6,379.3 350.0,294.9 499.3,278.0 649.1,294.5 693.1,382.0 669.6,504.0 501.5,564.9 330.6,503.1" fill="url(#suitr1x7325)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x7325) url(#metalr1x7325)"/><polygon points="309.5,379.3 350.8,293.4 498.4,278.3 649.2,294.7 690.2,381.0 667.8,502.7 498.7,566.4 331.9,504.5" fill="url(#carbonr1x7325)"/><polygon points="380.1,301.0 499.1,286.9 619.5,303.8 608.8,380.0 392.8,379.0" fill="url(#suitHir1x7325)"/><polygon points="381.8,380.5 366.9,424.5 434.5,503.0 500.0,529.6 568.9,502.8 633.4,427.2 618.9,379.5" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x7325)"/><polygon points="380.1,412.9 478.7,411.7 485.7,440.1 387.5,439.1" fill="#2060ff" filter="url(#glowr1x7325)"/><polygon points="524.5,411.4 617.6,409.8 609