.3,693.2 103.8,690.3 36.5,273.1" fill="url(#blader1x3116)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x3116)"/><line x1="97.2" y1="691.4" x2="46.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="117.1,692.0 148.7,691.7 189.9,272.9" fill="url(#blader1x3116)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x3116)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="68.3853381268121" y="682.4561490809544" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x3116)" stroke="#2060ff" stroke-width="1.4" filter="url(#wmr1x3116)"/></g><rect x="450.32308018617334" y="557.3110761817544" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3116)"/><rect x="425.5766021069139" y="577.1433322622441" width="152.0" height="26.0" fill="url(#bevelr1x3116)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x3116)"/><polygon points="308.5,381.2 350.0,294.7 501.3,279.8 651.5,295.4 693.7,380.8 667.7,503.7 498.4,564.2 331.7,502.5" fill="url(#suitr1x3116)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x3116) url(#metalr1x3116)"/><polygon points="308.3,380.5 349.7,293.8 500.6,278.0 649.5,295.6 693.1,379.3 668.8,502.1 499.2,565.9 332.4,503.2" fill="url(#carbonr1x3116)"/><polygon points="379.9,304.2 500.4,285.9 619.6,302.6 605.8,382.3 390.8,382.3" fill="url(#suitHir1x3116)"/><polygon points="382.1,382.0 365.8,427.2 432.1,502.9 499.9,527.0 566.8,503.7 634.7,427.4 617.5,379.1" fill="#1e0600" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x3116)"/><polygon points="381.9,409.8 477.0,410.0 484.2,439.9 388.2,438.3" fill="#2060ff" filter="url(#glowr1x3116)"/><polygon points="522.2,412.6 618.1,411.9 610.9,438.5 514.5,440.9" fill="#2060ff" filter="url(#glowr1x3116)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill