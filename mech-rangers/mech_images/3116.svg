ight="42.0" fill="url(#bevelr1x3116)" stroke="#2060ff" stroke-width="1.4" filter="url(#glowr1x3116)"/><rect x="487.0" y="639.7" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.8,468.2 235.8,466.6 256.6,736.2 129.9,736.6" fill="url(#suitr1x3116)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3116) url(#metalr1x3116)"/><polygon points="173.4,433.3 254.4,433.7 242.7,512.2 159.4,508.9" fill="url(#bevelr1x3116)" fill-opacity=".72" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3116)"/><polygon points="159.6,621.7 242.1,622.7 240.6,659.5 163.8,659.7" fill="#2060ff" fill-opacity=".42" stroke="#2060ff" stroke-width="1" filter="url(#skr1x3116)"/><polygon points="765.0,467.3 848.4,466.2 870.2,735.1 741.0,734.5" fill="url(#suitr1x3116)" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3116) url(#metalr1x3116)"/><polygon points="747.9,433.0 827.9,430.5 842.0,511.2 756.4,509.7" fill="url(#bevelr1x3116)" fill-opacity=".72" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x3116)"/><polygon points="757.2,620.3 838.5,622.9 835.5,659.5 761.6,660.1" fill="#2060ff" fill-opacity=".42" stroke="#2060ff" stroke-width="1" filter="url(#skr1x3116)"/><rect x="118.7"  y="701.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x3116)" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x3116)"/><rect x="748.8"   y="698.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x3116)" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x3116)"/><line x1="150.0" y1="701.4" x2="149.7" y2="783.5" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="779.5" y1="701.9" x2="777.8" y2="785.4" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="181.0" y1="702.1" x2="181.4" y2="783.6" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="810.8" y1="702.7" x2="810.0" y2="784.4" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><line x1="215.5" y1="700.1" x2="216.0" y2="784.7" stroke="#2060ff" stroke