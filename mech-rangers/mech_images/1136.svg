7" fill="url(#artilleryr1x1136)" stroke="#ffcc00" stroke-width="2.6" filter="url(#wmr1x1136)"/><rect x="836.9803544398025" y="395.6185663320124" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x1136)"/><rect x="981.7836131169089" y="448.4687422961928" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x1136)" stroke="#ffcc00" stroke-width="1.4" filter="url(#wmr1x1136)"/><circle cx="880.9382629536651" cy="470.6816997813992" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x1136)"/><circle cx="881.3790537264757" cy="470.5818578516133" r="34.0" fill="#ffcc00" fill-opacity=".4" filter="url(#bloomr1x1136)"/><circle cx="880.2476514511369" cy="472.8118537205271" r="18.0" fill="#ffcc00" filter="url(#glowr1x1136)"/><rect x="843.3488503169827" y="381.65873919287696" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x1136)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x1136)"/><rect x="840.8525517616049" y="396.86472223559394" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="847.2697523990274" y1="518.3013052687048" x2="848.4610793174803" y2="551.0898325386457" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="871.5307035551965" y1="520.2936251075007" x2="873.5807536649146" y2="549.3456949669868" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="894.793769483231" y1="519.0863979291171" x2="894.2640949313156" y2="547.9735989165492" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/><line x1="920.8669627115689" y1="518.1161155243404" x2="920.3377074308321" y2="550.1105378000997" stroke="#ffcc00" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.6386478593573" y="555.1541620989329" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x1136)"/><rect x="424.7015974241309" y="576.370529412292" width="152.0" height="26.0" fill="url(#bevelr1x1136)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x1136)"/