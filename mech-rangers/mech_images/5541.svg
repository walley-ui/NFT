kr1x5541)"/><line x1="478.0036469585635" y1="490.8760909392498" x2="478.4194773809425" y2="521.4577673343941" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5541)"/><line x1="499.22904675528406" y1="490.15061064073814" x2="499.60000059884044" y2="519.0367779086343" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5541)"/><line x1="521.7897881062329" y1="491.5232474714517" x2="521.4992785457149" y2="519.250008784514" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5541)"/><line x1="544.4478035213613" y1="492.1267406248487" x2="547.0164630197175" y2="519.3060453728773" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5541)"/><polygon points="432.8,502.4 565.9,502.6 554.5,557.3 446.4,557.0" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x5541)"/><polygon points="476.4,303.9 523.8,302.7 512.3,176.4 488.7,176.2" fill="url(#bevelr1x5541)" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x5541)"/><polygon points="366.6,324.4 458.1,321.5 467.5,227.4" fill="url(#bevelr1x5541)" fill-opacity=".78" stroke="#c0c0d0" stroke-width="1.5" filter="url(#skr1x5541)"/><polygon points="541.0,323.3 636.0,323.1 532.4,229.9" fill="url(#bevelr1x5541)" fill-opacity=".78" stroke="#c0c0d0" stroke-width="1.5" filter="url(#skr1x5541)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".48">CHROME RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".32">MECH RANGERS</text></svg>