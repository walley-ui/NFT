0" rx="5" fill="url(#carbonr1x2852)"/><rect x="749.6"  y="701.9" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x2852)" stroke="#2060ff" stroke-width="2" filter="url(#wmr1x2852)"/><rect x="750.1"  y="701.4" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x2852)"/><rect x="120.7" y="698.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><rect x="754.2" y="699.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><rect x="150.2" y="701.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><rect x="785.9" y="699.3" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><rect x="182.1" y="700.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><rect x="814.8" y="700.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><rect x="211.6" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><rect x="844.6" y="699.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x2852)" stroke="#2060ff" stroke-width=".8" filter="url(#wmr1x2852)"/><ellipse cx="183.80261152325198" cy="711.8585881287977" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x2852)"/><ellipse cx="815.7093759051711" cy="711.0296582648343" rx="45.1" ry="30.0" fill="#2060ff" fill-opacity=".25" filter="url(#glowr1x2852)"/></g><rect x="450.39938451983033" y="557.040216173511" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x2852)"/><rect x="424.4194835793227" y="575.1960901696235" width="152.0" height="26.0" fill="url(#bevelr1x