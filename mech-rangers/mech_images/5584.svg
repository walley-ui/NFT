.2,294.2 170.5,591.9 103.5,726.7 32.6,591.6" fill="url(#carbonr1x5584)"/><polygon points="63.6,362.4 138.8,360.2 139.3,542.4 103.2,633.1 64.1,542.9" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="50.19081202106547" y1="431.18654931290075" x2="155.33667694175614" y2="430.47475874265655" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.32203377377239" y1="332.254853430856" x2="103.61270964456719" y2="591.8610279015265" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="34.71015534758565" y1="297.23381433589384" x2="169.1465846031345" y2="296.2803555549122" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.61083662867543" cy="432.3668429494835" r="18.0" fill="url(#bevelr1x5584)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x5584)"/></g><rect x="448.6066692234948" y="556.3901924185454" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x5584)"/><rect x="423.01846393048766" y="576.0258090606891" width="152.0" height="26.0" fill="url(#bevelr1x5584)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x5584)"/><polygon points="308.2,381.1 350.4,293.7 501.1,279.6 649.3,294.9 691.5,380.5 668.7,504.3 498.8,564.5 332.0,505.3" fill="url(#suitr1x5584)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x5584) url(#metalr1x5584)"/><polygon points="308.5,379.3 349.6,295.0 499.6,279.6 648.5,295.5 691.0,381.3 668.7,503.4 500.0,564.1 331.9,502.2" fill="url(#carbonr1x5584)"/><polygon points="382.5,301.2 501.0,286.2 619.1,303.4 608.8,379.0 391.3,380.1" fill="url(#suitHir1x5584)"/><polygon points="381.2,379.4 364.4,425.1 431.4,502.1 501.2,527.7 567.8,504.1 635.7,427.2 619.7,381.1" fill="#0d1520" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x5584)"/><polygon points="382.2,409.7 477.0,412.9 484.2,440.9 387.2,441.2" fill="#ff2040" filter="url(#glowr1x5584)"/><polygon points="521.4,411.2 619.4,411.6 609.9,