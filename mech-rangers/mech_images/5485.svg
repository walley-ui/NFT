2" stroke-width="1.3" filter="url(#skr1x5485)"/><line x1="398.5" y1="548.8" x2="599.8" y2="550.6" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x5485)"/><line x1="268.0" y1="490.5" x2="321.4" y2="491.5" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.1" y1="490.8" x2="733.3" y2="490.5" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.0" y1="521.9" x2="320.6" y2="524.6" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.7" y1="524.6" x2="731.8" y2="522.6" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.4" y1="555.3" x2="318.2" y2="555.4" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.4" y1="553.9" x2="734.4" y2="554.3" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.5" y1="587.7" x2="321.5" y2="584.8" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.7" y1="587.1" x2="733.1" y2="585.6" stroke="#ff44aa" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x5485)"><path d="M500,510.6 C391.2001374967396,449.3676606209949 443.02944958396256,543.8040012693406 500,529.3535806681216" fill="#ff44aa" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x5485)"/><path d="M500,510.6 C609.7076828630641,454.1807200804353 553.9320768490434,542.330311459899 500,528.4276432781667" fill="#ff44aa" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.2" filter="url(#skr1x5485)"/><path d="M500,493.20000000000005 C456.0658801085316,464.2521896113642 478.0659113886766,516.8050585329532 500,524.0356980010868" fill="rgba(255,255,255,.14)"/><path d="M500,493.20000000000005 C546.9030103265308,462.09464184129615 525.6189321566374,515.7839029790833 500,521.4248266264797" fill="rgba(255,255,255,.14)"/></g><rect x="451.1121768364683" y="557.8400918448343" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x5485)"/><rect x="424.970081345