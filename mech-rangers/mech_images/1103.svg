-opacity=".38" stroke-width="1"/><line x1="842.3" y1="703.3" x2="843.9" y2="782.7" stroke="#ffcc00" stroke-opacity=".38" stroke-width="1"/><polygon points="234.4,419.2 766.5,418.8 722.0,661.4 277.9,663.4" fill="url(#suitr1x1103)" stroke="#ffcc00" stroke-width="2.6" filter="url(#skr1x1103) url(#metalr1x1103)"/><polygon points="235.7,418.8 765.8,416.4 723.7,661.1 278.3,661.4" fill="url(#carbonr1x1103)"/><polygon points="366.3,416.3 631.3,419.0 610.2,514.6 387.6,517.1" fill="url(#suitHir1x1103)"/><line x1="360.7" y1="472.7" x2="637.0" y2="470.8" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1103)"/><line x1="399.7" y1="550.1" x2="602.5" y2="549.6" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x1103)"/><line x1="268.5" y1="492.2" x2="318.3" y2="492.5" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.8" y1="491.7" x2="732.0" y2="491.1" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.0" y1="524.4" x2="321.6" y2="521.4" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.5" y1="523.0" x2="734.9" y2="522.3" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.9" y1="553.6" x2="321.2" y2="555.5" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.1" y1="553.1" x2="732.6" y2="554.8" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.1" y1="585.3" x2="321.5" y2="587.9" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.8" y1="587.7" x2="732.3" y2="586.4" stroke="#ffcc00" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x1103)"><ellipse cx="499.9" cy="508.9" rx="42.9" ry="23.2" fill="#1e0600" stroke="#ffcc00" stroke-width="1.6" filter="url(#skr1x1103)"/><circle cx="498.9" cy="509.8" r="15.1" fill="#ffcc00"/><circle cx="496.4" cy="508.3" r="5.8" fill="#1e0600"/><ellipse cx="496.2" cy="504.3" rx="3.5" ry="2.3" fill="rgba(255,255,255,.7)"/></g><g><line x1="898.95184