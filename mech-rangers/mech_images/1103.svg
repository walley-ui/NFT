url(#skr1x1103)"/><line x1="547.6884479116835" y1="490.3004108197987" x2="545.7384698342719" y2="521.0880942079239" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1103)"/><polygon points="434.6,505.2 565.5,504.3 553.4,556.6 444.7,556.2" fill="#a07000" fill-opacity=".72" stroke="#ffcc00" stroke-width="1.3" filter="url(#skr1x1103)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".48">NOVA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffcc00" fill-opacity=".32">MECH RANGERS</text></svg>