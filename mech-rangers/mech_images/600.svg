0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="154.2,465.9 234.6,466.6 257.6,736.3 129.4,733.3" fill="url(#suitr1x600)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x600) url(#metalr1x600)"/><polygon points="172.6,431.7 251.4,433.9 244.0,510.7 160.7,512.4" fill="url(#bevelr1x600)" fill-opacity=".72" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x600)"/><polygon points="162.6,620.2 243.4,622.9 239.5,660.3 165.9,660.3" fill="#00ff60" fill-opacity=".42" stroke="#00ff60" stroke-width="1" filter="url(#skr1x600)"/><polygon points="764.3,466.9 848.8,467.0 870.0,736.6 740.3,734.1" fill="url(#suitr1x600)" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x600) url(#metalr1x600)"/><polygon points="745.8,433.6 827.4,430.6 840.1,509.3 757.9,511.3" fill="url(#bevelr1x600)" fill-opacity=".72" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x600)"/><polygon points="756.1,622.7 837.5,620.3 836.5,662.3 760.6,659.1" fill="#00ff60" fill-opacity=".42" stroke="#00ff60" stroke-width="1" filter="url(#skr1x600)"/><rect x="119.1"  y="700.4" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x600)" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x600)"/><rect x="747.7"   y="698.8" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x600)" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x600)"/><line x1="150.5" y1="702.1" x2="151.2" y2="783.4" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="779.8" y1="700.6" x2="779.6" y2="785.3" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="183.5" y1="701.2" x2="181.5" y2="784.9" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="812.1" y1="700.9" x2="810.6" y2="782.3" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="214.5" y1="701.4" x2="213.9" y2="785.4" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><line x1="842.6" y1="703.3" x2="845.5" y2="784.1" stroke="#00ff60" stroke-opacity=".38" stroke-width="1"/><polygon points