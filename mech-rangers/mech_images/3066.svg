.0,294.0 172.3,592.4 101.6,725.9 31.6,592.8" fill="url(#carbonr1x3066)"/><polygon points="62.4,362.2 141.5,361.0 138.5,542.4 103.7,631.7 63.6,540.0" fill="#4444ff" fill-opacity=".28" stroke="#4444ff" stroke-width="1.5"/><line x1="49.52918182717633" y1="431.49296725206074" x2="153.98378164213148" y2="430.3679195489734" stroke="#4444ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.6883224796876" y1="331.08112253444267" x2="101.01293761044738" y2="590.9411166260019" stroke="#4444ff" stroke-opacity=".4" stroke-width="1"/><line x1="33.660268212147024" y1="296.9035366170108" x2="169.7617448443919" y2="295.8418324691243" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="103.75424641709772" cy="431.0972138305194" r="18.0" fill="url(#bevelr1x3066)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x3066)"/></g><rect x="448.46008044071493" y="558.5404893249273" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x3066)"/><rect x="424.65229463297874" y="575.607823846303" width="152.0" height="26.0" fill="url(#bevelr1x3066)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x3066)"/><polygon points="307.1,381.9 351.7,294.7 498.7,278.8 648.4,293.5 693.3,379.6 668.7,505.1 499.7,565.2 332.5,505.4" fill="url(#suitr1x3066)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x3066) url(#metalr1x3066)"/><polygon points="306.5,379.1 348.5,294.2 500.9,278.9 650.3,295.6 690.8,379.3 668.0,505.0 499.7,564.3 330.4,504.0" fill="url(#carbonr1x3066)"/><polygon points="382.5,301.8 499.4,287.2 618.0,302.9 606.1,379.8 390.7,380.3" fill="url(#suitHir1x3066)"/><polygon points="379.9,378.8 366.5,425.8 432.4,504.8 499.1,528.5 567.5,505.0 633.7,427.3 617.6,381.4" fill="#0a0520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x3066)"/><polygon points="380.5,412.2 478.3,411.5 483.3,439.7 389.7,440.4" fill="#4444ff" filter="url(#glowr1x3066)"/><polygon points="521.5,412.4 620.3,413.1 611.9,