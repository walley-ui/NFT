ba(255,255,255,.58)" stroke-width="1.3"/><polygon points="115.8,692.7 149.5,692.4 189.5,272.5" fill="url(#blader1x8503)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x8503)"/><line x1="146.2" y1="691.4" x2="184.2" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="68.11990642094982" y="681.0015129137784" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x8503)" stroke="#2060ff" stroke-width="1.4" filter="url(#wmr1x8503)"/></g><rect x="448.6600321800448" y="556.5509149952792" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x8503)"/><rect x="423.1904939217493" y="577.037134369649" width="152.0" height="26.0" fill="url(#bevelr1x8503)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x8503)"/><polygon points="307.2,382.3 349.4,296.2 498.8,276.7 650.5,293.8 692.7,382.3 667.8,505.3 501.4,564.5 330.6,502.9" fill="url(#suitr1x8503)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x8503) url(#metalr1x8503)"/><polygon points="308.1,381.5 351.8,293.8 501.6,276.4 650.3,295.6 691.9,379.9 669.5,502.7 499.4,564.3 329.3,502.7" fill="url(#carbonr1x8503)"/><polygon points="382.5,304.2 498.2,284.9 620.5,302.7 607.9,379.4 391.9,380.7" fill="url(#suitHir1x8503)"/><polygon points="381.6,381.8 364.8,425.2 431.7,503.1 499.9,527.0 566.7,503.6 634.4,424.9 618.6,381.9" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x8503)"/><polygon points="379.3,411.7 478.8,409.9 483.6,441.5 388.2,440.4" fill="#2060ff" filter="url(#glowr1x8503)"/><polygon points="523.1,412.5 620.7,412.5 612.7,440.0 515.6,441.4" fill="#2060ff" filter="url(#glowr1x8503)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.2157827158086" y1="415.10715066203846" x2="515.478050161004" y2="411.64849005416033" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.6877301322855" y1="439.137612407282" x2="513.8870808308385" y2="439.71503002233806" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="501.10935367988424" y1="455.7032392540015" x2="498.68339374782516" y2="482.14990591779355" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8503)"/><line x1="455.53394585762175" y1="492.2939753410406" x2="455.1676662552916" y2="520.525745033566" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8503)"/><line x1="477.8646167179011" y1="490.93985242787744" x2="475.25014986390244" y2="519.7196934737265" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8503)"/><line x1="499.8882171003148" y1="492.8703325187787" x2="499.63316904865206" y2="520.7683106351644" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8503)"/><line x1="523.4304825229198" y1="490.8786871784366" x2="523.2081526544504" y2="521.152832681965" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8503)"/><line x1="544.4744024768659" y1="489.90753568178036" x2="544.4295061796159" y2="521.322667170316" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8503)"/><polygon points="432.8,502.2 566.7,505.2 553.6,557.0 446.9,558.4" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x8503)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>