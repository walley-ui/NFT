lowr1x1841)"/><polygon points="557.7,303.9 604.3,305.0 580.7,210.0" fill="url(#bevelr1x1841)" fill-opacity=".95" stroke="#ff44aa" stroke-width="1.6" filter="url(#skr1x1841) url(#glowr1x1841)"/><polygon points="637.2,305.3 683.5,306.4 660.9,195.2" fill="url(#bevelr1x1841)" fill-opacity=".95" stroke="#ff44aa" stroke-width="1.6" filter="url(#skr1x1841) url(#glowr1x1841)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".48">SAKURA RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff44aa" fill-opacity=".32">MECH RANGERS</text></svg>