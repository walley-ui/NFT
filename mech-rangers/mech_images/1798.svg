th="2.6" filter="url(#wmr1x1798)"/><polygon points="827.6,292.7 969.6,293.5 966.9,590.7 899.6,726.0 826.8,591.5" fill="url(#carbonr1x1798)"/><polygon points="861.5,362.2 936.6,361.4 935.6,541.0 897.9,630.4 861.4,540.1" fill="#ff2040" fill-opacity=".28" stroke="#ff2040" stroke-width="1.5"/><line x1="845.9651264000312" y1="430.5297083716839" x2="951.075157132335" y2="432.80096431737763" stroke="#ff2040" stroke-opacity=".65" stroke-width="1.3"/><line x1="897.6575863025711" y1="332.9961305540986" x2="897.7688511578925" y2="590.1248030006885" stroke="#ff2040" stroke-opacity=".4" stroke-width="1"/><line x1="829.0181929608435" y1="297.47793050576" x2="964.9014359942265" y2="296.19596859645094" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.1968253102713" cy="429.9520214980468" r="18.0" fill="url(#bevelr1x1798)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x1798)"/></g><rect x="449.53905964745206" y="558.6421028780751" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x1798)"/><rect x="425.02224971493706" y="573.5902930825949" width="152.0" height="26.0" fill="url(#bevelr1x1798)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x1798)"/><polygon points="309.4,381.1 351.5,294.8 501.4,276.7 651.2,293.5 691.7,379.0 668.1,504.3 498.7,566.2 330.2,505.4" fill="url(#suitr1x1798)" stroke="#ff2040" stroke-width="2.8" filter="url(#skr1x1798) url(#metalr1x1798)"/><polygon points="306.5,380.1 349.9,295.8 501.8,277.6 651.0,293.3 693.5,379.9 670.1,502.4 498.5,565.0 330.0,503.2" fill="url(#carbonr1x1798)"/><polygon points="382.2,301.3 499.7,286.5 619.7,301.0 607.1,381.3 392.1,380.5" fill="url(#suitHir1x1798)"/><polygon points="380.1,380.5 367.3,425.5 434.3,504.4 499.9,526.4 568.2,502.3 634.0,425.0 620.0,379.3" fill="#050508" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x1798)"/><polygon points="381.0,412.5 475.3,409.7 485.7,441.8 390.2,441.2" fill="#ff2040" filter="url(#glowr1x1798)"/><polygon points="523.5,410.7 620.1,411.7 609.8,438.8 516.3,440.6" fill="#ff2040" filter="url(#glowr1x1798)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.29281594535337" y1="412.3570096353069" x2="516.5300873644092" y2="411.67768098916855" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="486.43546314990147" y1="436.2834200548008" x2="513.9680269551836" y2="437.49598945006727" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="501.1781322848983" y1="455.1520708888769" x2="499.4737911957316" y2="482.112655823119" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1798)"/><line x1="455.55364573232833" y1="491.09533711811525" x2="455.7103656284325" y2="519.83983750958" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1798)"/><line x1="476.0499263395928" y1="491.98461644854393" x2="476.8922724378668" y2="520.9791757138446" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1798)"/><line x1="499.05700005469845" y1="490.6608865819871" x2="500.0592975317501" y2="518.3064733345061" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1798)"/><line x1="523.4087668642029" y1="490.2281564675271" x2="521.2779468822852" y2="518.9936369269155" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1798)"/><line x1="544.7583064933494" y1="490.35232830625023" x2="546.2643829032035" y2="521.4368036019616" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1798)"/><polygon points="432.8,501.9 568.5,503.2 552.8,556.6 446.7,556.9" fill="#cc0020" fill-opacity=".72" stroke="#ff2040" stroke-width="1.3" filter="url(#skr1x1798)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="97