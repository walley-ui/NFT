l(#wmr1x7000)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="912.6,692.8 944.8,691.0 984.6,270.2" fill="url(#blader1x7000)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x7000)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="864.2738633745909" y="683.0543202589266" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x7000)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x7000)"/></g><rect x="451.1593641274609" y="558.6864193974062" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x7000)"/><rect x="422.4469839936122" y="577.014048738312" width="152.0" height="26.0" fill="url(#bevelr1x7000)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x7000)"/><polygon points="309.0,380.0 350.0,294.9 499.4,278.9 650.6,296.3 691.7,379.3 668.7,504.3 499.3,565.0 329.6,503.4" fill="url(#suitr1x7000)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x7000) url(#metalr1x7000)"/><polygon points="309.7,380.4 348.9,294.5 499.9,279.1 650.6,295.5 693.0,380.3 669.6,503.6 500.8,566.6 329.5,503.9" fill="url(#carbonr1x7000)"/><polygon points="380.8,302.0 498.3,286.8 617.4,302.8 606.6,381.2 391.4,381.8" fill="url(#suitHir1x7000)"/><polygon points="380.0,381.6 366.0,425.6 432.8,504.2 499.6,529.3 567.3,502.7 635.9,426.4 618.1,379.6" fill="#0d1520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x7000)"/><polygon points="380.9,409.7 477.5,410.8 482.9,441.6 388.3,440.7" fill="#ccccff" filter="url(#glowr1x7000)"/><polygon points="521.5,410.7 617.4,410.9 611.9,439.0 516.0,439.4" fill="#ccccff" filter="url(#glowr1x7000)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.6516220151074" y1="413.0863754798658" x2="515.4255180312693" y2=