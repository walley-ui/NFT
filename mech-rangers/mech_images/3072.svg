1x3072)"/><polygon points="381.0,302.0 498.4,286.1 619.8,303.2 608.1,380.6 391.0,379.5" fill="url(#suitHir1x3072)"/><polygon points="381.3,379.9 366.9,424.1 433.6,504.2 499.4,526.9 566.6,505.4 635.0,425.4 619.1,379.9" fill="#1e0600" fill-opacity=".88" stroke="#ff44aa" stroke-width="1.8" filter="url(#skr1x3072)"/><polygon points="382.1,411.4 476.0,410.9 486.1,438.6 388.8,439.8" fill="#ff44aa" filter="url(#glowr1x3072)"/><polygon points="521.8,410.3 617.4,411.5 613.0,438.9 514.9,438.8" fill="#ff44aa" filter="url(#glowr1x3072)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.31025711275635" y1="411.6685779003426" x2="514.0917784305663" y2="413.01808323981237" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="485.4410016232729" y1="436.98094038292766" x2="515.4131418587082" y2="438.81917974501846" stroke="#ff44aa" stroke-opacity=".52" stroke-width="2"/><line x1="499.0697538462467" y1="453.0565102996304" x2="501.55965798739345" y2="484.6956090060994" stroke="#ff44aa" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3072)"/><line x1="454.05657164154576" y1="491.9490305564366" x2="453.8503372290917" y2="518.8729732549749" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3072)"/><line x1="478.27249583140014" y1="492.5431615766137" x2="476.81834194887426" y2="520.5759894846008" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3072)"/><line x1="499.13250610344113" y1="492.96190700279544" x2="500.65940611036496" y2="520.187625714019" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3072)"/><line x1="523.6106946682185" y1="491.86589298769826" x2="521.337299385909" y2="520.2601908940821" stroke="#ff44aa" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3072)"/><line x1="545.4532107247227" y1="489.7687547021545" x2="547.8620748541505" y2="520.