.7,294.8 170.6,292.1 171.1,591.1 103.7,727.7 33.5,591.4" fill="url(#titaniumr1x3259)" stroke="#ffcc00" stroke-width="2.6" filter="url(#wmr1x3259)"/><polygon points="30.4,293.0 171.0,291.9 173.6,591.6 102.3,728.0 31.9,593.1" fill="url(#carbonr1x3259)"/><polygon points="63.0,359.6 139.2,363.2 138.9,541.6 101.9,630.8 64.4,542.0" fill="#ffcc00" fill-opacity=".28" stroke="#ffcc00" stroke-width="1.5"/><line x1="51.30652410037813" y1="430.6914508877322" x2="153.50197744093833" y2="431.7368564701639" stroke="#ffcc00" stroke-opacity=".65" stroke-width="1.3"/><line x1="103.11434562740844" y1="330.51417474541813" x2="100.53271503750231" y2="590.4037734247744" stroke="#ffcc00" stroke-opacity=".4" stroke-width="1"/><line x1="35.58697124984112" y1="296.58661618921906" x2="170.10062165832144" y2="297.5500007235445" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.01377179747445" cy="429.6841261320747" r="18.0" fill="url(#bevelr1x3259)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x3259)"/></g><rect x="448.9497492349707" y="557.2007773240097" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x3259)"/><rect x="424.8124378131703" y="576.5403971189634" width="152.0" height="26.0" fill="url(#bevelr1x3259)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x3259)"/><polygon points="308.0,382.1 348.6,293.1 499.8,279.5 648.8,296.0 690.3,382.1 668.6,503.3 498.6,565.1 332.2,503.5" fill="url(#suitr1x3259)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x3259) url(#metalr1x3259)"/><polygon points="308.4,381.9 349.3,294.6 499.6,277.5 649.1,295.6 692.9,379.6 668.2,502.1 498.6,563.8 331.3,505.1" fill="url(#carbonr1x3259)"/><polygon points="379.8,301.7 498.3,286.6 619.9,301.3 607.0,382.0 390.9,380.6" fill="url(#suitHir1x3259)"/><polygon points="381.6,380.1 365.8,426.4 432.4,501.8 501.7,528.9 568.2,504.2 634.0,424.1 618.6,381.8" fill="#1e0600" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" fil