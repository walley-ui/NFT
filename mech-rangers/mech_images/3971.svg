.2,380.9" fill="url(#suitHir1x3971)"/><polygon points="379.6,379.0 365.2,424.0 434.2,505.2 499.3,527.1 568.3,502.5 635.7,425.6 620.1,380.5" fill="#0d1520" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x3971)"/><polygon points="382.1,411.3 476.8,412.8 483.3,440.0 388.5,440.4" fill="#4444ff" filter="url(#glowr1x3971)"/><polygon points="522.1,412.2 618.6,411.1 610.5,439.9 515.6,440.7" fill="#4444ff" filter="url(#glowr1x3971)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.69060498025266" y1="411.6092753067612" x2="515.0040522533842" y2="411.94892224827777" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="483.78079357441516" y1="438.7111167691648" x2="514.4364842060395" y2="436.77570134578275" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.86307578459383" y1="455.05150744905694" x2="500.86267105424776" y2="484.25350515367467" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3971)"/><line x1="455.28734801493584" y1="491.32504817768927" x2="454.66886789210145" y2="521.5631837435998" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3971)"/><line x1="477.0685757547058" y1="490.8446146255359" x2="478.0243609111197" y2="521.2928708925843" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3971)"/><line x1="500.5299975996837" y1="490.02198267383494" x2="501.18727183165026" y2="520.2981994009576" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3971)"/><line x1="523.3443545040302" y1="492.5552324232645" x2="523.330603805799" y2="519.4168560145423" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3971)"/><line x1="545.2038851869479" y1="490.9888681824319" x2="545.2924079943635" y2="519.0815454003401" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filt