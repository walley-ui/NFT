ight="42.0" fill="url(#bevelr1x3027)" stroke="#ffd700" stroke-width="1.4" filter="url(#glowr1x3027)"/><rect x="486.1" y="639.8" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.8,467.0 236.6,467.4 256.3,735.8 129.1,736.4" fill="url(#suitr1x3027)" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x3027) url(#metalr1x3027)"/><polygon points="175.1,432.1 254.3,431.8 244.8,510.4 158.4,510.9" fill="url(#bevelr1x3027)" fill-opacity=".72" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x3027)"/><polygon points="161.3,622.6 243.5,620.8 240.1,660.3 167.0,661.9" fill="#ffd700" fill-opacity=".42" stroke="#ffd700" stroke-width="1" filter="url(#skr1x3027)"/><polygon points="764.0,467.1 848.4,467.4 871.8,734.1 743.2,735.0" fill="url(#suitr1x3027)" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x3027) url(#metalr1x3027)"/><polygon points="748.2,433.3 828.3,432.1 842.0,512.0 757.7,510.0" fill="url(#bevelr1x3027)" fill-opacity=".72" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x3027)"/><polygon points="758.1,620.9 839.9,622.4 833.4,660.7 760.7,659.5" fill="#ffd700" fill-opacity=".42" stroke="#ffd700" stroke-width="1" filter="url(#skr1x3027)"/><rect x="118.4"  y="698.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x3027)" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x3027)"/><rect x="750.1"   y="701.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x3027)" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x3027)"/><line x1="149.5" y1="702.5" x2="150.0" y2="784.1" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="777.3" y1="703.3" x2="778.3" y2="782.6" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="181.5" y1="700.8" x2="181.9" y2="785.2" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="810.2" y1="700.1" x2="810.4" y2="785.0" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="215.7" y1="700.6" x2="214.3" y2="784.4" stroke="#ffd700" stroke