url(#wmr1x1888)"/><polygon points="829.2,293.9 966.5,292.4 968.1,591.3 898.5,725.3 826.6,590.3" fill="url(#carbonr1x1888)"/><polygon points="859.6,361.9 936.1,363.1 934.8,539.9 896.9,632.2 859.2,539.9" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="844.4712533438206" y1="431.25505097145214" x2="950.8636851871014" y2="432.6570647642948" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="899.0923134891875" y1="332.78787561263886" x2="897.8434962963313" y2="592.8169020284898" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="831.3242253406532" y1="295.6508748186752" x2="964.2844554517046" y2="297.459388879314" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="897.0973489068076" cy="432.96641122307625" r="18.0" fill="url(#bevelr1x1888)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x1888)"/></g><rect x="451.38019708776847" y="558.5176246137358" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x1888)"/><rect x="424.8050048830919" y="576.7151850296185" width="152.0" height="26.0" fill="url(#bevelr1x1888)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x1888)"/><polygon points="309.6,382.2 351.7,293.9 498.5,277.5 650.1,293.2 690.9,380.0 670.2,503.7 499.9,566.7 331.9,502.7" fill="url(#suitr1x1888)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x1888) url(#metalr1x1888)"/><polygon points="307.6,381.5 350.6,295.1 498.5,277.4 649.7,294.5 690.6,382.0 668.4,503.4 501.1,564.3 331.3,501.9" fill="url(#carbonr1x1888)"/><polygon points="382.5,303.0 498.3,287.0 617.9,303.5 608.4,379.1 392.2,378.9" fill="url(#suitHir1x1888)"/><polygon points="379.4,381.6 366.6,424.6 434.3,503.1 501.1,529.8 565.9,504.6 634.2,426.1 619.3,380.1" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x1888)"/><polygon points="380.8,409.6 478.0,409.9 483.5,439.5 390.3,439.8" fill="#2060ff" filter="url(#glowr1x1888)"/><polygon points="523.3,412.8 620.5,413.1 612.7,438.6 517.0,440.3" fill="#2060ff" filter="url(#glowr1x1888)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.15695212470365" y1="413.901809084136" x2="516.005181479212" y2="413.77688364442434" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.7758362921513" y1="439.5020727259107" x2="514.0804009936192" y2="438.9998834914528" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="498.72311265747993" y1="453.4283453335054" x2="501.1251906899735" y2="482.61866225423296" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1888)"/><line x1="453.40059360301126" y1="492.37145181260996" x2="455.0809350704588" y2="521.5853700495325" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1888)"/><line x1="476.51546101694925" y1="491.8901364590972" x2="475.50494000859555" y2="518.7295128457248" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1888)"/><line x1="500.1720831543207" y1="490.0710997823625" x2="500.40989989228547" y2="519.9116007686592" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1888)"/><line x1="522.7899025912023" y1="490.35806317506353" x2="522.3575741383805" y2="521.7095248864032" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1888)"/><line x1="544.6213560434245" y1="489.9368479649536" x2="546.5746184212343" y2="519.2838963689283" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1888)"/><polygon points="432.6,503.0 567.2,504.2 554.7,557.7 444.9,555.7" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x1888)"/><polygon points="315.9,306.1 362.6,303.8 337.8,196.8" fill="url(#bevelr1x1888)" fill-opacity=".95" stroke="#2060ff" stroke-width="1.6" filter="url(#skr1x1888) url(