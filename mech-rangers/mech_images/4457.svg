 d="M611.7815392838232 327.57257867977023 Q667.7411301963405 218.34174386439844 617.3108513800986 141.20946641080081" stroke="#2060ff" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#skr1x4457)"/><path d="M611.0929205796123 326.1334766509943 Q668.3238219169341 217.28985306518152 620.1294410548732 142.0190546920523" stroke="rgba(255,255,255,.25)" stroke-width="1.5" fill="none" stroke-linecap="round"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>