ke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="485.7145259418152" y1="439.6124647719786" x2="517.1438481228798" y2="438.90073112659155" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="499.40209923814984" y1="455.2226353321224" x2="499.9477291534655" y2="482.137325482443" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8911)"/><line x1="452.201600073725" y1="493.05399318188427" x2="454.9065477284417" y2="520.9840238577686" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8911)"/><line x1="475.71588624505324" y1="490.4412772001698" x2="476.1229366112873" y2="518.5802539012395" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8911)"/><line x1="498.39387318147345" y1="492.95564312105995" x2="500.00707021160054" y2="519.3310870671645" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8911)"/><line x1="523.8750251235999" y1="490.8307877148501" x2="523.9953320055827" y2="519.7806054379791" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8911)"/><line x1="546.3219267203659" y1="491.8030884844251" x2="547.3782794480398" y2="521.0622837900185" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8911)"/><polygon points="434.0,504.3 566.6,503.0 555.1,557.4 447.4,556.0" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x8911)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".48">CHROME RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".32">MECH RANGERS</text></svg>