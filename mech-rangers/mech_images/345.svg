rl(#blader1x345)" filter="url(#wmr1x345)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x345)" opacity=".9"/><line x1="113.02104709109288" y1="672.800860971026" x2="104.01152236349878" y2="-128.9899646696635" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="93.95889210393649" y1="671.2099746049381" x2="100.86863481074568" y2="-128.3988462421112" stroke="#ffcc00" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="45.85990835674104" y="670.7229122848249" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x345)" stroke="#ffcc00" stroke-width="1.6" filter="url(#wmr1x345)"/><rect x="71.1785641669668" y="673.8115842415951" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="88.45492019526657" y="678.5103390061296" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="91.40181487467137" y="684.3189070214518" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="90.37715069804338" y="692.22293831883" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="91.42551115531471" y="702.9486577528529" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="91.79500796928998" y="708.784981566295" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><rect x="88.70492469653485" y="716.6573926704004" width="24.0" height="6.0" rx="1" fill="#ffcc00" fill-opacity=".35"/><ellipse cx="103.83301953975108" cy="727.1572866488248" rx="22.0" ry="16.0" fill="url(#bevelr1x345)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x345)"/></g><rect x="451.34667124534025" y="558.0383729962632" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x345)"/><rect x="423.69704220937564" y="577.034959