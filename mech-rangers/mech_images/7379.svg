" fill="url(#blader1x7379)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x7379)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="910.9,692.6 944.9,691.4 985.5,270.2" fill="url(#blader1x7379)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x7379)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="863.8539755595476" y="683.1049298038706" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x7379)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x7379)"/></g><rect x="449.1571954417974" y="555.8964763586409" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x7379)"/><rect x="425.3871685781516" y="575.9542247527279" width="152.0" height="26.0" fill="url(#bevelr1x7379)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x7379)"/><polygon points="307.3,380.9 351.0,293.0 499.2,278.8 650.7,292.9 692.8,382.2 668.8,502.6 499.7,566.1 332.4,502.6" fill="url(#suitr1x7379)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x7379) url(#metalr1x7379)"/><polygon points="307.9,381.3 349.3,294.1 500.1,277.7 651.3,296.0 692.8,379.7 669.2,503.4 498.5,566.8 331.7,503.2" fill="url(#carbonr1x7379)"/><polygon points="379.8,302.4 501.5,287.7 619.1,303.6 608.2,381.5 392.3,380.7" fill="url(#suitHir1x7379)"/><polygon points="381.0,381.9 366.7,425.6 431.9,503.1 501.6,529.4 566.5,505.3 633.0,425.4 617.9,380.7" fill="#0a0520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x7379)"/><polygon points="381.5,412.9 476.3,409.9 484.2,440.0 388.4,441.8" fill="#ccccff" filter="url(#glowr1x7379)"/><polygon points="524.5,411.7 620.4,410.9 612.5,441.8 514.2,440.0" fill="#ccccff" filter="url(#glowr1x7379)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><li