onr1x8185)"/><polygon points="381.7,301.0 500.5,284.7 620.1,302.0 606.7,381.0 391.7,379.1" fill="url(#suitHir1x8185)"/><polygon points="381.1,379.5 367.0,425.6 434.4,504.9 498.3,526.7 566.8,503.9 634.5,424.3 618.6,379.2" fill="#1e0600" fill-opacity=".88" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x8185)"/><polygon points="381.2,411.4 478.6,411.4 484.9,440.3 388.7,439.2" fill="#ff2040" filter="url(#glowr1x8185)"/><polygon points="523.3,412.8 618.1,412.3 611.5,441.0 515.1,441.7" fill="#ff2040" filter="url(#glowr1x8185)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.2916527628526" y1="414.99907167926426" x2="516.6128052621522" y2="412.8229917981662" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="486.4377411944419" y1="437.52178773097694" x2="515.503043231871" y2="437.43799120383335" stroke="#ff2040" stroke-opacity=".52" stroke-width="2"/><line x1="500.0493949937634" y1="453.5019428170286" x2="499.4262837227434" y2="483.2432957828045" stroke="#ff2040" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8185)"/><line x1="454.4401521474868" y1="492.3560830273665" x2="452.4893738087081" y2="518.8723151607439" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8185)"/><line x1="476.2164482914284" y1="489.8525231968611" x2="478.3122060012445" y2="519.1405599431134" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8185)"/><line x1="498.7824973769486" y1="491.9693446880206" x2="499.2747583082877" y2="521.563320322521" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8185)"/><line x1="524.4647504252009" y1="491.2843346521258" x2="523.7183397005871" y2="518.631297330372" stroke="#ff2040" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8185)"/><line x1="546.6391189347208" y1="492.61563999727366" x2="545.5276922894828" y2="519.338304