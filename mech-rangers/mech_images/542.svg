0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.8,467.5 233.5,465.4 256.6,736.6 129.7,735.1" fill="url(#suitr1x542)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x542) url(#metalr1x542)"/><polygon points="174.0,433.6 252.2,431.8 241.8,511.7 160.2,510.8" fill="url(#bevelr1x542)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x542)"/><polygon points="161.4,622.3 243.9,620.3 238.0,662.7 163.8,661.7" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x542)"/><polygon points="766.3,465.1 846.4,466.8 869.9,734.8 742.0,733.3" fill="url(#suitr1x542)" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x542) url(#metalr1x542)"/><polygon points="747.5,431.6 825.9,432.1 840.1,511.8 755.3,509.0" fill="url(#bevelr1x542)" fill-opacity=".72" stroke="#ff00ff" stroke-width="2.2" filter="url(#skr1x542)"/><polygon points="755.9,621.3 839.4,621.4 835.1,662.0 762.2,660.0" fill="#ff00ff" fill-opacity=".42" stroke="#ff00ff" stroke-width="1" filter="url(#skr1x542)"/><rect x="120.7"  y="700.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x542)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x542)"/><rect x="747.9"   y="701.5" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x542)" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x542)"/><line x1="151.3" y1="700.3" x2="150.9" y2="782.8" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="777.0" y1="703.5" x2="777.8" y2="784.8" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="181.4" y1="702.5" x2="182.1" y2="783.2" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="810.7" y1="700.6" x2="811.4" y2="782.4" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="214.5" y1="702.7" x2="215.2" y2="782.6" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><line x1="845.2" y1="701.4" x2="845.2" y2="783.4" stroke="#ff00ff" stroke-opacity=".38" stroke-width="1"/><polygon points