ter="url(#wmr1x7976)"/><rect x="35.622678156513686" y="421.2698904663324" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x7976)"/><rect x="43.880933739561556" y="402.28826864408325" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x7976)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x7976)"/><circle cx="81.0103736466169" cy="415.6985708558" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x7976)"/><circle cx="82.69019552072507" cy="415.38910940485073" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="54.031365808695526" y="456.3048095276579" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x7976)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x7976)"/><circle cx="-21.590915269088033" cy="472.75797592820595" r="18.0" fill="#ff2040" filter="url(#glowr1x7976)" opacity=".88"/><circle cx="-21.204924826007367" cy="473.14749818006527" r="7.0" fill="#ffffff"/><rect x="76.76220533451063" y="499.6129969522357" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x7976)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x7976)"/><rect x="38.60839271130037" y="422.97671545725314" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.227875208426234" y1="488.13148201098664" x2="60.89834226122123" y2="517.7587399012409" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="77.44279577894133" y1="487.9330268462188" x2="78.75152069855478" y2="520.6495940653607" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="95.7302381988987" y1="486.19016890116035" x2="93.36934172319245" y2="519.0950057539158" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="448.8105761423707" y="558.421147911623" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x7976)"/><rect x="424.02700006812813" y="576.6150635750964" width="152.0" height="26.0" fill="url(#bevelr1x7976)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x7976)"/><poly