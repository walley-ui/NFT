l(#skr1x48) url(#metalr1x48)"/><polygon points="309.5,380.0 351.2,292.9 499.1,277.7 648.1,295.8 693.0,380.9 667.2,503.2 499.4,565.2 331.0,504.9" fill="url(#carbonr1x48)"/><polygon points="380.9,302.1 500.9,285.1 620.4,302.1 608.9,380.9 392.6,380.6" fill="url(#suitHir1x48)"/><polygon points="379.4,379.1 364.8,427.2 432.6,502.4 500.7,529.3 568.8,504.4 635.3,427.3 617.3,380.0" fill="#050508" fill-opacity=".88" stroke="#ff00ff" stroke-width="1.8" filter="url(#skr1x48)"/><polygon points="379.5,412.1 478.4,412.4 484.6,439.4 387.5,439.9" fill="#ff00ff" filter="url(#glowr1x48)"/><polygon points="522.1,411.2 618.6,411.5 610.1,438.8 514.3,439.1" fill="#ff00ff" filter="url(#glowr1x48)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.48595481781285" y1="413.06232489868995" x2="514.4385869271495" y2="411.7638853789307" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.04299538681283" y1="439.51949542695655" x2="515.7010301961005" y2="438.3315650677308" stroke="#ff00ff" stroke-opacity=".52" stroke-width="2"/><line x1="501.1190099131316" y1="455.1312037109397" x2="500.11313272975383" y2="484.6062750877813" stroke="#ff00ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x48)"/><line x1="454.12529149612413" y1="491.82824743986123" x2="455.1563688454032" y2="521.4385543661192" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x48)"/><line x1="478.65324061125517" y1="492.6728429718874" x2="476.8373073165677" y2="520.3834528772161" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x48)"/><line x1="499.2837224544957" y1="492.19786304468283" x2="498.25065274946394" y2="519.4401872373186" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x48)"/><line x1="524.600501883272" y1="491.1349424119107" x2="522.2149562051147" y2="519.4665321541019" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x48)"/><line x1="544.3769450040721" y1="489.741407825239" x2="546.6733113588951" y2="519.7415113279596" stroke="#ff00ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x48)"/><polygon points="432.7,504.4 567.7,504.3 555.5,557.3 447.9,558.5" fill="#050508" fill-opacity=".72" stroke="#ff00ff" stroke-width="1.3" filter="url(#skr1x48)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff00ff" fill-opacity=".48">VOID RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ff00ff" fill-opacity=".32">MECH RANGERS</text></svg>