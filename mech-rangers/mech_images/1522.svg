" fill="url(#blader1x1522)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#wmr1x1522)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="912.1,691.3 945.5,691.5 986.2,271.0" fill="url(#blader1x1522)" stroke="#c0c0d0" stroke-width="1.8" filter="url(#wmr1x1522)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.9439784720167" y="682.9887306990101" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x1522)" stroke="#c0c0d0" stroke-width="1.4" filter="url(#wmr1x1522)"/></g><rect x="448.30865482958035" y="557.5774716111831" width="100.0"  height="56.0" fill="#2c2c3c" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x1522)"/><rect x="425.1292108175345" y="576.5094190297649" width="152.0" height="26.0" fill="url(#bevelr1x1522)" fill-opacity=".65" stroke="#c0c0d0" stroke-width="1.2" filter="url(#skr1x1522)"/><polygon points="308.4,382.0 352.0,292.7 500.7,279.8 649.5,294.9 690.4,382.1 670.2,505.3 500.4,565.0 332.1,502.5" fill="url(#suitr1x1522)" stroke="#c0c0d0" stroke-width="2.8" filter="url(#skr1x1522) url(#metalr1x1522)"/><polygon points="306.6,379.3 349.9,295.7 498.9,278.6 651.3,295.1 691.3,381.7 667.2,503.6 500.6,565.8 332.0,505.0" fill="url(#carbonr1x1522)"/><polygon points="379.4,301.1 500.2,286.9 618.7,303.7 607.5,382.3 391.1,380.5" fill="url(#suitHir1x1522)"/><polygon points="381.5,379.3 365.7,425.7 432.5,504.6 501.8,529.8 566.4,502.6 633.1,426.0 619.0,382.0" fill="#0d1520" fill-opacity=".88" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x1522)"/><polygon points="382.0,412.4 478.2,412.8 484.2,439.7 388.2,441.1" fill="#c0c0d0" filter="url(#glowr1x1522)"/><polygon points="524.1,410.2 617.8,411.3 610.4,439.3 516.5,438.5" fill="#c0c0d0" filter="url(#glowr1x1522)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.27847043383866" y1="412.0751765674911" x2="514.007546393983" y2="414.67163049448277" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="484.46050366085024" y1="439.44503878410904" x2="517.0721658036485" y2="439.72731960983947" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="2"/><line x1="500.6679982962087" y1="454.0684214130975" x2="498.92150204777715" y2="483.6478985260241" stroke="#c0c0d0" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x1522)"/><line x1="453.90574034003544" y1="491.4261728613637" x2="452.7174146307446" y2="519.8008312243037" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1522)"/><line x1="476.7946633414738" y1="492.12754266569385" x2="475.809335001409" y2="519.3741877981462" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1522)"/><line x1="499.7527253823355" y1="492.87725919364016" x2="499.3733935466036" y2="521.0579608896747" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1522)"/><line x1="523.0790266155824" y1="492.2063145151361" x2="522.5800240357033" y2="519.6642382424325" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1522)"/><line x1="544.4525255704485" y1="493.0721105205826" x2="546.3307805347443" y2="519.229897567071" stroke="#c0c0d0" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x1522)"/><polygon points="431.5,503.9 567.9,502.4 555.2,558.3 446.1,555.5" fill="#2c2c3c" fill-opacity=".72" stroke="#c0c0d0" stroke-width="1.3" filter="url(#skr1x1522)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".48">CHROME RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#c0c0d0" fill-opacity=".32">MECH RANGERS</text></svg>