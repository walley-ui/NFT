" fill="url(#gunmetalr1x8173)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x8173)"/><rect x="829.5697606465407" y="420.4823610726744" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x8173)"/><rect x="838.3941030907073" y="402.07380631742996" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x8173)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x8173)"/><circle cx="878.7170903307945" cy="414.1671104498207" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x8173)"/><circle cx="876.2278335282207" cy="413.78167478647083" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="946.9242360011302" y="457.04398307316" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x8173)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x8173)"/><circle cx="1020.2919264639355" cy="471.42251126309856" r="18.0" fill="#ff2040" filter="url(#glowr1x8173)" opacity=".88"/><circle cx="1020.5604124758021" cy="470.82579648941754" r="7.0" fill="#ffffff"/><rect x="872.6377839214728" y="501.33550694137807" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x8173)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x8173)"/><rect x="834.3307124509104" y="424.3978137967176" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="856.4001119289175" y1="487.5587514732033" x2="859.2754029859417" y2="519.9847392460331" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="873.5284488249198" y1="487.6332704262808" x2="872.979110033121" y2="517.6403280678205" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="888.102843756564" y1="487.0585878949612" x2="888.8698741867767" y2="520.0707258521579" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.2907622454688" y="558.2677251989022" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x8173)"/><rect x="422.77781664477664" y="575.4018080179579" width="152.0" height="26.0" fill="url(#bevelr1x8173)" fill-opacity=".65" strok