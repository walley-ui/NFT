.8,291.7 171.4,292.4 173.5,592.0 101.0,726.8 30.9,590.8" fill="url(#titaniumr1x3323)" stroke="#4444ff" stroke-width="2.6" filter="url(#wmr1x3323)"/><polygon points="31.6,294.0 173.1,294.6 171.2,591.3 103.9,727.2 31.7,589.6" fill="url(#carbonr1x3323)"/><polygon points="65.5,361.0 141.8,359.7 139.8,542.3 100.9,630.0 64.7,540.6" fill="#4444ff" fill-opacity=".28" stroke="#4444ff" stroke-width="1.5"/><line x1="48.93101655341682" y1="431.21270795026794" x2="152.8975185238197" y2="430.0734191983938" stroke="#4444ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="100.52581040872258" y1="332.51258103530853" x2="101.21003121551124" y2="591.7861024638638" stroke="#4444ff" stroke-opacity=".4" stroke-width="1"/><line x1="33.97063741315153" y1="295.307648062706" x2="169.92088266978038" y2="295.7383499183692" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.07635546032336" cy="430.0225531060248" r="18.0" fill="url(#bevelr1x3323)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x3323)"/></g><rect x="448.936043765489" y="556.0621732990257" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x3323)"/><rect x="425.3753144866787" y="573.9250995622017" width="152.0" height="26.0" fill="url(#bevelr1x3323)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x3323)"/><polygon points="306.8,380.7 349.2,295.0 498.2,277.5 649.7,294.0 691.1,379.8 668.3,502.8 499.5,563.6 331.2,502.2" fill="url(#suitr1x3323)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x3323) url(#metalr1x3323)"/><polygon points="307.7,381.8 350.0,292.7 500.9,277.2 650.3,293.9 690.5,382.2 668.2,504.7 499.6,564.5 331.5,501.9" fill="url(#carbonr1x3323)"/><polygon points="381.6,304.1 499.2,285.2 618.2,301.3 607.6,379.2 394.1,382.0" fill="url(#suitHir1x3323)"/><polygon points="381.8,380.4 366.3,426.0 431.3,502.1 498.6,526.7 567.9,502.8 635.3,426.6 618.5,379.0" fill="#1e0600" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter