.1,292.5 173.3,589.9 100.6,728.1 32.2,590.0" fill="url(#carbonr1x8800)"/><polygon points="63.7,361.9 138.5,360.5 141.1,540.9 103.0,630.6 62.9,541.2" fill="#00ff60" fill-opacity=".28" stroke="#00ff60" stroke-width="1.5"/><line x1="48.727833283636684" y1="431.6830461077392" x2="155.2796224248968" y2="431.7052219832316" stroke="#00ff60" stroke-opacity=".65" stroke-width="1.3"/><line x1="101.17035328581926" y1="330.22598023638125" x2="102.87008359901604" y2="591.8175247025675" stroke="#00ff60" stroke-opacity=".4" stroke-width="1"/><line x1="32.51458793556314" y1="295.26418696856126" x2="169.07480765221638" y2="295.634241476655" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="100.96674983626228" cy="432.5572671747766" r="18.0" fill="url(#bevelr1x8800)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x8800)"/></g><rect x="449.6679000813514" y="555.398773654364" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x8800)"/><rect x="423.46579923210663" y="576.488560582418" width="152.0" height="26.0" fill="url(#bevelr1x8800)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x8800)"/><polygon points="307.6,379.8 349.7,295.6 501.1,279.5 651.0,293.2 692.6,380.5 670.7,502.8 499.2,564.5 331.6,502.0" fill="url(#suitr1x8800)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x8800) url(#metalr1x8800)"/><polygon points="308.2,381.2 349.3,295.5 501.6,278.2 650.9,293.0 691.8,379.2 667.9,504.5 499.9,564.6 330.5,504.7" fill="url(#carbonr1x8800)"/><polygon points="382.2,302.7 500.4,284.6 617.5,303.7 608.4,379.6 393.9,381.8" fill="url(#suitHir1x8800)"/><polygon points="381.3,381.0 365.0,424.3 432.9,503.8 498.8,529.8 566.2,504.6 634.4,426.5 618.1,381.3" fill="#050508" fill-opacity=".88" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x8800)"/><polygon points="382.0,412.0 477.1,411.4 484.7,440.5 389.0,441.6" fill="#00ff60" filter="url(#glowr1x8800)"/><polygon points="523.4,411.5 618.8,411.4 610.4,43