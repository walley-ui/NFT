l="#0a0520" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#0a0520" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#c0c0d0"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#c0c0d0"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#c0c0d0" stroke="#0a0520" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#c0c0d0" stroke="#0a0520" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><rect x="451.2030635911971" y="557.5424587906338" width="100.0"  height="56.0" fill="#2c2c3c" stroke="#c0c0d0" stroke-width="2.2" filter="url(#skr1x7511)"/><rect x="424.01242262506855" y="574.6550647044554" width="152.0" height="26.0" fill="url(#bevelr1x7511)" fill-opacity=".65" stroke="#c0c0d0" stroke-width="1.2" filter="url(#skr1x7511)"/><polygon points="307.6,381.9 350.8,294.0 500.5,277.8 648.6,293.9 693.6,380.3 668.8,504.8 498.6,563.7 329.7,503.9" fill="url(#suitr1x7511)" stroke="#c0c0d0" stroke-width="2.8" filter="url(#skr1x7511) url(#metalr1x7511)"/><polygon points="306.7,381.0 350.2,295.5 500.2,279.6 649.6,295.4 690.5,380.0 668.5,503.4 499.6,564.2 332.4,502.3" fill="url(#carbonr1x7511)"/><polygon points="382.3,303.5 501.4,285.7 620.3,302.5 609.1,382.1 391.5,380.7" fill="url(#suitHir1x7511)"/><polygon points="381.4,382.1 365.0,424.7 433.0,502.0 499.4,528.7 568.2,501.8 633.3,426.9 619.3,380.0" fill="#0a0520" fill-opacity=".88" stroke="#c0c0d0" stroke-width="1.8" filter="url(#skr1x7511)"/><polygon points="381.2,411.7 476.4,411.0 483.6,440.5 388.3,438.7" fill="#c0c0d0" filter="url(#glowr1x7511)"/><polygon points="524.3,411.5 618.6,411.6 612.9,440.7 513.8,440.3" fill="#c0c0d0" filter="url(#glowr1x7511)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.0233523227833" y1="414.87330083409324" x2="513.9751597033255" y2="41