485.7,490.2 " fill="url(#suitHir1x4235)" opacity=".45"/></g><g><rect x="35.37527332179245" y="423.0834690648131" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x4235)" stroke="#ffcc00" stroke-width="2" filter="url(#wmr1x4235)"/><rect x="34.76844444921237" y="422.7184964216314" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x4235)"/><rect x="43.297449556961624" y="401.88508438458666" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x4235)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x4235)"/><circle cx="80.63188863204789" cy="414.73823545668273" r="15.0" fill="#ffcc00" opacity=".8" filter="url(#glowr1x4235)"/><circle cx="82.94953593997282" cy="413.9245036411099" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="52.50010095754635" y="454.2560201911256" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x4235)" stroke="#ffcc00" stroke-width="1.2" filter="url(#wmr1x4235)"/><circle cx="-18.55124112913388" cy="471.4834114826284" r="18.0" fill="#ffcc00" filter="url(#glowr1x4235)" opacity=".88"/><circle cx="-21.187490255348415" cy="470.76176671534773" r="7.0" fill="#ffffff"/><rect x="79.71198630718511" y="502.1572455163114" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x4235)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x4235)"/><rect x="38.144856631699916" y="421.79360321126876" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="63.878592779617726" y1="486.0520660032518" x2="63.83278278283772" y2="521.1134521374479" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="76.50114769296718" y1="486.24464735826473" x2="76.45607579903674" y2="519.32887242781" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/><line x1="94.66682438332585" y1="487.19584678802636" x2="94.60113674424585" y2="518.3976893767714" stroke="#ffcc00" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.68627607030794" y="558.2158987483009" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" f