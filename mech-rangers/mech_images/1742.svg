.3" y="520.7" width="9.3" height="17.4" rx="1" fill="#ffd700" stroke="#050508" stroke-width=".6"/></g><g><rect x="41.80551401203495" y="398.10662539917973" width="175.0" height="118.0" rx="7" fill="url(#artilleryr1x1742)" stroke="#ffd700" stroke-width="2.6" filter="url(#wmr1x1742)"/><rect x="43.9150004594959" y="397.4024654202163" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x1742)"/><rect x="16.399586565177856" y="448.1515857216902" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x1742)" stroke="#ffd700" stroke-width="1.4" filter="url(#wmr1x1742)"/><circle cx="118.38556003937495" cy="469.83322054399173" r="48.0" fill="rgba(0,0,0,.55)" stroke="#ffd700" stroke-width="2" filter="url(#wmr1x1742)"/><circle cx="116.99240062082183" cy="471.87809073897074" r="34.0" fill="#ffd700" fill-opacity=".4" filter="url(#bloomr1x1742)"/><circle cx="119.7812085193954" cy="471.19213915383443" r="18.0" fill="#ffd700" filter="url(#glowr1x1742)"/><rect x="46.68915569543835" y="380.34919894877817" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x1742)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x1742)"/><rect x="43.33309511331838" y="397.16547629646954" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="51.500125002618844" y1="518.611945439037" x2="52.546978747416254" y2="549.664696576912" stroke="#ffd700" stroke-opacity=".6" stroke-width="2"/><line x1="74.38457698313516" y1="519.3911061737687" x2="74.49273801049215" y2="549.482601724565" stroke="#ffd700" stroke-opacity=".6" stroke-width="2"/><line x1="98.68433064877983" y1="521.0430028079078" x2="98.37176688112315" y2="547.7436746087857" stroke="#ffd700" stroke-opacity=".6" stroke-width="2"/><line x1="124.78698734300208" y1="518.7746523383073" x2="123.44672453034666" y2="550.7324743046426" stroke="#ffd700" stroke-opacity=".6" stroke-width="2"/></g><rect x="451.0271929683164" y="556.6741098452359" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#