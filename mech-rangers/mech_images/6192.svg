-opacity=".38" stroke-width="1"/><line x1="842.4" y1="700.6" x2="843.9" y2="782.5" stroke="#2060ff" stroke-opacity=".38" stroke-width="1"/><polygon points="233.5,416.0 765.3,418.6 723.2,663.8 278.3,663.7" fill="url(#suitr1x6192)" stroke="#2060ff" stroke-width="2.6" filter="url(#skr1x6192) url(#metalr1x6192)"/><polygon points="234.4,418.3 765.0,416.5 722.3,661.8 277.5,661.1" fill="url(#carbonr1x6192)"/><polygon points="366.1,416.8 631.8,419.3 611.9,513.8 387.9,516.3" fill="url(#suitHir1x6192)"/><line x1="362.4" y1="471.8" x2="636.9" y2="470.7" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x6192)"/><line x1="400.0" y1="550.7" x2="602.4" y2="550.4" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x6192)"/><line x1="267.8" y1="490.4" x2="318.8" y2="491.8" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.2" y1="490.6" x2="731.6" y2="491.0" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.1" y1="521.7" x2="318.1" y2="523.6" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.6" y1="523.5" x2="732.2" y2="521.4" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.1" y1="555.6" x2="318.6" y2="555.7" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.1" y1="555.1" x2="734.2" y2="554.3" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.1" y1="586.9" x2="318.4" y2="585.3" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.0" y1="587.6" x2="732.7" y2="587.7" stroke="#2060ff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x6192)"><polygon points="482.9,452.8 512.4,506.6 499.0,504.3 518.2,567.5 486.3,513.5 500.4,514.1" fill="#2060ff" stroke="#1e0600" stroke-width="1.4" filter="url(#skr1x6192)"/><polygon points="483.7,453.6 511.9,505.7 499.5,507.2 518.5,570.1 486.3,516.6 499.7,513.7" fill="url(#suitHir1x6192)" opacity=".4"/></g><g><rect x="32.850441525261814" y="421.