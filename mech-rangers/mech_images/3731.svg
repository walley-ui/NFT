.8,563.7 330.2,505.3" fill="url(#suitr1x3731)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x3731) url(#metalr1x3731)"/><polygon points="308.1,380.8 349.6,293.4 500.7,279.5 651.2,295.0 692.4,379.7 668.9,502.2 500.7,565.1 330.0,502.3" fill="url(#carbonr1x3731)"/><polygon points="380.4,301.8 501.0,286.5 618.3,302.7 606.2,382.3 392.2,379.0" fill="url(#suitHir1x3731)"/><polygon points="380.3,380.0 364.2,427.5 434.3,503.6 500.1,529.2 567.8,504.3 634.8,427.5 619.8,381.7" fill="#0d1520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x3731)"/><polygon points="382.7,410.1 477.9,411.7 483.4,441.6 387.5,438.6" fill="#ccccff" filter="url(#glowr1x3731)"/><polygon points="524.3,412.7 620.3,411.1 612.5,439.9 514.1,439.1" fill="#ccccff" filter="url(#glowr1x3731)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.8234060066379" y1="412.53053915826604" x2="516.0650516190008" y2="414.7340654321015" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="483.152427486293" y1="437.61414988003673" x2="514.6709624126926" y2="437.80145296035334" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="499.139508228004" y1="452.97768309526145" x2="499.02643412547184" y2="484.480339979101" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3731)"/><line x1="455.3723274683394" y1="491.6344876336865" x2="455.476520097889" y2="520.398677978199" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3731)"/><line x1="478.6690013711713" y1="491.44786098133767" x2="476.1416891951486" y2="519.8271861666814" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3731)"/><line x1="501.1460406984203" y1="490.35129943937056" x2="499.03999688802287" y2="520.189935713727" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3731)"/><line x1="52