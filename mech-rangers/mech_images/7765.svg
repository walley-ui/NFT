lr1x7765)"/><polygon points="309.4,382.2 348.8,292.9 500.1,279.3 651.1,293.6 691.2,379.0 669.4,504.2 500.0,565.0 329.7,502.9" fill="url(#carbonr1x7765)"/><polygon points="381.2,304.5 499.5,287.6 619.5,304.4 606.0,381.1 392.4,379.6" fill="url(#suitHir1x7765)"/><polygon points="379.6,381.1 364.5,424.1 433.7,503.3 501.8,527.1 568.5,504.0 635.4,426.4 617.7,380.8" fill="#0e001e" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x7765)"/><polygon points="382.0,411.1 476.2,413.0 484.5,438.9 388.3,440.9" fill="#ffd700" filter="url(#glowr1x7765)"/><polygon points="522.5,411.3 619.8,410.7 611.7,438.8 517.1,439.2" fill="#ffd700" filter="url(#glowr1x7765)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.4517250001989" y1="414.0217513591982" x2="515.1900590111874" y2="411.6393864381127" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="486.261134179458" y1="436.25403957981615" x2="515.5244415559247" y2="438.1604936988093" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="498.585222774744" y1="456.1782306468114" x2="500.1645941786468" y2="481.6348831337877" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x7765)"/><line x1="454.20644919814544" y1="490.67218263987445" x2="455.1829133327864" y2="520.8798287379556" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7765)"/><line x1="476.4187801383808" y1="491.6366749600507" x2="477.3351812555827" y2="520.6254201986827" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7765)"/><line x1="500.83645716337486" y1="490.4026301942765" x2="499.0932325368747" y2="519.6050463058986" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x7765)"/><line x1="521.3227804150059" y1="489.5618626363575" x2="524.8132643499039" y2="519.0888179158792" stroke="#ffd700" stroke-opacit