41" width="152.0" height="26.0" fill="url(#bevelr1x3090)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x3090)"/><polygon points="307.7,379.1 349.4,295.8 498.5,279.3 650.4,296.3 691.1,381.9 668.5,502.5 501.2,565.1 329.4,504.9" fill="url(#suitr1x3090)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x3090) url(#metalr1x3090)"/><polygon points="306.3,382.0 350.6,294.5 499.2,277.8 650.5,294.6 692.0,379.1 668.6,502.9 498.8,566.0 329.6,502.5" fill="url(#carbonr1x3090)"/><polygon points="380.6,302.0 500.3,286.7 620.1,302.9 606.8,380.5 390.9,382.0" fill="url(#suitHir1x3090)"/><polygon points="379.3,380.4 366.4,427.2 432.4,505.1 500.3,528.8 569.0,504.0 632.9,426.2 620.7,379.3" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x3090)"/><polygon points="379.7,409.8 476.3,410.2 484.2,438.3 388.5,440.5" fill="#2060ff" filter="url(#glowr1x3090)"/><polygon points="523.5,409.7 617.3,412.0 610.2,439.8 516.8,439.5" fill="#2060ff" filter="url(#glowr1x3090)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.2957650216855" y1="411.96967183062804" x2="516.378273941055" y2="413.6924162440002" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.5914797458425" y1="438.5495507097803" x2="516.293357073646" y2="438.2628996192478" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.0818825758062" y1="454.7248830748722" x2="499.96054312121123" y2="482.140693514701" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x3090)"/><line x1="452.67260541141036" y1="492.34467767952003" x2="454.3809137626365" y2="521.2782719206065" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3090)"/><line x1="477.5618967294134" y1="491.7138340776786" x2="478.66631084898484" y2="521.3237501423806" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3090)"/><line x1="501.195838173572" y1="489.51780027225607" x2="500.0779824627563" y2="520.9362862261012" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3090)"/><line x1="522.2811582977511" y1="492.77611146643756" x2="521.7945127461664" y2="519.9353633618914" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3090)"/><line x1="546.759945277609" y1="492.6697417666204" x2="546.7105320942775" y2="518.3638422087766" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x3090)"/><polygon points="431.1,505.0 566.3,502.9 553.4,556.3 446.1,557.6" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x3090)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".48">COBALT RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#2060ff" fill-opacity=".32">MECH RANGERS</text></svg>