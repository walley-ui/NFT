0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.0,465.5 234.3,467.4 258.1,734.9 128.2,733.7" fill="url(#suitr1x377)" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x377) url(#metalr1x377)"/><polygon points="173.4,432.6 251.6,432.3 243.5,511.7 157.9,511.6" fill="url(#bevelr1x377)" fill-opacity=".72" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x377)"/><polygon points="160.8,622.7 242.6,620.4 238.0,662.2 164.3,660.3" fill="#ffd700" fill-opacity=".42" stroke="#ffd700" stroke-width="1" filter="url(#skr1x377)"/><polygon points="764.8,466.8 845.9,467.7 871.1,736.6 742.6,735.0" fill="url(#suitr1x377)" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x377) url(#metalr1x377)"/><polygon points="745.9,432.7 827.1,431.2 840.4,512.2 756.4,509.3" fill="url(#bevelr1x377)" fill-opacity=".72" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x377)"/><polygon points="757.4,622.3 837.6,622.8 833.1,660.1 760.2,660.4" fill="#ffd700" fill-opacity=".42" stroke="#ffd700" stroke-width="1" filter="url(#skr1x377)"/><rect x="121.8"  y="700.0" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x377)" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x377)"/><rect x="749.8"   y="701.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x377)" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x377)"/><line x1="151.3" y1="702.7" x2="148.8" y2="783.6" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="776.9" y1="700.4" x2="777.0" y2="783.8" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="182.5" y1="702.6" x2="181.5" y2="782.5" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="809.2" y1="701.5" x2="810.4" y2="785.3" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="214.3" y1="701.8" x2="215.6" y2="782.4" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><line x1="844.4" y1="700.1" x2="844.9" y2="784.2" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><polygon points="236.7,416.2 763.4,417.1 722.5,663.2 277.7,663.8" fill="url(#suitr1x377)" stroke="#ffd700" stroke-width="2.6" filter="url(#skr1x377) url(#metalr1x377)"/><polygon points="235.7,416.5 765.4,418.0 724.0,662.3 277.3,662.6" fill="url(#carbonr1x377)"/><polygon points="367.4,418.7 632.7,418.9 611.3,513.9 387.7,514.6" fill="url(#suitHir1x377)"/><line x1="362.0" y1="470.1" x2="639.0" y2="472.6" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x377)"/><line x1="397.9" y1="548.0" x2="600.1" y2="550.9" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x377)"/><line x1="266.1" y1="489.5" x2="320.1" y2="490.2" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.7" y1="491.9" x2="731.4" y2="492.5" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.9" y1="523.1" x2="320.7" y2="524.6" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.1" y1="524.6" x2="733.6" y2="521.1" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.5" y1="554.0" x2="319.3" y2="555.1" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.5" y1="554.0" x2="732.9" y2="554.8" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.2" y1="587.9" x2="320.9" y2="587.5" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.6" y1="587.5" x2="732.6" y2="585.7" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x377)"><polygon points="501.2,451.3 543.5,509.8 500.5,568.4 459.0,511.7" fill="#ffd700" stroke="#0d1520" stroke-width="1.4" filter="url(#skr1x377)"/><polygon points="501.4,452.5 541.7,511.3 499.4,567.2 459.0,512.4" fill="url(#suitHir1x377)" opacity=".45"/></g><g><rect x="831.576941121053" y="420.4404806721955" width="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x377)" stroke="#ffd700" stroke-width="2" filter="url(#wmr1x377)"/><rect x="828.5377392259054" y="422.0531223400496" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x377)"/><rect x="838.7089264241606" y="401.65998621908943" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x377)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x377)"/><circle cx="876.4398155013658" cy="416.00207326058296" r="15.0" fill="#ffd700" opacity=".8" filter="url(#glowr1x377)"/><circle cx="876.8982702625543" cy="415.35598181011153" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="946.3997348520533" y="454.70736038116735" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x377)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x377)"/><circle cx="1020.7525957356767" cy="470.5605419820174" r="18.0" fill="#ffd700" filter="url(#glowr1x377)" opacity=".88"/><circle cx="1019.8623777905107" cy="472.73942857775836" r="7.0" fill="#ffffff"/><rect x="875.627228685245" y="502.8728748934343" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x377)" stroke="#ffd700" stroke-width="1" filter="url(#wmr1x377)"/><rect x="831.4755121452362" y="424.51223197681827" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="858.2511170510762" y1="485.0358716852963" x2="856.6823677111976" y2="520.9227713529951" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/><line x1="874.072211323455" y1="488.04340958502144" x2="874.445742912367" y2="519.2587361950427" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/><line x1="888.8759011598863" y1="484.6271922391839" x2="890.8627657543495" y2="517.6608710178174" stroke="#ffd700" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="449.8191904018633" y="556.0229031698778" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x377)"/><rect x="424.5855412701145" y="574.044228293933" width="152.0" height="26.0" fill="url(#bevelr1x377)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x377)"/><polygon points="307.9,380.9 350.4,293.9 500.9,278.0 650.3,294.1 690.3,380.3 668.7,503.7 499.7,566.2 331.4,504.7" fill="url(#suitr1x377)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x377) url(#metalr1x377)"/><polygon points="306.8,380.7 351.1,294.5 498.3,278.1 650.3,292.8 691.6,381.9 668.5,505.4 499.0,565.2 330.0,502.9" fill="url(#carbonr1x377)"/><polygon points="382.2,303.8 498.5,286.8 618.5,301.0 607.0,381.5 393.8,380.4" fill="url(#suitHir1x377)"/><polygon points="379.3,380.2 366.8,427.2 432.5,505.0 498.7,528.5 566.0,503.5 635.5,426.8 617.4,382.1" fill="#0d1520" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x377)"/><polygon points="381.3,409.7 476.3,412.0 484.2,439.3 390.4,438.7" fill="#ffd700" filter="url(#glowr1x377)"/><polygon points="522.4,412.3 618.4,410.7 611.1,439.4 516.0,440.3" fill="#ffd700" filter="url(#glowr1x377)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.0954250150919" y1="415.10324996570125" x2="516.8986583510787" y2="413.9030808719806" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="483.4304265735298" y1="436.524151676707" x2="514.7918082015962" y2="436.6768193308264" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="501.67484601009636" y1="455.07690724842246" x2="498.23920501349494" y2="483.9861075436697" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x377)"/><line x1="453.4377535042167" y1="491.6079597701318" x2="452.52083692427726" y2="520.465187982563" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x377)"/><line x1="478.6576635009981" y1="492.5702880337834" x2="476.986740053948" y2="519.1379983237014" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x377)"/><line x1="500.3304460979067" y1="492.48096557017413" x2="500.88862983100114" y2="519.8560165038332" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x377)"/><line x1="524.4890638519637" y1="492.96709894891825" x2="524.0001898054592" y2="519.4501306002028" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x377)"/><line x1="545.2216493432596" y1="489.6511412114836" x2="545.9547442110442" y2="519.2408022998832" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x377)"/><polygon points="432.9,502.0 567.9,504.0 554.3,556.9 445.1,555.4" fill="#503400" fill-opacity=".72" stroke="#ffd700" stroke-width="1.3" filter="url(#skr1x377)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffd700" fill-opacity=".48">IMPERIAL RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ffd700" fill-opacity=".32">MECH RANGERS</text></svg>