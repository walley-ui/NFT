l="#0d1520" opacity=".95"/><ellipse cx="518.6" cy="497.8" rx="8.7" ry="6.4" fill="#0d1520" opacity=".95"/><ellipse cx="481.4" cy="497.8" rx="2.3" ry="5.8" fill="#ccccff"/><ellipse cx="518.6" cy="497.8" rx="2.3" ry="5.8" fill="#ccccff"/><path d="M471.0,467.1 L458.2,426.5 L481.4,463.0" fill="#ccccff" stroke="#0d1520" stroke-width=".9"/><path d="M529.0,467.1 L541.8,426.5 L518.6,463.0" fill="#ccccff" stroke="#0d1520" stroke-width=".9"/><path d="M476.8,452.6 C488.4,449.1 511.6,449.1 523.2,452.6" fill="rgba(255,255,255,.18)"/></g><g><line x1="897.6428756719083" y1="793.0930918031372" x2="913.438047208041" y2="112.90970656853167" stroke="url(#chromer1x3999)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x3999)"/><line x1="903.0912864354067" y1="771.0108164055273" x2="910.1780423210562" y2="132.35393625693393" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="869.9,152.7 937.4,152.7 914.6,-7.5" fill="url(#blader1x3999)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x3999)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.7728555692919" y="420.32248282935467" width="40.0" height="20.0" fill="url(#bevelr1x3999)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x3999)"/><rect x="879.9047681182251" y="510.5210116710514" width="40.0" height="20.0" fill="url(#bevelr1x3999)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x3999)"/><rect x="879.6762765777856" y="602.8444503644481" width="40.0" height="20.0" fill="url(#bevelr1x3999)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x3999)"/><rect x="878.7188075841964" y="692.0003123326227" width="40.0" height="20.0" fill="url(#bevelr1x3999)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x3999)"/><ellipse cx="898.2759963786789" cy="789.8953100617043" rx="22.0" ry="15.0" fill="url(#bevelr1x3999)" stroke="#ccccff" stroke-width="1" filter="url(#wmr1x3999)"/></g><rect x="450.5497737413272" y="555.1442