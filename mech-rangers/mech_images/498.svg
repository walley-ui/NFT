" stroke-width="2" filter="url(#wmr1x498)"/><rect x="115.1" y="700.6" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x498)"/><rect x="747.7"  y="701.3" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x498)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x498)"/><rect x="747.2"  y="703.6" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x498)"/><rect x="121.3" y="698.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><rect x="756.9" y="701.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><rect x="152.8" y="701.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><rect x="786.4" y="698.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><rect x="181.8" y="698.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><rect x="814.5" y="699.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><rect x="209.7" y="700.4" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><rect x="845.4" y="700.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x498)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x498)"/><ellipse cx="183.78836098279803" cy="711.1266066426224" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x498)"/><ellipse cx="819.1283922484331" cy="709.2803718166239" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x498)"/></g><rect x="450.18452089698985" y="557.5060252794065" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x498)"/><rect x="424.58024249495