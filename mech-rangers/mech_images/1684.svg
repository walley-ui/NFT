 filter="url(#wmr1x1684)"/><rect x="42.68092542666939" y="397.30942215770483" width="175.0" height="118.0" rx="7" fill="url(#carbonr1x1684)"/><rect x="18.015262901075154" y="446.67117735389616" width="78.0" height="32.0" rx="6" fill="url(#barrelr1x1684)" stroke="#00ff60" stroke-width="1.4" filter="url(#wmr1x1684)"/><circle cx="118.36435908064243" cy="471.86602069446815" r="48.0" fill="rgba(0,0,0,.55)" stroke="#00ff60" stroke-width="2" filter="url(#wmr1x1684)"/><circle cx="117.80198597343636" cy="472.5352694901637" r="34.0" fill="#00ff60" fill-opacity=".4" filter="url(#bloomr1x1684)"/><circle cx="117.55041336644437" cy="470.8937332286499" r="18.0" fill="#00ff60" filter="url(#glowr1x1684)"/><rect x="45.66115619273853" y="381.2069311828352" width="100.0" height="18.0" rx="2" fill="url(#bevelr1x1684)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x1684)"/><rect x="45.00075383339074" y="397.48693658513946" width="120.0" height="12.0" rx="3" fill="rgba(255,255,255,.2)"/><line x1="51.641335445027764" y1="519.2972153449431" x2="50.445914505831865" y2="548.9386143119074" stroke="#00ff60" stroke-opacity=".6" stroke-width="2"/><line x1="75.33187191955741" y1="520.8527765262871" x2="74.8719778892025" y2="550.163268719241" stroke="#00ff60" stroke-opacity=".6" stroke-width="2"/><line x1="98.96368305211884" y1="517.9689496709965" x2="101.35826816692945" y2="551.0299304772168" stroke="#00ff60" stroke-opacity=".6" stroke-width="2"/><line x1="124.52710237246004" y1="517.8511500786059" x2="124.54062989246097" y2="548.5379159840755" stroke="#00ff60" stroke-opacity=".6" stroke-width="2"/></g><rect x="450.5405631830916" y="558.2583752630278" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x1684)"/><rect x="422.6973699519411" y="576.66498245541" width="152.0" height="26.0" fill="url(#bevelr1x1684)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x1684)"/><polygon points="306.7,381.8 351.0,294.4 499.0,277.4 649.8