 filter="url(#wmr1x2716)"/><polygon points="896.0,671.4 899.7,671.4 898.4,-128.6 897.3,-128.6" fill="url(#bladeTipr1x2716)" opacity=".9"/><line x1="908.7955122613348" y1="672.6777042293921" x2="898.5444621054642" y2="-126.86882078694182" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="888.0727115097642" y1="669.9831905898637" x2="897.0548892925494" y2="-127.96458194851877" stroke="#ff44aa" stroke-width="1" stroke-opacity=".45"/><line x1="902.5" y1="651.4" x2="899.7" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="893.2" y1="651.4" x2="896.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="841.3635559630208" y="668.1852327750064" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x2716)" stroke="#ff44aa" stroke-width="1.6" filter="url(#wmr1x2716)"/><rect x="867.5455604674854" y="674.625741271954" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="886.9290741789714" y="678.0024820083752" width="24.0" height="6.0" rx="1" fill="#ff44aa" fill-opacity=".35"/><rect x="885.5827332895808" y="684.0577275531366" width="24.0" height="6.0" rx="1" fill="#ff44aa" fill-opacity=".35"/><rect x="884.2749849153311" y="694.0043963185511" width="24.0" height="6.0" rx="1" fill="#ff44aa" fill-opacity=".35"/><rect x="885.503336216379" y="701.1043883481994" width="24.0" height="6.0" rx="1" fill="#ff44aa" fill-opacity=".35"/><rect x="885.2139919910207" y="708.4304509539157" width="24.0" height="6.0" rx="1" fill="#ff44aa" fill-opacity=".35"/><rect x="885.6409490956553" y="718.4207583011128" width="24.0" height="6.0" rx="1" fill="#ff44aa" fill-opacity=".35"/><ellipse cx="897.0731332591363" cy="727.8050935798325" rx="22.0" ry="16.0" fill="url(#bevelr1x2716)" stroke="#ff44aa" stroke-width="1.2" filter="url(#wmr1x2716)"/></g><rect x="448.3425204760395" y="555.4442489257082" width="100.0"  height="56.0" fill="#880050" stroke="#ff44aa" stroke-width="2.2" filter="url(#skr1x2716)"/><rect x="423.0677848181687" y="573.8200525552035" w