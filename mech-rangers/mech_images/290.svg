1x290)"/><polygon points="392.3,723.1 493.8,723.3 484.0,787.0 384.0,789.7" fill="url(#bevelr1x290)" fill-opacity=".5" stroke="#ff2040" stroke-width="1.4" filter="url(#skr1x290)"/><polygon points="511.3,662.4 600.1,663.0 613.6,878.6 518.7,878.9" fill="url(#suitr1x290)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x290) url(#metalr1x290)"/><polygon points="509.2,663.2 601.6,663.2 612.6,877.9 517.9,876.4" fill="url(#carbonr1x290)"/><polygon points="508.3,722.1 608.7,724.0 616.0,788.7 514.7,789.3" fill="url(#bevelr1x290)" fill-opacity=".5" stroke="#ff2040" stroke-width="1.4" filter="url(#skr1x290)"/><rect x="393.8" y="837.4" width="100.3" height="24.7" fill="url(#bevelr1x290)" stroke="#ff2040" stroke-width="1" filter="url(#skr1x290)"/><rect x="508.3"  y="839.6" width="100.3" height="24.7" fill="url(#bevelr1x290)" stroke="#ff2040" stroke-width="1" filter="url(#skr1x290)"/><polygon points="370.0,878.2 497.3,877.6 504.4,921.4 363.0,922.8" fill="#cc0020" stroke="#ff2040" stroke-width="2" filter="url(#skr1x290)"/><polygon points="502.2,877.9 630.1,877.0 636.0,923.2 496.5,921.8" fill="#cc0020" stroke="#ff2040" stroke-width="2" filter="url(#skr1x290)"/><polygon points="302.9,631.3 694.4,633.8 638.0,683.6 363.9,683.0" fill="#ff2040" fill-opacity=".52" stroke="#ff2040" stroke-width="2" filter="url(#skr1x290)"/><rect x="462.5" y="639.8" width="72.0" height="42.0" fill="url(#bevelr1x290)" stroke="#ff2040" stroke-width="1.4" filter="url(#glowr1x290)"/><rect x="486.4" y="640.2" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="153.4,467.1 235.1,467.5 258.5,734.7 129.1,735.8" fill="url(#suitr1x290)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x290) url(#metalr1x290)"/><polygon points="171.8,433.5 254.6,432.5 241.9,510.6 157.9,509.6" fill="url(#bevelr1x290)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x290)"/><polygon points="161.5,622.6 243.1,622.4 240.1,661.7 165.0,661.7" fill="#ff2040" fill-opacity=".42" st