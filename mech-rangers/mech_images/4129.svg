/><rect x="422.45026768213137" y="576.1438570935279" width="152.0" height="26.0" fill="url(#bevelr1x4129)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x4129)"/><polygon points="306.8,380.9 351.9,294.4 499.9,277.0 648.2,295.5 691.9,381.2 670.7,503.6 500.1,566.8 332.1,504.5" fill="url(#suitr1x4129)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x4129) url(#metalr1x4129)"/><polygon points="308.1,379.3 352.0,294.8 499.0,277.0 648.7,294.2 692.8,380.7 669.1,504.9 499.1,564.8 332.7,503.0" fill="url(#carbonr1x4129)"/><polygon points="379.9,304.0 498.2,286.5 617.9,302.7 606.2,379.5 393.9,381.7" fill="url(#suitHir1x4129)"/><polygon points="381.8,380.3 365.6,424.8 433.8,504.5 501.1,527.6 567.6,502.8 634.6,425.7 618.4,378.9" fill="#050508" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x4129)"/><polygon points="382.7,410.3 475.5,410.7 484.6,441.3 388.9,440.1" fill="#2060ff" filter="url(#glowr1x4129)"/><polygon points="523.1,410.1 618.7,412.0 610.0,440.7 516.1,441.8" fill="#2060ff" filter="url(#glowr1x4129)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.3484606990218" y1="412.2111403190531" x2="513.722808731012" y2="412.91681028949097" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.12843375435097" y1="436.7849444014952" x2="514.7095101240463" y2="437.6275662903674" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="499.5616315184161" y1="456.0631575944833" x2="501.2085415127687" y2="482.1886208430864" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x4129)"/><line x1="454.4704433405586" y1="492.5989791081287" x2="453.75408033400777" y2="520.3907291185111" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x4129)"/><line x1="477.9220088251307" y1="489.6684379308484" x2="476.84907783627506" y2="518.3354935267