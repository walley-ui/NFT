idth="148.0" height="82.0" rx="5" fill="url(#gunmetalr1x6464)" stroke="#00ff60" stroke-width="2" filter="url(#wmr1x6464)"/><rect x="829.7938249302656" y="421.9219691446051" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x6464)"/><rect x="837.415805989746" y="404.31398629928003" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x6464)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x6464)"/><circle cx="877.8288006642462" cy="414.05007319068534" r="15.0" fill="#00ff60" opacity=".8" filter="url(#glowr1x6464)"/><circle cx="876.5884887268395" cy="413.95313308080654" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="945.4308139340579" y="453.98024456799027" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x6464)" stroke="#00ff60" stroke-width="1.2" filter="url(#wmr1x6464)"/><circle cx="1020.4912401401066" cy="470.8002214387059" r="18.0" fill="#00ff60" filter="url(#glowr1x6464)" opacity=".88"/><circle cx="1020.2987425068952" cy="472.46493310090153" r="7.0" fill="#ffffff"/><rect x="875.2362688732893" y="502.9998374633491" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x6464)" stroke="#00ff60" stroke-width="1" filter="url(#wmr1x6464)"/><rect x="834.0559983036109" y="422.5057009313255" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="858.1283933822625" y1="486.17321796296164" x2="857.3007430887409" y2="517.7656502213329" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/><line x1="874.8381244325639" y1="486.0073964943178" x2="872.0590402700566" y2="517.6221229094081" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/><line x1="890.1306469726004" y1="485.15807820828627" x2="888.5123946322688" y2="518.9010802475735" stroke="#00ff60" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="450.55889156553894" y="557.4127426775173" width="100.0"  height="56.0" fill="#00441e" stroke="#00ff60" stroke-width="2.2" filter="url(#skr1x6464)"/><rect x="422.71658445075155" y="576.2410317039117" width="152.0" height="26.0" fill="url(#bevelr1x6464)" fill-opacity=".65" stroke="#00ff60" stroke-width="1.2" filter="url(#skr1x6464)"/><polygon points="306.9,379.3 351.7,295.4 498.3,276.8 651.4,295.2 690.9,381.6 669.8,504.2 501.2,564.4 329.8,503.4" fill="url(#suitr1x6464)" stroke="#00ff60" stroke-width="2.8" filter="url(#skr1x6464) url(#metalr1x6464)"/><polygon points="306.7,380.1 349.6,295.9 501.0,278.9 648.3,293.7 690.7,381.7 670.6,503.5 498.9,564.2 332.2,502.9" fill="url(#carbonr1x6464)"/><polygon points="381.8,303.5 500.4,285.6 619.0,304.3 607.7,379.8 390.9,382.4" fill="url(#suitHir1x6464)"/><polygon points="379.9,379.5 366.3,424.0 432.6,503.6 501.8,529.5 567.7,502.4 633.7,426.3 618.9,380.8" fill="#050508" fill-opacity=".88" stroke="#00ff60" stroke-width="1.8" filter="url(#skr1x6464)"/><polygon points="382.2,411.5 477.5,412.2 483.2,440.9 388.9,441.2" fill="#00ff60" filter="url(#glowr1x6464)"/><polygon points="524.1,411.0 620.4,411.2 610.4,438.7 516.8,438.7" fill="#00ff60" filter="url(#glowr1x6464)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.07059257678685" y1="413.7375503802672" x2="514.2127742823586" y2="412.00864998707544" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="485.1016218381561" y1="438.2013383324258" x2="515.1194276585617" y2="436.82604255834593" stroke="#00ff60" stroke-opacity=".52" stroke-width="2"/><line x1="498.6924779220484" y1="455.51587450969964" x2="500.3503213983029" y2="481.42576212212447" stroke="#00ff60" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x6464)"/><line x1="454.0958680990897" y1="491.2558824259787" x2="452.23516411164775" y2="521.7920257213525" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6464)"/><line x1="477.3642621253058" y1="491.6468425774015" x2="476.9861477534659" y2="519.0861343523487" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6464)"/><line x1="501.6910717510618" y1="492.2926123656332" x2="499.9025421332568" y2="518.9340452792123" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6464)"/><line x1="522.6742819306999" y1="490.10348324095827" x2="522.9717323767579" y2="519.5498927367851" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6464)"/><line x1="545.4297413665057" y1="492.1144919971935" x2="546.3078593915515" y2="518.6772345552221" stroke="#00ff60" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x6464)"/><polygon points="433.9,504.1 566.6,502.4 552.7,556.0 446.7,556.1" fill="#00441e" fill-opacity=".72" stroke="#00ff60" stroke-width="1.3" filter="url(#skr1x6464)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#00ff60" fill-opacity=".48">VIPER RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#00ff60" fill-opacity=".32">MECH RANGERS</text></svg>