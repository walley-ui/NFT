.5,295.1 171.2,591.2 101.8,726.0 33.9,590.1" fill="url(#carbonr1x5956)"/><polygon points="64.4,360.2 138.7,363.0 139.0,541.1 102.9,630.3 63.8,541.6" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="48.63887763977048" y1="432.1212270492688" x2="155.25523264653978" y2="430.8755654308945" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="101.33742260862138" y1="331.0389027783647" x2="101.51895346365866" y2="590.3600243091583" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="35.13324802102518" y1="294.8193574829958" x2="171.22266562677916" y2="296.13627721667285" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.75935502214354" cy="432.0873941685073" r="18.0" fill="url(#bevelr1x5956)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x5956)"/></g><rect x="448.6077264572494" y="558.5152696233242" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x5956)"/><rect x="423.37485009003433" y="576.0834017778747" width="152.0" height="26.0" fill="url(#bevelr1x5956)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x5956)"/><polygon points="307.6,379.8 350.9,293.6 498.3,279.0 649.5,294.3 690.4,381.0 669.8,503.6 500.5,565.3 331.8,502.1" fill="url(#suitr1x5956)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x5956) url(#metalr1x5956)"/><polygon points="307.3,382.0 351.7,294.7 499.5,276.9 649.9,293.9 693.2,380.1 667.6,504.5 501.2,564.7 329.4,505.1" fill="url(#carbonr1x5956)"/><polygon points="380.7,302.8 498.7,287.6 620.1,304.0 608.6,381.1 392.4,382.2" fill="url(#suitHir1x5956)"/><polygon points="381.4,380.9 365.8,425.1 432.5,502.1 500.6,529.2 565.6,502.0 632.7,426.7 619.1,380.3" fill="#0a0520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x5956)"/><polygon points="381.3,410.5 475.2,411.6 485.0,440.0 389.4,440.8" fill="#2060ff" filter="url(#glowr1x5956)"/><polygon points="524.2,411.1 617.3,412.1 610.4,