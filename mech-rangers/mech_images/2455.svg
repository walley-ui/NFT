url(#wmr1x2455)"/><polygon points="828.6,294.5 966.7,294.6 968.7,590.8 897.7,724.7 828.1,590.0" fill="url(#carbonr1x2455)"/><polygon points="859.6,360.5 936.6,360.0 936.1,540.0 898.8,632.9 861.2,543.1" fill="#ffd700" fill-opacity=".28" stroke="#ffd700" stroke-width="1.5"/><line x1="847.4979313739203" y1="430.0295829227194" x2="948.0843918131292" y2="432.7688577272929" stroke="#ffd700" stroke-opacity=".65" stroke-width="1.3"/><line x1="896.255689298138" y1="330.3652536176145" x2="897.9932477237285" y2="590.6086919002234" stroke="#ffd700" stroke-opacity=".4" stroke-width="1"/><line x1="829.2573453802244" y1="297.3707621254027" x2="967.1374399367347" y2="296.41063774656504" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="896.7417002717592" cy="431.5974239928648" r="18.0" fill="url(#bevelr1x2455)" stroke="#ffd700" stroke-width="1.2" filter="url(#wmr1x2455)"/></g><rect x="450.12684858189897" y="558.1930288981646" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x2455)"/><rect x="424.05556056750936" y="574.8991409504787" width="152.0" height="26.0" fill="url(#bevelr1x2455)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x2455)"/><polygon points="309.2,381.2 349.2,294.7 501.7,276.4 651.2,293.2 692.6,380.2 670.0,502.3 500.8,566.3 330.6,502.8" fill="url(#suitr1x2455)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x2455) url(#metalr1x2455)"/><polygon points="307.7,379.7 348.9,295.0 500.0,277.9 648.8,295.8 692.5,380.7 669.7,504.4 499.2,566.3 329.4,502.4" fill="url(#carbonr1x2455)"/><polygon points="382.3,304.4 500.2,286.1 620.4,303.8 607.5,380.9 390.9,381.3" fill="url(#suitHir1x2455)"/><polygon points="379.4,379.7 364.1,426.7 433.6,504.2 501.6,526.9 566.9,503.4 633.9,425.4 618.3,381.7" fill="#08001e" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x2455)"/><polygon points="379.2,410.6 478.1,410.2 485.5,440.6 387.4,441.6" fill="#ffd700" filter="url(#glowr1x2455)"/