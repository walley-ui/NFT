.5 690.6,380.7 668.0,504.5 500.1,566.0 331.4,505.3" fill="url(#carbonr1x5493)"/><polygon points="380.9,301.2 499.2,287.2 619.4,303.3 607.2,381.9 391.9,380.7" fill="url(#suitHir1x5493)"/><polygon points="380.4,381.4 364.3,426.8 431.1,504.6 498.7,528.6 568.8,504.1 632.8,427.3 617.3,380.9" fill="#0a0520" fill-opacity=".88" stroke="#ffcc00" stroke-width="1.8" filter="url(#skr1x5493)"/><polygon points="380.1,412.5 475.5,409.7 484.1,438.8 389.9,439.1" fill="#ffcc00" filter="url(#glowr1x5493)"/><polygon points="523.1,413.0 618.8,411.0 610.2,439.6 514.6,441.3" fill="#ffcc00" filter="url(#glowr1x5493)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.34531746037305" y1="414.2410756599158" x2="515.0579824879206" y2="412.5800625485368" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="483.3794624170847" y1="436.3439815515652" x2="515.4218697358295" y2="439.665131919086" stroke="#ffcc00" stroke-opacity=".52" stroke-width="2"/><line x1="498.51060414155944" y1="454.73765339469537" x2="501.49762965841217" y2="482.2738703538664" stroke="#ffcc00" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x5493)"/><line x1="455.3675615986623" y1="489.516942703817" x2="452.35277664259075" y2="521.6331903787329" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5493)"/><line x1="476.3041917805001" y1="490.7135804371908" x2="475.9061115904152" y2="519.8523282325826" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5493)"/><line x1="501.61407595817" y1="490.1451670992188" x2="498.8539913581684" y2="521.7673513270914" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5493)"/><line x1="522.652886666879" y1="492.0483148717321" x2="522.6833686438016" y2="518.6546632181853" stroke="#ffcc00" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x5493)"/><line x1="544.828105070