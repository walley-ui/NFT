 x2="86.16053771669041" y2="111.84728606883434" stroke="url(#chromer1x7485)" stroke-width="28.0" stroke-linecap="round" filter="url(#wmr1x7485)"/><line x1="98.36521214371544" y1="770.4366226053796" x2="87.89237743061032" y2="131.86107083447274" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="74.8,150.8 138.5,151.9 85.2,-8.9" fill="url(#blader1x7485)" stroke="#2060ff" stroke-width="1.8" filter="url(#wmr1x7485)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="81.77319789290425" y="422.6251322914846" width="40.0" height="20.0" fill="url(#bevelr1x7485)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7485)"/><rect x="83.25453405942764" y="511.58525072187183" width="40.0" height="20.0" fill="url(#bevelr1x7485)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7485)"/><rect x="82.02435257652772" y="601.852813154459" width="40.0" height="20.0" fill="url(#bevelr1x7485)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7485)"/><rect x="81.72026629256081" y="690.2533067452721" width="40.0" height="20.0" fill="url(#bevelr1x7485)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7485)"/><ellipse cx="100.73264085412022" cy="790.5493049251846" rx="22.0" ry="15.0" fill="url(#bevelr1x7485)" stroke="#2060ff" stroke-width="1" filter="url(#wmr1x7485)"/></g><rect x="449.2113947169855" y="556.0384590207599" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x7485)"/><rect x="422.44122038492935" y="577.1098505069502" width="152.0" height="26.0" fill="url(#bevelr1x7485)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x7485)"/><polygon points="308.4,381.9 349.3,293.1 500.4,276.4 649.0,294.6 693.1,381.0 669.1,503.8 498.5,565.3 329.9,503.8" fill="url(#suitr1x7485)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x7485) url(#metalr1x7485)"/><polygon points="309.3,380.4 351.2,294.1 498.8,278.2 651.4,294.