#bevelr1x644)" stroke="#ccccff" stroke-width="1.4" filter="url(#glowr1x644)"/><rect x="486.7" y="641.4" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.3,464.8 234.6,465.9 256.2,736.4 127.4,735.3" fill="url(#suitr1x644)" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x644) url(#metalr1x644)"/><polygon points="175.0,431.3 252.6,430.9 244.2,509.7 158.8,510.0" fill="url(#bevelr1x644)" fill-opacity=".72" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x644)"/><polygon points="161.0,623.5 242.5,620.2 238.9,659.3 164.2,659.5" fill="#ccccff" fill-opacity=".42" stroke="#ccccff" stroke-width="1" filter="url(#skr1x644)"/><polygon points="766.2,466.0 847.8,467.3 871.2,734.0 740.3,735.0" fill="url(#suitr1x644)" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x644) url(#metalr1x644)"/><polygon points="746.9,432.1 826.0,431.3 839.6,510.2 757.9,508.8" fill="url(#bevelr1x644)" fill-opacity=".72" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x644)"/><polygon points="756.7,622.2 839.1,620.2 833.9,659.7 762.4,660.2" fill="#ccccff" fill-opacity=".42" stroke="#ccccff" stroke-width="1" filter="url(#skr1x644)"/><rect x="118.9"  y="701.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x644)" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x644)"/><rect x="748.5"   y="699.2" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x644)" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x644)"/><line x1="148.6" y1="701.6" x2="148.9" y2="783.2" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="778.4" y1="701.5" x2="779.2" y2="783.7" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="184.0" y1="702.4" x2="184.0" y2="782.4" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="810.2" y1="702.8" x2="812.3" y2="784.8" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="217.1" y1="702.6" x2="216.3" y2="784.4" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><line x1="844.2" y1="703.1" x2="844.0" y2="785.2" stroke="#ccccff" stroke-opacity=".38" stroke-width="1"/><polygon points="234.5,416.1 764.7,417.7 721.9,660.9 276.6,661.8" fill="url(#suitr1x644)" stroke="#ccccff" stroke-width="2.6" filter="url(#skr1x644) url(#metalr1x644)"/><polygon points="236.7,416.2 766.0,418.6 722.9,663.5 278.9,661.1" fill="url(#carbonr1x644)"/><polygon points="368.8,416.0 630.8,418.0 611.7,515.6 389.8,516.4" fill="url(#suitHir1x644)"/><line x1="363.9" y1="472.5" x2="637.7" y2="472.0" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x644)"/><line x1="397.5" y1="551.3" x2="599.3" y2="550.5" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x644)"/><line x1="267.1" y1="491.3" x2="318.5" y2="489.7" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.6" y1="492.6" x2="732.7" y2="490.5" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.0" y1="523.2" x2="319.2" y2="522.0" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.5" y1="521.5" x2="732.4" y2="523.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="268.1" y1="554.3" x2="319.8" y2="553.4" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.7" y1="553.9" x2="734.7" y2="554.7" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.0" y1="587.8" x2="321.5" y2="587.9" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.1" y1="586.0" x2="732.2" y2="586.9" stroke="#ccccff" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x644)"><path d="M500,510.6 C390.66825900301336,453.4052515558899 437.93518238607794,548.1392386401445 500,531.4427933576703" fill="#ccccff" fill-opacity=".88" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x644)"/><path d="M500,510.6 C608.1319370234385,452.36368699818854 563.0075155757368,541.9995751897246 500,531.7309785797447" fill="#ccccff" fill-opacity=".88" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x644)"/><path d="M500,493.20000000000005 C454.19515571035447,464.9498281835579 478.99270067149774,514.2900068053044 500,521.2106248380617" fill="rgba(255,255,255,.14)"/><path d="M500,493.20000000000005 C548.4659927362576,464.2402754959651 525.5392832041719,517.4114966342225 500,521.1961129976437" fill="rgba(255,255,255,.14)"/></g><g><polygon points="868.1,691.9 898.8,691.4 834.1,271.8" fill="url(#blader1x644)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x644)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="911.4,692.0 943.3,693.0 984.7,272.3" fill="url(#blader1x644)" stroke="#ccccff" stroke-width="1.8" filter="url(#wmr1x644)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="863.3879178925046" y="681.4734675372019" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x644)" stroke="#ccccff" stroke-width="1.4" filter="url(#wmr1x644)"/></g><rect x="450.70007761996237" y="556.9088035799563" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x644)"/><rect x="424.25985402036457" y="575.0801744191907" width="152.0" height="26.0" fill="url(#bevelr1x644)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x644)"/><polygon points="309.5,381.6 348.5,294.9 498.4,278.1 649.1,293.3 693.1,380.0 670.5,504.1 501.0,565.1 332.5,504.8" fill="url(#suitr1x644)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x644) url(#metalr1x644)"/><polygon points="309.4,382.1 351.0,295.1 498.7,278.9 651.2,293.4 691.7,382.2 670.5,505.0 498.6,565.3 332.0,503.9" fill="url(#carbonr1x644)"/><polygon points="382.7,303.2 498.8,286.8 618.2,303.6 607.9,380.7 392.3,380.3" fill="url(#suitHir1x644)"/><polygon points="380.3,381.1 365.3,424.7 432.9,504.8 499.2,527.2 566.5,503.4 636.1,424.0 618.8,379.6" fill="#1e0600" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x644)"/><polygon points="381.9,409.9 475.9,411.1 484.5,440.0 388.2,440.7" fill="#ccccff" filter="url(#glowr1x644)"/><polygon points="522.7,413.1 620.7,410.9 609.9,440.0 514.7,439.6" fill="#ccccff" filter="url(#glowr1x644)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="486.2380537147261" y1="411.7190250710584" x2="517.0989275776222" y2="412.9444464124739" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="484.32596259905023" y1="437.1237397056073" x2="516.6942152837664" y2="438.02613920811564" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="500.55865373825657" y1="454.45093390364195" x2="501.62510595601054" y2="481.7496559362859" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x644)"/><line x1="452.6463137213886" y1="492.4510445353575" x2="452.7918202118762" y2="519.5616006202065" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x644)"/><line x1="477.47082414034753" y1="490.6628781716339" x2="475.1797925249114" y2="518.5789446244947" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x644)"/><line x1="501.5228324738331" y1="490.989276582282" x2="499.84354543890805" y2="519.1864991276525" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x644)"/><line x1="524.7704467311129" y1="490.98905566968017" x2="523.0656191889755" y2="519.994039859157" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x644)"/><line x1="544.6864337716438" y1="492.28838172405955" x2="547.2543594042025" y2="521.1218910858967" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x644)"/><polygon points="432.0,504.5 568.6,503.2 554.6,557.9 445.0,557.6" fill="#242438" fill-opacity=".72" stroke="#ccccff" stroke-width="1.3" filter="url(#skr1x644)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"   y="975.0" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".48">PHANTOM RANGER</text><text x="970.0" y="975.0" text-anchor="end"    font-family="monospace" font-weight="bold" font-size="22.0" fill="#ccccff" fill-opacity=".32">MECH RANGERS</text></svg>