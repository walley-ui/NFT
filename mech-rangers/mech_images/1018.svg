" rx="5" fill="url(#bevelr1x1018)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x1018)"/><rect x="113.9" y="701.0" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x1018)"/><rect x="747.9"  y="701.2" width="137.8" height="88.0" rx="5" fill="url(#bevelr1x1018)" stroke="#ff2040" stroke-width="2" filter="url(#wmr1x1018)"/><rect x="748.1"  y="700.3" width="137.8" height="88.0" rx="5" fill="url(#carbonr1x1018)"/><rect x="120.5" y="700.9" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><rect x="756.2" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><rect x="150.1" y="699.1" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><rect x="785.8" y="700.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><rect x="182.6" y="700.2" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><rect x="812.6" y="700.5" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><rect x="210.7" y="700.6" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><rect x="844.4" y="700.7" width="23.0" height="22.0" rx="2" fill="url(#knuckler1x1018)" stroke="#ff2040" stroke-width=".8" filter="url(#wmr1x1018)"/><ellipse cx="185.69830858431757" cy="712.4811751033924" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x1018)"/><ellipse cx="816.5628391378746" cy="710.7003284134715" rx="45.1" ry="30.0" fill="#ff2040" fill-opacity=".25" filter="url(#glowr1x1018)"/></g><rect x="451.59074971424417" y="558.2483328972943" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2