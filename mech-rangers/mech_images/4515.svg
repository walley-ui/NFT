4515)" filter="url(#wmr1x4515)"/><polygon points="91.8,-28.6 112.6,-28.6 102.2,-138.6" fill="url(#blader1x4515)" filter="url(#wmr1x4515)"/><polygon points="100.3,671.4 104.0,671.4 102.7,-128.6 101.6,-128.6" fill="url(#bladeTipr1x4515)" opacity=".9"/><line x1="111.97931508811187" y1="672.4428069954738" x2="103.57362769916651" y2="-129.49426512531937" stroke="rgba(255,255,255,.68)" stroke-width="1.5"/><line x1="94.04446361055595" y1="669.9956559140235" x2="99.41706244375553" y2="-127.30830244561659" stroke="#4444ff" stroke-width="1" stroke-opacity=".45"/><line x1="106.8" y1="651.4" x2="104.0" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><line x1="97.5" y1="651.4" x2="100.3" y2="11.4" stroke="rgba(0,0,0,.38)" stroke-width="1.6"/><rect x="46.15213799778369" y="667.7801576126367" width="112.0" height="28.0" rx="3" fill="url(#bevelr1x4515)" stroke="#4444ff" stroke-width="1.6" filter="url(#wmr1x4515)"/><rect x="71.24282092716541" y="675.0448434235528" width="64.0" height="10.0" rx="1" fill="rgba(255,255,255,.32)"/><rect x="89.53323729451742" y="677.2131280303001" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="90.1776830823533" y="684.2864646607078" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="91.631633949317" y="692.1861194898374" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="89.3791826357506" y="702.9607372714206" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="91.30360330300402" y="707.7196257425472" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><rect x="91.26778343258422" y="717.7290749057196" width="24.0" height="6.0" rx="1" fill="#4444ff" fill-opacity=".35"/><ellipse cx="101.02688758423548" cy="724.7873776524327" rx="22.0" ry="16.0" fill="url(#bevelr1x4515)" stroke="#4444ff" stroke-width="1.2" filter="url(#wmr1x4515)"/></g><rect x="450.5738321688026" y="556.3167683213949" width="100.0"  height="56.0" fill="#141428" s