.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="910.2,691.4 943.2,692.8 984.6,270.3" fill="url(#blader1x513)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x513)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="864.5705726257153" y="679.8843209407293" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x513)" stroke="#4444ff" stroke-width="1.4" filter="url(#wmr1x513)"/></g><rect x="451.57882040189577" y="556.7883574435488" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x513)"/><rect x="425.4262910382822" y="575.4937877167016" width="152.0" height="26.0" fill="url(#bevelr1x513)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x513)"/><polygon points="308.7,381.8 350.6,294.2 498.5,277.3 648.5,295.5 690.9,379.2 668.0,503.1 501.1,563.5 332.2,502.6" fill="url(#suitr1x513)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x513) url(#metalr1x513)"/><polygon points="307.2,380.0 348.5,292.9 500.9,276.9 649.6,293.2 692.6,379.1 668.6,503.0 498.7,564.0 330.0,505.4" fill="url(#carbonr1x513)"/><polygon points="382.3,301.5 500.1,284.6 619.4,303.3 608.9,379.8 393.6,378.8" fill="url(#suitHir1x513)"/><polygon points="379.7,382.0 365.9,426.7 433.7,503.5 498.9,527.4 565.7,502.9 635.6,426.6 618.5,382.2" fill="#050508" fill-opacity=".88" stroke="#4444ff" stroke-width="1.8" filter="url(#skr1x513)"/><polygon points="380.5,411.4 476.7,410.5 484.7,440.3 387.1,439.3" fill="#4444ff" filter="url(#glowr1x513)"/><polygon points="524.6,410.5 619.8,409.7 611.4,441.1 515.9,439.8" fill="#4444ff" filter="url(#glowr1x513)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.281002585832" y1="414.72719083148985" x2="513.9608760082535" y2="412.9207360284403" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="484.97798244139176" y1="438.46763007100674" x2="514.8994736095332" y2="438.92088456451893" stroke="#4444ff" stroke-opacity=".52" stroke-width="2"/><line x1="500.62370823435486" y1="453.99581710631026" x2="498.27912039412183" y2="484.51142678326" stroke="#4444ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x513)"/><line x1="453.4430979733169" y1="490.75636918283993" x2="453.9293572641723" y2="520.8849708503112" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x513)"/><line x1="475.88594138532875" y1="492.5896137906238" x2="478.5933344192244" y2="518.2944863731042" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x513)"/><line x1="500.37086111456154" y1="491.1268644524738" x2="500.5617039161734" y2="519.7479962941259" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x513)"/><line x1="523.1504730940424" y1="491.19060194455085" x2="523.2687189641035" y2="518.6607923457399" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x513)"/><line x1="545.7614505635761" y1="491.94494081465524" x2="546.6308392346092" y2="521.2211817068979" stroke="#4444ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x513)"/><polygon points="432.5,504.4 568.7,504.2 552.1,555.5 444.6,556.4" fill="#141428" fill-opacity=".72" stroke="#4444ff" stroke-width="1.3" filter="url(#skr1x513)"/><path d="M472.6465108588152 311.05311265019697 C305.716616474688 146.11305629098786 419.5759274917096 240.78971728021278 499.20601678481324 310.47713151229544" fill="#4444ff" fill-opacity=".92" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x513)"/><path d="M472.34826172383504 309.2801256147213 C303.02436537737026 147.24219174599273 419.74874588646 242.76516466476022 499.216335050948 311.69295728448776" fill="url(#suitHir1x513)" opacity=".28"/><path d="M527.7270389439724 309.98491141004484 C694.0584537623077 145.4054960018955 578.9100552451424 241.95722077628596 498.95290