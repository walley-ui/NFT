-opacity=".38" stroke-width="1"/><line x1="842.2" y1="701.9" x2="843.9" y2="783.4" stroke="#ffd700" stroke-opacity=".38" stroke-width="1"/><polygon points="233.8,418.6 766.5,417.1 722.0,663.1 279.0,664.0" fill="url(#suitr1x8625)" stroke="#ffd700" stroke-width="2.6" filter="url(#skr1x8625) url(#metalr1x8625)"/><polygon points="233.9,416.5 766.1,418.8 721.5,663.8 278.0,661.6" fill="url(#carbonr1x8625)"/><polygon points="368.6,415.9 632.7,419.3 611.0,515.9 389.7,516.7" fill="url(#suitHir1x8625)"/><line x1="362.7" y1="472.3" x2="636.4" y2="473.0" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x8625)"/><line x1="400.2" y1="550.3" x2="600.4" y2="548.5" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x8625)"/><line x1="268.1" y1="491.6" x2="319.9" y2="490.8" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.4" y1="492.2" x2="732.1" y2="491.9" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.3" y1="521.5" x2="318.9" y2="523.6" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="679.7" y1="523.5" x2="733.6" y2="522.4" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="266.9" y1="555.3" x2="318.7" y2="555.4" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.8" y1="555.0" x2="734.1" y2="555.7" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.1" y1="586.2" x2="318.9" y2="585.7" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.1" y1="585.6" x2="733.2" y2="585.6" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x8625)"><path d="M500,510.6 C397.6515299135819,446.0092562835664 436.92964859027416,548.8605339214579 500,527.5487160380185" fill="#ffd700" fill-opacity=".88" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x8625)"/><path d="M500,510.6 C609.8775870271027,455.31732083279644 563.3494958700612,550.7273465929926 500,529.47295123294" fill="#ffd700