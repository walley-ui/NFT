9.3" y1="551.0" x2="600.2" y2="551.0" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.3" filter="url(#skr1x497)"/><line x1="265.3" y1="491.5" x2="320.6" y2="490.9" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.8" y1="491.2" x2="731.9" y2="490.3" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.8" y1="524.1" x2="318.6" y2="524.5" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="678.8" y1="522.8" x2="732.9" y2="524.3" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="267.4" y1="554.7" x2="319.9" y2="555.3" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="680.2" y1="556.0" x2="733.7" y2="555.1" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="265.2" y1="585.3" x2="320.2" y2="586.6" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><line x1="681.6" y1="586.9" x2="734.8" y2="587.8" stroke="#ffd700" stroke-opacity=".62" stroke-width="1.8"/><g filter="url(#glowr1x497)"><polygon points="501.0,452.0 542.8,510.2 500.5,568.7 459.8,511.2" fill="#ffd700" stroke="#0a0520" stroke-width="1.4" filter="url(#skr1x497)"/><polygon points="501.0,451.1 542.0,508.9 501.7,568.3 457.6,511.9" fill="url(#suitHir1x497)" opacity=".45"/></g><g><polygon points="868.3,690.1 901.6,691.7 833.6,271.1" fill="url(#blader1x497)" stroke="#ffd700" stroke-width="1.8" filter="url(#wmr1x497)"/><line x1="892.8" y1="691.4" x2="841.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><polygon points="910.2,691.0 942.1,692.2 986.8,271.4" fill="url(#blader1x497)" stroke="#ffd700" stroke-width="1.8" filter="url(#wmr1x497)"/><line x1="941.8" y1="691.4" x2="979.8" y2="271.4" stroke="rgba(255,255,255,.58)" stroke-width="1.3"/><rect x="862.8578344579414" y="681.7866464736871" width="96.0" height="26.0" rx="2" fill="url(#bevelr1x497)" stroke="#ffd700" stroke-width="1.4" filter="url(#wmr1x497)"/></g><rect x="450.4204958399758" y="556.6637132636271" width="100.0"  height="56.0" fill="#503400" stroke="#ffd700" stroke-width="2.2" filter="url(#skr1x497)"/><rect x="424.9897847414948" y="575.9358684468083" width="152.0" height="26.0" fill="url(#bevelr1x497)" fill-opacity=".65" stroke="#ffd700" stroke-width="1.2" filter="url(#skr1x497)"/><polygon points="306.5,381.3 349.7,293.0 498.7,279.8 649.4,293.0 691.2,378.8 670.5,503.8 498.5,564.2 331.0,502.8" fill="url(#suitr1x497)" stroke="#ffd700" stroke-width="2.8" filter="url(#skr1x497) url(#metalr1x497)"/><polygon points="309.5,380.4 351.8,295.8 500.6,277.8 650.3,295.1 690.7,381.3 667.5,504.5 501.5,563.7 332.3,502.1" fill="url(#carbonr1x497)"/><polygon points="380.6,301.4 501.5,285.5 620.0,302.7 608.5,381.1 390.9,382.1" fill="url(#suitHir1x497)"/><polygon points="381.5,380.3 364.7,424.2 433.5,503.8 500.2,528.7 566.1,502.1 634.3,426.0 620.5,379.4" fill="#0a0520" fill-opacity=".88" stroke="#ffd700" stroke-width="1.8" filter="url(#skr1x497)"/><polygon points="380.3,411.1 475.6,412.9 483.0,439.0 387.1,438.3" fill="#ffd700" filter="url(#glowr1x497)"/><polygon points="524.6,412.2 617.8,413.0 612.5,440.2 514.7,439.9" fill="#ffd700" filter="url(#glowr1x497)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="485.54550604788585" y1="414.23378008911385" x2="515.3796095907129" y2="414.74760330375284" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="485.8326839795895" y1="439.16392807792874" x2="516.1555222482793" y2="438.9291839461774" stroke="#ffd700" stroke-opacity=".52" stroke-width="2"/><line x1="501.6408829567023" y1="456.1092311895452" x2="501.1402863919735" y2="481.80840217014776" stroke="#ffd700" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x497)"/><line x1="455.52529785165564" y1="491.29941440084946" x2="453.6969818012603" y2="520.8108503879979" stroke="#ffd700" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x497)"/><line x1="478.7153810347