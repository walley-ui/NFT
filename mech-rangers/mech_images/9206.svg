l(#wmr1x9206)"/><polygon points="33.7,294.0 171.4,292.3 172.9,590.7 103.7,727.3 32.7,591.5" fill="url(#carbonr1x9206)"/><polygon points="64.8,361.8 139.4,359.9 139.1,540.4 102.8,633.1 63.2,541.0" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="50.2718289758451" y1="430.1013818375766" x2="153.1720774835348" y2="430.70723651507865" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.35049001904201" y1="330.6668678511865" x2="102.01672278730196" y2="592.8332687094808" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="33.51820604264733" y1="296.11510535404085" x2="169.0664433594234" y2="295.8667751521803" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="101.3574728317931" cy="431.68682215511797" r="18.0" fill="url(#bevelr1x9206)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x9206)"/></g><rect x="449.8635942354798" y="555.4721138327383" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x9206)"/><rect x="422.42724122535435" y="574.447475054767" width="152.0" height="26.0" fill="url(#bevelr1x9206)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x9206)"/><polygon points="308.5,380.1 348.6,292.8 499.0,279.4 649.7,294.6 690.3,379.7 670.2,504.3 500.6,564.0 332.0,505.4" fill="url(#suitr1x9206)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x9206) url(#metalr1x9206)"/><polygon points="307.7,381.4 348.5,295.7 500.1,279.0 648.2,294.9 691.5,381.4 668.0,501.9 500.6,564.2 330.6,503.6" fill="url(#carbonr1x9206)"/><polygon points="381.7,303.4 501.2,286.6 620.6,303.1 609.0,379.5 394.0,379.2" fill="url(#suitHir1x9206)"/><polygon points="380.9,379.7 365.8,424.3 432.0,503.7 500.4,529.0 568.3,504.1 634.0,425.3 618.5,381.3" fill="#0d1520" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x9206)"/><polygon points="382.7,411.3 478.6,411.0 486.4,441.3 388.0,440.5" fill="#2060ff" filter="url(#glowr1x9206)"/><po