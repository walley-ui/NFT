ke-width="2.6" filter="url(#wmr1x8963)"/><polygon points="32.0,292.5 171.4,293.3 170.4,591.7 101.0,725.3 31.9,591.1" fill="url(#carbonr1x8963)"/><polygon points="63.2,361.1 139.5,359.9 140.5,541.3 103.0,632.8 65.4,541.6" fill="#2060ff" fill-opacity=".28" stroke="#2060ff" stroke-width="1.5"/><line x1="49.59214868372303" y1="430.0898952975869" x2="154.70742917884138" y2="430.8979433873668" stroke="#2060ff" stroke-opacity=".65" stroke-width="1.3"/><line x1="100.43730415137482" y1="330.9453939204104" x2="102.92800590101626" y2="592.2619248712435" stroke="#2060ff" stroke-opacity=".4" stroke-width="1"/><line x1="33.198126721139964" y1="298.1280702436343" x2="171.22168010858815" y2="295.9819375270977" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="100.70760027546433" cy="431.61552756596353" r="18.0" fill="url(#bevelr1x8963)" stroke="#2060ff" stroke-width="1.2" filter="url(#wmr1x8963)"/></g><rect x="448.7872303954326" y="557.2375755318441" width="100.0"  height="56.0" fill="#003ccc" stroke="#2060ff" stroke-width="2.2" filter="url(#skr1x8963)"/><rect x="422.9337687292136" y="574.9326051917859" width="152.0" height="26.0" fill="url(#bevelr1x8963)" fill-opacity=".65" stroke="#2060ff" stroke-width="1.2" filter="url(#skr1x8963)"/><polygon points="306.7,379.1 351.0,292.8 498.3,277.2 650.5,295.2 690.4,381.0 668.8,505.2 501.0,566.8 332.0,503.7" fill="url(#suitr1x8963)" stroke="#2060ff" stroke-width="2.8" filter="url(#skr1x8963) url(#metalr1x8963)"/><polygon points="307.4,380.3 348.6,295.4 500.7,276.5 650.2,293.9 692.2,381.4 668.5,505.0 498.2,564.4 330.8,503.6" fill="url(#carbonr1x8963)"/><polygon points="379.2,303.7 500.7,285.9 619.0,301.6 609.0,379.0 391.0,380.9" fill="url(#suitHir1x8963)"/><polygon points="379.8,379.2 365.1,426.1 434.0,503.9 499.6,527.1 565.8,503.0 635.2,426.2 620.8,381.4" fill="#08001e" fill-opacity=".88" stroke="#2060ff" stroke-width="1.8" filter="url(#skr1x8963)"/><polygon points="382.2,411.4 477.0,411.9 484.3,438.9 389.7,441.4" fill="#2060ff" filter="url(#glowr1x8963)"/><polygon points="523.5,411.6 620.2,411.6 611.0,439.8 516.6,441.8" fill="#2060ff" filter="url(#glowr1x8963)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="483.005133678168" y1="411.8785833042115" x2="514.7636807901226" y2="414.0790955881588" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="485.81492545424027" y1="437.2731831902638" x2="513.5660942471028" y2="436.5178795362823" stroke="#2060ff" stroke-opacity=".52" stroke-width="2"/><line x1="501.23091371338813" y1="453.5424239501357" x2="500.4210366596468" y2="484.0064743203111" stroke="#2060ff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x8963)"/><line x1="452.22269118091094" y1="493.06193318441507" x2="452.9560817664303" y2="519.1680077817291" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8963)"/><line x1="475.88462846077977" y1="491.1923009001649" x2="475.29026937237006" y2="520.497385850735" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8963)"/><line x1="500.28871600590645" y1="490.6434298319742" x2="500.17433259729296" y2="518.9859281081706" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8963)"/><line x1="521.88798648227" y1="491.36164823230354" x2="522.4600927300378" y2="520.4199019905179" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8963)"/><line x1="547.6627347959392" y1="490.4531650916673" x2="546.487170511596" y2="521.0127728921361" stroke="#2060ff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x8963)"/><polygon points="432.9,503.4 568.4,505.4 553.7,556.9 446.0,555.6" fill="#003ccc" fill-opacity=".72" stroke="#2060ff" stroke-width="1.3" filter="url(#skr1x8963)"/><text x="30.0"  y="975.0" font-family="monospace" font-weight="bold" font-size="22.0" fill="rgba(255,255,255,.22)">#0001</text><text x="500.0"  