e x1="97.1550466916896" y1="771.3827071857638" x2="89.15501939760517" y2="130.49663333985953" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="73.4,151.8 139.7,151.8 83.0,-10.1" fill="url(#blader1x274)" stroke="#ffcc00" stroke-width="1.8" filter="url(#wmr1x274)"/><line x1="140.2" y1="151.4" x2="84.2" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="81.97513703931119" y="421.2134554701857" width="40.0" height="20.0" fill="url(#bevelr1x274)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x274)"/><rect x="83.51498469192532" y="510.5725501630455" width="40.0" height="20.0" fill="url(#bevelr1x274)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x274)"/><rect x="81.45331331737336" y="600.8702341582626" width="40.0" height="20.0" fill="url(#bevelr1x274)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x274)"/><rect x="84.2548445325717" y="690.3144398299977" width="40.0" height="20.0" fill="url(#bevelr1x274)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x274)"/><ellipse cx="101.25387359824029" cy="790.0654196172952" rx="22.0" ry="15.0" fill="url(#bevelr1x274)" stroke="#ffcc00" stroke-width="1" filter="url(#wmr1x274)"/></g><rect x="450.98576280679555" y="555.6043219342828" width="100.0"  height="56.0" fill="#a07000" stroke="#ffcc00" stroke-width="2.2" filter="url(#skr1x274)"/><rect x="423.5336363716982" y="574.122254070174" width="152.0" height="26.0" fill="url(#bevelr1x274)" fill-opacity=".65" stroke="#ffcc00" stroke-width="1.2" filter="url(#skr1x274)"/><polygon points="307.2,379.8 348.7,295.5 501.4,278.2 651.1,295.6 692.4,381.1 669.8,504.6 501.1,565.8 332.8,503.9" fill="url(#suitr1x274)" stroke="#ffcc00" stroke-width="2.8" filter="url(#skr1x274) url(#metalr1x274)"/><polygon points="308.4,380.0 351.1,294.9 499.9,278.7 650.3,294.1 692.0,379.9 667.5,502.0 498.4,565.6 329.6,502.4" fill="url(#carbonr1x274)"/><polygon points="382.3,302.0 500.7,285.7 617.8,304.2 606.6,380.5 391.0,382.2" fill="url(#sui