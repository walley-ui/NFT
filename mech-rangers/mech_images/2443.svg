" fill="url(#carbonr1x2443)"/><polygon points="379.5,304.4 499.7,285.5 617.7,301.8 606.8,380.9 392.5,379.7" fill="url(#suitHir1x2443)"/><polygon points="381.4,381.6 367.2,425.6 434.3,503.1 500.3,528.6 568.9,503.1 633.6,425.1 620.5,380.8" fill="#0d1520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x2443)"/><polygon points="382.7,411.1 475.3,412.1 484.4,438.9 389.8,439.0" fill="#ccccff" filter="url(#glowr1x2443)"/><polygon points="521.9,409.9 620.7,411.1 610.9,440.1 514.6,439.1" fill="#ccccff" filter="url(#glowr1x2443)"/><ellipse cx="430.9" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><ellipse cx="569.1" cy="425.7" rx="38.4"  ry="8.2" fill="#ffffff" opacity=".88"/><line x1="484.2745968270674" y1="411.60823649056255" x2="515.1265057550185" y2="412.946438963525" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="486.39325870253145" y1="438.6347608147189" x2="516.1553866089695" y2="436.456486800313" stroke="#ccccff" stroke-opacity=".52" stroke-width="2"/><line x1="499.09273712448777" y1="454.5568359703757" x2="499.9747899468057" y2="482.53822973771025" stroke="#ccccff" stroke-opacity=".58" stroke-width="2.2" filter="url(#skr1x2443)"/><line x1="455.10052802309394" y1="491.6888056326657" x2="454.46814149057496" y2="519.4916828525253" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2443)"/><line x1="475.42412413399666" y1="491.77833773940796" x2="478.37087869312614" y2="521.5140323899686" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2443)"/><line x1="500.51017920151355" y1="492.2280723457224" x2="498.9486023190431" y2="519.5584746103734" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2443)"/><line x1="521.70678323308" y1="490.08827716270457" x2="523.7444404416344" y2="521.0018288934604" stroke="#ccccff" stroke-opacity=".52" stroke-width="1.5" filter="url(#skr1x2443)"/><line x1="545.6724307797105" y1="490.3033361593261" x2="545.003843