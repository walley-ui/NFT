lter="url(#wmr1x2980)"/><rect x="828.7874503857084" y="422.77144117821007" width="148.0" height="82.0" rx="5" fill="url(#carbonr1x2980)"/><rect x="837.272383782696" y="403.54963025609027" width="90.0" height="22.0" rx="3" fill="url(#barrelr1x2980)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x2980)"/><circle cx="876.4484545403719" cy="412.7546431421302" r="15.0" fill="#ff2040" opacity=".8" filter="url(#glowr1x2980)"/><circle cx="877.7018337642402" cy="413.06845865398645" r="6.0" fill="rgba(255,255,255,.9)"/><rect x="944.3476719858684" y="454.66301447739824" width="78.0" height="36.0" rx="5" fill="url(#barrelr1x2980)" stroke="#ff2040" stroke-width="1.2" filter="url(#wmr1x2980)"/><circle cx="1020.0886168805511" cy="471.8969347082078" r="18.0" fill="#ff2040" filter="url(#glowr1x2980)" opacity=".88"/><circle cx="1020.4384694505111" cy="469.90592770511284" r="7.0" fill="#ffffff"/><rect x="873.6703663110361" y="500.8091118434444" width="44.0" height="42.0" rx="3" fill="url(#gunmetalr1x2980)" stroke="#ff2040" stroke-width="1" filter="url(#wmr1x2980)"/><rect x="832.309465921633" y="421.6069668794982" width="90.0" height="10.0" rx="2" fill="rgba(255,255,255,.22)"/><line x1="857.9126451601834" y1="487.1492924204096" x2="859.1497157133743" y2="520.239934737049" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="874.5677551235632" y1="485.57152538904916" x2="873.6813576540537" y2="520.8595303319395" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/><line x1="891.2127716536262" y1="485.23785549467425" x2="890.8504426400737" y2="518.9081358260474" stroke="#ff2040" stroke-opacity=".5" stroke-width="1.2"/></g><rect x="451.0528057166375" y="558.2448213341646" width="100.0"  height="56.0" fill="#cc0020" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x2980)"/><rect x="425.71642531836403" y="574.2092961171642" width="152.0" height="26.0" fill="url(#bevelr1x2980)" fill-opacity=".65" stroke="#ff2040" stroke-width="1.2" filter="url(#skr1x2980)"/><polygo