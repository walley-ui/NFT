ight="42.0" fill="url(#bevelr1x3016)" stroke="#ff2040" stroke-width="1.4" filter="url(#glowr1x3016)"/><rect x="487.6" y="641.6" width="28.0" height="22.0" rx="1" fill="rgba(255,255,255,.48)"/><polygon points="152.0,468.3 235.3,467.4 258.1,733.4 127.3,733.2" fill="url(#suitr1x3016)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3016) url(#metalr1x3016)"/><polygon points="172.4,433.1 251.9,431.4 242.6,510.2 160.1,511.2" fill="url(#bevelr1x3016)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3016)"/><polygon points="162.0,622.1 241.8,623.4 238.9,661.5 167.0,660.8" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x3016)"/><polygon points="766.2,466.9 845.8,466.4 872.1,735.8 742.7,735.9" fill="url(#suitr1x3016)" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3016) url(#metalr1x3016)"/><polygon points="747.8,433.7 825.0,432.8 839.4,509.0 757.0,512.3" fill="url(#bevelr1x3016)" fill-opacity=".72" stroke="#ff2040" stroke-width="2.2" filter="url(#skr1x3016)"/><polygon points="755.8,621.5 840.4,622.9 835.8,659.9 761.8,659.5" fill="#ff2040" fill-opacity=".42" stroke="#ff2040" stroke-width="1" filter="url(#skr1x3016)"/><rect x="118.6"  y="699.3" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x3016)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x3016)"/><rect x="747.9"   y="700.6" width="135.3" height="85.0" rx="4" fill="url(#bevelr1x3016)" stroke="#ff2040" stroke-width="1.8" filter="url(#skr1x3016)"/><line x1="150.9" y1="701.9" x2="149.3" y2="785.6" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="776.6" y1="703.6" x2="777.8" y2="785.4" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="184.0" y1="700.7" x2="183.4" y2="784.5" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="810.7" y1="701.0" x2="810.2" y2="784.2" stroke="#ff2040" stroke-opacity=".38" stroke-width="1"/><line x1="215.4" y1="703.3" x2="215.2" y2="782.4" stroke="#ff2040" stroke