ke-linecap="round" filter="url(#wmr1x1420)"/><line x1="903.456051133629" y1="771.1841079209931" x2="913.3352751860023" y2="131.98939537899565" stroke="rgba(255,255,255,.42)" stroke-width="5.0" stroke-linecap="round"/><polygon points="871.0,150.8 934.9,150.7 916.2,-6.9" fill="url(#blader1x1420)" stroke="#4444ff" stroke-width="1.8" filter="url(#wmr1x1420)"/><line x1="935.8" y1="151.4" x2="915.8" y2="-8.6" stroke="rgba(255,255,255,.72)" stroke-width="1.6"/><rect x="879.0618949600123" y="421.36992694092913" width="40.0" height="20.0" fill="url(#bevelr1x1420)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1420)"/><rect x="878.6561430436187" y="510.51500739697366" width="40.0" height="20.0" fill="url(#bevelr1x1420)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1420)"/><rect x="879.0004157278314" y="603.0224647135474" width="40.0" height="20.0" fill="url(#bevelr1x1420)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1420)"/><rect x="880.1226502010227" y="692.2529972852208" width="40.0" height="20.0" fill="url(#bevelr1x1420)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1420)"/><ellipse cx="897.8213865641133" cy="791.6742628698237" rx="22.0" ry="15.0" fill="url(#bevelr1x1420)" stroke="#4444ff" stroke-width="1" filter="url(#wmr1x1420)"/></g><rect x="451.0736784014851" y="557.1319455601275" width="100.0"  height="56.0" fill="#141428" stroke="#4444ff" stroke-width="2.2" filter="url(#skr1x1420)"/><rect x="424.26722445832564" y="574.7647103948519" width="152.0" height="26.0" fill="url(#bevelr1x1420)" fill-opacity=".65" stroke="#4444ff" stroke-width="1.2" filter="url(#skr1x1420)"/><polygon points="307.1,381.3 350.3,295.1 501.4,278.3 650.0,294.8 692.8,380.9 668.3,504.7 499.2,566.5 331.1,503.9" fill="url(#suitr1x1420)" stroke="#4444ff" stroke-width="2.8" filter="url(#skr1x1420) url(#metalr1x1420)"/><polygon points="307.8,379.1 351.9,293.6 499.6,279.4 648.2,295.2 693.5,379.9 669.0,502.8 501.5,566.5 329.9,505.0" fill="url(#carbonr1x1420)"/><polygon points="38