.5,293.6 173.1,591.2 103.8,727.9 33.9,590.5" fill="url(#carbonr1x9106)"/><polygon points="64.6,361.4 139.2,360.6 139.4,539.9 103.0,631.4 65.1,541.8" fill="#ccccff" fill-opacity=".28" stroke="#ccccff" stroke-width="1.5"/><line x1="51.48601381195706" y1="430.00961121786384" x2="153.54715533241625" y2="431.9960526913404" stroke="#ccccff" stroke-opacity=".65" stroke-width="1.3"/><line x1="102.22195277785879" y1="332.1030125089921" x2="103.94941630078476" y2="591.9038832137361" stroke="#ccccff" stroke-opacity=".4" stroke-width="1"/><line x1="35.5608339620195" y1="296.86959562143306" x2="171.76896961893883" y2="296.0065888543613" stroke="rgba(255,255,255,.5)" stroke-width="2"/><circle cx="102.34408453427253" cy="431.0980473881587" r="18.0" fill="url(#bevelr1x9106)" stroke="#ccccff" stroke-width="1.2" filter="url(#wmr1x9106)"/></g><rect x="450.49050295874474" y="556.9212986162863" width="100.0"  height="56.0" fill="#242438" stroke="#ccccff" stroke-width="2.2" filter="url(#skr1x9106)"/><rect x="422.82400186331944" y="574.3526768614538" width="152.0" height="26.0" fill="url(#bevelr1x9106)" fill-opacity=".65" stroke="#ccccff" stroke-width="1.2" filter="url(#skr1x9106)"/><polygon points="308.8,381.2 349.6,294.5 501.8,278.7 648.5,294.6 692.4,381.3 668.5,502.1 498.4,566.1 332.4,504.6" fill="url(#suitr1x9106)" stroke="#ccccff" stroke-width="2.8" filter="url(#skr1x9106) url(#metalr1x9106)"/><polygon points="307.9,378.8 350.6,296.1 500.5,277.0 650.2,295.3 690.3,379.6 669.1,504.1 500.3,566.2 330.7,504.6" fill="url(#carbonr1x9106)"/><polygon points="382.3,301.2 498.4,284.9 617.9,301.6 606.3,382.3 391.8,378.9" fill="url(#suitHir1x9106)"/><polygon points="380.7,379.1 365.0,425.7 431.3,503.4 498.7,527.0 567.8,503.2 635.4,424.3 618.6,380.6" fill="#0a0520" fill-opacity=".88" stroke="#ccccff" stroke-width="1.8" filter="url(#skr1x9106)"/><polygon points="379.8,411.9 475.6,411.4 484.2,440.4 388.0,440.3" fill="#ccccff" filter="url(#glowr1x9106)"/><polygon points="523.6,412.7 618.2,412.0 612.1